body:
  text: 卷之二太陽中篇傷寒證治第二傷寒正治太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒前總脈總證中已先並舉中風傷寒所同有之脈證矣而尚未分其何以為中風何以為傷寒也此篇即於篇首脈浮頭項強痛之總脈證中又增入已發熱未發熱惡寒頭痛嘔逆及脈之陰陽俱緊以別其為傷寒所現之脈證有如此也傷寒者寒傷營也營在衛內而屬陰寒本陰邪其性鋒鋭故深入而傷營也寒邪入腠玄府緊閉陽氣不得發泄未有不鬱而為熱者此言或已發熱或未發熱者言其發熱之候雖有或早或遲而皆必惡寒體痛嘔逆也稱惡寒而不言惡風者以寒傷營而言也下文雖有惡風無汗之條蓋以營衛表裡相連寒邪由衛入營營傷則衛必先傷是以亦惡風也體痛者寒傷營分也營者血中精專之氣也血在脈中隨營氣而流貫滋養夫一身者也生氣通天論云聖人陳陰陽而筋脈和同氣血皆從此因寒邪入於血脈之分營氣澀而不快於流行故身體骨節皆痛也嘔逆氣逆而嘔也胸膈為太陽之區界邪在胸膈故氣逆而為嘔也然各經之嘔不一唯惡寒發熱脈緊無汗之嘔則為太陽之本證也當以各經之兼證別之則自分矣如傷寒嘔多雖有陽明證不可攻之蓋以太陽表證未去亦屬太陽之嘔也若發熱無汗之傷寒嘔不能食而反汗出濈濈然者是轉屬陽明之嘔也又如食谷欲嘔者屬陽明也又若嘔而往來寒熱者屬少陽之類是也脈緊者如索之緊絞也脈經謂緊與弦相類辨脈篇云弦者狀如弓弦按之不移也緊者如轉索無常也脈陰陽俱緊者言取之浮候固緊而按之沉候亦緊也前中風為陽邪所以僅傷衛分之陽故陽浮而陰弱此以寒邪鋒鋭深入營分寒邪由衛入營營衛俱受傷故脈之陰陽俱緊也病機十九條云諸寒收引皆屬於腎腎與膀胱相為表裡故寒在太陽而脈緊也緊則為寒氣所傷故名之曰傷寒也然非獨冬令為然也六氣之變四時皆有之特以冬月為多耳以下凡稱傷寒而用麻黃湯者皆同此脈證也以寒傷營為第二層故以之為太陽中篇也辨誤夫寒雖六氣之一實冬令嚴寒肅殺之藏氣也天地之陽氣自春令上升出地而發生萬物至夏令而暢茂盛長矣盛極當衰故行秋令以收斂成實是為西成既成則有冬氣以藏之又為來春發生之根本故冬藏之寒氣乃天地萬物成始成終之正氣所以不可傷傷之則為病矣然何以傷之即病乎蓋天地之陽氣至十月則陰氣已極卦屬純坤十一月而一陽生於盛陰之中在卦為復其象為坎一陽居於二陰之中以寒水為之胞胎涵藏深固潛養初陽所謂潛龍勿用也待漸長出地而為東震發生之主故其卦為泰乃立春之候也至二月而陽氣始壯透地上騰而為風矣由此天造草昧之時而雷霆風雨萬物化生草木條達矣若傷其寒水之胞胎則藏陽損泄至春而不能暢達則六氣不時旱潦不均饑荒薦至矣人身以腎為冬臟命門之真陽藏於兩腎之中即坎卦之象乃大極中涵藏之元氣也為生氣之本三焦之原一陽藏於兩腎寒水之中潛養固密則元陽充足然後清陽之氣升越上騰蒸穀氣而外達則為衛氣遊一身而布化則為三焦若此火損傷則三焦無以布其陽氣上焦無此則耳目失其聰明中焦無此則水穀不能運化下焦無此則氣化不得流行二陰之竅不利況不能蒸騰其慓悍滑疾之穀氣以外衛皮膚致腠理不密而風寒溫暑之邪乘虛而中之矣故曰冬傷於寒春必溫病此內經言未病之前先傷於寒也所謂冬傷於寒者言傷其冬臟主蟄封藏之本寒水不能固養其元陽以致三焦肝膽之陽氣不旺不能敷布其陽春生髮之衛氣使腠理不密玄府空疏外邪得以襲之而成溫也至若此篇之所謂傷寒者乃仲景專指寒邪侵入營衛鬱於腠理之間陽氣不得發泄惡寒發熱之外邪已病之傷寒也叔和不曉陰陽未達至理軒岐之旨罔窺仲景之玄未悟妄以內經之冬傷於寒認為仲景之傷寒不分已病未病不辨先天后天遂引內經冬傷於寒以證仲景論中傷寒二字究不能解冬傷於寒因何直待春令而始溫病又不能解熱論所云凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑以既感之寒邪何故肯遙隔半年三月然後發動想其下筆之際必大為扼腕不得已而強為一說曰不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病若寒邪果肯安然久處於肌膚則素問玉機真藏論中之風寒客於人使人毫毛畢直皮膚閉而為熱之說豈反為虛語耶自有叔和之說而千古之惑從此始矣不意唐啓玄子王冰亦不察其誤謬遂於素問陰陽應象論中冬傷於寒句下引此數語以作注腳又因此而使天下後世之人皆認為經文之本意如此莫識其為叔和之謬語視之不啻若鼎鍾銘勒之文金石不磨之論悉崇信之而不疑動輒引之以為證據無論智愚鮮有不陷溺其說而入其彀中者矣餘四氣之旨詳載在素問生氣通天論及陰陽應象論注中此篇不及俱載僅略舉其一端以辨傷寒二字之疑似為千古之訛耳太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之上條雖具脈證以正傷寒之名而傷寒之證猶未備也故於此條補出諸證並出其主治之法也其於兩條中互見者蓋示人以傷寒之見證非必悉具亦或有不齊也邪在太陽必頭痛前雖見之總證而本條猶未見也故仍補出曰身疼腰痛骨節疼痛者所以分疏上文體痛之義至真要大論云諸寒收引皆屬於腎腰者腎之府也骨者腎之所主也腎與膀胱一臟一腑相為表裡且足太陽膀胱之經挾背脊而行於兩旁邪在太陽故腰痛骨節疼也惡風雖或可與惡寒互言然終是營傷衛亦傷也何則衛病則惡風營居衛內寒已入營豈有不從衛分而入者乎故亦惡風也無汗而喘者肺主皮毛寒邪在表內通於肺邪氣不得發泄肺氣不宣通故無汗而喘也寒邪非汗泄不解故以麻黃湯主之麻黃湯方麻黃三兩去節桂枝二兩甘草一兩杏仁七十個去皮研上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息麻黃氣味輕薄辛溫發散肺經開鬼門之專藥也杏仁苦辛滑利肺氣之要藥也仲景治太陽傷寒皆用手太陰藥者以肺主皮毛故也用甘草者經云寒淫所勝平以辛熱佐以苦甘是也一劑之中唯桂枝為衛分解肌之藥而能與麻黃同發營分之汗者以衛居營外寒邪由衛入營故脈陰陽俱緊陽脈緊則衛分受傷陰脈緊則邪傷營分所以欲發營內之寒邪先開衛間之出路方能引邪由營達衛汗出而解也故李時珍本草發明下云麻黃乃肺經專藥故治肺病多用之張仲景治傷寒無汗用麻黃有汗用桂枝歷代名醫解釋皆隨文附會未有究其精微者時珍嘗思之似有一得與昔人所解不同夫津液為汗汗即血也在營則為血出衛則為汗大寒傷營營血內澀不能外通於衛衛氣閉固津液不行故無汗發熱而憎寒夫風傷衛衛氣受邪不能內護於營營氣虛弱津液不固故有汗發熱而惡風然風寒之邪皆由皮毛而入皮毛者肺之合也肺主衛氣包羅一身天之象也證雖屬乎太陽而肺實受邪氣其證時兼面赤怫鬱咳嗽痰喘胸滿諸證者非肺病乎蓋皮毛外閉則邪熱內攻而肺氣膹郁故麻黃甘草同桂枝引出營分之邪達之肌表佐以杏仁泄肺而利氣是則麻黃湯雖太陽發汗重劑實為發散肺經火鬱之藥也瀕湖此論誠千古未發之祕奈何前輩見仲景用之以發太陽之汗遂以為足太陽藥又以麻黃為發汗之藥桂枝為固衛止汗之藥若桂枝果能止汗仲景豈反用之以助麻黃而發汗耶後人有用麻黃而監之以桂枝見節制之妙更有馭六馬而執轡唯謹恆虞其泛軼之說豈理也哉脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯此二條所申脈浮及浮數者亦可發汗不必皆緊脈也按脈法浮則為風緊則為寒脈浮惡風自汗者當用桂枝湯解之脈緊惡寒無汗者當以麻黃湯汗之中風用麻黃湯則為誤汗傷寒用桂枝湯尤為禁劑此條以脈但浮而曰可發汗宜麻黃湯豈仲景之誤耶以理測之脈雖浮數而不緊必有惡寒體痛無汗之見症故以麻黃湯發汗也若脈浮而數者尤似乎脈浮而動數之太陽中風矣不知已發熱之傷寒其脈亦可浮數也但察其所見之證有惡寒無汗等證則仍是寒傷營也然脈既浮數則鬱熱之邪猶在表經云可汗而已也故曰可發汗宜麻黃湯辨誤寒邪在表則脈浮已發熱者則脈數此其常也因上文有陰陽俱緊之脈法然寒邪在表亦可浮緊恐人拘泥故又申此二條以明傷寒脈浮及浮數者亦可用麻黃湯但以有汗無汗別之可也注傢俱因仲景有脈數急者為欲傳句遂謂乘其欲散而拓出之散其數而不令其至於傳後人因之又巧為之說曰乘其勢正欲傳用麻黃擊其半渡而驅之使出以理推之恐不必作如是解傷寒一日太陽受之脈若靜者為不傳頗欲吐若燥煩脈數急者為傳也傷寒一日太陽受之者即內經熱論所謂一日巨陽受之二日陽明受之之義也因太陽主表總統營衛故先受邪也然寒傷營之證其脈陰陽俱緊或見浮緊之脈若一日之後脈安靜恬退則邪輕而自解不至傳入他經矣倘見證頗覺欲吐則傷寒嘔逆之證猶未除也況吐則邪入胃乃內入之機若口燥而煩熱脈數急者為邪氣已郁為熱其氣正盛勢未欲解故為傳經之候也傷寒二三日陽明少陽證不見者為不傳也二三日熱論所謂二日陽明受之三日少陽受之也然未必太陽之邪必先傳陽明而後傳少陽也或入陽明或入少陽未可定也若以常法論之則二日當傳陽明三日當傳少陽若二三日陽明少陽證不見者是邪氣止在一經故為不傳也傷寒失治太陽病脈浮緊發熱身無汗自衄者愈浮緊寒傷營之脈也發熱無汗寒傷營之證也自衄鼻血自出言失治而至於自衄也傷寒之脈證既具自當發其汗矣蓋汗為營血之所化陽氣鬱蒸而使陰液外泄則營分之寒邪隨汗外泄而解矣身既無汗營邪不得外泄鬱熱傷營迫血妄行從鼻竅而出熱邪亦得隨血外泄而愈也血猶汗也汗即血也血與汗皆能泄營分之邪故自衄者愈傷寒脈浮緊不發汗因致衄者麻黃湯主之此重言以申明上文之義言上文所謂脈浮緊發熱身無汗而自衄者蓋失之於先以不發其汗熱鬱營血之中因而致衄耳若見其脈浮緊即知其寒邪在表當即以麻黃湯汗之則邪隨汗泄不至鬱熱傷營逼血上行致傷陰分矣故當先以麻黃湯主之則不至於衄也太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之此又承上文言雖服藥而未得盡除並詳其致衄之漸又推原其所以然之故也言邪在太陽脈浮緊而無汗發熱身疼痛不早發其汗至八九日之久而不解猶未陷入於裡而表證仍在者此等仍當發其汗若服解表藥已而病微除者非藥力輕薄不足以汗去其邪即汗不徹而邪不得盡除也邪之所除既微則留邪甚盛鬱而不泄所以發煩眩冒而目瞑也其邪氣之劇者必至鬱熱傷營陰受煎迫血熱上行從鼻竅而衄矣衄則熱邪上越乃得解也原其所以然者以寒邪在太陽之表陽分鬱熱之邪氣太重故也陽邪既重則從前發汗時當以麻黃湯主之邪可盡除不至發煩目瞑直待衄血而後解矣辨誤條辨以風為陽邪寒為陰邪泥為定法故以浮緊身疼無汗屬傷寒以陽氣重句屬中風又以發煩為風壅目瞑為寒鬱謂衄後風邪已解而寒性沉滯須以麻黃湯發之尚論遂因之以立說亦謂此乃風多寒少之證陽氣重者風屬陽而入衛為寒所持雖得衄解仍主麻黃湯以發其未盡之沉滯兩傢俱以此三條入太陽下篇以為風寒並感之證誤矣豈知風寒之本性雖有陰陽之分而其中人也無論中風傷寒在陽經則為陽邪入陰經則為陰邪此條雖屬寒邪已鬱而為熱又在陽經故曰陽氣非指中風之陽邪為陽氣也如果是風寒並感則當用桂枝麻黃各半等湯及大青龍湯矣何故獨以麻黃湯主之耶若云衄後風邪已去不必桂枝解肌所以獨用麻黃則去道遠矣仲景本雲表證仍在當發其汗又以服藥不能盡除以致發煩目瞑至衄血乃解又恐後人未達其旨而又原其所以然之故以陽邪太重輕劑無益當以麻黃湯汗泄其邪則不至邪郁不伸發煩目瞑而衄矣非謂衄後可更用麻黃湯也若衄後可用則禁汗例中惡得有衄家不可發汗之戒乎且前條已有自衄者愈並不主之以麻黃湯次條有不發汗因致衄者方云以麻黃湯主之義自明矣何庸二三其說耶傷寒脈結代心動悸者炙甘草湯主之傷寒而見結代之脈則知其真氣已虛經血枯澀矣氣虛則流行失度血澀則脈道不利故脈見結代也五臟生成篇云脈之合心也脈要精微論云脈者血之府也心為藏神主血之臟因氣血虛衰心神搖動氣餒而惕惕然悸動也此為陰陽並虛法當氣血兼補故以炙甘草湯主之炙甘草湯方甘草四兩炙生薑三兩桂枝三兩人參二兩麥冬半升生地黃一斤阿膠二兩麻仁半斤大棗十二枚擘上九味以清酒七升水八升先煮八味取三升去滓內阿膠煬化盡溫服一升日三服一名復脈湯此方以炙甘草為君故名炙甘草湯又能使斷脈復續故又名復脈湯甘草生能瀉心下之痞熟能補中氣之虛故以為君生薑以宣通其鬱滯桂枝以暢達其衛陽入大棗而為去芍藥之桂枝湯可解邪氣之留結麥冬生津潤燥麻仁油滑潤澤生地黃養血滋陰通血脈而益腎氣阿膠補血走陰乃濟水之伏流所成濟為十二經水中之陰水猶人身之血脈也故用之以導血脈所以寇氏本草云麥冬地黃阿膠麻仁同為潤經益血復脈通心之劑也人參補元氣之虛同麥冬又為生脈散之半更以清酒為使令其宣通百脈流行血氣則經絡自然流貫矣藥雖平和觀其斤量之重升量之多分兩之法雖有古今之異然較之他方已不同矣今人以一錢二錢及幾分作劑日飲一服而欲求其即效庸可得乎脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治此一節所以申上文結代之義而析言其狀也緩者脈來四至而軟弱寬緩也乃緊脈轉索絞急之對稱非若遲脈之三至及三至半也結者邪結也脈來停止暫歇之名猶繩之有結也凡物之貫於繩上者遇結必礙雖流走之甚者亦必少有逗留乃得過也此因氣虛血澀邪氣間隔於經脈之間耳虛衰則氣力短淺間隔則經絡阻礙故不得快於流行而止歇也動而中止者非辨脈法中陰陽相搏之動也謂緩脈正動之時忽然中止若有所遏而不得動也更來小數者言止後更勉強作小數小數者鬱而復伸之象也小數之中有脈還而反動者名曰結陰何以謂之結陰辨脈法云脈來緩時一止復來者名曰結脈脈來數時一止復來者名曰促脈陽盛則促陰盛則結此皆病脈以此觀之則此條乃脈緩中止為陰盛之結故謂之結陰也代替代也氣血虛憊真氣衰微力不支給如欲求代也動而中止句與結脈同不能自還因而復動者前因中止之後更來小數隨即有還者反動故可言自還此則止而未即復動若有不復再動之狀故謂之不能自還又略久復動故曰因而復動內經雖有數動一代者為病在陽之脈而此則從緩脈中來為陰盛之脈故謂之代陰也成氏謂結代之脈一為邪氣留結一為真氣虛衰即脈要精微論所謂代則氣衰者是也上文雖云脈結代者皆以炙甘草湯主之然結為病脈代為危候故又有得此脈者必難治句以申明其義蓋脈者陰陽氣血之所會隨呼吸而至者也故靈樞五十營篇云一呼脈再至氣行三寸一吸脈再至氣行三寸一呼一吸為一息脈四至而氣行六寸積十息而氣行六尺積至一百三十五息脈行八丈一尺漏下一刻日行十分六釐積至二百七十息脈行一十六丈二尺氣行交通於中而一周於身漏下二刻日行二十分零至一萬三千五百息氣行五十營於身水下一百刻日行二十八宿漏水皆盡而脈度終矣根結篇云五十營者五臟皆受氣持其脈口數其至也五十至而不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣豫之短期要在始終所謂五十動而不一代者以為常也以知五臟之期豫之短期者乍數乍疏也經義如此故曰得此脈者必難治傷寒禁汗脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以營氣不足血少故也浮緊傷寒之脈也法當身疼腰痛骨節疼痛宜以麻黃湯汗解之為是假若按其脈而尺中遲者不可發汗何以知之夫尺主下焦遲則為寒尺中遲是以知下焦命門真陽不足不能蒸穀氣而為營為衛也蓋汗者營中之血液也為熱氣所蒸由營達衛而為汗若不量其虛實而妄發之則亡陽損衛固不待言然營氣出於中焦衛氣出於下焦營衛皆出於三焦三焦皆根於命門命門涵藏於兩腎尺遲則知腎中之真元不足三焦之氣弱矣此以寒氣傷營汗由營出以尺中脈遲則知腎臟真元衰少營氣不足血少之故未可以汗奪血所以尤不可發汗也脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈脈浮數法當汗出而愈者即前第四條脈浮而數者可發汗之例也身重之證論中所見不一有風濕風溫風寒火逆及陰陽易三陽合病之不同此所謂身重者因邪未入里誤下而胃中陽氣虛損也凡陽氣盛則身輕陰氣盛則身重故童子純陽未雜而輕儇跳躍老人陰盛陽衰而肢體龍鍾是其驗也所以邪入於陽則狂邪入於陰則不能反側也誤下陽虛與誤汗陽虛無異此條心悸與發汗過多叉手冒心之心下悸同一裡虛之所致也但誤汗則先亡其衛外之陽而後及於里此因誤下而竟虛其里所以誤汗尚有桂枝甘草湯和衛之治此條脈浮而數法當汗出尚有表邪故無補里之法直待其津液自和而後汗出愈也須待也言脈浮數而發熱惡寒之邪在表若不汗解而誤下之邪氣雖未陷入而為痞結之變但身重心悸者則知陽氣已虛不可更發其汗當待其自汗出乃可解也其所以然者浮數之脈因誤下之後尺中之脈見微弱耳蓋尺中者腎脈也腎為藏精之府津液之主也然津液之流貫周行也皆命門真陽之氣蒸騰升降故能隨營衛而運行滋灌若見尺中脈微是裡虛而津液衰少陽虛而氣不蒸騰即上文尺中遲之變文也故不可發汗當待其下後所損之真陽漸復氣液蒸騰營衛流行則津液自和便自汗出而愈矣上條不立治法亦此義也辨誤前輩注釋見原文中有尺中脈微四字又見津液自和一語便泥定下多亡陰之說但以為陰虛而津液少故不可發汗不知津液之來皆生於蒸騰之陽氣苟非邪火燔灼焉得枯涸所謂火蒸水而為氣氣凝聚而為水陰陽相須水火升降然後氣液周流故謂之陰無陽不生也豈但亡其陰而陽氣獨無損乎觀尺中脈遲脈微二語明系陽虛之變現所以桂枝二越婢一湯之條內明言脈微弱者此無陽也詎可獨責之裡陰素虛乎大抵微遲之脈汗下皆不宜六經原文中彰彰可考也咽喉乾燥者不可發汗咽喉乾燥上焦無津液也上焦之津液即下焦升騰之氣也下焦之氣液不騰則咽喉乾燥矣少陰之脈循喉嚨挾舌本熱論篇云少陰脈貫腎絡於肺系舌本故口燥舌乾而渴也邪在少陰故氣液不得上騰即上文尺中微遲之類變也故曰不可發汗後人以為津液素虧發汗則竭陽明之津液誤矣皆由成氏以咽門為胃之系故也如此而反指前人以少陰立說者為謬揆之於理豈其然乎淋家不可發汗發汗則便血淋之為病有膏淋石淋血淋肉淋等之分雖有寒熱虛實之異然皆為腎虛之所致蓋腎主二陰之竅與膀胱相為表裡而為一合者也腎為臟而膀胱為腑臟為主而腑為使然腎為三焦之原三焦為命門之用若腎臟之真陽不充則三焦之氣化失常矣是以下焦之真氣衰弱則氣不流利而為澀為痛膀胱之氣化混淆則水不分清而為濁為黏矣而況淋之為病從精隧而出者乎肺為人身之天氣水液由肺氣而下行忽凝結而為膏為石猶之雨化為雹總為氣化之乖違衝脈為血之海其脈起於胞中謬隨氣液而滲入膀胱恰如涇流入渭悉屬陰陽之錯亂又非至真要大論之所謂水液渾濁皆屬於熱之赤白濁可比也且命門之真陽為衛氣之根本皮毛之衛氣乃真陽之外發發汗則外亡衛氣內喪真陽矣若傷寒家既有淋證則知腎氣已虛真陽虧損又豈可故發其汗乎倘不知禁忌而誤發其汗則必至於元陽敗泄真氣大虛陽不能固其陰氣不能攝其血致動少陰之血從便瀉而出矣其亦內經所云胞移熱於膀胱則為癃溺血之類乎衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠衄鼻出血也額上非即額也額骨堅硬豈得即陷蓋額以上之囟門也鼻雖為肺之竅而上通於腦貫督脈自額上巔由腦後風池風府大椎陶道靈臺至陽過命門而至長強前則內通於肺達膻中氣海而為呼吸之要道也脈急緊者言目系急緊也眴本作旬音絢目搖動也所謂衄家者即論中所云發煩目瞑必衄及傷寒脈浮緊不發汗因致衄者又云脈浮緊發熱無汗自衄者愈其皆用麻黃湯者非謂衄後當用麻黃湯也言此等無汗致衄者當先用麻黃髮其汗則不至於衄矣若無汗而不發其汗則熱邪內郁必待自衄而愈若不發其汗又不得自衄則變症多矣何也夫汗者陽氣蒸營血之所化也在營則居於脈中而為血陽氣鬱蒸則由營達衛蒸氣外泄而為汗汗泄則邪隨汗出而解矣不發其汗而衄則熱邪亦隨衄而泄所以自愈也若此則何必於衄後更發其汗乎況更有未病之前素有衄證者乎倘衄血之後督脈腦髓之陽氣已泄營分血脈之陰氣已虛而復發其汗是犯虛虛之戒矣生氣通天論云陽氣者精則養神柔則養筋五臟生成篇云諸脈者皆屬於目諸髓者皆屬於腦諸筋者皆屬於節諸血者皆屬於心故人臥則血歸於肝肝受血而能視血行而不得反其空則病矣是以誤汗則陽氣不充於腦而額上之囟門必陷血虛則系目之筋脈急緊而直視所以睛不能轉側而搖動也經云奪血者無汗奪汗者無血衄後則無血以歸肝而神不歸舍失汗則衛氣失常不能行陰二十五度所以不得眠也是故有邪氣則邪氣當之無邪氣則元氣當之其可忽乎哉亡血家不可發汗發汗則寒栗而振夫血者陰也氣者陽也陰陽者一氣之分也腎者人身之兩儀也命門胞中者太極也兩腎涵藏真氣分陰分陽陰陽相倚氣血交互而成形體也亡血失血也或吐或衄或便或溲或崩或産或破損皆是也血亡則陰氣亡矣汗者陰血之所化陽氣之所蒸也陰血既亡非唯無以為汗抑且孤陽孑立矣若不量虛實妄發其汗則不但陰血更竭並孤陽而盡亡之矣安得不寒戰鼓栗而身振搖耶危矣殆矣瘡家雖有身疼痛不可發汗汗出則痓瘡家非謂疥癬之疾也蓋指大膿大血癰疽潰瘍楊梅結毒臁瘡痘疹馬刀俠癭之屬也身疼痛傷寒之表證也言瘡家氣虛血少營衛衰薄雖或有傷寒身體疼痛等表證亦慎不可輕發其汗若誤發其汗則變逆而為痓矣痓者即所謂身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者是也然其所以致此者皆由陰陽兩虛氣血衰少發其汗則陽氣鼓動陰液外泄陽亡則不能柔養血虛則無以滋灌所以筋脈徑急而成痓也故仲景於痙證中有云太陽病發汗太多因致痓也豈有所謂重感寒濕外風襲虛之說哉汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸汗家傷寒家已經發汗及自汗盜汗者皆是也重發汗者已發而再發也傷寒汗出不徹者當重發其汗以盡其邪若發汗已徹衛氣已虛更疑尚有餘邪又重發其汗則虛其虛而致亡陽之變必恍惚心亂矣恍惚者心神搖蕩而不能自持心亂者神虛意亂而不得自主也神者心之所藏陽之靈也隨神往來者魂也所以任物者心也是以神留則生神去則死也此以重發其汗陽亡神散故恍惚心亂也小便已而陰疼者汗後虛陽上越下焦無陽氣弱不利而莖中澀痛也猶陰陽易之少腹裡急或引陰中拘攣之類也禹餘糧丸雖缺然餘糧乃鎮墜之重劑專主下焦前後諸病所以能鎮恍惚之心亂治便已之陰疼其佐使之屬或有扶陽補虛之用未可知也傷寒誤汗誤汗者非必不當汗而汗之方為誤汗即應用麻黃湯症亦但許發微似汗而已寧許其大汗出乎即使太陽中風發熱汗出之症亦當以桂枝湯發其微似汗尚有如水流漓之戒若使犯之亦為誤汗況麻黃湯乎後人但知麻黃湯為發汗之藥而以桂枝為止汗之藥殊不知麻黃桂枝兩湯皆能使人誤汗亡陽故上篇亦有誤汗之變乃中風傷寒之所均有因難以分篇不得已而俱入中篇讀者審之發汗已脈浮數煩渴者五苓散主之此條無傷寒二字者以下節承上文語中有之是以知其為傷寒也此條義理深微最不易解若以常法論之則脈之浮數當雲浮則為風數則為熱似與上文脈浮而數可發汗用麻黃湯之同類矣以證之煩渴論之則煩為熱邪在裡渴則胃中熱燥又當與白虎加人參湯症相類矣而長沙以五苓散主之似乎以熱治熱其義令人不解所以歷代注家俱不得其旨故成氏有脈浮數為表邪未盡煩渴為亡津液而胃燥之解與五苓散和表潤燥遂以桂改桂枝而曰兩解表裡然桂枝雖能和表豈能潤燥況原方本來用桂而非桂枝乎條辨又以汗出過多腠理反開風邪又入煩熱而脈轉浮數渴者亡津液而內燥故用四苓以滋之一桂以和之亦以五苓為兩解愚竊謂津液既亡四苓之淡滲下走如何可滋津液既燥一桂之辛散溫熱如何治燥尚論一如其說而不改致仲景之旨晦而不彰者久矣余欲析其義深思而未得其解閣筆者半月餘因思天地陰陽升降之道乃悟陰陽應象論所謂地氣上為云天氣下為雨雨出地氣云出天氣之義而得煩渴用五苓散之旨其故在發汗已三字蓋因汗多亡陽下焦真陽已虛無蒸騰之用乃地氣不升之所致也然渴之一症各有不同如太陽之渴以膀胱之氣化言因氣液不得上騰故專用五苓散主之陽明之渴以胃中津液枯燥言故以白虎湯主之少陽以邪在半表半裡往來寒熱或作或輟故或渴或不渴而以小柴胡湯加減主之也至於三陰則無渴證矣雖有少陰引水自救及厥陰消渴等證非真渴也歷代以來唯李東垣知清陽有上升之義故云渴為太陽之本證也然五苓散凡六見於論中皆以之專治太陽渴證而兼利小便者以氣化言也蓋因深明經義知陰陽升降天地氣交之妙默會膀胱為州都之官津液藏焉氣化則能出矣及三焦為決瀆之官水道出焉之奧義故知氣上騰而為津液涕唾則不渴氣下降而成水液則便瀉所謂氣化之功也若下焦無蒸騰之用是腎臟之地氣不升則上焦無氣液之潤而渴矣地氣既不升騰則肺臟之天氣不降無雨露之施而小便不利矣是以太陽之表為膀胱之經膀胱為腎之腑過發其汗衛陽敗泄真陽虛衰下焦無火腎氣不蒸故上無津液而渴也其立方之義用桂以助腎臟蒸騰之氣更用諸輕淡以沛肺家下降之功使天地陰陽之氣交通氣化流行而上下之氣液皆通矣義詳五苓散方論中辨誤五苓散一方後人不能窺仲景立法之微妙俱憚桂之辛熱而不敢用遂改桂為桂枝而以四苓滋其內桂枝以解其外為表裡兩解之劑喻氏更以為術用蒼桂用枝則於立方本意愈遠愈失矣豈以仲景立法之祖不知畏避反於脈浮數而煩渴之證偏用之耶又於痞證中之瀉心所不能解其人渴而口燥煩小便不利者及陽明證中不更衣十日渴欲飲水者亦概用之耶讀古人書而不知古人之工夫學力漫以訛傳俗習之膚見窺之遂至不達其意致廢而不用惜哉傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之此條欲言汗出不渴之治故復敘上文汗出而渴之症非另立一證也其不再言脈浮數而煩渴者因是承上文語故略之也其所以又出不渴一條者所以形容上文汗出而渴之一證難測難治最易誤人以最煩熱之脈症而用最不易用之熱藥也唯其有此平常容易乃見上文之隱晦難明觀其文理之密別識之精而注家茫然不知良可為之浩嘆也言上文所云傷寒服麻黃湯後汗出多而渴者為真陽已虛非五苓散不足以治之矣若汗出而不渴者則其汗未為太過知陽氣未虛津液無損氣化如常矣然初汗之後恐衛氣未和津液未布故但以茯苓甘草湯主之亦收拾餘邪之意也茯苓甘草湯方茯苓二兩桂枝二兩生薑二兩甘草一兩上四味以水四升煮取二升去滓分溫三服辨誤前中風篇內明言桂枝本為解肌若脈浮緊發熱汗不出者不可與也此條明系傷寒何故反用桂枝若不明辨何怪前人以桂枝為固衛止汗乎蓋仲景之用桂枝湯者以陽浮熱自發故以桂枝之辛溫解散發衛家之微汗又以陰弱汗自出故以芍藥之酸收斂營陰之汗液也夫汗者陽氣蒸陰液之所成也陰液者營血之所化也若寒邪入營正宜以麻黃湯泄其營內之寒邪豈宜以芍藥之酸收斂其營氣乎故曰不可與也此條雖系傷寒而已經發汗矣猶恐尚有遺邪營氣終未當斂故以茯苓之滲利代之但以桂枝甘草調和衛氣而已較之用芍藥之桂枝湯非大相徑庭乎所謂不可與者蓋不與桂枝湯耳非不與桂枝也發汗後水藥不得入口為逆若更發汗必吐下不止舊說桂枝有四禁此條亦在禁例余閲仲景論中既有桂枝本為解肌其人脈浮緊發熱汗不出者不可與也一條則凡寒傷營之證皆在所禁豈止四條此所謂發汗者用麻黃湯發汗過多也誤汗則胃中陽氣虛損胃本司納因胃中虛冷氣上逆而不受故水藥俱不得入口以主納者不得納故謂之逆然與水逆證之水入則吐不同也彼以未經汗解表裡俱有邪水既入而後吐故曰水逆此以誤汗亡陽胃虛氣逆水藥不得暫入故但謂之逆言誤汗變逆已致水藥不得入口矣若又不知而更發其汗則胃陽愈敗必至中氣不守上吐下泄而不止矣此條仲景雖未立方然溫中扶胃之法如人參桂枝湯之類可酌用也或曰誤汗亡陽不過損泄衛氣耳既非誤下何至內傷胃氣而水藥不得入口且甚至吐下不止乎夫人身先天陽氣藏於兩腎之中其清陽升發而為三焦之氣附於肝膽布其陽氣而為後天之火溫養脾胃故飲食入胃谷之濁氣下降為命門真火之所蒸騰則陽氣發越其慓悍滑疾之氣直達皮膚而為衛氣是以誤汗則衛氣喪失真陽大虛胃氣亦隨之而損也惡得有衛陽敗泄而胃氣無損者乎仲景深知經義故能言之但未肯道其詳耳後人每以心火相火三焦火胃火分論不知天之六氣地之五行即陰陽二氣之分也二氣之分又即一氣之升降也孫真人云不知太易不足以言醫況並不知經義更曷足以言醫嗚呼斯道之不振又安足怪乎發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之奔豚者即前燒針令汗針處被寒所發之奔豚乃腎家奔突上衝之陰邪也悸者築築然惕動狀若心驚而恍惚跳躍也誤汗之後陽氣已虛下焦陰寒之氣欲作奔豚而氣先上逆故從臍下忽築築然而悸動也前針處被寒以必作奔豚從少腹上攻心其勢較甚故以桂枝加桂湯溫散其寒邪此條但云欲作奔豚欲作非必作可比乃可作可不作之間耳但因臍下悸知陰氣已動恐其欲作奔豚故以茯苓桂枝甘草大棗湯主之也茯苓桂枝甘草大棗湯方茯苓半斤桂枝四兩甘草二兩炙大棗十五枚擘上四味以甘瀾水一斗先煮茯苓減一升內諸藥煮取三升去滓溫服一升日三服取甘瀾水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之茯苓氣味淡而滲陽中之陰其性上行而後下降能滋水之源而降下本草謂其能利小便而伐腎邪故倍用之以為君桂枝辛溫和衛而能宣通陽氣故多用之以為臣李東垣云陽不足者補之以甘故鳳髓丹用甘草以緩腎之急而生元氣也更用大棗以和潤其津液而劑成矣用甘瀾水者動則其性屬陽揚則其勢下走故也發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之腹脹滿者太陰脾土之本證也發汗後陽氣虛損胃氣不行脾弱不運津液不流陰氣內壅胃病而脾亦病也雖非誤下成痞而近於氣痞矣以厚朴生薑甘草半夏人參湯主之厚朴生薑甘草半夏人參湯方厚朴半斤去皮炙生薑半斤切半夏半斤洗人參一兩甘草二兩炙上五味以水一斗煮取三升去滓溫服一升日三服厚朴味苦辛而性溫下氣開滯豁飲泄實故能平胃氣而除腹滿張元素云治寒脹而與熱藥同用乃結者散之之神藥也此雖陽氣已傷因未經誤下故虛中有實以胃氣未平故以之為君生薑宣通陽氣半夏蠲飲利膈故以之為臣參甘補中和胃所以益汗後之虛耳然非脹滿之要藥所以分兩獨輕由此推之若胃氣不甚虧而邪氣反覺實者尚當消息而去取之未可泥為定法也觀金匱之治腹痛腹滿仲景以厚朴三物七物兩湯治之皆與枳實大黃同用則虛實之分自見矣發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之發汗過多者前桂枝本為解肌過多尚有如水流漓之戒若過用麻黃湯尤為發汗過多則陽氣大虛陽本受氣於胸中故膻中為氣之海上通於肺而為呼吸位處心胸之間發汗過多則陽氣散亡氣海空虛所以叉手自冒覆其心胸而心下覺惕惕然悸動也凡病之實者皆不可按按之則或滿或痛而不欲也故素問舉痛論云寒氣客於經脈之中與炅氣相薄則脈滿滿則痛而不可按也又云脈充大而血氣亂故痛甚不可按也此以誤汗亡陽心胸真氣空虛而悸動故欲得按也因此條是誤汗所致故以桂枝甘草和衛扶陽補中益氣但此方性味和平力量淺鮮如參芍之補斂恐不可少仲景立方諒不止此或有脫落未可知也若方氏以心血為重置陽虛而弗論尚論譏之不亦宜乎桂枝甘草湯方桂枝四兩甘草二兩炙上二味以水三升煮取一升去滓頓服義具注中不另立論未持脈時病人叉手自冒心師因教試令咳而不咳者此必兩耳無聞也所以然者以重發汗虛故如此此論誤汗陽虛之耳聾以辨不必邪在少陽然後耳聾也夫足少陽之脈起於目鋭眥上抵頭角下耳後其支者從耳後入耳中出走耳前下胸中貫膈絡肝屬膽循脅裡故素問熱論篇云少陽主膽其脈循脅絡於耳故胸脅痛而耳聾也若夫汗後陽虛皆以發汗過多衛陽散亡之故非邪在少陽也以服桂枝而如水流漓已為痛戒如麻黃湯者其可重用乎所以古人用藥治病中病即已五常政大論所謂小毒治病十去其八無毒治病十去其九無使過之傷其正也然以衛氣散亡而能令人耳聾者何也耳者腎之竅也陰陽應象論云在臟為腎在竅為耳衛氣者乃胃中谷氣下降為腎中真陽之所蒸騰發越而布於皮膚以捍衛風寒者也營衛皆屬太陽而為表真陽藏於少陰兩腎之中而為里故一臟一腑相為表裡而成一合也誤汗亡陽則腎家之真陽敗泄所以腎竅之兩耳無聞猶老年腎憊陽衰亦兩耳無聞其義一也仲景雖不立治然欲治之亦不外乎汗多亡陽之法也發汗病不解反惡寒者虛故也芍藥甘草附子湯主之發汗病不解者發汗過多而陽氣虛損故生外寒仍如未解之狀也惡寒而曰反者不當惡而惡也本以發熱惡寒而汗之得汗則邪氣當解而不惡寒矣今病不解而反惡寒者非風寒在表而惡寒乃誤汗亡陽衛氣喪失陽虛不能衛外而惡寒也或曰既云發汗病不解安知非表邪未盡乎曰若傷寒汗出不解則當仍有頭痛發熱脈浮緊之辨矣而仲景非唯不言發熱且毫不更用解表而毅然斷之曰虛故也即以芍藥甘草附子湯主之則知所謂虛者陽氣也與上文虛字無異其脈必微弱或虛大虛數而見汗出但惡寒之證如附子瀉心證及用桂枝加附子湯桂枝去芍藥加附子湯之類故曰虛故也而以芍藥甘草附子湯主之芍藥甘草附子湯方芍藥三兩甘草三兩炙附子一枚炮去皮破八片以上三味以水五升煮取一升五合去滓分溫服芍藥酸收斂汗液而固營陰附子辛熱補真陽而強衛氣甘草扶植中州調和營衛所謂溫經復陽之治也發汗後惡寒者虛故也不惡寒但惡熱者實也當和胃氣與調胃承氣湯上二句是承上文語所以起下文者也言前條云發汗後惡寒者以汗後陽虛故也若發汗之後不惡寒而反惡熱者非虛證也乃汗後太陽已罷邪轉陽明為胃實之證當和其胃氣則愈矣然既汗之後陽氣已虛不宜大下故當與調胃承氣湯即陽明篇所謂與小承氣湯微和胃氣勿令大泄下是也發汗後飲水多者必喘以水灌之亦喘發汗之後衛外之陽氣已疏胃中之真陽已損若津液竭而渴欲飲水當如太陽上篇中風發汗後欲得飲水者少少與之可也若飲水過多則胃虛不運水冷難消必至停蓄不滲水寒侵肺呼吸不利故肺脹胸滿氣逆而喘急也若以冷水灌濯則營衛先已空疏使寒邪入腠水氣侵膚肺本主乎皮毛故內通於臟而亦為喘也肺熱而喘者故用麻黃杏仁甘草石膏湯此以汗後水寒而喘則去麻黃加葶藶之小青龍湯或可酌用也發汗若下之病仍不解煩躁者茯苓四逆湯主之既發其汗則表邪當解若又下之里邪亦當解矣乃仍不解而煩躁者此非鬱熱不解大青龍之煩躁也蓋因汗之太過亡其衛外之陽下之太甚又損其胃脘之陽致無陽而陰獨故也煩躁者陰盛迫陽虛陽攪擾則作煩陰邪縱肆則發躁補虛復陽乃其治也故以茯苓四逆湯主之然大青龍之煩躁因熱邪不得發越所致乃實邪也故用汗泄涼解之劑茯苓四逆之煩躁因陰盛陽虛所致乃虛邪也故當用收復溫補之藥尚論引入青龍項中良有以也茯苓四逆湯方茯苓六兩人參一兩甘草二兩炙乾薑一兩附子一枚去皮破八片上五味以水五升煮取三升去滓溫服七合日三服茯苓虛無淡滲而降下導無形之火以入坎水之源故以為君人參補汗下之虛而益胃中之津液乾薑辛熱守中而暖胃附子溫經直達下焦導龍火以歸源也傷寒誤下傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯此論誤下之後證有表裡緩急之分治有先後虛實之當急也下之誤下之也續連續也言因誤下之虛遂續得下利不止也清穀清水完穀也誤下而胃虛里寒致完穀不化也前後兩身疼痛義各不同一以陰寒在裡而痛一以寒邪在表而痛也上截所謂身疼痛者因誤下陽虛陰寒在裡無陽氣以噓培柔養故身疼痛與上篇人參新加湯同義雖有誤汗誤下之不同而陽虛則無不同也後身疼痛者指傷寒之表症而言也後謂下後非救里之後也寒氣傷營營血滯澀不快於流行而痛也清便自調謂小便清而自調邪未入里之徵也急救者唯恐不及之詞也言寒傷營之證設醫以藥誤下之致胃陽敗損裡氣虛寒胃不殺穀津液不守所以隨得下利清穀不止也猶身疼痛者無陽氣以溫養筋骸流通氣血之故也既無表證但見裡寒故當急救其里也若誤下之後但身疼痛小便清而自調者知其寒邪但在於表猶未入里乃傷寒首條之惡寒體痛及次條身疼腰痛骨節疼痛惡風無汗之身疼痛也當急救其表若不急救其表則外邪必乘誤下之虛陷入於裡而為變逆之證故云急也然則救里維何宜以四逆湯溫里復陽可也若救表則當以桂枝汗解之然桂枝湯之不可用於傷寒也前上篇第十二條已有明禁矣而此條反用之豈仲景二三其說耶不知仲景所禁但禁脈浮數而發熱汗不出者乃未治之傷寒也此條已屬傷寒誤下胃陽已虛陰邪已盛衛氣已虛不宜復用麻黃湯發汗更亡其陽矣故以桂枝之辛溫宣通其陽氣而微解其表則溫散兩全而無害矣此又定法中之活法未可執一論也辨誤此節是兩股文當作兩截解傷寒醫下之句是一條之總冒言假若下之後續得下利清穀不止而身疼痛者其裡寒已甚陽氣將危且全無表證故急當救里是以無陽之裡證為急也此三句是上半截義又言如下後但有身疼痛之表證而清便自調者是並無里證可知故急當救里里既無邪當以表邪為重此三句是下半截義故下文又以兩方分隸兩義之下而總結之辭義井井爽然可見不意成氏以來各注傢俱作一義解皆云救里之後得清便自調然後與桂枝湯救表若果如此論則下截之者字與急字皆不須用矣豈溫經救里之後身尚疼痛直待清便自調裡氣已和然後救表尚可云急乎如厥陰條中下利腹脹身體疼痛先溫其里乃攻其表方為次第分明允為一義此條乃里證急則救里無里證則救表因證施治之活法故有兩者字及兩急字以分之豈可混講只因後身疼痛之後字上脫一下字稍覺模糊遂成千古之惑奈注者不辨語氣不清脈理泛然下筆致失作者之意竊為前輩惜之也況傷寒用桂枝之禁前中風條內凡諸注家皆能申仲景之意而亹亹言之才至傷寒例中之桂枝湯豈遂忘之而竟置之弗論耶此正所謂隨文順釋而已又何裨於後學哉傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之五六日雖為邪當入里之候然有邪尚在表而未解者極多總以表證既去而無里證者為邪氣已解表證初罷而隨見里證者為外邪入里未可以日數拘也今五六日而身熱不去是表證尚未除也大下之後若表邪盡陷則身不熱而為痞結及協熱下利等變證矣今乃身熱不去是邪氣半留於表也心中結痛是邪氣半入於裡也表裡皆有邪是以謂之未欲解也然邪入猶淺初入於上焦心胸之間耳若用表裡兩解之法則邪未入胃豈宜攻裡無若就近取之則以高者越之之法為便故以梔子豉湯吐之則內邪隨湧而上出外邪又因吐得汗而解矣梔子豉湯方梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服梔子本草不言其能吐而仲景獨用之以吐胸邪故張子和三法中亦有之蓋因其味苦性寒而其味懊惱故能令人吐然亦大概以雞羽探之耳淡豉本主傷寒寒熱瘴氣惡毒時疾熱病李時珍云黑豆性平作豉則溫既經蒸罯故能升能散得蔥則發汗得鹽則能吐得酒則治風得薤則治痢得蒜則止血炒熟則又能止汗其合梔子而能吐膈間之邪者蓋取其能升能散能吐耳發汗若下之而煩熱胸中窒者梔子豉湯主之已發汗之後下之而致煩熱鬱悶胸中窒塞者因汗不徹而邪未解也然既汗之後邪氣已減有限之餘邪陷入胸中故不至結痛而但覺窒礙耳邪在胸中最宜上越故亦以梔子豉湯主之傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之傷寒表證未除而誤下之下後外邪陷入在膈則煩在胃則滿既煩且滿所以躁擾不寧臥起皆不安也邪氣雖入未成痞結陰陽應象論云高者因而越之中滿者瀉之於內所以用梔子之苦寒湧越其心胸之虛邪厚朴枳實之苦辛以泄其脹滿之濁氣故以梔子厚朴湯主之然汗隨吐發故不須更解其表也梔子厚朴湯方梔子十四枚擘厚朴四兩姜炙枳實四枚去瓤以上三味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之傷寒表邪未解醫不知而以峻厲丸藥大下之宜乎陷入而為痞結矣而身熱不去是邪未全陷尚有留於表者微覺煩悶乃下後之虛邪陷膈將結未結之徵也大下之後既不可復發其表又不可再攻其里瞷邪之猶在胸膈也速宜以梔子乾薑湯湧之則煩悶之胸邪得上越而出身熱之表邪亦因吐而汗解矣立方之義蓋以身熱微煩用梔子之苦寒以湧胸中之邪誤下傷胃取乾薑之辛熱以守胃中之陽則溫中散邪之法盡之矣梔子乾薑湯方梔子十四枚擘乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之既汗吐下則正氣皆虛邪猶未盡雖不比實熱之邪陷入而為結為痞然虛邪內入亦足以作虛煩而令人不得安眠也若邪重而劇者必至煩熱擾亂令人神志昏憒反復顛倒心中若有所懊恨不平者然此皆虛邪在膈之所致也湧而越之則無形之邪隨吐而散矣故以梔子豉湯主之若如上文證而少氣者因汗吐下後胸中之陽氣已虛膻中之呼吸不足中氣大虛再湧則恐傷胃氣故加甘草以補中和胃庶無損於元氣也若加乾嘔者是汗吐下後胃中陽氣已傷中焦虛冷胃氣不和氣上逆而乾嘔也故加生薑之辛溫以宣達胃中之陽和暖中州之氣則雖更用吐法亦無傷於胃陽而氣自和平矣此皆因時制宜之法也梔子甘草豉湯方於梔子豉湯方內加入甘草二兩余依前法得吐止後服梔子生薑豉湯方於梔子豉湯方內加生薑五兩余依前法得吐止後服凡用梔子湯病人舊微溏者不可與服之梔子苦寒用之蓋所以吐胸中之煩熱者也若病人平昔大便微溏者則中氣本自虛寒用之恐寒涼損胃反致大腸滑泄故不可與服倘必欲湧邪則戴人吐法中有甘溫之藥可酌選也傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之傷寒本當以麻黃湯汗解若吐下之則治之為逆心下者胃脘之間也逆滿氣逆中滿也脈沉緊沉為在裡緊則為寒蓋陰寒在裡也動經經脈瞤動也身為振振搖即上篇振振欲劈地之漸也言傷寒不以汗解而妄吐下之致胃中陽氣敗損寒邪陷入而逆滿陰氣上衝而頭眩也陰寒在裡故脈見沉緊也陽氣已為吐下所虛若更發其汗必至亡陽而致經脈動惕身不自持而振振然搖動矣動經振搖與上篇心悸頭眩身瞤動而振振欲劈地者幾希矣故用桂枝以解散外邪通行陽氣而以茯苓白朮甘草補中氣而治其吐下之虛也然傷寒而不忌桂枝者以桂枝本能解表且不用全湯無芍藥之酸收故也但藥物平易倘用之而未效真武湯或在可擬之列也辨誤條辨等注家俱謂心下逆滿氣上衝胸為寒邪挾飲摶實於膈脈見沉緊明系飲中留結外邪若發汗強解津液盡竭傷動經脈故有身為振搖之患其言若此是全不知為亡陽之變與誤汗條中之振振欲劈地相似反多增一伏飲之說理殊不解恐未精切姑録之以俟智者之鑑茯苓桂枝白朮甘草湯方茯苓四兩桂枝三兩白朮二兩甘草二兩上四味以水六升煮取三升去滓分溫三服傷寒蓄血蓄血與上篇同義因上冠傷寒二字故仍置之中篇傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸此與上篇三條互相發明非有中風傷寒之別也言傷寒有熱邪在裡而少腹滿者應小便不利何以言之裡熱則津液枯竭少腹滿則膀胱不瀉故應小便不利今反利者乃邪不在氣分而傷血分所以三焦膀胱之氣化流行而小便仍利因血蓄下焦故少腹滿也此證必當下之乃愈不可余藥者言既無如狂喜忘及身黃之證不須以桃仁承氣及抵當湯之快劑蕩滌之但宜以抵當作丸小其制而又分其勢以緩下之庶無太過之弊而無傷於正氣也抵當丸方水蛭二十個熬虻蟲二十五個去足翅熬桃仁二十個去皮研大黃三兩酒浸上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服
