body:
  text: 卷之五溫病風溫痙濕暍溫病風溫痓濕暍諸證邪氣皆由營衛而入故仲景皆稱太陽病所以附於太陽之末溫病風溫證治第七太陽病發熱而渴不惡寒者為溫病太陽病者即首篇所謂頭項強痛等證也因邪由營衛而入其見證屬太陽故稱太陽病然邪在太陽初見表證雖發熱而不渴然發熱亦必惡寒至邪傳陽明而太陽證罷則發熱汗出而不惡寒矣及至邪入陽明之裡胃腑熱燥方有渴欲飲水之證乃中風傷寒之常經也此則既有太陽見證則為邪在太陽而非陽明矣以發熱而即有渴證又不惡寒是以謂之溫病也溫者天時溫暖之邪氣也在冬則有寒邪而四時皆有非時之寒氣感之皆為傷寒在春則有風邪而四時皆有不時之風邪感之皆為中風春暖之後夏至以前天氣已熱未至酷暑其溫暖鬱蒸之氣感之即為溫病是為春溫其冬令有非時之暖感之則為冬溫至秋肅之時自應涼風薦爽若遇不時之熱氣鬱蒸感之即為秋溫惟發於春盡夏初者乃為適當其令之邪氣故內經生氣通天論及陰陽應象論皆曰冬傷於寒春必溫病經文之以冬傷於寒而曰春必溫病者蓋借天地四時以喻人身之陰陽臟腑天人一致之理也非謂冬月為寒邪所傷至春而後為溫病也冬傷於寒之旨見暍症首條此不多贅但此條乃溫病發源之首所以正名定分言溫病之初感其見證如此與中風傷寒之首節無異而未暇立治法也然其治法終莫之見豈當年立法時竟忘之而未有邪抑歷年久遠散失遺亡而為脫簡邪吾恐忘亦未必竟忘失也未必盡失又恐叔和編次之時紛雜於六經證治之中而不能辨也但不知仲景當時作何次序想漢末至西晉相去未古豈遂至遺亡散失邪大都為王氏所亂其所編之書既行於世則仲景舊本皆廢棄而無存矣二千年來雖名賢繼出俱無從考正致後人有仲景長於治傷寒不長於治溫之説嗚呼仲景醫聖其才力豈遂盡於此邪今以理揆之就此一節仲景之意蓋謂邪在太陽以渴而不惡寒者為溫病則其所以別於中風傷寒者固在於此而其所著意處亦在於渴而不惡寒矣夫渴為溫邪所致而其不惡寒見症既非陽明亦是溫熱之邪所致所以謂之溫病也然溫邪既有頭項強痛之太陽表症理宜解表而又有發熱而渴不惡寒等溫熱之見證則又當以清解熱邪為治矣所以麻黃桂枝皆辛溫之藥而麻黃湯但能汗泄其傷寒之陰邪而不能治溫桂枝但能解散中風之陽邪而亦不能治溫非唯不能治溫其溫熱之性反足以助邪故其見證之初以大青龍湯之涼解為治溫之首劑而作一大柱石也然無汗者宜之耳其有發熱而渴不惡寒而汗自出者不宜更汗則有桂枝二越婢一湯之法也其無表證但熱渴而不惡寒者為已入陽明又有白虎湯可用也至於誤汗誤下等變又有中風傷寒篇內之誤汗誤吐誤下之法可推而變通也若見邪歸陽明之實熱症現則為熱邪入腑自有舌苔黃黑燥裂芒刺譫語神昏狂亂諸證之可驗則陽明篇中之承氣湯證也倘有傳陰變逆之陰寒證現則三陰篇中之諸溫經法可擬也其所以但有首條而無逐條分治之法者蓋因其所感之邪各異以六氣之偏勝不同故其初證各自不同其治法亦不同也若其變症與夫誤治傳經入陰之證則其經絡臟腑寒熱虛實與中風傷寒無異可倣佛求治世人不知其故以為仲景溫病之法止留此二則而無下文治例盡嘆為遺失之餘惜哉若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期言既有太陽見證而已發其汗汗後則風寒當解散矣若發汗已而身猶如火之灼熱尚不解者非獨中風亦非傷寒也乃風邪溫氣並感之證故名曰風溫蓋風為春令之邪溫則初夏之氣乃春盡夏初風邪未退熱氣初來以冬臟之寒水受傷則寒水不能固養其真陽失精泄汗使藏陽敗泄至春令而少陽肝膽不能布其陽氣於皮膚以致衛外之陽氣衰微腠理不密使風邪溫氣併入而成風溫病也故曰冬傷於寒春必溫病然風溫之為病也其脈與風寒各異傷寒則寒傷營分寒邪深入故脈陰陽俱緊中風則風邪傷衛邪氣但傷陽氣故脈陽浮而陰弱風溫之脈則風邪傷衛氣而陽脈浮溫熱之邪傷陰分而陰脈亦浮也所謂脈之陰陽者如辨脈篇所謂寸口脈陰陽俱緊之陰陽是以浮候為陽沉候為陰此所謂陰陽脈俱浮則以寸口為陽尺中為陰即關前為陽關後為陰之法也陽脈浮則風邪傷衛毛孔不閉故汗自出即上篇陽浮熱自發陰弱汗自出之義也陰脈浮則熱傷陰分溫邪熏灼鬱冒神昏故身重多眠而昏睡中之鼻息必齁鼾也其語言難出者非舌強失音喑啞之病乃神昏不語也若此者自汗既不宜於麻黃之更發其汗亦不宜於桂枝之溫解斂汗當以涼解之法治之若桂枝二越婢一之類可擬也風溫之邪在經則里邪未實自不宜於攻下若被下者必裡虛邪陷使太陽之溫邪內入太陽之腑熱犯膀胱致熱邪癃閉而小便不利也直視失溲者足太陽膀胱絶也始則熱邪癃閉而不利終則膀胱氣絶而失溲素問疹要經終論云太陽之脈其終也戴眼反折瘈瘲其色白汗乃出出則死矣且溫熱之邪豈宜以火濟火自不當以火劫汗若被火者火助風威熱乘火勢微者火熱內鬱而發黃陽明篇所謂瘀熱在裡必發黃也其劇者則心神昏亂而狂越如驚駭癲癇之狀太陰陽明論中以陽明氣血盛邪客之則熱熱甚則惡火前篇太陽傷寒加溫針尚且必驚況於溫病乎溫病得火內外充斥浸淫於臟腑肌肉筋骨之間所以時時瘈瘲也瘈瘲者筋骨瞤動十指抽掣臂胻堅徑轉側而不自知也若用火熏劫汗之法是不循法度不知避忌謂之逆治一逆治之即不可救然猶能遷延時日若再逆之是促其絶命之期矣溫邪中人火逆之害如此以此推之辛溫之治亦所當審矣形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈此溫病之似傷寒者也形作傷寒者謂其形象有似乎傷寒亦有頭項強痛發熱體痛惡寒無汗之證而實非傷寒也因其脈不似傷寒之弦緊而反弱弱者細軟無力之謂也如今之發斑者每見輕軟細數無倫之脈而其實則口燥舌焦齒垢目赤發熱譫語乃脈不應證之病也故弱者必渴以脈雖似弱而邪熱則盛於裡故胃熱而渴也以邪熱熾盛之證又形似傷寒之無汗故誤用火劫取汗之法必至溫邪得火邪熱愈熾胃熱神昏而語言不倫遂成至劇難治之病矣若前所謂其脈不弦緊而弱者身發熱而又見浮脈乃弱脈變為浮脈為邪氣還表而復歸於太陽也宜用解散之法當汗出而愈矣病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散此溫病之似中風者也解見痞症條下傷寒論無發癍説附夫癍症為外感證中之最劇其毒厲之氣往往夭札人性命而仲景傷寒論中於六經之證治則亹亹言之諄諄詳盡絶無一字論及癍症者何也其意蓋以中風傷寒及溫病痙濕暍等症皆人所自致猶天地之氣冬月溫暖不能閉藏其來復之陽少陽之生氣不布而疾疫飢荒人身之腎屬坎而為冬臟真陽藏於兩腎寒水之中若失精泄汗寒水包藏之氣受傷則藏陽敗泄少陽之氣不能升發而衛外之陽氣不密風寒溫暑之邪皆可乘虛而入生氣通天論所謂順之則陽氣固雖有賊邪弗能害也失之則衛氣解散此謂自傷氣之削也又云陽氣者若天與日失其所則折壽而不彰是故陽因而上衛外者也又云陽者衛外而為固也寒水傷則陽不固陽不固則外氣入故曰冬傷於寒春必溫病此皆外感之內因也故有內因則病無內因則邪氣不能入故云雖有賊邪弗能害仲景所以名之曰傷寒論而不曰中風溫暑論也叔和不達其旨謬以冬傷於寒為傷寒故有寒毒藏於肌膚之説為千載之誤至於疫病則不然與傷寒大異其有內因者固病而無內因者亦病何也疫病之傳染或一鄉之內或一里之中甚至連州跨郡沿門闔境濺染纏綿老幼皆然床連枕藉煙火寂然病氣盈室親故不敢入其門廝役不敢近其處至於死喪相繼腐殣載途若此者豈皆盡有內因乘虛而入邪皆因疫氣沾染所致耳所謂疫者乃天地鬱蒸之氣如秋行夏令冬行春令春行初夏之令全無閉藏清肅之氣純是溫暖不正之邪人在氣中感觸而成瘟疫一人始之其毒厲之氣從鼻息而入其水土之邪從食飲而入病則脈頗相同症頗相類遂相傳染蔓衍牽連如水之洊至如火之延燒一時難止難滅如天下之大工大役無能免者故謂之疫其病狀雖有不齊大概皆發癍疹所以癍為時行疫氣之所致非傷寒條例中病故論中但有中風傷寒溫暑痙濕暍之病而無發癍一證也然發癍時疫以仲景之用心豈竟棄置而弗論哉夫仲景所撰原云傷寒卒病論合十六卷以理度之必非漫然棄置大約在卒病論六卷之中其六卷既失遂至遺亡而不得見耳顧名思義蓋以忽然得之故曰卒病時疫乃厲氣所染非積漸所致豈非卒病乎後人以卒病疑為雜病者大謬不然之論也觀其附於傷寒論之後必非雜病之緩而可待者故知其為卒病無疑也然而癍疹之發皆因時行之一氣所使非關人事所以一人始之則凡病者皆然若無此氣則雖有時行之他病而絶無癍疹矣朱奉議活人書第十三問云夏月天氣大熱玄府開脈洪大正宜發汗但不可用麻黃桂枝熱性之藥須於麻黃桂枝湯中加石膏黃芩知母升麻不加則轉助熱氣便發癍黃此論頗合大青龍之義未為不可其他謬説及節庵陶華所云誤投熱藥或當汗不汗當下不下汗下未解所致皆不經之論也夫癍黃皆時疫之氣其發越之候遲速不齊有六七日而出者有十日半月而出者更有寒熱頭痛表證既解之後重復發熱而出者有始終不得出而死者此等或可委之於用藥之誤至有才見發熱並未服藥不二三日而斑點即見者豈亦誤用麻黃桂枝辛熱之藥而然邪亦有春秋並無天時之大熱及隆冬盡遇嚴冽之寒天而亦發者豈亦夏月天氣大熱而然邪若云玄府開則已汗自出脈洪大則已屬陽明又非玄府緊閉脈浮緊可汗之寒邪表症矣而云正宜發汗則仲景之法已亂六經之序已淆且不論傷寒中風溫暑又不分寒熱虛實而概加諸藥使後人顛倒錯亂其可謂之活人書乎全生集乎總由卒病論六卷遺亡無癍證之明文可徵耳二書盛行於世令人視桂枝麻黃兩湯為鴆毒坐視人之夭枉而莫之敢用者非此説入人之深漸漬日久之害乎痓濕暍三證王叔和云傷寒所致太陽痓濕暍三種宜應別論以為與傷寒相似故此見之痓濕暍三種既非傷寒中風自應別論然仍屬太陽當附於太陽篇後但叔和發語即曰傷寒所致此四字已欠明白夫痓病本太陽經中風傷寒之變或可云傷寒所致若濕乃外感雨露地氣水濕之邪雖非寒邪之可比以氣屬寒濕之邪猶可云傷寒所致暍則為夏令暑邪之所感即內經熱論篇所謂後夏至日者為病暑是也豈可亦以為傷寒所致乎然亦毋怪其有是説也叔和若明內經冬傷於寒之旨而曰傷寒所致則可若不明內經冬傷於寒之義但以仲景論中寒傷營之傷寒二字指曰傷寒所致則不可何也仲景之所謂傷寒以風寒暑濕之外邪所傷故曰傷寒內經之冬傷於寒則不然蓋以天地四時之冬令比人身之腎為冬臟奈何不解經旨妄以內經冬傷於寒句竟作傷寒二字解之不知內經之冬傷於寒寒乃北方坎水玄冥司藏之正氣為三冬伏蟄閉藏陽氣之胞胎必閉之堅固藏之縝密待陽氣完足至春而透地出自東震而為長子雷出地奮布其少陽之生氣而後發生萬物故冬藏之氣在易則為潛龍勿用而為龍蛇之蟄在詩則塞向墐戶婦子入室之時在禮則曰天地不通閉塞而成冬土事毋作慎毋發蓋以固而閉地氣沮泄是謂發天地之房諸蟄皆死民必疾疫在天地則為三冬乃一陽初復之候在人則為兩腎兩腎者人身之冬臟兩腎之中為真陽伏蟄閉藏之處所以冬令之寒水受傷藏陽不密不惟水不能生木而使春令少陽之生氣衰微人身之真陽損泄則透發三焦之少陽不布致衛外之陽氣不密腠理疏張不能捍禦外邪所以冬令之寒邪入之則為傷寒春令之風邪中之則為中風春盡氣暖之時溫邪襲之而為溫病春夏之交風邪溫氣並至感之而為風溫至盛暑流行夏令暑熱之邪犯之則為暑病霧露雨水地氣汗液之邪著之即為濕病故素問陰陽應象論云冬傷於寒春必溫病春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽蓋四時五行之氣遞相生旺則邪不能犯若一氣受傷而無生息之功則後令氣衰而必病矣義詳陰陽應象論注中此不具載然陰陽應象論中但有春溫而無夏暑故又於熱論篇尾補出雲凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑即此觀之後人之以冬傷於寒句誤認為傷寒者皆惑於凡病傷寒而成溫之一語也豈知上古立言者已於前卷生氣通天論及陰陽應象論中先疏明其義矣至熱論篇中但約而言之故略而不詳也不意後人不理前説但認定此句擬議揣度勉強立言以致失其真旨且又於病字上著疑不知傷寒固當稱病而冬傷於寒尤為病之內因乃病之根柢也總之根氣一傷凡遇外邪皆可成病但隨其時令之或風或寒或溫或暑或濕耳非預有蘊蓄之邪待時而變也蓋因根本先虛猶開門揖盜凡盜皆可入更無他説也逮仲景氏出而盡推風寒溫暑之證羅列其正病變病之條精處其立法立方之治而總名之曰傷寒論然但名之曰傷寒論而不曰中風溫暑論者蓋以風寒溫暑濕邪皆時令之客氣外入之邪耳唯經文冬傷於寒為四氣之一乃人身本元受病之根源一氣受傷便為風寒溫暑之內因故以為名觀長沙命名之意則經旨已自躍然顯露矣所以其自序云撰用素問九卷良不誣也然傷寒論中並無一字涉及內經者亦並無即病與不即病之説乃叔和見不及此妄作傷寒序例偏引冬傷於寒春必溫病二句以為立説之張本究不能解其所以然之故而謂傷於四時之氣皆能為病以傷寒為毒者以其最成殺厲之氣也中而即病者名曰傷寒又不能解所以春必病溫之故見熱論有先夏至日者為病溫後夏至日者為病暑即更造為一説云不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病殊不知玉機真藏論云風寒之客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也風寒之中人如此之速豈有寒毒而能安然久處於肌膚之中半年三月自冬徂春而始變溫自冬至夏方變暑病者乎此説一行以後諸賢無有不受其牢籠墮其陷阱致始終不能自振如唐王太僕之經注即以叔和此説一字不改引為陰陽應象論中冬傷於寒之注腳又以暑病認為熱病更添蛇足而謂之晚發遂使天下後世皆靡然從之以為經義本然如此毫不察其出自叔和之謬至於傳習既久漸漬日深渾然不見真偽之迹蔓衍相延馴至無書不有無論不然即後之著作家繼踵而出鮮有不蹈其轍而躡其迹者更後之學者又見前輩皆宗之雖或有才智過人者亦不敢輕議是非皆死守於範圍之中受其束縛無敢少逾其軌度諸賢之中雖以王安道之智而溯洄集中亦以即病不即病之説不厭不倦亹亹言之此無他亦以未明內經四氣之旨耳所以集中有四氣所傷論一篇千言萬語始終不得其義宛如蠅入紙窗非不努力嚮明飛撲無奈尚隔一層且又不知退尋別路故亦死墮叔和彀中而莫之知也當時叔和立説之時設有問奇之士試問其冬傷於寒之寒毒既可藏於肌膚其春風夏暑秋濕之傷當又藏於何地而既傷之後皆必遙隔一令然後發病耶側聆其訓必議論一新有大可聽者矣又云欲候知四時正氣為病及時行疫氣之法皆當按鬥歷占之豈知四時太過不及之乖氣方能中人為病既云正氣豈反為病耶況其占候之法舍卻內經六元正紀五常政大論以及六微旨與至真要諸篇之陰陽至理其六氣司天在泉歲運之太過不及與間氣客氣之勝復變遷以察天地四時之陰晴旱潦寒熱燥濕不齊之應而全憑歷日一本以二十四氣之寒暖占之真不學無術昧於陰陽甚矣且一篇之中又録內經熱論一段擅自增改殊失尊經之義又云更感異氣變為他病當依舊壞證例而治之不識其意中於傷寒論中以何者為壞證其例又在何處治之之法又在何所此等語氣真是不知者之妄談耳至於陽盛陰虛如何汗之則死下之則愈陽虛陰盛若何汗之則愈下之則死並不闡明其義徒足惑亂人意況桂枝下咽陽盛者因何而斃承氣入胃陰盛者何故以亡神丹是何藥物因何不可誤發甘遂不同他藥因何獨稱妄攻背謬不堪鄙俚難讀嗚呼仲景之徒果如是乎痓病證治第八太陽病發熱脈沉而細者名曰痓謂之太陽病者以邪由營衛而入營衛皆太陽所屬所見皆太陽經表證故也然但曰發熱而不敘諸證者以總見於下文故也邪在太陽若中風之脈則當浮緩傷寒之脈則當浮緊此則同是太陽發熱之表症而其脈與中風傷寒特異反見沉細者因邪不獨在太陽之表也大凡沉則在裡沉則為寒細則為虛細則為寒脈沉而細當為寒邪在裡矣而外猶發熱邪氣尚在太陽之表則表裡皆有風寒邪氣浸淫於皮膚筋骨臟腑經絡之間非若中風傷寒之邪先表后里以次傳變之可比乃邪之甚而病之至者故謂之痓乃難治危惡之證也所以金匱此條之下有為難治三字也病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痓病也上文有脈無證此條有證無脈合而觀之痓病之脈證備矣靈樞經脈篇云足太陽之脈起於目內眥上額交巔從巔入絡腦還出別下項循肩膊而挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀循髀外下合膕中貫踹內出外踝之後循京骨至小趾外側是動則病沖頭目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者此太陽經脈絡行度及發病之見症也此所謂身熱者風寒在表也足寒者陰邪在下也頸項強急背反張者太陽之經脈四行自巔下項挾背脊而行於兩旁寒邪在經諸寒收引其性徑急邪發則筋脈抽掣故頸項強急背如角弓之反張所謂筋所生病也惡寒者寒邪在表則當惡寒在下焦而陽氣虛衰亦所當惡也時頭熱面赤目脈赤者頭為諸陽之會陽邪獨盛於上所以足寒於下也時者時或熱炎於上而作止有時也頭面為諸陽之所聚乃元首也不宜動搖因風火扇動於上故獨頭面動搖卒然口噤而不言也王太僕謂腎與胞脈內絶則不能言以胞脈繫於腎腎脈上貫肝膈入肺中循喉嚨挾舌本內氣阻絶故不能言也太陽病發熱無汗反惡寒者名曰剛痓太陽病發熱汗出不惡寒者名曰柔痓上文但舉痓病之脈症猶未分別其受病之源頭以正其名而核其實也此篇仲景雖無治法然既有定名自當循源溯流因證施治也夫痓病雖為中風傷寒之變體然終不離乎中風傷寒之見證故仍以風寒之見證分剛柔也謂之剛者寒本陰邪以寒邪收引徑急故頸項強急背反張也謂之柔者風本陽邪以風邪性緩雖頸項亦強而筋骨稍覺弛軟汗出不惡汗則異於剛痓也然六經論中以發熱無汗為傷寒發熱汗出為中風此麻黃桂枝之定法也而此篇以發熱無汗為剛痓發熱汗出為柔痓何也其痓病之異於中風傷寒者在反惡寒與不惡寒之兩句耳蓋中風傷寒邪皆在表無有不惡風惡寒者如太陽上篇云太陽病發熱汗出惡風脈緩者名為中風此中風而惡風也又曰太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風此中風而惡寒亦惡風也太陽中篇云太陽病或已發熱或未發熱必惡寒體痛此傷寒而惡寒也又云太陽病頭痛發熱身疼腰痛惡風無汗而喘者此傷寒惡風也此以發熱無汗之痓病是傷寒之變也發熱無汗本應惡寒而曰反惡寒反者不當惡之詞也然而非也以時頭熱面赤目脈皆赤之見證似乎熱甚而仍身熱足寒頸項強急而惡寒故曰反也反者甚之之詞言寒邪太盛因虛陽上走而時常頭熱面赤目脈盡赤究是表裡皆寒甚故足寒頸項強急而惡寒口噤而背如角弓之反張寒邪已經在裡而表猶惡寒故曰反也寒性徑急故稱剛痓其發熱汗出之痓病乃中風之變也亦本惡寒而曰不惡寒者已屬陽明然陽明無項強諸症故仍在太陽而為痓病也既不惡寒則知陽邪已經自表達里所以不惡寒而但有頸項強急等症較之剛痓稍緩故稱柔痓耳太陽病發汗太多因致痓前所論痓病皆中風傷寒深入之邪浸淫於經絡臟腑筋骨肌肉之間乃自然感受之證也此因邪在太陽本非痓病因發汗太多使衛陽敗泄而真陽亡矣亡陽則陰寒獨治生氣通天論云陽氣者精則養神柔則養筋陽氣衰微不能噓養其筋骨故筋脈徑急而成痓所以太陽篇云太陽病醫發汗遂漏不止四肢拘急難以屈伸者桂枝加附子湯主之痓之見症雖又甚焉然亦理之相似者也辨誤成注云千金云太陽中風重感寒濕則變痓太陽病發熱無汗為表實則不當惡寒今反惡寒則為太陽中風重感於寒為痓病也此説殊誤發熱無汗為表實是寒邪實於表故皮膚閉而為熱麻黃湯證也正當惡寒如何反云不當惡寒此一誤也仲景以發熱無汗惡寒為剛痓是明言剛痓為傷寒之變症當從麻黃湯一例求之隨證增減可也如頸項強急口噤背反張皆麻黃症也以頸屬陽明故金匱云太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痓葛根湯主之此即太陽陽明篇所謂太陽病項背強𠘧𠘧無汗惡風者葛根湯主之之義也設足寒時頭熱面赤等症皆寒邪太盛虛陽上泛之症麻黃附子細辛湯亦可用也以此義推之純是寒邪並無太陽中風又重感於寒之説此再誤也又以發熱汗出不惡寒為柔痓此又明言柔痓為中風之變症其症當從桂枝湯例中求之隨症加減可也如發熱汗出桂枝症也以不惡寒已屬陽明故金匱云太陽病其證備身體強𠘧𠘧然脈反沉遲此為痓栝蔞桂枝湯主之此即陽明篇中所謂太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之之義也至於金匱所謂痓為病胸滿口噤臥不著席腳攣急必齘齒可與承氣湯者乃已入陽明之治也傷寒論中立法雖嚴而理無不貫但於六經條例中分明其經絡條貫別識其表裡陰陽則其證其治進退出入無往而非可由之路矣易大傳所謂往來不窮謂之通仲景之學其斯之謂歟濕病證治第九太陽病關節疼痛而煩脈沉而細者此名濕痹之候其人小便不利大便反快但當利其小便夫濕者六氣之一也然一氣之中猶有別焉霧露之氣為升於地之輕清而上騰者故為濕中之清傷人皆中於上雨雪泥水之濕為著於地之重濁而在下者為濕中之濁傷人皆中於下經云清邪中上濁邪中下所以金匱要略云濕傷於下霧傷於上霧傷皮腠濕流關節也亦稱太陽病者以風寒暑濕之邪皆由衛氣不密其氣得從皮毛而入以營衛皆屬太陽故也關節筋骨肢節之間也凡濕邪中人必流注於肢節而煩疼腫痛故素問陰陽應象論所謂地之濕氣感則害人皮肉筋骨者是也以雨露水濕之氣因衛陽不能外固由太陽而流入於關節筋骨之間致肢節疼痛而煩擾不寧其脈沉而細者此名濕痹然何以辨之譬之寒傷營證雖亦身疼腰痛骨節疼痛而其脈則浮緊痓病之脈沉細而症則發熱頸項強急口噤反張濕病脈亦沉細而骨節煩疼症異則脈同症同則脈異所以為不同也沉細者寒濕流於皮肉筋脈之間血凝氣滯營衛不快於流行故脈細而疼痛也濕痹之候寒濕內淫則三焦不能施化氣化不得流行其人小便不利是以水穀不能泌別濕氣流溢於大腸故大便不得燥結而反快也若此者不必以燥濕為治其濕氣淫溢非燥濕之所能勝故但當利其小便因燥濕之所去者少滲利之所去者多故小便利則水穀分而濕淫去矣此條蓋論雨雪泥水地氣之濕乃濕中之濁者故曰但當利其小便若霧露之清邪即當以微似汗解之矣然利小便句當審察其脈證機宜未可泛然以淡滲為治也脈既沉細關節已疼而小便不利則陰寒可知自當以寒濕為治責之下焦無火膀胱之氣化不行則五苓散及甘草附子湯之類當意在言表濕家之為病一身盡疼發熱身色如似熏黃此亦論兩水地氣之濕也一身盡疼即前濕流關節之義前云脈沉而細明是寒濕之邪此雖無脈象而云發熱則邪猶在經身色如熏黃是濕已入里脾受濕傷而中央土色已現於外濕邪充塞浸灌於表裡肌肉肢節之間所以一身盡疼而身色如熏黃也熏黃者如煙燻之狀黃中帶黑而不明潤也蓋黃家有陰陽之別陽黃明潤陰黃則黑暗而無光澤素問五臟生成篇云黃如蟹腹者生黃如枳實者死如陽明篇傷寒發黃身如橘子色者而用茵陳蒿湯下之及身黃髮熱而以梔子柏皮湯以至麻黃連軺赤小豆湯者皆以瘀熱在裡小便不利濕熱停蓄所致悉屬陽黃此證一身盡疼已屬寒濕之邪流於關節而身色如似熏黃即陰黃之屬也外雖發熱尚為太陽在表之邪其發現之色則由內達外既如煙燻或當於寒濕中求之未可知也但必詳審其脈證而施治耳仲景所以不立治法者蓋欲人於陰陽寒熱中求之耳未有一定可擬之法也設一立治法即膠於一偏恐後人執著其説而不能圓通變化耳濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈成注每不能闡發仲景深義遂為後世所譏惟此條注釋頗得原文精義但尚嫌其語焉不詳多所缺失今即因其意而申之云此蓋言霧露所感之濕所謂清邪中上者是也既稱濕家而不云關節疼痛又不言一身盡疼痛更不言骨節煩疼掣痛但曰身上疼痛身上者身之上也邪在上焦是濕未流於關節而外客於身上之肌表也不云發熱身似熏黃但曰發熱面黃而喘是濕未入里而色但現於頭面也喘者肺主皮毛開竅於鼻濕襲皮毛內壅肺氣所以鼻塞而喘非胸腹脹滿而喘也若寒濕在裡則屬陰邪無頭痛發熱之見症脈當沉細此則發熱頭痛鼻塞而煩是邪氣但在上焦毫不犯里故其脈大而自能飲食腹中和而身軀臟腑無病也其病但因頭中寒濕故鼻塞也病淺不必探求毋庸製劑但當以辛香開發之藥納之鼻中以宣泄頭中之寒濕則愈朱奉議及王氏準繩俱用瓜蒂散濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也此言霧露寒濕之邪中人也太陽之經脈挾背脊而行於兩旁寒濕中之故背強寒邪在表所以欲得被覆而向火也寒濕之邪留著於太陽之經陽氣不得流行以頭為諸陽之會諸陰絡不能至頭皆劑頸而還陽氣不行獨聚於頭故其人但頭汗出所謂清邪中上也當表邪未解之時若早下之則寒濕之邪乘下後之虛內陷入胃胃氣傷敗而噦噦者俗所謂冷厄是也噦而胸滿小便不利者寒濕在中胃氣不行三焦不運上焦之氣不降則濁氣鬱塞而胸滿下焦之清陽不升則氣化不行而小便不利也舌上如苔者若熱邪入胃則舌上或黃或黑或芒刺或乾硬或燥裂皆苔也此云如苔乃濕滑而色白似苔非苔也然何以致此因寒濕之邪陷入於裡而在胸膈命門之真陽不得上升而在下焦上下不通故曰丹田有熱胸中有寒下焦之真火既不得上達即所謂清陽不升是下焦無蒸騰之用氣液不得上騰而為涕唾故渴又以寒濕在胸道路阻絶故雖欲得水而不能飲則口燥而煩渴也仲景雖不立治法然以理推之邪在太陽之表則當汗解頭汗既出不當用麻黃胸中之寒邪當去下焦之氣化當行於法當溫則下文之桂枝附子湯甘草附子湯即其治也前人擬陷胸湯恐非其治即五苓散理中湯雖近於理猶未盡善何也以但能溫中而不能解外故必以用桂枝者為妥也濕家下之額上汗出微喘小便利者死若下利不止者亦死治濕但有汗法及利小便法而無下法上文因寒邪在表下早即有噦而胸滿小便不利之變然為寒濕所中陽氣已傷而誤下之必致亡陽變逆而死矣夫濕邪在表本宜於汗若誤下之致虛陽欲亡而上奔額上汗出而喘乃孤陽絶於上也濕邪在裡唯恐其小便不利下後而小便反利及下利不止者腎主二陰之竅而不攝是真陽脫於下也上絶下脫故皆為死證也病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也一身盡疼者濕流關節也發熱者風邪在表也日晡所陽明氣旺之時也風為陽邪濕為淫氣風濕之邪留著於肌肉關節之間陰陽應象論所謂濕傷肉者是也以陽明專主肌肉故至陽明氣旺之時而劇也風濕兩傷故曰此名風濕然此病因何得之皆傷於汗出當風故也蓋汗欲出則陽氣已動腠理已開陰液已出矣汗出當風則風乘腠理之開而入矣風邪既入汗不得出以離經之汗液既不得外出皮毛又不能內返經絡留於腠理肌肉之中而為濕矣雖非泥水雨雪之濕亦非霧露嵐瘴之比乃人身汗液之濕也濕雖不同而其為病則大同小異與他濕同然也所以濕流於關節肌肉而身疼風入皮膚腠理而發熱也其或暑汗當出之時久傷於取冷太過使欲出之汗不得外泄留著於肌肉腠理之所致與汗出當風無以異也此處雖無治法然仲景於金匱要略此文之下即有麻黃杏仁薏苡甘草湯溫服取汗之法即其治也問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也此又設為問答以明風濕兼治之法也風濕相搏謂風濕兩相搏聚而使一身盡疼也天陰雨不止言又值濕氣盛行之時也汗大出而濕氣尚在者以風乃無形之邪外襲皮毛故隨汗可去濕乃重濁之氣淫著於肌肉流滯於關節之間不能隨迅發之大汗而驟出故大汗則風氣去而濕氣在也若治風濕之法固當發其汗矣然服藥之後但令其熱氣從內達外如蒸蒸發熱之狀使微微似欲汗出氣蒸膚潤久令如此則風濕留著之邪漸出而俱去矣治法如此方得盡去不然則風去而濕仍在矣傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之此條本在太陽篇中傷寒條下因濕病又為六氣之一非傷寒所得而該故留此一條於傷寒例中以為標目使後之臨證者遇傷寒而有寒濕之兼證者當另於寒濕門中求其治法可也今附於此以便學者之尋求追討焉以下二條王叔和亦編入傷寒條內及觀金匱要略則此二條仍在痓濕暍三症篇中故亦移入於此萃成寒濕一門倘傷寒有此兼症當於此中尋求治法即仲景所謂於寒濕中求之是也此言見證雖屬傷寒頭痛發熱惡風無汗法當汗解而以麻黃湯發其汗至發汗以後邪氣不解而身目又為之發黃何也究其所以然者不但有在表之邪蓋因寒邪與濕氣摶結在裡而不解故也然寒濕之邪非陽明瘀熱發黃及身黃如橘子色者可與茵陳蒿湯下之可比陰寒本無下法所以此證為不可下也故當於濕病一門之寒濕中求之即下文桂枝附子湯及去桂枝加白朮湯與甘草附子湯者是也尚論謂即麻黃連翹赤小豆湯茵陳蒿湯梔子柏皮湯三法誤矣此條不言傷寒之脈證但云發汗已身目為黃若此何以知為寒濕在裡乎不知陽明篇中濕熱鬱蒸之發黃一則曰發熱汗出者此為熱越不能發黃但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裡身必發黃而以茵陳蒿湯下之又曰陽明病面合赤色不可攻之必發身黃小便不利也又云陽明病無汗小便不利心中懊憹身必發黃又云陽明病被火額上微汗出小便不利者必發黃又云傷寒瘀熱在裡身必發黃麻黃連翹赤小豆湯主之傷汗七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之傷寒身黃髮熱者梔子柏皮湯主之此條不言發熱亦不言小便不利不言被火並不言頭汗則非瘀熱可知但以傷寒無汗而發之得汗後亦可謂熱邪發越亦不能發黃矣乃至身目為黃蓋因其證本屬傷寒而汗不能解是以知寒不在表而在裡矣然非濕不能發黃故又知寒濕在裡也寒濕之治不應混列於傷寒篇中故當於寒濕症中求之耳仲景之文雖似不言其證治而細揣其義不啻耳提面命矣學者果能尋繹其文則領會其不言之教亦多矣故自序云若能尋余所集思過半矣傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之此條既云傷寒又曰風濕相搏當是風寒並感應入太陽下篇不應置之太陽中篇因本是濕邪兼症故移入濕證條中彙集一門以便查核大凡中風傷寒之邪至八九日設不傳入他經亦必入里而不在表矣夫寒為陰邪在表則當體痛風為陽邪熱鬱則必發煩至八九日之久煩則或有體痛者絶少矣此證雖屬傷寒因又有濕邪搏聚濕亦陰邪流於關節所以身體煩疼而身重不能轉側也不嘔不渴邪不在胃未入於裡也脈浮虛而澀者浮則為風浮則按之無力即所謂浮則為虛也寒邪在營血脈不得流利則澀濕流關節氣血不快於流行亦澀正風寒濕三氣所著之脈名為濕痹者是也法當兼治故以桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之濕在裡則小便不利大便反快大便硬則濕不在裡小便利則濕氣已去不須汗泄故去桂枝想風濕之後寒濕之餘氣未盡身體尚疼轉側未便故仍用去桂枝之白朮附子湯也桂枝附子湯方桂枝四兩附子二枚生薑三兩甘草二兩大棗十二枚上五味以水六升煮取二升去滓分溫三服風邪非桂枝不能汗解寒邪非附子不足以溫經非生薑亦不能宣散甘草大棗緩薑附之性助桂枝而行津液也此方乃太陽上篇誤下之後脈促胸滿微惡寒之桂枝去芍藥湯而加附子非汗後遂漏不止之桂枝加附子湯也桂枝附子湯乃去芍藥者故另立一名而無加字桂枝加附子湯乃不去芍藥者即於桂枝全湯中加入故多一加字若不去芍藥之酸收即為傷寒無汗之禁劑矣然既曰傷寒而不用麻黃湯獨取桂枝者非但用之以解散衛分風邪因其見證皆屬陰寒陽氣已弱脈已浮虛不宜大汗若大汗之非惟犯上文汗大出者但風氣去濕氣在之戒具有亡陽之禍故用桂枝附子湯但令微微似欲汗出則風濕皆去不必用術燥濕也觀仲景立法處方無不各有深意如太陰發汗而用桂枝湯厥陰攻表亦用桂枝湯其義自見即使少陰之用麻黃亦必與附子同用者陰經皆以陽氣為重故也又如金匱所載云濕家身煩疼可與麻加朮湯發其汗為宜慎不可以火攻之一節因承上文身疼發熱面黃而喘頭痛鼻塞煩而脈大無陰寒之症故不用附子而忌火攻既見頭痛發熱邪在陽經況有濕氣而身體煩疼自宜發汗故用麻黃全湯更加朮以燥濕也又金匱濕病條中更有風濕脈浮身重汗出惡風者不用桂枝湯加減而用防己黃耆湯主之者以脈浮汗出惡風似乎風邪在表應用桂枝而仲景又偵知其衛氣已虛皮膚不密毛孔不閉所以汗出惡風乃濕家之表虛者故用防己利水以黃耆固表白朮甘草燥濕補中而已皆因其表氣已虛衛陽不固並微似汗之桂枝亦不輕用矣非用意淵深而能制方若是邪去桂枝加白朮湯即朮附湯桂枝附子去桂枝加白朮湯者即於桂枝附子湯方內去桂枝加朮三兩余依前法去桂枝加白朮湯者即朮附湯也因承上文桂枝附子湯加減故云去桂枝加白朮湯也古方術上無白字故稱朮附湯成氏不曉誤附於太陽上篇遂漏不止之桂枝加附子湯後前既無仲景原文方法後但虛懸此方殊無著落用處致方氏無從查考遂謂加減舊缺有補出之説喻氏僅採取方氏條辨作尚論篇故亦不能分辨方中用附子二枚古之附子乃山野所生或小於今之種蒔者亦未可為定法恐是後人傳寫之誤以愚意度之當以應用之分兩為度桂枝四兩即宋之一兩八分元則較重於宋今更重矣生薑三兩即宋之八錢附子若用一枚約重一兩二三錢炮過可得乾者三錢半若分三次服亦不為過前人有古方不可治今病之説皆不知古今斤兩不同故也風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或微腫者甘草附子湯主之風濕相搏與前文同義掣痛者謂筋骨肢節抽掣疼痛也不得屈伸寒濕之邪流著於筋骨肢節之間故拘攣不得屈伸也近之則痛劇者即煩疼之甚也疼而煩甚人近之則聲步皆畏如動觸之而其痛愈劇也汗出即中風汗自出也短氣邪在胸膈而氣不得伸也小便不利寒濕在中清濁不得升降下焦真陽之氣化不行也惡風不欲去衣風邪在表也或微腫者濕淫肌肉經所謂濕傷肉也風邪寒濕搏聚而不散故以甘草附子湯主之甘草附子湯方甘草二兩附子二枚去皮白朮二兩桂枝四兩上四味以水六升煮取三升去滓溫服一升日三服得微汗則解能食汗出復煩者服五合恐一升多者服六七合為妙風邪在表故汗出惡風而不欲去衣非桂枝不足以汗解衛邪濕淫在經非術不足以助土燥濕因寒濕流於關節致骨節煩疼掣痛而不得屈伸下焦無火氣化不行而小便不利故用附子以溫經散寒則陽回氣暖而筋脈和同東風解凍而水泉流動矣經云陽氣者精則養神柔則養筋筋柔則無掣痛不得屈伸之患矣甘草所以緩陰氣之急且為桂枝湯中本有之物因湯中之芍藥能收斂助陰故去之耳雖名之曰甘草附子湯實用桂枝去芍藥湯以汗解風邪增入附子白朮以驅寒燥濕也中暍證治第十太陽中熱者暍是也其人汗出惡寒身熱而渴也暍者盛夏暑熱中之邪氣也暍證三條有本證變證之不同蓋示人以病無定情證變不一勉人當隨證立法無一定不移之治也此條先言本證之情形如此而以中熱二字通解暍字之義即內經熱論所謂病暑也王肯堂云中暍中暑中熱名雖不同實一病也謂之暍者暑熱當令之時其氣因暑為邪耳非即夏月暑熱當令之正氣也夫冬月之寒邪感之則為傷寒而四時皆有不時之寒感之亦為傷寒春令之風邪感之則為中風而四時皆有不時之風感之亦為中風春盡夏初風邪未已溫熱初行感之則為風溫夏令之夏至以前熱氣未甚其氣尚溫其邪感之則為溫病即素問所謂先夏至日為病溫者是也然亦四時皆有不時之溫暖故有春溫冬溫之病即秋氣肅爽之時亦有感受非時之溫暖而成秋溫者矣惟中暍一證獨於盛暑中有之其他時令則絶無也大凡四時遊行於兩間之邪氣即陰陽升降氣候變化中之太過不及偏盛偏虛之乖氣也但借四時寒暑溫熱之氣中人而為風寒溫暑之病然皆因人之虛而中之耳故靈樞云風雨寒暑不得虛邪不能獨傷人必因虛邪之風與身形兩虛相得乃客其形也是以中暍一症非盛夏之熱氣乃暑熱中之邪氣也即熱論所謂後夏至日者為病暑是也其氣之中人也亦必由營衛而入與風寒無異故曰太陽但較之中風則同一發熱汗出惡寒而多一渴證其所以渴者非若風寒本屬寒因至鬱熱之邪入里胃中熱燥方見渴證暍乃暑熱之邪其氣本熱不待入里故中人即渴也若陽明證雖亦發熱汗出然不惡寒而反惡熱矣若邪入陽明之裡而渴欲飲水則亦無惡寒者矣此中風與中暍太陽與陽明之辨也然溫病亦發熱而渴以不惡寒者方為溫病暍雖身熱而渴則又惡寒矣此又中暍與溫病之殊也溫病與中暍皆夏令暑熱之邪暍症惡寒而溫病不惡寒者以溫邪為夏至以前之病純陽當令之時其溫熱之邪布於皮膚充於肌肉漸至入里則表裡皆熱故不惡寒也暍證為夏至以後之病陽極陰生之後陰氣已長當暑汗大出之時腠理開張衛陽空疏表氣已虛不能勝受外氣故汗出惡寒也前太陽中風汗出惡風為表邪未解故以桂枝湯汗解之太陽陽明中風項背強𠘧𠘧汗出惡風者亦以太陽表症未罷故以桂枝加葛根湯汗解之至於熱邪入胃渴欲飲水口乾舌燥或大汗出後大煩渴不解脈洪大者方以白虎加人參湯主之此條雖不立治法而於金匱要略中此條之下以發熱惡寒之證似乎表邪未解即以白虎加人參湯主之何也蓋以風雖陽邪尚非溫暑可比故雖發熱汗出仍當以汗解為治暑屬純陽之氣本系熱邪況盛夏則暑汗大出內經熱論雖曰暑當與汗皆出而勿止然瘧論又云令人汗出空疏腠理開故暑邪得入是熱邪乘腠理之虛而為暍證也所以即用石膏以治時令暑熱之邪又加人參以補汗出之表虛添津液而治燥渴也此條雖未言脈而下文之脈微弱及弦細芤遲皆虛脈也以暑熱之邪而脈不大汗出惡寒之症而脈不浮其為虛邪無疑證熱脈虛寧非人參白虎之治乎故曰脈虛身熱得之傷暑也世俗不知仲景立法原以桂枝治中風麻黃治傷寒而以青龍治溫白虎治暑先立四大柱而後察其證變通其治法以盡其變寒熱溫涼補瀉隨症設施非獨拘拘於大順散蒼朮白虎湯香薷飲治暑諸方而已也辨誤暑病一門從來議論繁多紛紛莫定劉氏云潔古謂靜而得之為中暑動而得之為中熱東垣謂避暑於深堂廣廈得之曰中暑宜大順散勞役得之曰中熱宜蒼朮白虎湯夫暑熱一也夏之令氣也靜居堂廈而病乃夏月傷冷之病何可以中暑而別求於中熱邪丹溪謂夏月陽氣盡出於地人之腹屬地氣於此時浮於肌表腹中虛矣夏月伏陰在內此陰字有虛之義若作陰冷看誤矣前人治暑有用大順散溫熱藥者蓋以涼亭水閣寒泉冰雪所傷也非為伏陰而用火令之時爍石流金有何陰冷孫真人令人夏月服生脈散非虛而何愚竊謂內經熱論以後夏至日者為暑病則夏至以後立秋以前正酷暑炎蒸之際凡受暑熱中之邪氣皆是熱邪即所謂中暍者是也蓋暑即是熱熱即是暑但內經則謂之病暑仲景則謂之太陽中熱而名之曰中暍也暑熱既非二證動靜豈可分屬東垣之深堂大廈及勞役得之亦即靜動之謂也豈可亦以中暑中熱之名分隸其下而以大順散蒼朮白虎湯主之邪毋怪後人之議之也丹溪以陰字作虛字解恐未盡善既云夏月伏陰在內又曰火令之時爍石流金有何陰冷豈所謂伏陰之陰全是虛邪孫真人雖令人夏月服生脈散其本意蓋恐盛夏暑汗過泄故用人參五味以斂之盛火剋金故以人參麥冬救之乃未中暑時預防調攝之方耳非謂中暑之人可概用生脈散補斂之藥也不然則素問熱論所謂暑當與汗皆出勿止之語可竟棄而弗用邪是以夏月之病非必皆中暑也大順散為飲冷寒中之藥人參白虎乃暑熱襲虛之治五苓散為溫下焦滲小便之法益元散為清暑利小便之用香薷飲為解散和中滲利之劑當因證而施豈可泛用其雖在夏月若頭痛惡寒發熱無汗者亦是暑熱中之寒邪所中仍當以治傷寒法汗解之蓋因本是夏月之傷寒原屬麻黃湯證也若兼有溫暑之邪則又大青龍證矣第別其感受之風寒暑濕即當以仲景風寒暑濕之法治之未可以天時之寒暖遂變易其法也何也天地四時有寒熱溫涼之正氣各司其令若有不時之溫暖即有春溫冬溫之厲病又有非時之暴寒故四時皆有傷寒月令所謂春行冬令春行夏令夏行春令夏行冬令及秋行冬令冬行春令之類皆足以致疾疫災眚之變又豈可悉依司令之正氣而施治哉是以四時之氣不偏則不病病則治其偏勝之邪氣可也寧可膠於前人之謬謂寒涼必不可用之於三冬汗劑必不可用之於盛夏乎此從來俗習之弊也溯洄集中王履氏亦謂中暑中熱為一證言暑熱之令大行於天地之間勞役之人或因飢餓令元氣虧乏不足以御天令之亢熱因虛則邪入而病若不虛則天令雖亢亦無由傷之至於避暑於深堂大廈得頭痛發熱等症者亦傷寒之類不可以中暑名之乃身中陽氣受陰寒所遏而作也苟欲治之則辛溫輕揚之劑發散可也若大順散一方甘草最多薑桂杏仁次之其初意本為病者伏熱引飲過多脾骨受濕嘔吐水穀不分臟腑不調所立故甘草乾薑皆火炒用肉桂而非桂枝蓋溫中藥也若以此治靜而得之之證吾恐不能發表反增內煩矣世俗往往不明類曰夏月陰氣在內大順散為必用之藥夫陰氣非寒氣也蓋夏月陽氣發散在外而陰則在內耳豈可視陰氣為寒氣而用溫熱之藥乎其蒼朮白虎湯雖或宜用豈可視為通行之藥乎必參之治暑諸方隨所見之證而治之然後合理夫所謂靜而得之之證雖當暑月即非暑病宜分出之勿使後人有似同而異之惑王氏此論傷寒暑病劃然頗足證前人之失但治暑諸方大概皆出於後人之手非活法也不若參之仲景諸法雖無方可據而其治法則於脈證乃禁汗禁下中可推也所以不立方者蓋欲令人隨證變通非若後人之大順散及蒼朮白虎湯使人通行概用也太陽中暍者身熱疼重而脈微弱此夏月傷冷水水行皮中所致也身熱太陽表證也不言汗出惡寒者邪氣較輕於前也疼重者身體重而疼痛也傷寒則有身疼腰痛骨節疼痛之證而濕家亦有筋骨煩疼一身盡疼關節疼痛之證此以中暑之陽邪而亦有此寒濕之證是以知其為夏月傷冷水水行皮膚中所致也傷冷水者或飲冷水或以冷水盥濯水寒留著皆可滲入皮中也中暑之脈本虛又以水寒所傷故尤見微弱也言太陽經為暑熱之邪所中其邪由營衛而入故有表證而發熱也前症本惡寒汗出而渴此條不汗不渴而身疼重者以既為暑邪所中又為冷水所傷水既行於皮中故無汗而不渴也暑病之脈本虛又為寒濕所傷所以脈微弱也然論中不立治法而金匱要略於此條之下有一物瓜蒂湯主之王肯堂云瓜蒂一物散或曰五苓散愚竊以理推之若暑邪盛而表證甚者當以瓜蒂之苦寒上湧下泄使水去而表邪亦去以因吐得汗有發散之義故也若身熱微而表症少但脈微弱而疼重水行皮中者則水寒較勝自當用五苓散以助下焦蒸騰之氣使上焦肺氣下行通調水道下輸膀胱使從水道氣化而出可也但在臨證者用之得宜耳太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚首條以中熱二字釋暍字之義言其人汗出惡風身熱而渴乃論太陽中暍之本症也其二條同是太陽中暍身但熱而不惡寒汗出其暑邪較輕又以不渴身疼重脈微弱而知其為夏月傷冷水水行皮中所致此中暍之有兼症者也此條亦是太陽中暍而發熱惡寒不云汗出而又不渴是以知其非陽邪獨盛之暍也既非傷冷水又身重而疼痛弦細芤遲皆陰脈也弦則陰邪徑急細則元氣已虛芤則脈空遲則為寒中暑之脈雖虛未必若是之甚是以知其為陰寒之證也小便已灑灑然毛聳者小便雖通其莖中艱澀可知衛陽已虛惡寒之狀可見乃下焦無火氣化不快於流行也四肢為諸陽之本手足逆冷者是陽虛而氣不達於四肢也凡此皆陰寒無火之脈症也小有勞身即熱者病暑之人非必勤動作勞然後謂之勞也即起居動靜間小有勞動即擾動其陽氣而虛邪伏暑即因之而發熱也口開前板齒燥者脈雖弦細芤遲症雖手足逆冷以小勞而鼓動其陽邪身熱而枯燥其津液雖不渴而板齒燥矣成氏云內經生氣通天論云因於暑汗煩則喘喝蓋因煩熱則氣不得息而喘喝喘喝則口開而前板齒燥也若發其汗則衛陽愈虛陽虛則生外寒故惡寒甚若加溫針則火力內攻必反助其暑熱之陽邪故發熱甚邪不在裡而數下之適足以敗壞真陽使下焦愈冷氣化不行小便艱澀而淋甚也此條但敘脈證而不言所以然之故又無治法但言不可用火攻汗下可見古人立法道不輕傳欲令後之有知識者自行推測倘得悟徹精微庶或知難而不至於怠忽耳故云若能尋余所集思過半矣愚竊以理推之當以五苓散助其下焦蒸騰之氣使氣液上騰而津回燥潤小便順利衛氣強而邪自解矣設陽回氣復之後暑邪未盡而身熱反渴者人參白虎湯仍可酌用也
