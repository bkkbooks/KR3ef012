body:
  text: 卷之七少陽全篇合病並病附少陽證治第十四少陽正治少陽之為病口苦咽乾目眩也少陽者足少陽膽經也膽為東方初生之木名之曰少陽者天地之陽氣生於黃泉則草木之根荄勾萌於至陰坤土之中謂之厥陰至三陽開泰陽氣透地則萌芽生動二月而陽氣上騰以雷霆之鼓風雨之潤而草木條達陽氣附於草木而初生故為之少陽人身以臟腑居於軀殼之中者為三陰陽氣由命門而出為無形之三焦難經所謂命門為三焦之原是也三焦附於肝膽猶天地之陽氣附於草木也是為少陽主乎軀殼之裡層由此而盛陽外布於肌肉而為陽明行於營衛達於皮毛而為太陽矣靈樞經脈篇云足少陽之脈起於目鋭眥出走耳前至目鋭眥後下頸入缺盆邪在少陽之經故目眩而咽乾又云是動則病口苦善太息且手少陽脈之支者亦走耳前至目鋭眥動則病耳聾嗌腫喉痹故少陽之為病口苦咽乾目眩也傷寒中風五六日往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之五六日六經傳邪之候也往來寒熱者或作或止或早或晏非若瘧之休作有時也以五六日而尚往來寒熱則知邪未入陰猶在少陽也少陽之脈雖行身之側而其實則軀殼之裡層也向外則由陽明達太陽而為三陽表也向內則軀殼中之臟腑為三陰里也少陽居於表裡之間故為半表半裡邪在少陽則所入已深衛氣周行一身故邪氣與衛氣合則病作與衛氣離則病休衛氣旋轉流行如環無端故其寒熱之作必待正邪相遇所以有往來之不齊也非若太陽居表之最外一層營衛所在邪氣入之即寒熱不休也其所以寒熱者瘧論所謂邪並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱也胸脅苦滿者少陽脈之支者別鋭眥下大迎合於少陽下頰車自頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街其直者從缺盆下腋循胸過季脅邪入其經故胸脅苦滿或脅下痞硬也胸脅苦滿故默默不欲飲食然邪在半里為入陰之漸且少陽與厥陰相為表裡所以如厥陰證之默默不欲食及飢不欲食或腹中痛也邪熱在胸故心煩喜嘔或但胸中煩而不嘔或心下築築然悸動也或渴或不渴者寒熱往來或作或止即瘧論所云或甚或不甚故或渴或不渴也邪在半表故身有微熱少陽之脈下胸中邪入胸中而犯肺故或咳也或者或有或無非必皆有也大凡邪氣在表表實則當汗解邪氣在裡裡實則當攻下邪在膈上將次入里則當用吐今邪在半表半裡之間汗之則達表之途遠誤汗則陽氣虛而邪必犯胃恐有譫語煩悸之變生吐下則內陷之機速誤吐下則正氣傷而虛邪內侵恐有驚悸之患作故汗吐下皆在所禁而以小柴胡湯和解其半表半裡之邪也以下凡稱少陽病者其見證皆具載此二條中雖未必全見或見一二證者即謂之少陽病也小柴胡湯方柴胡半斤黃芩三兩人參三兩甘草三兩半夏半升生薑三兩切大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服柴胡湯而有大小之分者非柴胡有大小之異也蓋以其用之輕重力之大小而言也大柴胡湯能兩解表裡之邪者以柴胡湯解其半表之邪而以大黃攻下其在裡之實邪其功力較大故謂之大小柴胡湯兼能和解半表半裡之邪且可以調護其正氣其功用較緩故謂之小也夫小柴胡湯乃升發少陽之要劑也草木得陽氣而升發陽氣出地而發生草木陽氣附於草木故木為少陽若木得邪氣而抑鬱不舒則少陽之氣不能宣布其發生矣故六元正紀大論云木鬱則達之木氣條達則少陽之氣升發天地變化而草木蕃矣人身之陽氣由腎水中命門而出從三陰而始達少陽若為邪氣所遏其氣不得由陽明而達太陽邪客其經所以往來寒熱胸脅滿而脅下痞硬或嘔或渴之證肝膽受邪故口苦咽乾目眩也邪在少陽內逼三陰達表之途遼遠汗之徒足以敗衛亡陽少陽雖外屬三陽而入里之路較近下之適足以陷邪傷胃汗下俱所不宜故立小柴胡湯以升發少陽之郁邪使清陽達表而解散之即所謂木鬱達之之義也故少陽一經惟此一方無他法也雖有多證亦不過因此出入變化而已至變證已離少陽柴胡不中與之則更用他法矣雖後人之補中益氣湯及逍遙散之類其升發清陽開解鬱結之義亦皆不離小柴胡之旨也方用柴胡為君者李時珍云柴胡乃手足厥陰少陽之藥勞在脾胃有熱或陽氣下陷則柴胡乃引清氣退熱必用之藥李東垣謂能引清氣而行陽道傷寒外諸有熱則加之無熱則不必也又能引胃氣上行升騰而行春令又凡諸瘧以柴胡為君隨所在經分佐以引經之藥十二經瘡疽中須用以散諸經血結氣聚愚按所謂清氣者下焦所升清陽之氣也謂之清陽者蓋谷之濁氣降於下焦為命門真陽之所蒸其清氣騰達於上聚膻中而為氣海通於肺而為呼吸布於皮膚而為衛氣運行於周身內外上中下而為三焦附於肝膽而為少陽風木故清陽不升內無以達生髮陽和之氣所以外不能驅邪出表矣陰陽應象論云清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也因此而東垣有能引胃氣上行升騰而行春令之語瀕湖有脾胃有熱陽氣下陷引清氣而退熱之用是下焦之真陽虛則當以溫補命門為主下焦之真陽不上行則當以升發清陽為急必使陽氣運行清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑然後陰陽各得其用也小柴胡湯之用柴胡蓋取其清陽發腠理也黃芩者佐柴胡而徹其熱也藏氣法時論云肝苦急急食甘以緩之故用人參甘草之甘緩膽為奇恆之府其精汁無餘所以藏而不瀉與他腑之傳化不同況少陽為春生之始氣春氣旺則百物皆生故十一臟皆取決焉手少陰三焦以氣為用氣不旺則不能運化流行故以人參助其升發運行之力也其在本方已有因證加減之法今世俗皆棄人參而不用以為穩當乃盲醫不知虛實之故也惟熱盛而邪實者乃可去之或有兼證之不相合者亦可去也若邪輕而正氣虛者未可概去也或邪氣雖盛而正氣大虛者亦當酌其去取也如柴胡桂枝湯雖發熱微惡寒支節煩疼微嘔而心下支結為外證未去乃太少兼證故於小柴胡之半劑加入桂枝湯之半以兩解之而人參仍不去也又如柴胡桂枝幹薑湯雖已發汗而復下之不為不虛矣又以胸脅滿而微結但頭汗出往來寒熱非惟少陽之邪未解太陽亦未解也故增入桂枝幹姜栝蔞牡蠣而人參半夏薑棗皆減去矣又如柴胡加芒硝湯雖有潮熱胃實之證以其胸脅滿而嘔本屬柴胡證奈以非其治之丸藥下之致成少陽壞病故但加芒硝而人參仍不去也更如大柴胡湯以太陽病而過經十餘日反二三下之亦可謂虛矣更後四五日而柴胡證仍在故先與小柴胡湯服湯而嘔不止心下反急鬱郁微煩不解者蓋因邪自太陽誤下入里且柴胡證仍在故仍以柴胡解少陽之邪加入大黃枳實以攻入里之邪合而為兩解表裡之劑然以太陽入里之熱邪未去所以竟去人參也若此之類皆去取之法仍小柴胡湯之變法也總之邪氣獨在少陽未見有去人參者若兼太陽表症及陽明胃實者未有不去人參者也若能得其去取之旨便能隨證加減無不得心應手矣半夏辛溫滑利可以去胸脅之滿及痞硬之邪即半夏瀉心之義非獨治痰蠲飲也生薑辛而能散大棗甘而和緩可以和營衛而調其往來之寒熱也以一方而該一經之證苟非靈機活潑隨證轉移曷足以盡其變哉後加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚傷寒鬱熱之邪及中風之陽邪在胸皆可發煩邪在少陽可煩太陽之邪在胸亦煩以邪熱摶聚於胸中而煩悶不宜補氣故去人參外邪犯胃寒飲聚於胃口則嘔故用半夏之辛溫滑利以蠲飲若不嘔則邪未犯胃飲未摶結故去半夏也栝蔞實甘寒潤燥降火治咳嗽故加之以去胸邪而止煩熱李時珍云張仲景治胸痹痛引心背咳唾喘息及結胸滿痛皆用栝蔞實乃取其甘寒不犯胃氣能降上焦之火使痰氣下降也成氏不知此意乃云苦寒以瀉熱蓋不嘗其味隨文附會耳然栝蔞之性滑半夏亦滑因栝蔞甘寒宜於煩熱半夏辛溫故不用也若渴者去半夏加人參合成四兩半栝蔞根四兩半夏辛辣而溫熱故不宜於燥渴栝蔞根苦寒而能徹熱生津故宜加入增人參者所以益氣而添津液也若腹中痛者去黃芩加芍藥三兩腹痛為太陰脾病張元素云芍藥白補赤散能瀉肝益脾胃酒浸行經上中部腹痛與姜同用溫經散濕通塞利腹中痛胃氣不通白芍入脾經補中焦乃下利必用之藥蓋瀉利皆太陰病故不可缺得甘草為佐治腹中痛熱則少加黃芩寒則加桂此仲景神方也李時珍謂白芍益脾能於土中瀉木赤芍散邪能行血中之滯日華言赤補氣白治血缺審矣如此則丹溪所云腹痛多是血脈凝澀亦必酒炒用然止能治血虛腹痛余並不治之說非確論矣腹痛已屬太陰黃芩寒中故去之愚謂太陰腹痛者合溫藥治之則可若兼陽明胃實腹滿而痛當用承氣湯者非芍藥所能治若腹雖痛而有表邪未去者亦未可用不可概以芍藥為腹痛必用之藥也若脅下痞硬去大棗加牡蠣四兩少陽之經脈下胸中貫膈屬肝絡膽循脅裡邪入其絡故脅下痞硬去大棗者恐其甘緩也牡蠣之加成氏謂咸以軟堅而已後人皆附會焉不知仲景但以之治脅下痞硬而不用之以治心下痞硬則知不但咸以軟堅並可以平肝邪而入少陽之絡矣神農本經不言及此惟名醫別録有治心脅下痞熱之語王好古亦云以柴胡引之能去脅下硬以茶引之能消項上結核以大黃引之能消股間腫以地黃為使能益精澀小便想亦有所自也柴胡龍骨牡蠣湯中用之以治胸滿煩驚不可轉側亦所以平木氣而解少陽之邪也豈止咸以軟堅之用耶若心下悸小便不利者去黃芩加茯苓四兩悸者惕惕然跳動之謂也然有心下心中臍下之不同如心中悸而煩者小建中湯之悸也脈結代而心動悸者炙甘草湯之悸也發汗過多叉手冒心而悸者桂枝甘草湯之悸也汗出不解發熱心下悸頭眩身瞤動振振欲劈地者真武湯之悸也發汗後臍下悸欲作奔豚者茯苓桂枝甘草大棗湯之悸也凡此諸悸皆太陽誤治之虛邪所致也即少陽中風兩耳無聞目赤胸滿而煩者亦因吐下之虛而致驚悸也雖傷寒脈弦細頭痛發熱者已屬少陽若誤汗之致胃不和而譫語者當以小承氣和胃則愈其證似乎胃實然亦因邪在少陽不可汗而汗之邪乘誤汗之虛陷入於胃胃不和則煩而悸耳亦虛邪也至於三陰之悸皆陰盛陽虛可不言而喻矣所以陽明一經實邪居多故絶無悸病惟太陽病而小便利者飲水多必心下悸小便少者必苦裡急之一條與此義相符蓋以太陽之熱邪尚未入腑膀胱無熱故小便通利里既無熱所以飲水多則水寒停蓄胃氣不得流行故心下築築然悸動也況於小便不利者乎此以少陽虛無之腑以氣為用邪氣犯之則虛故小柴胡湯中有人參之補雖非飲水多而致心下悸以小便不利亦必三焦不運陽氣不行水飲停蓄於胃故令心下悸也去黃芩者惡其寒中也加茯苓者取其淡滲其性上行而下降利水而瀉下若小便得利悸自當止耳然既去黃芩之寒中加茯苓之淡滲則知中氣已寒倘下焦無火氣化不行設小便仍不利者五苓散或可採擇也若不渴外有微熱者去人參加桂三兩溫覆取微汗愈不渴則邪未入里外有微熱則表證未除去人參者恐其固太陽之表邪也然何以知其為太陽之表邪乎觀加桂去人參則知為太陽之表邪矣溫覆取微汗所以解太陽之風邪也所謂加桂者乃桂枝非桂肉也李東垣曰經云味薄則發泄故桂枝上行而達表味厚則發熱桂肉下行而補腎此但曰加桂而未云桂枝然以溫覆取微汗推之知其為桂枝無疑矣傳寫脫落其義可見若咳者去人參大棗生薑加五味子半升乾薑二兩有聲無痰曰咳咳者肺氣上逆也肺為主氣之臟通呼吸而行衛氣若氣上逆則不宜於補故去人參大棗之甘生薑則不必去也加五味子乾薑者即小青龍湯之制也小青龍以水寒傷肺故以此收肺氣之逆此方用之其義一也但肺寒氣逆者宜之肺熱氣盛者未可加也所謂半升者非今升斗之升也以五味子而加半升令人讀之無不駭異以為五味子之酸收本為難用寧有即用半升之理孰知古之所謂升者其大如方寸匕以銅為之上口方各一寸下底各六分深僅八分狀如小尉斗而方形嘗於舊器中見之而人皆不識疑其為香爐中之器用而不知即古人用藥之升也與陶隱居名醫別録之形象分寸皆同但多一柄想亦所以便用耳如以此升之半作一劑而分三次服之亦理之所有無足怪也今廢而不用久矣故人皆不知有此謂即當今升斗之升所以駭其用之不當而曰古方不可治今病也宜哉辨誤條辨及尚論皆作傷寒五六日中風往來寒熱成無己注本作傷寒中風五六日其注中謂玉函曰中風五六日傷寒往來寒熱即是或中風或傷寒非是傷寒再中風中風復傷寒也即仲景所謂傷寒中風有柴胡證但見一證便是正或中風或傷寒也其說頗合於理當從之方氏云脈經作中風往來寒熱傷寒五六日之後心煩作煩心心下作心中身有作外有雖傳寫之不同其實非二義也傷寒中風有柴胡證但見一證便是不必悉具前二條備言少陽經之諸見證然未必諸證悉備恐後人必以諸證全見者方為少陽病故又立此條以申明上文或胸中煩或渴或腹中痛等諸或有或無之義也傷寒中風者或傷寒或中風也言傷寒中風證中凡見少陽證即為柴胡湯證即使但見一證便是邪氣已入少陽不必如上文之諸證悉具也如但見少陽本經證止宜以小柴胡湯主之若有他經兼症者仍當以小柴胡為主而兼用他經藥治之如已見柴胡證而有太陽證未罷者即以小柴胡加桂枝湯主之如少陽未解而陽明之裡邪已急則用小柴胡去參甘增入大黃為大柴胡湯以兩解之矣又如少陽誤治而為壞病則有柴胡加芒硝湯及柴胡桂枝幹薑湯柴胡龍骨牡蠣湯等方皆一小柴胡湯之變制也蓋以每見少陽一證即以小柴胡主治故稱柴胡證也舊本柴胡湯諸加減方皆雜入太陽篇中今悉收置少陽篇內以小柴胡為主方而總統之而以諸方隸其下俾學者循其序而施治焉庶或可以希仲景之意稍得其一二未可知也傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之四五日三陽傳遍之後也身熱惡風項強皆太陽表證也脅下滿邪傳少陽也手足溫而渴知其邪未入陰也以太陽表症言之似當汗解然脅下已滿是邪氣已入少陽仲景原云傷寒中風有柴胡證但見一證便是不必悉具故雖有太陽未罷之證汗之則犯禁例故仍以小柴胡湯主之但小柴胡湯當從加減例用之太陽表證未除宜去人參加桂枝脅下滿當加牡蠣渴則去半夏加栝蔞根為是傷寒陽脈澀陰脈弦法當腹中急痛者先用小建中湯不瘥者與小柴胡湯主之陽主表陰主裡弦主肝邪徑急澀為營血留滯故弦屬肝邪澀為陰脈也寒在半表衛氣不行營血不貫則脈不流利而澀邪入少陽肝木氣旺脈來徑急則弦陽脈澀者蓋輕取其浮候則澀也陰脈弦者重按其沉候則弦也陽脈澀則知營衛不和氣血澀滯而邪在半表陰脈弦則知邪氣半已入里木旺乘土太陰受病矣太陰脾土為肝邪所犯故腹中急痛也腹中者足太陰之脈起於足大趾之端上膝股內前廉入腹屬脾絡胃故腹為太陰之部位也急痛者厥陰肝木徑急之陰邪傷脾也藏氣發時論云肝苦急急食甘以緩之又云脾欲緩急食甘以緩之故先用小建中湯之甘以緩肝脾之急而建立中氣也中氣已旺肝邪當退矣若猶不瘥者是少陽之邪猶未解也仍與小柴胡湯主之以和解其邪但恐腹中急痛其中氣必寒成氏去黃芩加芍藥之外或薑桂可加入也傷寒五六日頭汗出微惡汗手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也此句應下文脈雖沉緊汗出為陽微假令純陰結不復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解此條非但別少陽少陰之疑似推而廣之實六經辨別陰陽之精義也五六日邪氣入里之候也頭汗出邪在陽經也惡寒為三陰之本證而三陽之表證亦皆惡寒心下滿者少陽病有胸滿而少陰證中亦有胸滿手足冷為少陰而厥陰有厥深熱亦深者少陽有默默不欲食而厥陰亦默默不欲食唯大便硬則與三陰無涉矣諸證雜見陰陽參錯難於辨認詳察其脈若但細而未見沉遲者此為猶在少陽但陽微陰盛陰邪結於裡故有手足冷心下滿口不欲食之陰寒里證而更有頭汗出之陽證在以此推之此為陽微而結其邪必有表復有里也若其脈沉亦邪氣在裡之脈也雖手足冷不飲食似乎皆為在裡之陰邪然頭汗出猶為陽證但陽氣微弱耳何以言之假令純陰結不得復有頭汗出之外證邪氣當悉入在裡矣此因尚有陽經之外證為半在裡半在外故謂之有表復有里也所以脈雖沉緊尚不得為少陰病其所以然者邪在陰經不得有汗故少陰證中之汗曰反汗出而為亡陽也今頭汗出則三陽之經絡皆上至頭三陰之經脈劑頸而還皆不上頭故知非少陰也邪氣仍在半表半裡是仍在少陽也可與小柴胡湯以和解之設不了了者設或目中不了了也若至目中不了了則邪氣已離少陽而歸陽明之裡矣即陽明中篇之所謂目中不了了睛不和無表裡症大便難此為實也急下之之義故當用土鬱奪之之法所以謂之得屎而解也若未至不了了則邪氣尚在少陽未可妄下也辨誤尚論謂陽微結者陽邪微結未盡散也以方注作陽氣衰微故邪氣結聚為大差云果爾則頭汗出為亡陽之證非半表半裡之證矣果爾則陰結又是陰氣衰微矣愚竊謂陽微結三字而以陽邪微結解之是以微結二字聯講故以陽氣衰微為誤然則下文汗出為陽微句之陽微二字又當作如何解若以頭汗出為亡陽則太陽上篇脈浮動數條中之但頭汗出余無汗劑頸而還者及陽明篇中之但頭汗出身無汗劑頸而還小便不利身必發黃者皆為亡陽證邪更以陰結為陰氣衰微則又是以曲作直指鹿為馬之談矣豈知仲景本意謂傷寒本應無汗以衛陽衰弱陽氣不固所以頭汗出而微惡寒故云汗出為陽微以見雖有手足冷心下滿口不欲食之陰寒里證而尚有汗出惡寒在表之陽邪非純陰結也假令純是陰邪內結不得復有外證當悉入在裡矣以陽氣雖微而其陽證尚在故為半在裡半在外也如此則為陽氣衰微而陰邪內結也明矣豈可強詞奪理謬以汗出為亡陽之證陰結為陰氣衰微乎平心論之是邪非邪況目中不了了自有陽明原文具在寧可又以大柴胡為和法乎傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門此二條又示人以病無定例法無定法於艱難疑惑之中另闢手眼即內經所謂揆度奇恆之類也腹滿足太陰脾病也譫語足陽明胃實也腹滿為脾臟寒有可溫之理譫語則胃家熱又有可下之機矣寸口氣口也氣口為手太陰之脈乃主氣之臟營衛之氣五十度而復會於手太陰故為胃氣之脈而胃為水穀之海五臟六腑之大源五味入口藏於腸胃以養五臟氣皆變現於氣口今氣口脈浮而緊浮則為風緊則為寒皆邪氣在表之脈也論證則邪不在表言脈則邪不在裡況太陰篇之腹滿全無可汗之法即陽明篇之腹滿若脈浮而緊者亦無可下之條脈證參差艱於施治深察其故若果邪氣在表不應寸口獨浮獨緊脈尚浮緊邪當在表亦不應腹滿譫語唯仲景知其邪犯中焦所以獨變現於氣口故命之曰此肝乘脾也謂之肝乘脾者乘其所勝也以木性本能制土乃五行生剋之常於理為順於事為直故名之曰縱縱者紋理順直之謂也既無汗下之法又知肝木剋制脾土故以泄肝為治期門者足厥陰肝經之募穴也其脈起於足大趾之大敦穴終於乳下巨闕兩旁各四寸半之期門穴自此內入則屬肝絡膽矣故刺之以瀉其盛所謂隨其實而瀉之則其氣平而邪自解矣傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門傷寒發熱乃已發熱之傷寒也嗇嗇惡寒風邪在表也大渴欲飲水之證上篇中風發熱六七日不解而煩有表裡症故渴欲飲水此邪犯太陽之裡而渴也又太陽病發汗後大汗出胃中干欲得飲水此因大汗出後胃中津液乾燥而渴也上文風寒並感之渴欲飲水及陽明篇之渴欲飲水口乾舌燥者皆以白虎加人參湯主之此等俱無表證而熱邪入胃之渴也今發熱而嗇嗇惡寒則邪猶在表大渴欲飲水則邪又在裡以表邪如此之盛或兼見里證者固有之然未必有若此之裡症也里症如此之甚表邪未解者亦有之而未必猶有若此之表證也其所以然者雖系傷寒發熱而嗇嗇惡寒乃營衛不和之證也蓋以肺主皮毛而通行營衛肺臟受邪皮毛不密故嗇嗇惡寒也大渴欲飲水者注傢俱謂木盛則熱熾非也其腹必滿豈獨飲水而後滿乎腹滿本為脾病經脈別論云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行豈有所謂大渴欲飲水之證乎此因肝木剋制脾土故知其腹必滿以脾病而不能散精無以上輸於肺則肺氣困弱何以朝百脈而輸精於皮毛乎是以嗇嗇惡寒大渴欲飲水以潤其枯涸也此所謂肝乘肺者肺本金藏肝木之所受制焉能乘之以肝木之旺氣乘剋土之勝賈其餘勇來侮困弱之肺金於理為不順故謂之橫若肺能自振終不為木所侮其氣自能行營衛通皮毛而自汗出則發熱惡寒當解能通水道輸膀胱則小便利而腹滿當消故曰其病欲解若未得解者刺期門以泄肝邪之旺則脾肺之圍解矣少陽傳陰服柴胡湯已渴者屬陽明也注見少陽陽明篇傷寒三日少陽脈小者欲已也熱論云三日少陽受之則傷寒三日乃邪傳少陽之時也若邪在少陽脈必弦數而不小三日而少陽脈小為少陽不受邪矣即使已傳少陽而得此脈亦必邪氣輕微故為將解而欲已也少陽病欲解時從寅至辰上少陽者發生草木之初陽也自一陽來復於子陽氣萌於黃泉木氣即含生於少陰之中至醜而為二陽至寅而三陽為泰陽氣將出至卯則其氣上升於空際而為風陽氣附於草木木得陽氣而生長在人則陽氣藏於兩腎之中所謂命門先天相火也其陽氣流行於上中下者曰三焦其成形而生長條達者曰膽其氣旺於寅卯至此而經氣充盈正可勝邪故為病之欲解時也至辰土而其氣已化陽氣大旺將成太陽則陽不為少矣故曰自寅至辰上傷寒三日三陽為盡三陰當受邪其人反能食不嘔此為三陰不受邪也此所以驗陽邪不傳陰經之法也素問熱論云一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受病而未入於臟者故可汗而已也四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆受病以此推之則傷寒三日自太陽而之少陽三陽為盡矣四日當傳太陰而三陰當受邪矣若已傳太陰其脈布胃絡嗌腹滿嗌乾自不能食矣即太陰篇首所謂腹滿而吐食不下時腹自滿之證也若其人反能食不嘔是邪氣未入太陰故為三陰不受邪其邪即從陽經解矣傷寒六七日無大熱其人躁煩者此為陽去入陰故也此言邪自三陽傳入三陰之驗也傷寒六七日邪持三陽已久而身無大熱似乎陽經之邪已解當無躁煩之證矣蓋躁者陰邪也煩者陽邪也邪在陽分則煩邪入陰經則躁其人躁煩者知其為陽邪傳入陰經之故也陽去入陰非但指少陽之邪傳入陰經也即太陽陽明之邪雖不由少陽亦可傳入前人所謂越經傳者是也所以仲景不獨言少陽而總言之曰陽去入陰也以少陽為三陽盡處與三陰為鄰故以此二條附入少陽篇後以為邪氣傳陰與不傳陰之辨也少陽禁例傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸寒邪在太陽而頭痛發熱者脈必浮緊若傳入少陽則膽腑肝臟皆屬東方木氣所以脈見弦細此太少不同之疹也故云屬少陽然邪入少陽已在三陽之第三層逼近於里其入已深達表不易以並無邪氣之太陽居表汗之適足以損泄衛陽使胃中之津液外走而胃脘之陽亦亡矣陽亡而邪氣乘虛入胃故云發汗則譫語也譫語者邪氣入胃胃實所致也邪既屬胃是屬陽明而非少陽矣故當和胃如陽明篇以小承氣和胃令大便微溏胃和則愈也胃不和者以陽氣虛損之胃邪熱陷入而胃虛邪實所以煩悶而築築然悸動此少陽誤汗之變症也可不慎歟少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚上文云傷寒此言中風上文言傷寒邪入少陽禁汗此言少陽中風禁吐下非謂傷寒中風禁各不同皆互相發明之意也前云傷寒脈弦細者屬少陽乃太陽傳少陽之語此條直曰少陽中風為本經自受之邪似有二義然亦非謂傷寒必自太陽傳來中風偏可本經自感亦皆互明其義也足少陽之脈起於目鋭眥上抵頭角下耳後其支者從耳後入耳中出走耳前至目鋭眥後陽邪入絡故兩耳無所聞而目赤也其支者別鋭眥下大迎合手少陽下頸合缺盆以下胸中故胸中滿而煩也邪在少陽已在半里吐下則胃虛邪陷而變生矣以虛邪在裡與正氣不協故胃不和而惕惕然悸動也少陽與厥陰臟腑相為表裡至少陽之腑邪深入犯臟致厥陰肝臟受邪而驚駭也此少陽誤吐誤下之變也臨證施治其可忽諸少陽壞病本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯若已吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之壞病說已見太陽壞病條下此一節乃少陽經之壞病也以下誤治諸條皆犯少陽禁例致生變證皆壞病也以其不循本經治法妄施汗下因而生變乃醫壞之也故稱壞病但變證已生本證已壞非復柴胡之舊矣故於臨症之時當審其形勢察其變端知犯何經何絡何臟何腑何虛何實何故變逆然後以法治之也法者即下條諸治逆之法也此條言本太陽受邪而不解遂致轉入少陽也脅下硬滿乾嘔不能食往來寒熱即首條往來寒熱胸脅苦滿默默不欲食心煩喜嘔脅下痞硬之柴胡湯證也邪傳少陽汗吐下三法俱在所禁若尚未吐下則治不為逆脈雖沉緊似乎寒邪已入於裡而其往來寒熱脅下硬滿之半表證尚在是脈雖沉緊而邪氣猶在少陽未入於裡也故當仍與小柴胡湯若已吐下發汗溫針而致邪陷入里胃實譫語者是邪不在少陽而柴胡證已罷矣此為醫所壞也察之而知其所犯何逆而以下文諸法治之也凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解柴胡湯證即前往來寒熱胸脅硬滿默默不欲食心煩喜嘔或渴或不渴等證也凡見此證不必悉具皆當以小柴胡和解其邪不宜用汗下等法若見此證而誤下之幸無他變柴胡證不罷而仍在者此雖誤下而未至變逆邪氣尚在少陽也當復與柴胡湯必蒸蒸而振蒸蒸者熱氣從內達外如蒸炊之狀也邪在半里不易達表必得氣蒸膚潤振戰鼓栗而後發熱汗出而解也然服小柴胡湯而和解者多矣未必皆蒸蒸而振也此因誤下之後元氣已虛雖得柴胡和解之後當邪氣已衰正氣將復之際但元氣已虛一時正難勝邪必至邪正相搏陰陽相持振戰寒栗而後發熱汗出而解也若正氣未虛者不必至振戰而後解也若正氣大虛雖戰無汗者是真元已敗不能作汗也危矣殆矣傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡湯不中與之宜半夏瀉心湯此解已見痞症條下因本是少陽變證故復見於少陽本篇其上半截是承上文語言誤下之而不變逆者復與柴胡湯必蒸蒸而振卻發熱汗出而解若誤下之後心下滿而硬痛者為結胸但滿而不痛者為痞二者雖有陰陽虛實之分皆以誤下變逆非復少陽本證皆壞病也故曰柴胡不中與之結胸為陽經熱入之邪故以大陷胸湯攻之其陰經虛痞之邪則以半夏瀉心湯開之所謂知犯何逆以法治之之義也詳見痞結條中得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食谷者噦此言誤下之後已成壞病不可仍用柴胡湯再誤也六七日六經傳遍之後入里傳陰之時也脈遲非寒邪入里及邪中三陰之遲也浮弱即太陽中風陽浮陰弱也言風邪在衛脈但陽浮而陰弱尚未鬱而為裡熱未見數脈故云遲也惡風寒者即太陽上篇嗇嗇惡寒淅淅惡風乃陽浮陰弱之見證也手足溫非系在太陰之脈浮緩而手足自溫之溫亦非少陰手足溫者可治之溫並非厥陰晬時脈還之手足溫也此所謂手足溫者言脈雖遲而惡寒其手足則溫病已六七日而其邪猶在太陽非若三陰之脈沉遲則手足厥冷也俗醫不知脈遲浮弱而惡風寒為表邪未解但拘日數之多而於脈症不加察焉意謂六七日之久邪必在裡遂二三次下之致裡虛邪陷由少陽而內入陽明之裡故有不能食而脅下滿痛之少陽證面目及身黃之陽明裡症即陽明篇所謂瘀熱在裡也邪雖內陷究竟頸項仍強則太陽陽明之表證猶在然何以知其為兩經之表證乎蓋頸在身之前而屬陽明項在身之後而屬太陽故也又因裡熱內瘀腸胃之傳化失常三焦不運氣化不行故小便難若小便利則不能發黃矣如此之表裡有邪三陽俱病而與柴胡湯不惟不足以和解少陽之邪而太陽陽明未散之表邪及陽明發黃之瘀熱在裡得湯中人參甘草之滯補而愈固所以濕熱下墜後必下重也後謂大便也下重者非下體沉重即大便後重皆濕熱壅滯欲大便而後重不得出也瘀熱在胃故本渴渴而飲水胃中之實邪壅塞則不能容受胃氣不行則小腸亦不能傳送故小便不利膀胱不瀉腸胃不通大氣不得流行所以上逆而嘔也若此者非少陽一經獨病故曰柴胡湯不中與也然則何以治之仲景不云乎知犯何逆以法治之所謂法者如此條未下以前之證不過脈遲浮弱而惡風寒前太陽中風之治即法也二三下之後致不能食而脅下滿痛則小柴胡一法也至面目及身黃則為陽明裡證柴胡湯即不中與之矣茵陳蒿湯一法也中風之頸項強乃太陽陽明之表證桂枝加葛根湯一法也傷寒之頸項強有麻黃之葛根湯又一法也太陽之小便不利五苓散一法也陽明之小便不利豬苓湯一法也若少陽陽明兼證之胃實者則有表裡兩解之大柴胡湯一法也若少陽陽明兼證而正虛里實者則柴胡芒硝湯又一法也此等諸法不可枚舉論中無不具載但貴臨證施治審證察脈詳辨經絡分別虛實何重何輕何主何客何先何後應用何法應服何方或一方加減或兩方合用量時度勢以定取捨真所謂圓融活變觸類旁通經云審察病機無失氣宜者是也至於食谷者噦以不能食而脅下滿痛身黃小便不利而又有下重渴嘔之證若再誤犯穀氣必至噦而不治矣噦者即厄逆也靈樞云平人之噦者谷入於胃氣注於肺有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦若病深而噦乃胃敗而中氣將絶也故素問寶命全形論云鹽之味鹹者其氣令器津泄弦絶者其音嘶敗病深者其聲噦人有此三者是為壞腑毒藥無治短針無取此皆絶皮傷肉血氣爭黑所以仲景陽明中風即有加噦者不治之語其原文與此條亦大同小異乃成氏以為食谷者物聚而噦方氏謂過飽則亦當噦噫豈有病至如此之劇尚能過飽乎觀其以噦噫並言是以厄逆與噯食氣同論矣輕重不分吉凶不辨毫不知其為不治之證所以疑其為末後尚有脫落不知仲景以不治之證作結彼竟茫然不知何哉尚論並棄而不載又不知何意前輩用心終莫知其意指也傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之傷寒發汗固所宜然雖五六日若表證未除非必當攻下之期也必察其汗後表證盡去里邪已實然後方可議下汗下得宜自無他變矣今已發汗而復下之致胸脅滿而微結是必汗不徹而表邪未盡因下早而外邪內陷也胸脅滿者邪入少陽也少陽之脈下頸合缺盆下胸中循脅裡故也微結者邪之所結者小不似結胸之大且甚也小便不利而渴者汗下兩竭其津液之所致雖為太陽之邪入里而犯膀胱然亦少陽之兼證也不嘔者邪未盡入少陽也但頭汗出則知邪在陽經未入於陰也邪氣既不全在於表又未全入於裡而在半表半裡之間少陽之分故往來寒熱也心煩邪在胸膈也凡此者皆太少兩經之外證未解小柴胡湯不中與也故以柴胡桂枝幹薑湯主之柴胡桂枝幹薑湯方柴胡半斤桂枝三兩乾薑三兩栝蔞根四兩黃芩三兩牡蠣三兩甘草二兩上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩後服汗出便愈名曰柴胡桂枝幹薑湯實小柴胡湯加減方也小柴胡湯後加減法云若胸中煩而不嘔去半夏人參加栝蔞根蓋胸中煩則邪熱入里以有邪氣者不為虛故去人參恐其固邪氣也加栝蔞根所以召津液而止渴潤燥也不嘔則胃無邪氣痰飲不積又以渴故所以不用半夏之辛溫也若脅下痞硬去大棗加牡蠣今胸脅滿而微結故去大棗之甘緩牡蠣鹹寒能治傷寒寒熱脅下痞熱故加入也若不渴外有微熱者去人參加桂枝溫覆取微汗今既不渴而又往來寒熱以但頭汗出太陽之邪未去故去人參也加桂枝所以解肌而除太陽未去之邪也誤下之後胃陽已傷邪氣已結加入乾薑辛以開結溫以守中同黃芩則寒熱相因調劑之功成矣傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之此條雖非誤治然亦失治之證也傷寒至六七日經盡傳裡之候也發熱微惡寒支節煩疼即傷寒首條發熱惡寒骨節疼痛之表症猶未解也微嘔而心下支結則邪犯胸膈矣胸雖太陽部分然足少陽之脈下頸入缺盆下胸中故寒熱而嘔又為少陽症也其邪氣支結於心下已為半里之症發熱惡寒支節煩疼又為在表之邪是邪氣半在表半在裡也以外證未去固當解表而少陽又禁汗故不用麻黃而以柴胡為主加入桂枝湯以和解太少二陽之邪也辨誤成氏云支散也王肯堂云支結支撐而結也若訓作散則不能結矣方注云支結言支飲摶聚而結也喻氏云心下支結邪結於心下偏旁不中正也若謂支飲結於心下夢語喃喃吾不識支飲為何物也諸說紛紛略無定論愚謂成氏以散字訓之固誤而方氏以支飲摶聚為解亦未中窾尚論謂邪結於心下偏旁而不中正若果如其說則仲景不謂之心下矣諸說之中當以支撐之解為近是後更有支飲懸飲之支義頗相同然疑惑未悉不敢穿鑿姑留以俟智者之辨柴胡加桂枝湯方柴胡四兩桂枝一兩半人參一兩半甘草一兩半夏二合半黃芩一兩半芍藥一兩半生薑一兩半大棗六枚上九味以水七升煮取三升去滓分溫服一升小柴胡及桂枝湯之義各見本方論中矣此因太少兼證故用兩方合治之法然邪自太陽陷入而結於心下則必由陽明少陽之經假道而入矣但用柴胡桂枝而不及陽明者以陽明裡證居多無解肌發表之專藥且無陽明見症故也太陽陽明證中雖有葛根湯亦必借麻黃桂枝兩方加入葛根以解其邪耳然既曰傷寒不用麻黃而但用桂枝者豈桂枝湯非太陽傷寒之禁劑邪蓋以邪入少陽即以少陽為主即前所謂傷寒中風有柴胡證但見一證便是不必悉具之義也邪在少陽又在禁汗禁下之例故但以桂枝合柴胡並解太少之邪也以兩方各用原方之半合作一劑同用故謂之柴胡加桂枝湯也然表邪尚盛之傷寒參芍非所宜用當於臨證時去取可也傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之八九日經盡當解之時也下之誤下之也胸滿誤下里虛邪氣陷入也煩者熱邪在膈而煩悶也驚者邪氣犯肝肝主驚駭也小便不利邪自少陽而入里三焦不運氣化不行津液不流也譫語邪氣入里胃熱神昏也一身盡重靈樞謂脾所生病也不可轉側足少陽膽病也言傷寒八九日經盡當解之時而不解因誤下之後使太陽之經邪傳至少陽而入里也然何以別其為少陽乎少陽篇云少陽中風胸中滿而煩及胸中煩而不嘔或心煩喜嘔或小便不利者是也靈樞經脈篇云足少陽之脈其支者下頸合缺盆下胸中貫膈絡肝屬膽循脅裡是動則病心脅痛不可轉側至真要大論云陽明司天在泉燥淫所勝肝木受邪民病左胠脅痛不可反側者蓋膽附於肝少陽厥陰相為表裡仲景所謂臟腑相連也經脈篇云足太陰之脈屬脾絡胃是動則病身體皆重故厥陰在泉風淫所勝濕土受克則身體皆重也蓋以邪氣入胃胃病而脾亦病也太陰陽明論云脾胃以膜相連耳皆因誤下而陽虛陰盛故一身盡重而不可轉側也所以脈解篇有云所謂不可反側者陰氣藏物也物藏則不動故不可反側也然此條經絡糾紛變症雜出未可以尋常治療也故以小柴胡為主加龍骨牡蠣湯主之柴胡加龍骨牡蠣湯方柴胡四兩半夏二合洗龍骨一兩半牡蠣一兩半人參一兩半茯苓一兩半鉛丹一兩半桂枝一兩半大黃二兩生薑一兩半大棗六枚擘上十一味以水八升煮取四升內大黃切如棋子更煮一二沸去滓溫服一升邪入少陽故以小柴胡之半劑為主以和解少陽之邪人參以補益下後之虛半夏以滑利胸膈之氣姜以宣達其陽氣棗以和潤其津液也去甘草者恐助胸滿也去黃芩者陽虛陰盛避寒涼也桂枝辛溫助陽和衛合薑棗而為桂枝去芍藥湯可以汗解太陽之餘邪而成太少兩解之劑其去芍藥者恐其益陰收斂也且桂枝全湯為傷寒之禁劑者亦惡芍藥之酸收也下篇蜀漆龍骨牡蠣救逆湯中之去芍藥亦此義也牡蠣者小柴胡本方加減法中原有脅下痞硬者去大棗加牡蠣四兩之法觀其但用之於脅下痞硬而不用之於心下痞硬則知非但咸以耎堅抑且可以平木氣而伐肝邪矣李時珍云龍者東方之神故其骨與角齒皆主肝病許叔微云肝藏魂魂遊不定者以此治之則亦非但前人所謂重澀而已總之一身皆重不可轉側皆少陽肝膽之邪偏著於脅耳二物之用既能平肝木之邪又以重鎮之性兼治其煩驚也若曰載神之舟楫則枯骨朽殼豈能載虛靈之生氣乎吾恐未必然也至於鉛丹一味皆以為重鎮心臟之驚余細閲論中並無心臟受病之文若必以驚為心病則仲景胡不以丹砂鎮之而偏以鉛丹為重蓋心固主驚而肝臟亦主驚駭是故鉛丹之為物也非惟金能制木重可鎮驚況鉛本北方之黑因制煉之功化而為南方之赤則坎離一交水火既濟以之治肝木之邪有三家相見之奇五行攢簇之妙矣大黃乃蕩滌之藥熱邪在胃譫語神昏非此不療但因下後之虛故切如棋子僅煮一二沸使性味不全則不成峻下矣同人參則補瀉兼施佐茯苓則滲利並用此所以為非常之治也殫心思竭智力其所以為立法之聖歟太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩為未解也與大柴胡湯下之則愈邪入太陽循經而行六日而經盡六日以後第七日為一經至十餘日而太陽之邪不解謂之過經不解即太陽總證中所謂再作經也以太陽之邪久而未解當仍以汗解為是而反二三下之後四五日而柴胡證仍在者則知雖屢經誤下而外邪猶未全入於裡尚在少陽半表半裡之間故先與小柴胡湯服湯後而嘔不止則少陽半表半裡之邪猶未解也心下急則邪已入陽明之裡胃邪實而脹滿矣熱邪在裡故郁煩也表裡俱未解邪不獨在少陽一經小柴胡不中與也當以表裡兩解之大柴胡湯下之則愈矣大柴胡湯方柴胡半斤黃芩三兩芍藥三兩半夏半斤枳實四枚大黃二兩生薑五兩切大棗十二枚擘上八味以水一斗二升煮取六升去滓再煎溫服一升日三服大柴胡湯者以小柴胡為主治而增減以大其用也蓋小柴胡為少陽一經之專劑者以不出不納之膽腑以氣為用之三焦邪入其經不過虛無偏勝邪正不和之氣耳故以柴胡黃芩生薑半夏以解散其邪人參甘草以補其正大棗之甘緩以和其性所謂和解之劑也至邪既內入已歸陽明之裡乃有形之實邪則當以承氣湯攻下之矣此以少陽未罷陽明裡實若但用和解之小柴胡不惟不足以解散少陽半表之客邪而人參甘草反足以助陽明胃家之實熱故於小柴胡中去人參甘草之補增入小承氣之半以泄胃中之實熱也用芍藥者以參甘既去故用之以扶土斂陰兼平少陽木氣之邪李時珍謂芍藥能於土中瀉木者是也兩方合用則二陽並治表裡兼施故為兩解之劑云太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也此辨症似少陽而實非柴胡症也言邪在太陽過一候而至十餘日已過經矣而有心下溫溫欲吐胸中痛大便反溏腹微滿鬱郁微煩之證若先此未有諸症之時已自極其吐下之者則知胃氣為誤吐誤下所傷致溫溫欲吐而大便反溏邪氣乘虛入里故胸中痛而腹微滿熱邪在裡所以鬱郁微煩乃邪氣內陷胃實之症也胃實則當用攻下之法以胃氣既為吐下所虛不宜峻下唯當和其胃氣而已故與調胃承氣湯陽明篇所謂胃和則愈也若不爾者謂先此時未曾極吐下也若未因吐下而見此諸症者此非由邪陷所致蓋胸為太陽之分邪在胸膈故溫溫欲吐而胸中痛也大便反溏熱邪未結於裡也腹滿郁煩邪將入里而煩滿也若此者邪氣猶在太陽為將次入里之徵若以承氣湯下之必致邪熱陷入而為結胸矣故曰不可與也但前所謂欲嘔胸中痛微溏者雖有似乎少陽之心煩喜嘔胸脅苦滿腹中痛之證然此非柴胡症也更何以知其為先此時極吐下乎以欲嘔乃胃氣受傷之見證故知極吐下也太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯十日已去言十日已過也傷寒之脈浮緊浮則邪氣在表緊則寒邪固閉至十日已去而脈見浮細浮則按之無力細則邪解正虛也同一浮脈浮緊則為寒邪在表以浮而緊也緊則有力故為邪氣實浮細則為邪退正虛者以浮而細也細則弱小故為正氣虛仲景所謂浮為在表浮則為虛之別也且嗜臥則正虛而倦怠邪退而安靜矣故為外已解也設或胸滿脅痛者是太陽雖罷而邪已轉入少陽矣故與小柴胡湯以和解半表半裡之邪若其脈但浮而不細又無胸滿脅痛之少陽見證則是寒邪獨在太陽之表故當以麻黃湯發汗也辨誤成氏謂脈浮細而嗜臥表已罷也病雖已和解之並不言設胸滿脅痛者與小柴胡湯之義豈太陽病雖已無故而又以治少陽之小柴胡湯和之是毫不知太少之傳變病情之進退方法之各殊而混解之其何以闡發仲景立法之旨乎方氏云脈浮細而嗜臥大邪已退胸滿脅痛則少陽未除試問十日已去脈未浮細之前少陽證安在而曰未除邪又云脈但浮則邪但在表故與麻黃湯不知仲景之意云脈若不細而但浮為邪氣但在太陽故與麻黃湯非已傳少陽而又還表也未達其旨而解之其為注也不亦難乎傷寒十三日胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡以解外後以柴胡加芒硝湯主之傷寒邪氣六日而遍行於六經之表七日經盡當衰素問熱論篇所謂七日巨陽病衰是也十三日則已再經矣而邪猶未解胸脅滿而嘔日晡所發潮熱已而微利者何也十三日不解胸脅滿而嘔則邪傳少陽矣日晡所發潮熱邪氣又入陽明矣已而微利者因誤下而胃虛邪陷所致也此等胸脅滿而嘔者本柴胡證因少陽半表之邪未解邪持表裡之間故下之而不得利今反利者知庸醫不察表裡以丸藥下之耳蓋丸藥但能攻裡而不能解表故也以兩經兼證舍少陽之半表不治而僅攻陽明之裡邪致胃氣一虛少陽之邪並陷入里而反下利非其治也前所謂潮熱者胃實也胃邪雖實奈少陽半表之邪未去當先用小柴胡湯以解外邪然後再以柴胡湯加入芒硝下之則胃中之熱邪亦解所謂胃和則愈也然有潮熱胃實之證仍留人參而不去者以少陽本屬虛邪又以十三日之久元氣自耗更因誤下之虛故雖加瀉實之芒硝而人參不去也柴胡加芒硝湯方於小柴胡湯方內加芒硝六兩余依前法服不解更服熱入血室婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之言婦人中風而在發熱惡寒表證未解之時經水適來得之而至七八日之間熱退身涼而脈遲似乎邪氣已解不意胸脅下滿如太陽熱邪內陷結胸之形狀且譫語者何也蓋少陽之胸脅滿邪在半表半裡尚屬陽分必往來寒熱其脈必弦細而數陽明胃熱之譫語脈必實大此證則脈遲而熱除身涼矣臨證之時殊令人不解仲景云此為熱入血室也夫血室者衝任二脈也靈樞謂天地有四海人身亦有四海而衝脈為血之海素問上古天真論云女子二七而天癸至任脈通太衝脈盛月事以時下骨空論云衝脈者起於氣街並少陰之經挾臍上行至胸中而散唐王太僕云任脈當臍中而上行衝脈挾臍兩旁而上行氣街者穴名也衝脈起於氣街者從少腹之內與任脈循腹並行也靈樞云衝脈者十二經之海與少陰之絡起於腎下出於氣街又曰衝脈任脈者皆起於胞中上循脊裡為經絡之海其浮而外者循腹各行會於咽喉別絡唇口血氣盛則皮膚熱血獨盛則滲灌皮膚生毫毛由此言之衝任二脈從少腹之內上行至中極之下氣街之內明矣愚按衝任二脈皆奇經中之陰脈也陰血充盈氣滿當瀉溢入子宮而下出謂之月事以時下如太陰晦朔弦望之候盈縮各有其時月事之下猶月之盈極當虧也衝任為經血所積受之處故謂之血室此以中風寒熱之時適遇衝任盈滿當瀉之候或熱邪煎逼胞脈已開子宮之血方出而熱邪排闥直入致為熱入血室也熱但內入血室陽分無邪故熱除而身涼邪已陷入陰中遂現陰症之脈故脈遲也衝脈挾臍上行至胸中而散且胸脅為少陽脈之所至肝為厥陰藏血之臟與少陽相表裡臟病則腑亦病即下文所謂臟腑相連故少陽亦病而胸脅下滿如結胸狀也譫語者邪在陰分即下文所云晝日明瞭暮則譫語如見鬼狀也此為邪熱入於足厥陰肝經藏血之臟當刺肝經之募穴名期門者以泄其邪乃隨其邪氣所實之處而瀉其有餘之邪也婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之前條但言中風之寒熱此條承上文止言續發之寒熱前但云經水適來此但言經水適斷蓋因中風發熱惡寒之時經水適來以致熱入血室既入之後邪熱阻絶遂致經水適斷所以其血必結非後人所謂適來為經之初來適斷為經之已盡而謂之乘虛而入也至後血弱氣盡或可言經盡耳謂之結者邪與血結氣乖凝聚而不得出也邪血凝聚於經絡胞脈之間內未入腑外不在表而在表裡之間仍屬少陽故使如瘧狀而發作有時也當以小柴胡湯主之前後婦人中風兩條仲景雖分言之以互相發明其義而學者當合論之以悉其旨可也但前以七八日而脈遲身涼此以七八日而續得寒熱皆熱邪已入之變症又示人以熱入血室之見症頗有不同無一定之式未可執泥以生疑二也但不揣愚昧意謂仲景氏雖但曰小柴胡湯主之而湯中應量加血藥如牛膝桃仁丹皮之類其脈遲身涼者或少加薑桂及酒製大黃少許取效尤速所謂隨其實而瀉之也若不應用補者人參亦當去取尤未可執方以為治也古人立法但與人以規矩而已學者臨證消息可也所謂書不盡言言不盡意其是之謂乎婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈前言中風此言傷寒以見風寒鬱熱之邪皆可入血室而致變也傷寒發熱者謂寒邪已發熱而經水適來也晝日明瞭者邪不在陽分氣分且晝則陽氣用事衛氣行陽二十五度之時生氣通天論云平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉是也暮則譫語者邪在陰分血分夜則陰氣用事衛氣行陰二十五度之時五藏生成篇云人臥則血歸於肝肝受血而能視熱邪入陰血之分故不得眠而譫語如見鬼狀也熱入血室非惟不在營衛而更與腸胃無涉故曰無犯胃氣病在下焦血分與上二焦絶不相關汗吐下三法徒損無益犯之適足以敗胃亡陽故禁止之曰無犯胃氣使真元無損正旺邪衰必自愈也設或未解期門可刺如前小柴胡加減可用也血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯下之血弱氣盡者謂血氣皆虛也言經血已盡之後不惟血弱而氣亦虛衰矣蓋人以陽氣陰血兩相依附而成形體蓋血瀉之後氣亦隨之而虛矣以血弱氣盡之時營衛不密腠理偶開邪氣因其開而遂入與正氣兩相搏聚而結於脅下少陽之分正氣與邪氣分爭一如少陽症之往來寒熱休作有時默默不欲飲食其所以然者以少陽與厥陰肝臟膽腑與其他臟腑不同膽附肝葉之中兩相連屬故膽病肝亦病也此條邪從腠理而入與前熱入血室不同然經盡血虛之候邪氣乘虛而入與熱入血室無異肝為藏血之臟足厥陰之脈起於足大趾上循足跗上膕內廉循股陰入毛中過陰器抵小腹邪入其絡則小腹必痛故其痛必下邪在少陽而結於胸脅故曰邪高痛在厥陰之絡而居少腹故曰痛下所以謂之邪高痛下也邪在胸脅而厥陰之氣又上逆故使嘔也證雖臟腑相連而邪結脅下往來寒熱默默不欲食皆少陽本病也故以柴胡湯主之而厥陰血分之藥或可量入也附合病並病篇合病並病總論合病者兩經三經一時並受見證齊發不似傳經之以此傳彼也其證與前三陽篇之表裡證同其當汗當下不可汗下皆同以其並感齊發無先後之不齊故謂之合並病者此經傳入彼經遂至兩經俱病非若傳經之此經傳入彼經邪既傳入彼經而此經之證隨罷也謂之並者一經病而並及他經亦病故謂之並然傷寒論中惟三陽有合併病三陰證中無之蓋因太陽皆屬汗證陽明多下症而少陽全不可汗下其治法迥殊不可淆亂故立法森嚴精詳審辨倘治法一差變證立至非若三陰證之陰寒相似理中四逆輩可通用也故立合病並病之條以見兩經三經之病偏多偏少何重何輕當以何者主治何者當禁如太陽證當汗而與少陽合併則禁汗如陽明當下而太陽證未罷則仍當汗而禁下又如三陽合併有少陽證在內則汗下皆禁若太少證俱罷則仍可下之類也然合病並病非三陽經諸證之外更別有合併病也其合併之義即所以申明三陽傳變之中又有兩經三經齊病非傳非變者更有一經病並及他經亦病遂至兩經皆病者之分別也總之中風傷寒有一定之例一曰傳經乃以此傳彼彼病而此罷也設有未罷不可但治受傳之經如太陽未罷不可下少陽未罷不可汗下之類也二曰合病乃兩經三經一時並感見證齊發也三曰並病乃一經受病傳入他經而本經之證仍未罷彼此皆病也至若變證非天然自感之病皆誤治失治所致乃人事所召即壞病也又不在定例中矣夫傷寒論中之合併二義自當各因其證治分隸三陽條下如當汗之並病及用麻黃湯之合病自當隸於太陽篇中如用葛根湯及葛根半夏湯之合病當隸於太陽陽明篇中用大承氣及白虎湯之合併病當隸於陽明中篇如用黃芩湯及黃芩半夏生薑湯至刺大椎刺肺俞肝俞刺期門之合併病當隸於少陽篇中為是舊因王叔和編次之時雜亂於三陽篇中不使各歸本屬而成氏注本又不正其失一任其顛倒錯亂以後注家雖議論繁多而絶不及此致尚論另立一門後之學者遂疑為三陽諸證之外又有合併二病未免多歧之惑今若仍散歸諸篇恐於叢雜之中讀者模糊閲過未能專悉其義故仍喻氏之舊而發明其意庶令閲者專而易曉與各歸本篇無異矣倘得其理爽然又何求焉辨誤方氏條辨云合之為言相配偶也輕重齊多少等謂之合以陽明切近太陽所以合也其說如此豈少陽與太陽僅多陽明之一間遂無合病邪若是則下文太陽與少陽之合病何來喻氏遂因之而廣其說云兩經之證各見一半如日月之合璧王者之合圭璧界限中分不偏多偏少愚謂日月遙相對照光滿而為望日月同處東北甲地兩相併合全晦而為合朔究未必中分各為一半也至於圭璧則有桓圭信圭躬圭谷璧蒲璧之不同謂之五瑞九峰蔡氏云古者天子錫諸侯以命圭圭頭斜鋭其冒下斜刻大小長短廣狹如之諸侯來朝天子以刻處冒其圭頭察其同異以辨其僞故周禮天子執冒以朝諸侯即周書顧命所謂上宗奉同冒者是也豈中分一半之謂乎且二璧之形圜而中虛亦未必中分其半也然合病之兩經受邪亦偏多偏少故有麻黃承氣黃芩白虎諸湯偏於一經之治並未中分其半況更有三經合病者乎竊未敢以為然也至並病條下方氏又云並猶合也云彼此相兼合而有輕重多寡之不同謂之並以少陽間陽明去太陽遠故但兼併也竊謂太陽行身之背少陽行身之側陽明行身之前何間之有亦何遠之有豈有不能合而但兼併之理耶若果如是則但當有太陽與少陽之並病不當有太陽與少陽之合病矣何合併皆有太少之條乎喻氏又因兼併之說而曰兩經之症連串為一如索貫然即兼併之義也遂有秦並六國之喻殊足惑亂人意若曰如秦並六國則六經病證皆當併入一經矣豈止兩經兼併而已哉嗟嗟仲景之立法也何精後人之注釋也何晦仲景之為後世慮也何深後人之讀其書也何淺嗚呼道之不明也有以夫合病證治第十五太陽與陽明合病喘而胸滿者不可下麻黃湯主之太陽陽明合病者謂太陽陽明兩經皆有見證也以兩經見證之中有喘而胸滿之證是太陽之表邪偏重於陽明也豈方氏所謂輕重齊多少等及喻氏兩經各見一半乎夫喘者肺邪盛滿之所致也寒邪入腠而肺主皮毛皮毛為肺之合肺臟受邪故氣滿而喘也所以傷寒首條即曰頭痛發熱身疼腰痛惡風無汗而喘者麻黃湯主之蓋麻黃為辛散肺氣之專藥杏仁為滑利肺氣之要藥湯中惟桂枝為解散衛邪之太陽經藥耳仲景以手太陰藥治足太陽病者皆以肺主皮毛故也且胸為太陽之部位脈要精微論云背者胸之府也足太陽之經脈凡四行皆在背而行於督脈之兩旁痹論云衛氣循皮膚之中分肉之間熏於肓膜散於胸腹營衛皆統於太陽故胸屬太陽胸滿者太陽表邪未解將入里而猶未入也以陽明病而心下硬滿者尚不可攻攻之遂利不止者死況太陽陽明合病乎此以太陽表症未罷攻之恐邪陷變逆故曰不可下而以麻黃湯專發太陽之寒邪也此條當自太陽傷寒例中遺出太陽與陽明合病者必自下利葛根湯主之太陽陽明合病雖與前條同義然上條之邪在胸膈猶未犯胃此曰必下利則邪已內侵而犯胃矣蓋以太陽之郁邪既在營衛而陽明之熱邪又盛於肌肉之間兩經之邪熱並盛不待全陷而熱邪內逼胃中之真氣不守而必下利矣然雖下利而其邪猶在於表未可責之於里既非誤下之後胃氣未虛斷不可以協熱下利之法治之當仍以兩經之表證為急故以葛根湯主之蓋以麻黃桂枝解太陽營衛之邪加入葛根以解散陽明肌肉之經邪早解其表即所以杜其入里之途也辨誤尚論謂葛根湯即桂枝湯加葛根不用麻黃者是也其說恐非當雲中風自汗者用桂枝加葛根湯傷寒無汗者用有麻黃之葛根湯乃為活法陽明篇首有汗出惡風者太陽陽明中風也故用桂枝加葛根湯無汗惡風者太陽陽明傷寒也故用葛根湯葛根湯乃桂枝麻黃之合劑而加葛根者桂枝加葛根湯乃桂枝全湯而加葛根者也此但曰葛根湯而不曰桂枝加葛根湯豈非用麻黃者乎然下文葛根加半夏湯已有麻黃此條之葛根湯已不待言矣況前有麻黃者但稱葛根湯無麻黃者即名之曰桂枝加葛根湯矣又何庸辨乎太陽與陽明合病不下利但嘔者葛根加半夏湯主之如前太陽與陽明合病不下利而但嘔者是鬱熱之表邪內攻不下走而上逆也嘔則邪在胸中而犯胃口故於兩經解表之葛根湯加入辛溫蠲飲之半夏以滑利胸膈之邪也葛根加半夏湯方葛根四兩麻黃三兩去節桂枝二兩芍藥二兩甘草二兩生薑三兩大棗十二枚半夏半斤上八味以水一斗先煮葛根麻黃減二升去白沫內諸藥煮取三升去滓溫服一升覆取微似汗太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯太少兩陽經之證並見而為合病太陽雖在表而少陽逼處於里已為半表半裡以兩經之熱邪內攻令胃中之水穀下奔故自下利當用黃芩撤其熱而以芍藥斂其陰甘草大棗和中而緩其津液之下奔也若嘔者是邪不下走而上逆邪在胃口胸中氣逆而為嘔也故加半夏之辛滑生薑之辛散為蠲飲治嘔之專劑也黃芩湯方黃芩三兩芍藥二兩甘草二兩大棗十二枚上四味以水一斗煮取三升去滓溫服一升日再夜一服若嘔者加半夏半升生薑三兩黃芩加半夏生薑湯即附前方服法內陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯陽明者胃土也少陽者肝膽木也兩經俱感二經之證並見熱邪連結逼近於里里受外迫土受木刑胃土不守水穀下奔故必下利而其脈不負者為順而無害若負者則為喪失之敗證矣所謂負者即勝負之負也以木土克賊之證而胃家之真氣無損則其脈雖或數或大而其沖和渾厚之氣仍在是木雖剋土而土不受傷故為順而無害是謂有胃氣者生也若土受木克胃土之氣傷敗其脈或弦細徑急而懸絶或如新張弓弦或如循刀刃如按琴瑟或右寸關弦細短促而不可按或微細而結代之類是中土已壞而厄忒手足逆冷青黃塵垢之色必現為真氣喪失之死證所以謂之相剋賊名為負也素問陰陽別論云脈有陰陽凡陽有五五五二十五陽所謂陰者真藏也見則為敗敗必死也所謂陽者胃脘之陽也三陽在頭三陰在手所謂一也愚按經義蓋以胃脘之陽為二十五陽之主其後天生和長養之氣皆由此出謂之三陽在頭者言三陽經之胃脈在結喉兩旁各一寸半之動脈名曰人迎三陰經之胃脈在右手魚際後一寸之寸口脈名曰氣口即手太陰肺脈也故曰肺朝百脈經云氣口獨為五臟主者以胃為水穀之海五臟六腑之大源五味入口藏於腸胃以養五臟氣氣口者脈之大會五臟六腑之氣皆變現於氣口也此二脈者皆同一疹候胃氣之脈故曰所謂一也若存沖和渾厚之氣則為不負而順若無胃氣衝和即為真藏之脈而失矣若其脈滑而數者滑則有力而流利乃胃實氣旺之象為順而不負之脈滑數則熱邪盛於裡氣食實於胃故為有宿食停留視其舌苔黃黑而厚按其胃脘及繞臍硬痛者是少陽陽明之經邪皆歸陽明之腑矣故當下之宜大承氣湯三陽合病脈浮大上關上但欲眠睡目合則汗成氏以浮屬太陽大為陽明其說雖是而不知浮大之脈但見於關上蓋指陽明脈浮大而言也觀下文見證皆屬陽明即可知矣更以關脈獨候少陽之氣而曰膽熱則睡豈右關亦候肝膽邪其說尤未盡善素問脈要精微論云附上左外以候肝內以候膈右外以候胃內以候脾關上者指關脈而言也仲景辨脈篇中稱尺脈曰尺中關脈曰關上寸脈曰寸口內經則但言尺中寸口而不言關蓋言尺澤曰尺中魚際曰寸口尺寸之中則為上下之半故謂之關所以全部內經但有尺脈寸口而不及關也至平人氣象論中於尺寸則亹亹言之而並不言關也今言脈浮大而上關上者謂關脈之浮大上出關上也然左肝雖候肝而少陽膽經乃肝之合也故少陽受邪浮大於左右關候脾胃故邪入陽明而右關浮大也其不言左右而但言脈浮大上關上者乃該左右而合言之以見邪自太陽而來與少陽熱邪陽明熱邪三經鬱熱之氣並蒸令人矇昧昏冒故但欲眠睡也目合則汗者即陽明中風條下所謂脈但浮者必盜汗出之義也此本陽明中風故脈浮大中風本陽浮陰弱原多自汗而目合則衛氣內入不能司其開闔毛孔不閉所以汗出也此條三陽合病在太陽則當汗解在陽明又當攻下惟少陽受邪汗之則譫語下之則悸而驚所以汗下皆禁然三陽俱受邪何以獨重少陽而禁汗下乎仲景云傷寒中風有柴胡證但見一證便是不必悉具蓋言若見少陽一證即當以少陽為主故也然則仲景不言治法其終何以施治乎曰浮大之脈獨見於關上且言眠睡目合則汗皆為陽明見證是邪熱獨盛於陽明矣舍汗下和解之法其惟下文之同治乎三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗者白虎湯主之腹滿身重即陽明篇所謂其身必重腹滿而喘及腹滿痛之類也難以轉側口不仁而面垢者靈樞經脈篇云足少陽之脈是動則病口苦善太息心脅痛不能轉側甚則面有微塵身無膏澤至真要大論陽明在泉及陽明司天民病喜嘔嘔有苦善太息心脅痛不能轉側甚則面有微塵身無膏澤至真要大論陽明在泉及陽明司天民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤此皆陽明燥金司氣少陽肝膽受邪之應也然胃開竅於口靈樞云胃和則口能知五味矣此所云口不仁是亦陽明胃家之病也譫語邪熱在胃也惟遺尿則邪在足太陽之裡熱在下焦故膀胱不攝而妄出也以三陽合病而見證如此之劇既有少陽並受之邪汗下皆在所禁汗之則犯少陽之戒故譫語病至譫語遺尿正氣已自不守若下之則胃陽喪失而額上生汗矣何也頭為諸陽之所聚而陽明行身之前額則陽明之部位也素問陽明脈解云四肢者諸陽之本也太陰陽明論云四肢皆稟氣於胃誤下而胃陽喪亡致邪氣入陰而手足厥冷故汗下皆在所禁也若雖見前三陽諸證而又自汗者知太少之邪已減獨歸併於陽明之裡即陽明篇首所謂身熱汗自出又所謂陽明病法多汗者是也邪熱在裡既不須汗又不堪下故以白虎湯主之並病證治第十六二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可發小汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也二陽太陽陽明也並病者謂太陽雖受邪雖已傳入陽明而太陽仍未罷兩經俱病也此條雖云二陽並病其創法之意蓋示人以兩經之邪有偏盛於太陽者治法亦當以太陽為主未可輕治陽明也自太陽初得病時至汗出不惡寒句是言太陽轉入陽明之故即傳經之義也乃一條之總義自若太陽病證不罷者至可小發汗句是汗不徹而太陽未罷之輕者此段為客面色緣緣正赤句至末方是主謂太陽之邪正盛而未解其初入陽明之邪尚輕而可忽當以太陽表證為主治也意謂太陽初得病時發其汗汗先出不徹其邪不得盡去因而轉為陽明邪既轉屬陽明隨即有自微汗出不惡寒之陽明見證非若太陽證之身熱惡寒無汗也即陽明篇首之身熱汗自出不惡寒反惡熱之義也若邪已轉屬陽明而太陽病證尚有不罷者是表證猶未盡除邪氣未歸陽明之裡胃邪未實為不可下下之為逆如此等未盡之表邪不過因汗出不徹耳其邪去多留少可小小發其汗邪當自解設若病人之面色緣緣然正赤而浮現於面者乃陽氣為寒邪所閉怫鬱於表當汗解之或熏之取汗此雖同一汗出不徹之證其留邪甚多一如全未解散之太陽表邪若前所謂發汗不徹可小發汗之說又不足言矣此因陽氣怫鬱為寒邪所束怫鬱於皮膚腠理之間不得發越乃當汗不汗致令人鬱悶煩躁也不知痛處者謂所受寒邪若但在太陽之表則如傷寒首條有身疼腰痛骨節疼痛之證其痛處自有定在此因寒邪雖在太陽已曾轉屬陽明而陽明之經已在肌肉之分且腹中四肢皆陽明胃經之所屬也是以素問太陰陽明論中有四肢皆稟氣於胃之語陽明篇中即有脈浮大而短氣腹都滿之證蓋因太陽邪氣初轉陽明在經在腑未有定所故覺乍在腹中乍在四肢按之不可得其人氣短耳即素問離合真邪論所謂此邪新客溶溶未有定處也見證如此雖太陽初轉陽明而太陽表證正盛陽明不足論也但坐以汗出不徹之故更發其汗則愈矣然何以知其汗出不徹乎夫脈者氣血流行之動處也寒傷營血不得汗泄陽氣鬱滯血脈不快於流行則澀此以脈澀故知之也二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯太陽陽明並病與上條同義但上文則太陽證多而未解雖有陽明證而猶未可下當專以太陽主治而宜汗此條則言太陽證已罷但有潮熱手足汗出大便難而譫語等陽明胃實諸證應以陽明為治而當下皆示人以辨證施治之法也太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門頭項強痛太陽證也眩冒少陽肝膽病也足少陽之脈起於目鋭眥足厥陰之脈上入頏顙連目系邪熱在少陽肝膽臟腑相連熱邪在絡上侵目系故眩冒也或眩冒者或時眩冒也時如結胸者時或如結胸之狀而實非結胸也少陽之脈下頰車合缺盆以下胸中邪在少陽故時如結胸而心下痞硬也況胸又屬太陽者乎邪在太陽則當汗邪在少陽則禁汗太陽與少陽並病亦不可汗既不可汗則兩經郁經之邪無可解之法故當刺大椎第一間及肺俞肝俞又叮嚀之曰慎不可發汗發汗則譫語與少陽篇禁例無異也大椎者背脊共二十一節最上之第一節骨上即百勞穴也肺俞者第三椎兩旁各一寸半之二穴也肝俞者第九椎下兩旁各一寸半之二穴也刺大椎者所以泄頭項強痛之邪也刺五分留三呼瀉五吸刺肺俞者泄肺氣以開皮毛也寒邪客於皮毛皮毛者肺之合也然泄肺氣而開皮毛本當以麻黃湯發汗乃為正治因太少並病不可發汗故刺之以泄皮毛而代麻黃湯之汗也可刺三分留七呼刺肝俞者瀉少陽之邪也可刺三分留六吸凡此三刺皆可泄兩經之氣解太少之邪者也故邪在少陽慎不可發汗發汗則裡虛邪陷而譫語矣譫語則邪犯陽明脈當洪大而不弦弦者少陽肝膽之邪也脈弦而五六日譫語不止是木邪盛而未欲解也故當刺肝經之募穴期門以泄其邪所謂隨其實而瀉之也辨誤條辨不知胸屬太陽及少陽之脈亦下胸中而以胸為陽明部分固謬又疑雲肝與膽合刺肝俞以瀉少陽肺與膀胱非合也以肺主氣故刺之以通膀胱之氣化歟不知太陽之表邪在外膀胱之氣化在裡通其在裡之氣化豈能即解在外之表邪其說更謬尚論不加揆度遂取其論以為說云膀胱不與肺合然肺主氣刺肺俞以通其氣斯膀胱之氣化行而邪自不能留矣嗚呼以智者而亦蹈前人之轍跡其亦以盲引盲之謂乎嘻太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之此即上文之證治也以上文但言不可發汗而未言不可下故此條又重申不可下之禁也太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩上文所謂時如結胸乃其本證非誤下之變故不過時常如結胸之狀而心下痞硬乃似結胸而非結胸也此因太少兩經並病皆不可下以不可下者而反下之遂成結胸心下硬又因誤下之虛中氣不守而下利不止邪陷胸中而水漿不下矣其人心煩者誤下之後陽邪陷膈故作虛煩也然其證已劇而仲景不立治法致方氏疑為脫簡而尚論云並病即不誤下已如結胸心下痞硬矣況誤下乎比太陽誤下之結胸殆有甚焉且其人心煩似不了之語以太陽經結胸證悉具煩躁者亦死意者此謂其人心煩者死乎愚恐未必盡皆死證也夫三陽經之煩證不一皆非死證惟煩躁並見者為重耳以煩屬陽而躁屬陰也所以三陰之手足厥而煩躁者多死而三陽篇中如汗不出而煩躁者為邪氣不得外泄之表實故用大青龍湯之汗劑如發汗若下之病仍不解而煩躁者為陽虛陰盛之裡虛證故以茯苓四逆湯溫之唯結胸證悉具而煩躁者死蓋以太陽誤下邪已陷入而為結胸且諸證悉具煩躁則陰極陽亡所以死也此雖亦以反下而成結胸其人雖心煩而未躁或有治法未可知也當於仲景諸煩證中約略尋討其活法可也
