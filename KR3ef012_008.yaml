body:
  text: 卷之八太陰篇霍亂附太陰證治第十七太陰傷寒太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬此總敘太陰之見症言太陰經受病必見腹滿而吐等證也然非謂諸證皆具方為太陰也以後凡稱太陰病必見此等症者乃為太陰病也夫太陰者盛陰也為東北之艮土得先天坎中未經生化之陽氣而生者地之純陰象焉以地居天之中先天來復之陽生於黃泉之下透地而發生萬物蓋以盛陰為體而以陽氣為用所以地寒則五穀不生土暖則發生萬物故人身之太陰脾土亦居五臟之中具靜順之體而有健運之用以胃為之腑而為水穀之海乃西南之坤土為後天離火之所生故屬陽明而能腐化水穀為坤厚載物之象是以胃則藏五味而化五穀脾則行精液而運精微周身臟腑經絡四肢筋骸皆受其生和長養為生氣之所自出其經脈行於任脈之兩旁為太陰之經故易曰坤為腹蓋腹行之脈穴也腹行之經脈受邪故為太陰病所謂邪入陰經則為陰邪也太陰之經以脾為臟以胃為腑其經脈受邪內通脾胃脾胃以膜相連寒邪在裡故腹滿而吐即素問熱論所謂太陰脈布胃中故腹滿而嗌乾也食不下者在陽明篇中即所謂不能食者為中寒況太陰乎陰邪在中則腹滿上逆則吐下迫則自利益甚時常腹自痛也當溫中散寒以解散其陰邪如下文所謂理中四逆輩可也倘粗工不辨陰陽罔知經絡以腹滿而吐食不下為停食胃實之證而以苦寒下泄之藥誤下之必致傷敗胃陽陰邪內結而胸下結硬矣胸下者心胸之下胃脘之間也以陰寒硬結於胃脘之中故謂之胸下結硬言與結胸不同也結胸以太陽誤下陽邪陷入陽位故結於胸此以太陰誤下胃陽空虛陰邪結於胸下之胃中故云結硬於胸下當此而不知急救胃陽祛除陰翳必致胃陽敗絕至呃忒四逆之變而死矣辨誤成氏謂太陰為病者陽邪傳裡也其說殊謬豈太陰無本經自受之邪乎又云陰寒在內而為腹痛者則為常痛陽邪傳裡雖痛亦不常但時時腹自痛此論尤謬豈反忘太陽篇首所云病發於陽則發熱惡寒病發於陰則無熱惡寒邪總之邪入陽經則發熱而為陽邪邪入陰經則無熱而為陰邪其旨曉然矣成氏既為仲景開闢功臣豈尚懵然未辨乎恐不若尚論所云腹滿自利為太陰之本證為易曉也但尚論又云設不知而誤下之其在下之邪可去而在上之邪陷矣故胸下結硬與結胸之變頗同愚竊謂陽邪因下之太早故有結胸之變陰邪本無可下所以痞結總條有云發於陽而反下之熱入因作結胸發於陰而反下之因作痞同是反下變逆而痞症遂無熱入二字下文但以下之太早為結胸之故並無所以成痞之故何也仲景之意蓋謂太陽之邪在表尚未解散誤下則裡虛邪陷致成結胸所以有下早之戒陰邪雖亦有在經在裡之分然三陰終不在表若誤下之必傷敗胃中之陽氣致陰邪僭逆遂成結硬故曰胸下結硬前甘草瀉心湯條下云此非結熱但以胃中虛客氣上逆故使硬也陰邪始終不可下下之必致變逆故曰反下陰經雖多下證在太陰必大實痛者胃氣實然後以桂枝大黃湯下之少陰證中亦必以口燥咽乾及心下必硬口乾燥者至六七日脹滿不大便然後以大承氣湯急下之厥陰證中亦必以下利譫語知有燥屎方以小承氣湯下之皆三陰證中之邪歸陽明方可議下此條純是陰邪有何在下之邪可去陰邪既非熱入又何在上之邪陷入乎此論已屬不經況陽邪陷入仲景必稱結胸陰邪結聚則稱胸下結硬而必不言結胸陰邪陽邪已自不同陷與非陷亦自各異且胸與胸下之部分更有不同寧可云胸下結硬與結胸頗同之理乎古人立法語氣不同文法少異則其意指絕殊矣後人不能細繹其文模糊混注其可為後世訓乎自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩陽經有下利而陰經尤多下利惟自利而不渴者方屬太陰何也以太陰脾臟有寒邪故也大凡邪入陽經則發熱津枯而渴邪入陰經則不熱而津液不耗故不渴即太陽篇首所謂無熱惡寒發於陰之義也陰寒在裡故腹滿痛而自利乃太陰脾經之本證也故當溫之宜服四逆輩者言當用姜附輩以溫之也曰四逆輩而不曰四逆湯者蓋示人以圓活變化之機量其輕重以為進退無一定可擬之法也若膠於一法則非圓機矣張兼善云經言輩字謂藥性同類唯輕重優劣不同耳四逆湯甘辛相合乃大熱之劑苟輕用之恐有過度之失所以仲景不為定擬莫若以理中循循用之至為穩當夫兼善以四逆為大熱而恐其過度是最不善讀書者觀仲景於三陽症中如誤汗亡陽而以真武四逆救之則曰四逆湯主之又如少陰厥陰症中寒邪過盛之證皆曰宜四逆湯及四逆湯主之者皆以真陽欲絕急溫之法不待籌畫而用之無疑者也若猶豫不決遷延時日則將陽氣竭絕亡可翹足而待豈理中湯之一味乾薑可救耶唯此太陰之邪或有可用者或有不必全用者故曰宜服四逆輩而無一定之方也設陰寒急證而必以理中湯為穩當循循用之則小熱不能治大寒陰邪不退真陽不復則死矣其謂之過度耶抑穩當耶所以延習至今庸工皆以穩當為妙至殺人而竟不自知愚者反以為熱藥之誤豈不冤哉辨誤尚論云注謂自利不渴濕勝也故用四逆輩以燠土燥濕此老生腐談非切論也仲景大意以自利不渴者屬太陰以自利而渴者屬少陰分經辨證所關甚鉅蓋太陰屬濕土熱邪入而蒸動其濕則顯有餘故不渴而多發黃少陰屬腎水熱邪入而消耗其水則顯不足故口渴而多煩躁若不全篇體會徒博註釋之名其精微之蘊不能闡發者多矣其論如此乍讀之若頓開生面創闢一新陳腐皆去特然傑出仲景久晦之旨一旦為光天化日矣既而思之喻氏之言即成注也成注云自利而渴者屬少陰為寒在下焦自利不渴者屬太陰為寒在中焦與四逆等湯以溫其臟此雖三家之說實兩家言也及推仲景原文細繹六經之旨方氏固謬而成氏之說亦非喻氏雖痛斥方注然其立說更不能無誤謬也夫方注云自利不渴為濕勝太陰濕土故曰有寒四逆輩皆能燠土燥濕故曰溫之仲景以自利不渴為臟寒方注偏以自利不渴為濕勝仲景以四逆輩為溫方注偏以四逆輩為燥濕豈後人之智慮過於前人注者之識見勝於作者耶是以謂之不能無過也成氏以自利不渴屬太陰為寒在中焦其論未始不正其自利而渴者屬少陰為寒在下焦其義何居試問少陰篇之渴證有幾遍閱少陰篇中止渴證二條而已其一則曰五六日自利而渴者屬少陰也虛故引水自救小便色白者以下焦虛有寒不能制水故令色白此非真渴也其二則曰下利六七日咳而嘔渴心煩不得眠此因陰寒在下地氣不升氣液不得上騰而渴天氣不降肺氣不得下行而壅塞咳嘔故以豬苓湯滲利下焦上通肺氣而已初非熱邪作渴也其外四十餘條皆無渴證豈可以自利而渴為少陰之定旨乎況云自利而渴者屬少陰為寒在下焦既云寒矣何渴之有恐其義未通不足為定論也尚論以太陰屬濕土熱邪入而蒸動其濕故不渴而多發黃若濕熱發黃其說則可如傷寒發汗已身目為黃以寒濕在裡不解故也以為不可下而於寒濕中求之者豈亦熱邪蒸動耶況成注原云自利而渴者屬少陰為寒在下焦而喻氏遂因其說而變其詞曰少陰屬腎水熱邪入而消耗其水故口渴而多煩躁不知下文小便色白下焦虛有寒熱邪何來煩躁安在而作此議論耶在成氏則但閱太陰篇有自利不渴者屬太陰句及閱少陰篇見有五六日自利而渴者屬少陰句並不體會全篇通解下文貿貿焉援筆定論其於學術可謂疏矣雖不應臧否前哲奈所關者大所慮者深故不能無辨耳傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實穢腐當去故也傷寒之脈浮緊中風之脈浮緩皆太陽證也今以傷寒而脈見浮緩豈風寒並感耶若果如太陽下篇大青龍湯條下之脈浮而緩為風寒並受則當有表證矣此以邪在太陰緩為脾之本脈因邪入陰經故無發熱等證也手足自溫者脾主四肢也以手足而言自溫則知不發熱矣邪在太陰所以手足自溫不至如少陰厥陰之四肢厥冷故曰系在太陰然太陰濕土之邪鬱蒸當發身黃若小便自利者其濕熱之氣已從下泄故不能發黃也如此而至七八日雖發暴煩乃陽氣流動腸胃通行之徵也下利雖一日十餘行必下盡而自止蓋以濕氣實於脾家故腸胃中有形之穢腐當去穢腐去則脾無形之濕熱亦去故也此條當與正陽陽明發黃篇第七十七條互看其上節相同而下節各異前以小便自利而不能發黃之後以七八日而大便硬者乃邪歸陽明為可下之證此以七八日而暴煩下利穢腐當去為脾家實乃邪歸太陰為利儘自止之證一歸於胃實而為陽明證一歸於脾實而成太陰證其同感而異變同源而異派若非諄諄分辨能無多歧之惑乎觀其立法示人謂非後學之指南臨證之冰鑑歟傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之言傷寒鬱熱之邪已內入胸膈猶未入胃胸為太陽所屬則太陽證猶未罷而胃中反有陰寒之邪氣故腹痛而欲嘔吐也腹痛嘔吐皆屬太陰以胃中有邪氣而見太陰證者太陰陽明論云脾胃以膜相連為一表一里故也然胸中有熱當以寒涼為治而腹痛欲嘔則又當以溫中為急從來治寒以熱治熱以寒乃為正治今胸中有熱胃中有寒治寒則逆其熱治熱必害於寒不得已而以黃連湯主之所謂寒因熱用熱因寒用二者相須素問至真要大論云逆之從之逆而從之從而逆之之法也黃連湯方黃連三兩甘草三兩乾薑三兩桂枝三兩人參二兩半夏半升大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三服夜二服熱邪已入胸膈雖未成結胸而胸邪非若不開熱氣又非寒莫治故以黃連之苦寒為君即黃連瀉心湯之意也甘草緩腹中之痛與黃連同用能瀉心下之邪即甘草瀉心湯之義也若非乾薑之溫熱守中不足以療腹中之痛必人參半夏之辛溫扶胃乃能止欲嘔之逆然胃有實熱則人參即為難用此乃陰寒虛氣雖有胸中之客熱而無入胃之熱邪仍屬太陰本證故當溫補兼施也用桂枝者使陽氣通行兼解其未去之經邪也加大棗者調停其中氣和協其藥性之寒溫也黃連與乾薑同用乃寒因熱用所以治胸中有熱也乾薑與黃連並行即熱因寒用所以治腹痛欲嘔也胸中有熱而用黃連者逆而折之之法也復用乾薑者求其屬以衰之之法也腹痛而用乾薑者逆者正治也又用黃連者從者反治也胸既有熱而腹痛欲嘔又為胃中有寒一寒一熱之邪而以黃連乾薑並馳者從而逆之逆而從之也立方之旨精矣微矣太陰中風太陰中風四肢煩疼陽微陰澀而長者為欲愈此言太陰在經之表證也太陰中風者風邪中太陰之經也四肢煩疼者言四肢痠疼而煩擾無措也蓋脾為太陰之臟而主四肢故也然脾臟何以主四肢乎素問陽明脈解云脾病而四肢不用者何也岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉此所謂脾主四肢之故也微澀皆陰脈也陽微陰澀者言輕取之而微重取之而澀也邪在陰經陽未受邪陰實陽虛而脈偏見於沉候故陽脈微也脈者氣血伏流之動處也因邪入太陰脾氣不能散精肺氣不得流經營陰不利於流行故陰脈澀也陽微陰澀正四肢煩疼之病脈也長脈者陽脈也以微澀兩陰脈之中而其脈來去皆長為陰中見陽長則陽氣無損長則陽氣將回故為陰病欲愈也辨誤成氏謂表邪少則微里向和則澀俱誤蓋微與澀皆病脈也因微澀之中又見長脈故知欲愈非謂微澀即欲愈之脈也何不云邪不在表間陽分故陽脈微邪但在裡之陰分故陰脈澀然後言得長脈之陽則為陰病見陽脈者生為欲愈則仲景之意得伸矣奈尚論又以陽微陰澀為風邪已去而顯不足之象脈見不足恐元氣已漓暗伏危機故必微澀之中更察其脈長知元氣未漓其病為自愈既以微澀為風邪已去豈非亦以微澀為欲愈之脈耶如此而又譏前注以澀為血凝氣滯為大謬而曰豈有血凝氣滯反為欲愈邪不知方氏條辨謂陰澀者太陰統血血凝氣滯也長為陽氣勝陽主發生故為欲愈其說未為大謬而矯枉其詞以陷之豈理也哉太陰病欲解時從亥至醜上太陰者陰氣之純全也先天卦體陰氣生於盛陽之中故一陰生於午至亥而為十月之候卦體屬坤陰氣方純至子而黃鐘初動陽氣雖萌正陰氣盛極之時故太陰之旺氣鍾於此氣旺則邪自解矣至醜而陽氣已增非陰氣獨旺之時因醜之上半陰氣尚盛故曰至醜上太陰病脈浮者可發汗宜桂枝湯此所謂太陰病者即上文太陰中風也上條言陽微陰澀而長者為欲愈此言其外證雖見四肢煩疼之太陰證而其脈尚浮者則其邪猶在太陽之表猶未深入太陰也何也邪從外入必由營衛營衛屬太陽風邪在衛則脈浮故脈浮猶屬太陽也即太陽上篇陽浮陰弱之義故亦宜桂枝湯辨誤夫桂枝湯者本太陽經中風藥也成氏但言脈浮當汗散而不言太陰所以用太陽藥之故如此關節毫不置辨何怪乎後人有隨文順釋之譏乎條辨謂浮則邪見還表不知此猶初入之邪犯衛非已入里而又復還表也此注為誤尚論云太陽脈浮緩為中風浮緊為傷寒但揭一浮字義即全該風邪用桂枝湯其脈之浮緩不待言矣然則寒邪之浮緊其當用麻黃湯更不待言矣況少陽篇中雲設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯早已挈明麻黃湯之義故於太陰證中但以桂枝互之乃稱全現全彰也不然同一浮脈何所見而少陽當用麻黃太陰當用桂枝也哉喻氏此論於太陽則然矣至於三陰恐不能不少變其法矣夫太陽以浮緩自汗為中風浮緊無汗為傷寒而有麻黃桂枝之不同者蓋因營衛皆屬太陽之表以風傷衛者汗自出為衛強營弱故以桂枝湯汗解衛強之熱自發而以芍藥收斂營弱之汗自出既有芍藥之收斂便不可用之於無汗之傷寒又以寒傷營者無汗故以麻黃杏仁開發皮毛泄營中之寒氣仍以桂枝宣通衛氣助其發汗既有麻黃之發泄便不可用之於有汗之中風以風寒營衛之各殊所以有麻黃桂枝之迥異一誤用之變證立起故立法者不得不辨至邪入三陰而但舉一浮字者但別其在表在裡而已何也若曰中風有汗仲景於少陽篇中明言陰不得有汗矣若曰傷寒無汗者當發汗則三陰篇中無麻黃湯發汗之例即使少陰有麻黃附子細辛湯及麻黃附子甘草湯二方一則以始得之而反發熱曰始得之是寒邪初感其入猶淺尚在營衛以惡寒脈沉之少陰病本不當發熱者而反發熱是邪猶在表況太陽與少陰本為一表一里故用麻黃以散發熱之太陽表邪用附子以溫脈沉之少陰寒氣令命門之真陽有助即發太陽之微汗亦無妨矣一則雖得之二三日以二三日無里證也既曰無里證則是邪猶在表或反發熱未可知也故微發汗以解之而仍以附子溫經補陽也即厥陰條下之麻黃升麻湯亦因傷寒誤下陽邪陷入陰中而為變逆故用升舉開發之藥汗散之耳若太陰一經則唯此二條為風邪在表前以陽微陰澀而長故為欲愈此以脈浮為邪在太陽之表故可發汗也然不用麻黃而用桂枝湯者以陰病本屬無陽既不能若少陰證之麻黃可與附子同用若誤用之適足以敗衛亡陽況中風原屬桂枝湯之本證乎所以三陰證中少陰有脈微不可發汗脈細沉數為在裡而不可發汗反汗出為亡陽及嘔而汗出汗出不煩皆非輕證況有強責少陰汗及但厥無汗而強發之之難治乎厥陰有下利清穀不可攻表汗出必脹滿及裡寒外熱汗出而厥者更有發熱而利其人汗出不止者死皆以有陰無陽故也蓋汗雖陰液實人身之陽氣所蒸也汗出而真陽亦隨之而泄矣寧可以麻黃湯而用之於三陰證乎況仲景原文有太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯之條諸傢俱在太陽篇中而尚論云在少陽篇中及閱少陽篇並無此文乃喻氏但言之於注中至於仲景原文反失之而不載然仲景之意言太陽傷寒之脈浮緊若十日已去其脈浮細是緊脈已去變而為虛細之脈且嗜臥則為邪去而倦怠為安寧景象故云外已解也設使胸滿脅痛者是太陽證雖退其邪已轉入少陽矣故與小柴胡湯但浮而不細者是但有邪氣在表之浮脈而無邪退變虛之細脈又無胸滿脅痛之少陽證乃邪氣獨在太陽之表故當以麻黃湯以汗之非謂柴胡證而可用麻黃湯也喻氏豈猶不知麻黃湯但可用之於太陽無汗之傷寒而他經皆不可用雖陽明篇中亦有之而陽明一經止有太陽陽明傷寒有脈浮無汗而喘者用麻黃湯項背強𠘧𠘧無汗惡風者用有麻黃之葛根湯太陽陽明合病喘而胸滿者麻黃湯主之太陽與陽明合病者必自下利以有麻黃之葛根湯主之之類皆太陽初轉陽明其太陽證居多而陽明證尚少故仍以太陽主治而然也若少陽一經汗吐下皆在所禁絕無用麻黃湯者豈有少謂少陽篇中早已挈明用麻黃湯之義太陰證中但以桂枝互之之說耶又豈有何見少陽當用麻黃太陰當用桂枝之理哉汗下兩法非唯三陽不可誤用而三陰證中尤所慎重用之一差死生立判誠用藥之權衡性命之樞機也安能無辨太陰誤下本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之此言太陽誤下而陷入太陰也腹滿時痛即前首條之太陰本證也言本太陽中風醫不汗解而反下之致裡虛邪陷遂入太陰因爾腹滿時痛故曰屬太陰也然雖屬太陰終是太陽之邪未解故仍以桂枝湯解之加芍藥者桂枝湯中已有芍藥因誤下傷脾故多用之以收斂陰氣也神農本經言其能治邪氣腹痛張元素云與姜同用能溫經散濕通塞利腹中痛胃氣不通入脾經而補中焦太陰病之所不可缺得甘草為佐治腹中痛熱加黃芩寒加桂此仲景神方也李時珍云白芍益脾能於土中瀉木所以倍加入桂枝湯也若下後脈沉遲而寒者張元素之薑桂非謬言也桂枝加芍藥湯方於桂枝湯方內更加芍藥三兩隨前共六兩余依桂枝湯法大實痛者桂枝加大黃湯主之桂枝加大黃湯方桂枝三兩大黃一兩芍藥六兩甘草二兩炙生薑三兩切大棗十二枚擘上六味以水七升煮取三升去滓溫服一升日三服此承上文言醫誤下而腹滿時痛者為屬太陰若大實滿而按之痛者終是陽經傳邪雖屬太陰已兼陽明胃實矣當下之然不可如陽明證中之腹滿痛者急下之而用大承氣湯也此本因太陽未解誤下而入太陰故仍於加芍藥之桂枝湯中增入大黃一兩耳考漢之一兩即宋之二錢七分也以水七升而煮至三升分作三次服之止溫服一升按李時珍云古之一升今之二合半約即今之一飯甌也大黃不滿一錢亦可謂用之緩而下之微矣豈可亦謂之古方不可治今病歟揆之脈證尚當察其脈大而舌有苔者猶恐其少總在臨證者之得其機宜用之允當可耳太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也此又承上文而致其反復叮嚀之意也言邪在太陰而脈弱者其人初雖不便利至陰邪在裡脾不堅實而續得大便滑利者設使如上文實痛而當行大黃芍藥者宜比前更減之何也以其人陰邪在裡脈弱則胃氣亦弱易於行動故也大凡人以胃氣為本未可輕易損傷故雖陽明證中亦以先硬後溏未定成硬恐胃邪未實而以小承氣湯微溏不令大泄下也附霍亂篇霍亂證治第十八霍亂證治問曰病有霍亂者何答曰嘔吐而利名曰霍亂此言無表證之霍亂也有聲無物為乾嘔聲物兼有為嘔有物無聲為吐嘔則邪氣在表吐則邪氣在裡邪獨在上則嘔而不利邪獨在下則利而不嘔若為暴寒所中寒邪直入中焦太陰脾臟受寒故胃中驟冷而上吐下利轉筋腹痛手足厥逆者名曰霍亂此皆六氣勝復之變也太陽寒水及太陰濕土司天在泉之勝復或厥陰陽明之勝復皆有之即少陽少陰二火司天在泉或為諸寒濕之間氣客氣所勝者亦然且尤於陰晴風雨酷暑暴寒之中每每有之一家之中一里之內或闔境皆然乃時行寒濕也但霍字未詳其義大約是倏忽間吐瀉擾亂之意耳成氏以揮霍撩亂解之恐未必然方有執云靈樞五亂篇曰清氣在陰濁氣在陽清濁相干亂於腸胃則為霍亂也問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也此言有表證之霍亂也發熱頭痛身疼惡寒者寒邪在表也吐利者寒邪在裡也言傷寒之邪在太陽而發熱頭痛身疼惡寒則無吐利若傷寒之邪在陰經而有吐利惡寒則無發熱頭痛此雖較前又多表證酷似傷寒然吐利仍在故此亦名霍亂然始而吐下繼而利止則霍亂之裡邪已矣復更發熱者表邪未解霍亂將仍轉而為傷寒矣成氏云利止里和復更發熱還是傷寒必汗出而解竊恐霍亂暫止里未必和吐瀉之後汗不輕發當諒其虛實故不言發汗也傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也似欲大便而反矢氣仍不利者屬陽明也便必硬十三日愈所以然者經盡故也此承上文言以發熱頭痛身疼惡寒吐利之霍亂利既止而復發熱是霍亂仍歸於傷寒矣但傷寒之脈陰陽俱緊以寒邪在表或見浮緊已發熱者或見浮數而已其脈微澀者陽氣大衰則微陰血凝泣則澀微澀之脈陰陽兩受傷殘矣因前本是表裡俱寒之霍亂其寒邪在表則傷陽在裡則傷陰故也今復更發熱是霍亂不已仍變而為傷寒卻延至四五日揆其日數其候至陰經受邪位次之上即素問熱論所謂四日太陰受之五日少陰受之是也至陰經上而竟轉入陰則陰臟受邪寒邪入里故必利也此因前霍亂時本已先嘔下利至於脈微澀則已在陰陽兩傷之後又因在表之寒邪不去復更發熱又傳入陰經下利是陰陽已傷再傷陽氣已敗覆敗故為不可治也若利止發熱之後至四五日而病人似欲大便頗虞其複利而反但轉矢氣仍不下利者此為邪氣不轉入陰而轉屬陽明也何也凡下利者必溏泄而無矢氣即或有之亦必稀糞隨矢氣而出矣豈能但轉矢氣哉今但轉矢氣是以知其大便必硬已還陽明矣所謂陽明中土為萬物所歸無所復傳之地至十三日而愈矣但言便硬而不言下法者以陰寒吐利之後胃陽復還而硬非若陽明證之便硬為實熱盛也經盡者前太陽總證云頭痛至七日以上自愈者以行其經盡故也蓋言太陽之邪七日以上經盡而衰去也十三日者即所謂再作經也七日太陽之經已盡復傳陽明至十三日而其經亦盡故也下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也此又承上文言霍亂利止後復更發熱者是霍亂復為傷寒矣四五日不轉入陰而入陽明之裡則當便硬硬則胃陽已復寒邪已去故當能食而愈也今反不能食到後經中頗能食者言今便已硬猶不能食者胃中陽氣未回也後經謂七日之後再作一經也言到七日以後再作陽明一經胃氣方醒而頗能食是復過一經而能食也如此則於過經之一日當即愈方為轉入陽明如其不愈者是未入陽明故曰不屬陽明也可見入陰即為不治入陽則為即愈陰陽之迥別如此惡寒脈微而複利利止亡血也四逆加人參湯主之此又承上文脈微轉入陰經必利而言也言如前證而不發熱但惡寒脈微而復下利則陰寒在裡陽氣微弱甚矣而忽得利止此非陽回利止乃亡血也亡血二字以仲景詞義推之皆無陽之意不知是何深義殊不能解如太陽中篇云假令尺中遲者不可發汗蓋尺中遲則為下焦虛冷真陽衰少恐更亡其陽故云不可發汗不意下文即曰何以知之然以營氣不足血少故也以陽虛而云血少因有營氣不足四字此段猶為易解既云營氣不足則知奪血者無汗奪汗者無血天地以陽蒸陰而為雨人身以陽蒸陰而為汗故曰陽之汗以天地之雨名之若發其汗則陽氣隨汗而泄汗泄則營血去而陽隨之以亡矣故以尺中虛為血少耳又如厥陰篇中雲傷寒五六日不結胸腹軟脈虛復厥者不可下此為無血下之死既曰腹軟脈虛復至四肢厥冷是以陽虛陰盛而不可下也亦謂之無血豈非以無陽為無血乎此所謂殊不可解者也此條以惡寒脈微之下利寧非虛寒所致而以利止為亡血而又以四逆加人參湯主之豈非亦以無陽為亡血乎此又一殊不能解者也不得已而強解之除是陰無陽不生陽氣虛衰則陰血亦亡故以四逆湯挽救真陽而加人參湯以扶補其氣血之虛也未知然否姑妄議之以俟後之君子四逆加人參湯於四逆湯內加人參一兩余依前法霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之此又承上文言有表證之霍亂頭痛發熱身疼而不惡寒者既不轉入陰經而反熱多欲飲水者非陽明胃熱渴欲飲水之證也蓋因本系表裡均受寒邪而致霍亂所以上吐下利今其頭痛發熱身疼之太陽表證尚在因寒邪內犯太陽之腑故膀胱為津液之所藏寒在下焦氣液不能上騰而為涕唾所以虛陽在上熱多而欲飲水即如太陽中篇所謂脈浮數而煩渴者五苓散主之之義也故以桂肉之辛熱助下焦腎中蒸騰之陽氣而以四苓沛肺家下行之水如此則腎中之地氣上升而渴自止肺藏之天氣下降而便自利矣苟非長沙之聖孰有不認為胃無津液而用寒涼以濟之者耶然後賢猶未達五苓之義而不敢用每改桂為桂枝良可慨也至於寒多而不用水者則中焦已寒脾胃虛冷故用理中丸溫補之也理中丸方人參白朮甘草乾薑以上各三兩上四味搗篩為末蜜和丸如雞黃大以沸湯數合和一丸研碎溫服之日三服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服參朮甘草補中氣而益脾乾薑溫熱守中而散寒為足太陰之專藥故能治理中焦而驅除陰慝為脾胃虛寒之主劑也後加減方文理背謬量非仲景之法姑存而辨之以資考校之用若臍上築者腎氣動也去朮加桂四兩太陽上篇云氣從少腹上衝心者必作奔豚此乃腎氣動也此云臍上築則非從下上衝之腎氣矣腎肝在下豈反於臍上築築然而動乎此所謂築者非心下悸即臍間之動氣耳未可云腎氣動也成氏既注為脾虛腎氣動則脾虛之證不應去朮又云甘者令人中滿術味甘而壅補又何去朮而獨留甘草邪即此觀之出自仲景者果如是乎吐多者去朮加生薑三兩霍亂吐多乃胃氣虛寒最宜理中全用若胃有宿食恐助其痞滿固當去之成氏謂嘔家不喜甘故去朮蓋嘔與吐大相懸絕之證也邪氣在表則嘔如中風有鼻鳴乾嘔傷寒有體痛嘔逆陽明有傷寒嘔多雖有陽明證不可攻之亦是太陽表證未罷也少陽有嘔而發熱心煩喜嘔此皆有表證而嘔也至若吐證則為寒邪在裡如太陰有腹滿而吐少陽有欲吐不吐有咽痛而復吐利有飲食入口即吐心下溫溫欲吐厥陰則有吐蛔而下利者矣嘔吐之分如此而成氏不辨以嘔為吐誤矣嘔家以生薑為聖藥者取其辛溫發散也吐家以乾薑為主治者取其溫中去寒也方中既有乾薑加與不加皆可下多者還用術悸者加茯苓二兩霍亂而下多則寒邪在裡理中自宜全用已不必言前小柴胡湯加減云悸者加茯苓四兩蓋以水停心下小便不利故心下築築然而悸也此亦加茯苓焉知上文臍上築者非心下悸而又去朮加桂邪總非仲景之筆遂多此等不倫之語渴欲得水者加朮足前成四兩半太陽邪入膀胱五苓散之渴也陽明熱邪入胃津液枯燥白虎湯之渴也此因渴欲得水而加朮術性本燥濕豈宜於渴者五苓散中用之全賴肉桂之蒸騰故氣液得升耳不然術豈渴證所宜且理中丸已自有術又加至四兩半不知又屬何意成氏謂津液不足則渴術甘以緩之愚謂津液不足而反用燥濕之術已不可解況渴證而用緩法何也腹中痛者加人參足前成四兩半成氏謂裡虛則痛加人參以補之愚竊謂虛則因何而痛痛則何故補之此真所謂隨文順釋洵不虛也寒者加乾薑足前成四兩半原方中四味等分已有乾薑三兩不為少矣又加一兩半殊未切當若果至寒甚何不即加附子直待腹滿然後加入邪腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被霍亂腹滿本屬陰寒附子或可至於去朮之說亦當略分虛實若吐下未已濁氣留中固當去朮若吐利已過中氣虛寒則朮附恰當同用即中氣不寒者亦如補中益氣湯治氣虛中滿可也若果能飲熱粥升許則術亦可不去矣飲熱粥而微溫勿揭衣被者即服桂枝湯取漐漐微似汗之法也寒邪在裡而腹脹陽氣衰微而加附子似不宜於汗然已有附子回陽微汗亦不妨矣吐利止而身痛不休者當消息和解其外宜桂枝湯小和之消息二字最妙方為活法身痛不休未易擬議如傷寒第二條之身疼腰痛骨節疼痛乃寒邪在表而痛此麻黃湯證也如發汗後身疼痛脈沉遲者此乃汗後亡陽陽虛里寒無陽氣以噓培和暖其筋骨營血凝澀而痛此桂枝加芍藥生薑人參新加湯證也如太陽下篇之首條發熱惡寒身疼痛不汗出而煩者此風寒並感溫熱之表邪所致大青龍湯證也又如太陽下篇傷寒醫下之續得下利清穀不止身疼痛者急當救里宜用四逆湯者後身疼痛清便自調急當救表宜用桂枝湯者又如厥陰篇之下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯者歷觀論中之身疼痛者表裡不同虛實各異而更有虛實表裡互相參錯者臨證酌治能不為之消息詳辨乎若使毫釐之差必致千里之謬死生存亡系焉司命者其可有所失歟所以吐利止後之身痛不休或陽氣虛損營血不行乃陰寒所致可用四逆者或病後新虛氣血未和而可用如人參新加湯之類者或果有表邪未解雖屬寒邪病後不宜更汗舍麻黃而用桂枝湯和表者各當以脈證審辨可耳但其辨甚微非淺事也故曰消息二字最妙果能如此方為活法也吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之汗出發熱惡寒似桂枝證然霍亂則與中風迥異蓋中風之初有表證而尚無里證但治其表可也霍亂則方有表證而寒邪已先入里故上吐下利也且吐且利而又四肢拘急則諸寒收引也手足厥冷則陽氣衰微而不充於四肢也其證之急里甚於表故急宜救里當以四逆湯主之寒中霍亂本無汗下及寒涼之治者皆以寒邪在裡陽氣虛衰故也所以但用溫經散寒而其表證亦無不解也既吐且利小便複利而大汗出下利清穀內寒外熱脈微欲絕者四逆湯主之吐利則寒邪在裡小便複利無熱可知而大汗出者真陽虛衰而衛氣不密陽虛汗出也下利清水完穀胃寒不能殺穀也內寒外熱非表邪發熱乃寒盛於裡格陽於外也陰寒太甚陽氣寖微故脈微欲絕也急當挽救真陽故以四逆湯主之吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯主之此合上文兩條之脈證而言吐利之時所以有此脈證今吐既已而下利又斷當邪解而愈矣仍汗出而厥四肢拘急而不解脈仍微而欲絕者此寒邪固結而不解陽氣虛盡而欲竭所以吐亦無氣以出而自已利亦津液不行而自斷此非欲愈之吐下得止乃無陽氣以流行腸胃不通臟氣不行之徵也當急救真陽無奈寒邪太盛又恐拒格而不受非前方可治故以熱因寒用之通脈四逆加豬膽汁湯主之吐利發汗脈平小煩者以新虛不勝穀氣故也霍亂吐瀉而有發熱頭痛惡寒無汗者苟非陽虛原當以溫中發散治之今吐利發汗而脈平則邪解而愈矣而覺胸中小小煩悶者蓋以病後新虛胃氣未復食谷太早未能勝任穀氣故也損谷則自愈矣
