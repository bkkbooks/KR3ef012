body:
  text: 卷之四太陽下篇風寒兩傷營衛證治第六風寒並感證治太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也以真武湯救之夫發熱汗出惡風頭項強痛而脈浮緩者為太陽中風若發熱頭項強痛身疼腰痛骨節疼痛體重嘔逆惡風無汗脈陰陽俱緊者為太陽傷寒此條以太陽中風四字冠之而曰脈浮緊發熱惡寒身疼痛不汗出是中風而見傷寒之脈證矣然諸脈證中惟脈浮而煩及發熱惡寒皆中風所有之脈證故為風寒並感營衛兩傷之證也蓋風鬱則煩寒鬱則躁風寒並鬱於營衛之間不得汗泄故作煩躁也用桂枝則去風而遺其寒用麻黃則治營而忘其衛故以去芍藥之桂枝湯合麻黃湯並用加入石膏者所以治鬱熱之煩躁也三者並馳風寒鬱熱之邪解矣故立大青龍湯主之然青龍之制非但為風寒並感之大綱直為溫病治表之一大柱也後人不知輒嘆為仲景詳於治傷寒略於治溫故春溫一證漫無成法可師為古今之缺典豈知溫證治法已苞舉於六經條治之中而不覺也其寒熱溫涼補瀉之法豈又在中風傷寒之外邪然此方原為脈緊無汗者立法如上篇脈浮弱而汗出惡風者已屬陽浮陰弱汗自出之中風而麻黃湯已為禁劑矣若脈見微弱則與浮緊大相徑庭矣浮緊為表邪實微弱則真陽虛其虛實迥殊故脈見微弱而汗出惡風者非表邪所致乃足少陰腎中之真陽已虛不能升發而為衛氣所以衛陽不能固密而汗自出陽虛不任外氣而惡風寒也故曰不可服若誤服之適足以亡陽而致陰氣上逆四肢厥冷陽虛無以噓養其筋肉而惕惕然瞤動矣此皆為誤汗亡陽之逆變也若犯此者當急以真武湯救之此與上篇誤汗條下身瞤動振振欲劈地之亡陽同一治法但彼曰主之而此曰救之則危急存亡系焉臨證施治者當知所急矣大青龍湯方麻黃六兩去節桂枝二兩嫩枝香甜者不去皮杏仁四十枚去皮尖研甘草二兩生薑三兩切大棗十二枚擘石膏如雞子大研細羅上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗出者停後服汗多亡陽遂虛惡風煩躁不得眠也青者東方木之色也龍陽物也蓋飛騰變化行雨之神物也然龍之為物也特鱗蟲之長耳非能自為飛騰變化也不過隨陽氣而出入上下以成其用耳故三冬陽氣在下則潛藏伏蟄而不見故謂之潛龍勿用陽氣出地則曰見龍在田至陽氣上升則曰飛龍在天矣其所以潛而勿用者以三冬陽氣在下則陰氣在上龍性純陽故潛藏於陽氣之中不敢出出遇陰寒肅殺之氣則死矣故曰龍蛇之蟄以存身也其出也陽氣上升則雷出地奪龍隨之而啓蟄上騰此所謂鼓之以雷霆潤之以風雨而少陽之氣發生萬物草本敷榮矣其藏則伏於北方之坎其動則出於東方之震故曰青龍青龍湯者人身之春劑也青龍主令於春者春即人身生和長養之氣也蓋少陽木氣喜於發散若為寒氣所持則鬱而不達矣必使陽氣升發然後降而為雨雨猶人身之汗也得汗則發泄而陽氣得伸故以大青龍為行雨之神而發之所謂木鬱則達之也若汗出惡風而見微弱之脈為真陽大虛之候用之則為亢龍而有悔矣故曰不可服也仲景氏立方命名之義蓋有定指夫春令少陽風木用事陽氣透地而為風布其生和發育萬物為春木司令之正氣若風木太過而偏勝或不及而抑鬱則為淫僻之邪即能傷人害物其感之而病者謂之中風以木得陽氣而生其性溫暖故為陽邪其證發熱惡寒其脈浮緩陽邪止傷陽分所謂水流濕火就燥也故獨傷衛氣以致皮毛不闔而自汗以桂枝湯和解其邪得微汗則營衛和諧而愈矣若以風木行令之時溫暖宣發之候而值六氣之變遷為乍寒所中則雖以風傷衛之時而有寒傷營者矣月令所謂季春行冬令則寒氣時發叔和例中但知霜降以後至春分以前為傷寒而不知春分以後猶有寒氣時發也以陽氣宣發之時而為寒邪所閉腠理不通陽氣怫鬱發熱惡寒身疼不寒而煩躁故立大青龍湯以治之雖為風寒兩解之法而注家以此條雖曰太陽中風而傷寒脈證居多遂謂寒多風少不知下條之名曰傷寒者雖中風脈證居多亦以大青龍湯發之此正互相發明之義也立方之意蓋以風木之陽邪為客寒所勝鬱而為熱既當治其勝氣又宜平其鬱邪故於治傷寒中兼平風木之溫邪而於麻黃湯中倍加麻黃又以桂枝湯非傷寒所宜故去芍藥之酸收增入石膏辛寒清肅之品既可以開腠理而汗泄其寒邪又可以和衛氣而涼解其溫熱夫人身之汗猶天地之陽氣為陰氣所遏而為鬱蒸陽氣屈伏之甚則陽蒸陰而上騰是為地氣上升升者云也陽氣所蒸之陰氣也至升而已降降者雨也即蒸騰之陰氣隨陽氣而下降也陰陽應象論云地氣上為云天氣下為雨雨出地氣云出天氣者是也如此則陰以陽升而龍隨之以升陽隨陰降而龍隨之以降天地之陽氣得伸陰氣得平鬱蒸化而為清寧矣謂之青龍湯者所以治春溫中之傷寒者也其以麻黃之全體而兼桂枝白虎之半者蓋以非青龍之春暖不能發寒氣之鬱結非白虎之秋肅不能除風熱之溫邪也然非獨春暖之傷寒為然也即以此治冬月之溫邪亦然也雖夏至前後溫暑之時設有寒傷營而不汗者亦無不然也是以內經專以春夏秋冬論人身肝心肺腎立一定之體而後伸其變蓋因立萬世之經常不得不然也仲景絶不言春夏秋冬而立法處方隨時變化以合其轍是能以圓活變化之機而不離乎經常者也故其自序中雲撰用素問九卷豈虛語哉世人謂麻黃髮汗止宜於冬月之傷寒者皆限於叔和之例也若是則彼所謂春分以後秋分節前之時行寒疫者又屬何病邪即使溫暖之候必以麻黃為不可用若青龍湯之寒溫並解者亦必不可用歟總之仲景之書有叔和而始晦傷寒一例遂畫千古之定限印定後人眼目而後之學者又皆死受其束縛而不敢變若致仲景之活法變而為膠柱鼓瑟之法矣其如天下後世何故不得已而申其辨也真武湯方茯苓三兩芍藥三兩生薑三兩白朮二兩附子一枚去皮破八片上五味以水八升煮去滓溫服七合日三服真者先天純一不雜之氣也武者乾金之用陽氣之動也以乾金之堅剛不屈陽氣之發揚蹈厲而言也在八卦則為坎之中爻一陽居於二陰之間乃先天乾中之陽丹家所謂水中金陽氣潛藏之象也在六十四卦則為復之初爻實震之下爻一陽生於黃泉之下少陽生髮之象黃鐘之實也亦謂之玄武玄北方天一之水也謂之玄者陰陽未判赤黑未分之色也蓋陽亦陰黑混淆於太極之中故其色玄也天地以十一月冬至子之半陽氣萌於至陰之中一陽藏於坎水之內謂之潛龍以陰寒盛極於上不敢飛騰故就陽氣而伏蟄於深淵待陽氣出地與陰氣相薄發為雷電乃能乘之而飛越天表及至雨霽云收陽氣斂藏龍亦隨之而復歸江海矣豈能常飛不潛常現不隱時夭矯於天際乎不然陰盛於下陽極於上龍無所歸雖以昭昭之靈有爛死泥沙已耳能無患乎所謂亢龍有悔也若真陽之在人身也處兩腎之中所謂命門是也腎本冬臟六節藏象論云腎者主蟄封藏之本精之處也上古天真論云腎者主水聚五臟六腑之精而藏之夫腎者天一之水也精者陰之凝聚也精為陰氣之極故曰天癸癸者十干之終癸盡則甲出陰極陽生之處也以真陽生於至陰之中故陽氣藏於陰精之內廣成子云人身中真陽之氣藏於陰精之內精氣者真氣之母真氣者精氣之子常將母子相守故不死復歸其根是也是以命門藏於兩腎之中其象為坎命門者真陽也兩腎者真陰也其出也則為三焦之用名曰相火相火者龍火也其入也藏於兩腎之中謂之真陽真陽者潛龍也真陽雖處下焦而能熏蒸穀氣升發清陽直達皮膚而為衛氣衛氣者真陽之發越也所以溫肌肉固腠理司開闔而肺臟主之者也其出於腎而主於肺者何也水熱穴論云其本在腎其末在肺故也肺腎何以有本末之稱乎蓋腎者人身之地氣也肺者人身之天氣也真陽發越地氣之上升也呼吸流貫天氣之下降也六微旨大論曰升已而降降者為天降已而升升者為地天氣下降氣流於地地氣上升氣騰於天高下相召升降相因也故地氣升而為云天氣降而為雨所以陽氣勝而鬱蒸陰液泄而為汗故曰陽之汗以天地之雨名之汗泄出於皮毛肺臟主之肺以藏魄故曰魄汗汗者所以開腠理而泄寒邪散鬱熱者也若寒傷營分腠理鬱結發熱惡汗身疼無汗者宜發之然亦微汗而已若脈微弱而汗出惡風者不可發也脈微弱則真氣已虛汗出惡風則衛氣衰弱陽虛可知故少陰條下有脈微不可發汗之禁更誤服大青龍湯而犯虛虛之戒使衛氣喪失真陽敗亡遂致有厥逆瞤惕之變此時孤陽飛越於外陰寒獨盛於中使龍不歸淵頃刻有喪亡之禍故非真武不足以救之茯苓淡滲而下走導入水源也芍藥斂陰酸以收之也薑朮俱入足太陰所以建立中氣薑可以宣達陽氣術可以培土製水附子所以急救坎中之陽恢復命門真氣招集散亡之陽使陽氣仍歸下焦則天根溫暖龍方就之以居故能導龍歸窟龍本坎中之陽北方之位龍之所生龍之所潛乃其故處實其安宅也武之與龍雖有陰陽之分本為一體所謂龜蛇同氣也沈存中雲六氣方家以配六神而方唯五東方厥陰之氣其性仁其神化其色青其形長其蟲鱗唯龍之青者可以體之然未必有是物也其他取象皆類此如朱雀居南白虎居西玄武居北勾陳之虛位居中矣然則螣蛇何所居乎不知唯北方有二曰玄武太陽寒水之氣也螣蛇少陽相火之氣也在人為腎腎也有二左屬太陽膀胱寒水右屬少陽三焦相火火降而息水水騰而為雨露以滋五臟上下相交此坎離之交以為否泰者也故腎為壽命之本夫沈氏之以兩腎為左水右火者非難經高陽生之偽説也所以論兩尺脈為三焦膀胱之寄體也推其本體之坎象則左右皆腎而俱屬坤陰唯中爻則先天之乾陽也所謂乾坤交媾罷一點落黃庭乃生天生地生人物之根本也一陽陷於二陰之間是螣蛇居於玄武之中螣蛇本能興雲霧而飛遊蛇之能化龍者也故荀子謂其能無足而飛也以其潛伏而將出飛騰故謂之螣蛇至乘陽氣而飛騰乃為龍耳今人於真武像前設龜蛇之形不置之於左右而必以蛇加龜背者所以象夫坎之體也蛇者坎中一畫之陽爻也龜者上下二陰之四段也蓋先天真陽非坎不藏仲景深知消息故其立方用意所以溫養坎宮使真陽歸其魂而返其宅已盡坎離之用所以但有真武湯而無朱雀湯也歷代名家俱未詳其義方氏條辨又不揣其意謂真武專位乎北而為司水之神龍既不能外水以自神水又必由真武以神其主吾知其不能不降於真武矣喻氏復取其説亦云真武乃北方司水之神龍唯藉水可能變化設真武不與之以水青龍不能奮然升天可知是皆但知真武為水而不知水中有火但以真武為陰而不知陰中有陽如此而曰舍天人致一之理者不足以談醫何哉又引許旌陽斬蛟事謂蛟蜃之精從硯水中逸去水怪原有尺水丈波之能向非真武坐鎮北方天地間久為龍蛇之窟矣惜哉通儒少究玄理亦習此世俗之談何以尚論千古邪傷寒脈浮緩身不疼但重乍有輕時無少陰症者大青龍湯發之前條用大青龍湯以中風冠之皆見傷寒之脈症此條亦用大青龍又以傷寒冠之而見中風之脈症非有風寒輕重之分皆所以互相發明其義也浮緩中風脈也身不疼承上文發熱惡寒身疼痛而言也因承上文故不復言發熱惡寒也身不疼者寒邪輕也身不疼而但重唯身重則陰寒之見證也凡證屬陰寒則身重所以寒傷營者身重而邪入陰經者亦重故少陰有四肢沉重而疼痛也然乍有輕時則重為陰邪而屬傷寒輕為陽邪而屬中風矣故為風寒兩傷營衛之證也無少陰證言無上條脈微弱汗出惡風之脈症也前脈微弱而汗出即指少陰腎臟虛寒亡陽而言也此云少陰症亦即指脈微弱而言也有少陰證者不可用無少陰症者方可服皆所以反復申明其義也以衛氣乃真陽之發越真陽為衛氣之根源故陽虛者不可發汗誤汗則陽氣喪亡而厥逆瞤惕也所以少陰條下云脈微不可發汗亡陽故也辨誤前條冠之以中風而所見傷寒之脈症居多注家遂以寒多風少此條以傷寒二字為首而所見反中風之脈證居多注家又以為風多寒少不知仲景立法垂訓唯恐不明故前以中風立名則多見傷寒之脈證此以傷寒立名則多見中風之脈證以見風寒兩停皆前後轉換之法也前云脈微弱汗出惡風者不可服此云無少陰症者可用皆所以互相發明其義耳非有多少之別也觀前後皆以大青龍湯發微似汗以治之則曉然矣若果系熱多寒少之症則仲景必明言之如下文桂枝麻黃各半湯及桂枝二越婢一湯之二條可見矣太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯邪入太陽至八九日經盡而不解發熱惡寒往來如瘧狀此邪客營衛風寒並感也熱多寒少者風多於寒也因先中於風又為寒邪所襲而不得解也如瘧狀則疑邪入少陽矣若邪入少陽則必嘔而發熱其人不嘔則知邪氣未入少陽也太陽表邪雖亦有嘔證然無往來寒熱之似瘧故知仍在太陽也邪在太陽而不嘔邪氣之輕者也其小便清又知邪未入里邪氣輕而猶未入里故欲自可也一日二三度發者在衛之風邪勝入營之寒氣輕邪浮於表出入淺近易於往來也至真要大論云邪正之會遇有多少陽氣多而陰氣少則其發日近所以瘧論篇中但責重於衛氣也若邪入少陽之經則邪入者深一日不能發二三度或一日或間日作矣邪既浮淺脈又微緩微者非微細之微言較前略覺和緩也以脈緩故知邪氣將解而欲愈也何也寒邪未解之脈當浮緊或陰陽俱緊風邪未解之脈當浮緩今不浮不緊而漸覺和緩故為欲愈也若以此證而脈微惡寒者則又知其非欲愈之脈矣前以發熱惡寒一日二三度發故以脈之微覺其和緩而知其為欲愈此所謂微者乃輕微細小之微非微緩之微也脈微而但惡寒乃陰陽俱虛即大青龍湯條下之脈微弱汗出惡風之義也陰虛則津液不足陽虛則衛氣衰微故不可更發汗更下更吐自當以溫經補虛為急矣若如上文諸症脈雖微緩而面色反有發熱之赤色者是脈雖微緩其風寒猶在表而未欲解即並病條中所謂面色緣緣正赤者陽氣怫鬱在表當解之熏之之義也未解則風寒鬱於皮膚之間不得小汗出以散其邪則身必作癢故當以桂枝麻黃各半湯約其劑而兩解之也桂枝麻黃各半湯方桂枝一兩十六銖芍藥一兩生薑一兩切大棗四枚甘草一兩麻黃一兩去節杏仁二十個去皮研上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合此以風寒兩傷營衛故以桂枝麻黃之半合而為各半湯以並解之然邪雖浮淺恐芍藥之酸收斂營分之寒邪故止留其三分之一又欲其汗小已有桂枝可發微汗故麻黃杏仁亦止留其三分之一尚恐其太泄又以芍藥微斂之而能適中病情也且所煮不過一升八合所服六合而已為劑小而所服者少自無過發之弊恰可以解散其邪已耳無太過不及此所以為時中之劑歟太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可更汗宜桂枝二越婢一湯太陽中風發熱惡寒熱多寒少與前證相似但未詳言其如瘧不嘔等證耳前云脈微緩則為欲愈脈微而但惡寒已為陰陽俱虛而不可汗吐下矣此條承上文以明陰陽俱虛句而又獨申其陽虛之治也前云脈微緩為和平而欲愈此云脈微弱則細軟而無力矣故曰無陽無陽者命門真陽之氣衰少也真陽既衰其升發之衛氣浸弱故云不可更汗汗之則陽氣必敗矣即前青龍湯條內所謂脈微弱者不可服之一義也無陽既不可發汗風寒又非汗不解持其兩端不得已而約其制變其法為桂枝二越婢一湯以微解之越婢湯者以熱多寒少故用石膏多於麻黃也桂枝二越婢一湯方桂枝十八銖芍藥十八銖甘草十八銖生薑一兩三錢切大棗四枚麻黃十八銖石膏二十四銖研上七味㕮咀以水五升煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一此亦風寒兩傷營衛之劑也名曰桂枝二越婢一湯者煮成桂枝全湯而用其十分之二又煮越婢全湯而用其十分之一也今雖以兩方合為一劑而考其分兩如桂枝芍藥之各三兩止存其十八銖是三兩而存七錢半比之全湯亦止用其十之二也越婢之麻黃六兩止用十八銖亦七錢半也石膏八兩止用二十四銖乃一兩也較之全湯亦止用其十之一耳其甘草生薑大棗兩方皆同亦倣佛其分兩而已所以謂之桂枝二越婢一湯然越婢之名成氏以為能發越脾氣引外臺方名曰越脾湯謬也此為太陽治表之藥與脾臟何涉而有此名邪方氏謂越逾也婢女子之卑也女子陰也卑少也謂少陰之脈微弱為無陽難於發汗方用越婢者寓發於不發之中也喻氏亦取其説謂石膏之辛涼以兼解其寒其柔緩之性比之女婢猶為過之用之可無恐矣愚竊謂未必然也想仲景當時或以此治越人之婢而得效遂以名方亦未可知但亦不必深求況立名之義無大關係當存疑而置之弗論可也奚用強解乎服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯此所以別中風及風寒並感之疑似恐人誤用麻黃湯也上半截論但中風而無寒邪之證自形如瘧以下乃風寒均有之證也言太陽中風服桂枝湯其風邪在衛而浮淺當取微似汗則傷衛之風邪解矣使大汗出則犯如水流漓之戒而病不除矣脈洪大者浮而洪大中風鬱熱之所致非傳入陽明之大也若邪入陽明當見陽明證矣此所謂洪大所以別其無寒緊之脈也然中風之脈浮緩此何以洪大乎觀其服桂枝湯而不能解知其為風多而鬱熱之邪太重故脈變洪大也脈雖洪大而太陽中風之發熱汗出等證仍在當仍與桂枝湯如前法令出微似汗可也若往來寒熱形狀如瘧而一日再發則是風邪在表為寒氣所襲遂成風寒並感營衛兩傷之證即前條一日二三度發之義也亦以風寒所入者浮淺故一日得再發也如此則不但當用桂枝湯獨解衛分之邪並當用麻黃兼發營中之汗矣然一日再發當以在衛之風邪為主入營之寒氣次之故以桂枝二麻黃一湯治之桂枝二麻黃一湯方桂枝一兩十七銖芍藥一兩六銖麻黃十六銖杏仁十六個去皮尖甘草一兩二銖生薑一兩六銖大棗五枚擘上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再服同前如瘧之證而前用桂枝麻黃各半湯此用桂枝二麻黃一湯者蓋因前條八九日既如瘧狀乃風寒並感營衛之邪兩無輕重故以各半湯治之此因本是中風所以但服桂枝湯下節又兼感寒邪以致形狀如瘧為風多於寒之證故以桂枝二麻黃一湯治之然此所謂一二者又非前桂枝二越婢一湯之法矣前照二湯之全方而用其分兩之一二此則以桂枝湯兩倍合麻黃湯一倍準之也服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之頭項強痛中風傷寒均有之證也翕翕發熱是熱在皮毛中風證也無汗則又傷寒之本證矣就此諸證為風寒兼有無疑矣而但服桂枝湯是治風而未治寒也故仍頭項強痛翕翕發熱無汗而不解也又或誤下之所以有心下滿微痛之證乃下後邪氣陷入而欲結也小便不利太陽之熱邪內犯膀胱氣化不行也治之以桂枝湯去桂加茯苓白朮湯未詳其義恐是後人傳寫之誤未可知也即或用之恐亦未能必效也夫風寒並感以桂枝麻黃各半湯治之可也表症未除誤下之而心滿微痛則邪氣欲結未結梔子豉湯之類吐而越之可也邪犯膀胱五苓散導之可也計不出此而以桂枝湯去桂加茯苓白朮湯主之何也蓋桂枝湯之能解風邪皆賴桂枝之辛溫可以汗解其邪用芍藥者因營陰弱而汗自出故用之以斂陰收汗若傷寒無汗者必不可用今仍頭項強痛翕翕發熱無汗既不以麻黃桂枝並用若曰桂枝去芍藥則可若反去桂枝而留芍藥其如無汗何茯苓雖能滲利小便而白朮又除濕補中之物將置未解之表證於何地邪余故疑其未能取效也成注謂外證未罷無汗小便不利則心下滿微痛為停飲也與桂枝以解外加茯苓白朮以行留飲殊不知桂枝已去豈能解外加茯苓白朮即能使留飲行動耶王肯堂云或問頭項強痛邪氣仍在表也雖經汗下而未解何故去桂加茯苓白朮是無意於表證也曰此非桂枝證乃屬飲家也頭項強痛既經汗下而不解心下滿而微痛小便不利此為水飲內蓄邪不在表故去桂枝加茯苓白朮若得小便利水飲行腹滿減而熱自除則頭項強痛悉愈矣如十棗湯證頭亦痛乃邪熱內蓄而有伏飲故頭痛其水飲頭痛不須攻表但宜逐飲飲盡則病安矣王氏此論其或問一節頗合於理而後論悉遵成注以茯苓白朮為逐飲而設又旁引曲喻以十棗湯之頭痛證明其説豈理也哉如翕翕發熱無汗明是太陽表症雖心下滿而微痛又未痞硬引脅何見其必為停飲乎若果屬停飲十棗雖或未可遽用何半夏之辛溫滑利亦竟舍之而不用耶芍藥茯苓白朮果能利小便逐水飲而使諸表證悉愈耶仲景立法豈方不對證而能為後世訓乎余竊疑之大約是歷年久遠後人舛誤所致非仲景本來所繫原方近代名家悉遵成氏之訓俱強解以合其説謂用之而諸證悉愈吾不信也桂枝去桂加茯苓白朮湯方於桂枝湯方內去桂枝加茯苓白朮各三兩余依前法煎服小便利則愈傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯此條以傷寒名始而以桂枝湯終之亦風寒並有之證也不然桂枝湯為傷寒之禁劑何可用乎蓋以風寒並感故也上截先言傷寒熱邪歸里以起下截小便清一段以反復申明表裡之辨因上文是起下語在所當忽故承氣湯不言大小及調胃也六七日邪氣入里之候也傷寒六七日不大便是熱邪結於裡也頭痛有熱者邪熱在裡腸胃不通熱壅上焦而頭痛也其熱則或蒸蒸之熱或日晡潮熱非寒邪在裡之頭痛有熱也故當與承氣湯下之若不大便六七日頭痛有熱而小便清者則知邪不在裡其頭痛發熱之邪仍在表也若小便清而頭痛則里雖無熱而有中風之陽邪盛於上也如不解散其邪必至衄血而後已也故當用桂枝湯微似汗以解之傷寒發熱解半日許復煩脈浮數者可更發汗宜桂枝湯傷寒而用桂枝湯與上條同義言風寒並有之證但以麻黃湯發汗則營邪去而解矣解後半日許復煩者因在衛之風邪未解故也若按其脈但浮數而不緊者則知寒邪已去矣脈法云浮則為風數則為熱是中風之陽邪未去熱鬱而煩也可更發其微似汗則解矣宜桂枝湯傷寒二三日心中悸而煩者小建中湯主之心中心胸之間非必心臟之中也悸虛病也煩陽邪也傷寒二三日表證未解之時也大凡中風傷寒之心下悸者或誤汗亡陽或飲水過多及氣血皆虛脈見結代而然也此條既未誤汗飲水又不言表證但曰心中悸而煩者是寒邪已去中氣已虛僅存中風之陽邪將次入里而先煩也中氣虛餒則膻中呼吸之氣不得伸故築築然而悸動陽邪將陷故熱邪內犯而虛煩也若寒邪在營則不應用桂枝湯矣此因寒邪已去風邪仍在太陽故以桂枝湯為主以解衛分之邪加入膠飴倍芍藥以建立中氣也辨誤小建中湯即桂枝湯倍芍藥而加膠飴也各注家不辨桂枝湯為傷寒之禁劑漫因傷寒二字遂置之傷寒條下而謂邪氣欲傳未傳之時恐其內虛故建立中氣令邪不易入即入亦足以御之如此議論則此方僅足以暫阻邪氣而已豈仲景立方猶不足以療病歟余不得已移置太陽下篇以俟有識者訂之小建中湯方桂枝三兩芍藥六兩甘草二兩炙生薑三兩膠飴一升大棗十二枚擘上六味以水七升煮取三升去滓內膠飴更上微火消化溫服一升日三服嘔家不可用建中湯以甜故也建中者建立中焦之脾土也蓋土為五行之主脾為四臟之本即洪範建中立極之義也中氣虛餒脾弱不運胃氣不行致心中悸動故以建立中氣為急也謂之小建中者以風邪未解未可以參朮補中止加膠飴倍芍藥於桂枝全湯和衛解邪之中以稍裨中土故謂之小建中湯芍藥性雖酸收既無寒邪在所不計李時珍謂其益脾能於土中瀉木故倍用之飴糖為米糵之上品能和潤中州經所云脾欲緩急食甘以緩之是也中氣既和陽邪得解則心中之悸煩自止矣風寒火劫太陽傷寒者加溫針必驚也溫針即前燒針也太陽傷寒當以麻黃湯發汗乃為正治若以溫針取汗雖欲以熱攻寒而邪受火迫不得外泄而反內走必致火邪內犯陽神故震驚搖動也寒邪被火尚致驚惕況中風之陽邪被火乎傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之傷寒以發熱無汗言也脈但浮而不緊兼中風邪也火迫者或熏或尉或燒針皆是也劫者要挾逼脅之稱也言風寒兩傷營衛之症以火劫之而強逼其汗陽氣隨汗而泄致衛陽喪亡而真陽飛越矣前已云太陽傷寒者加溫針必驚此又以兼有陽邪之證以火劫迫之陽邪兼併於上真陽欲亡於下虛陽挾飲而上奔使神魂飛越君主孤危故必驚駭癲狂起臥不安也以桂枝去芍藥加蜀漆牡蠣龍骨方可救其變逆也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩甘草二兩牡蠣五兩熬龍骨四兩生薑三兩切大棗十二枚擘蜀漆一兩洗去腳上為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升中風當用桂枝湯者以風邪在衛也傷寒忌用桂枝湯以寒邪在營也此方用桂枝者所以解衛分之風邪也去芍藥者恐其斂營分之寒邪也傷寒不忌桂枝之溫散故麻黃湯中用之但忌芍藥之酸收故此方去之舊説謂心神浮越故驚狂起臥不安若論火邪迫劫自應心神散亂然蜀漆之加又不止於心神散亂矣考之本草蜀漆乃常山之苗味辛有毒與常山功用相同但有劫痰截瘧之功並無斂散收補之用且老人久病之所忌諒非補益之品仲景用之不過因痰隨氣逆飲逐火升故使人迷亂驚狂耳尚論引丹溪謂其能飛補神可賴以攸寧豈其然乎仲景雖未明言痰飲觀其蜀漆之用已曉然無疑矣況人身之津液皆隨氣以流行有形之痰飲猶水濕之就下水性無常激之可使過顙痰雖重濁隨氣可以逆行蓋氣即是火火即是氣當火劫亡陽之候下焦之虛陽失守厥逆上奔挾痰涎而驟升遂使陽神飛越痰氣迷漫而驚狂不安也故亦以蜀漆劫截之藥邀而奪之破其痰飲又以龍骨牡蠣之重所以鎮而攝之也李時珍云龍乃東方之神其骨與角齒皆主肝病許叔微云肝藏魂魂遊不定者以此治之牡蠣亦咸澀鎮重能平治肝邪此以神魂不定肝主驚駭故以此急救其火劫亡陽之逆變也前中風誤汗俱以補虛復陽為治而此症獨不用者前以亡陽則真陽喪失陰邪獨盛此則陽邪兼併陽氣獨厥所以不同也火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之以火劫變逆之證而又下之此一誤再誤矣又因燒針而致煩躁者蓋因外邪未盡而陽煩真陽欲亡而陰躁也雖經屢誤但見煩躁而不至驚狂則亦未若挾痰迷亂之甚故不須蜀漆止用去芍藥薑棗之桂枝湯以解其外龍骨牡蠣以鎮攝其內而已此經所謂大小輕重制方之法也前誤汗條中因發汗而又下之病仍不解而煩躁以茯苓四逆湯主之者以汗下兩亡其陽故用溫經復陽之治此雖汗下而未經誤汗且挾火邪而表猶未解故止宜解肌鎮墜之法也桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩龍骨二兩牡蠣二兩上為末以水五升煮取二升半去滓溫服八合日三服義見前條方論及注中心下水氣傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之此以下二條非風寒並感之證也因小青龍湯當附大青龍湯之後故亦入下篇傷寒表不解謂頭痛項強發熱體痛無汗之證未得汗解也心下心之下胃脘之分也水氣水飲之屬也寒邪在膈氣不流行故水飲停蓄也寒邪尚在表而未解何水飲即停蓄於心下乎痹論云衛氣循皮膚之中分肉之間熏於肓膜散於胸腹逆其氣則病以寒邪在營衛之間邪隨衛氣而入也乾嘔發熱太陽表證也喘咳水寒傷肺而氣逆也經云形寒飲冷則傷肺以肺主皮毛寒邪在表水氣停蓄故傷肺氣也或利者水寒傷胃而下流也或噎者水氣寒邪窒礙胃中氣不通行也或渴或小便不利者水寒固閉於中焦則下焦之陽氣不得上騰而為津液故渴上焦之清氣不得下降而為滲利其升降之氣化不行故小便不利而少腹滿也或者或有或無非必諸證皆見也前以風寒鬱熱之邪不得外泄而煩躁故以大青龍湯汗泄涼解之此條以寒邪未解水飲停蓄肺臟傷而喘咳並見中氣寒而氣滯不行宜溫宜散可發可收故以小青龍湯主之小青龍湯方麻黃三兩去節芍藥三兩五味子半升乾薑三兩桂枝三兩半夏半升湯洗甘草三兩炙細辛三兩上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升小青龍即大青龍之變制也謂之小者控制而小用之也蓋龍蟠蠖屈非若升騰飛越之勢之大也夫前以天地鬱蒸非風狂雨驟雷雨滿盈不足以散鬱蒸之熱氣此則水滯寒凝非雨潤云蒸水泉流動豈能解沍結之寒邪是以大青龍為辛涼發汗之劑故用麻黃全湯兼桂枝之半又倍增麻黃而加石膏也小青龍乃辛溫發散斂逆之藥故用桂枝全湯去薑棗而兼麻黃之半又加乾薑細辛者一以助麻黃桂枝之辛溫發散李時珍謂使寒邪水氣從毛孔中散一取其暖中去寒溫肺泄肺之功也更加芍藥五味者所以收肺氣之逆皆控御節制之法也蓋細辛乾薑之用以腎與膀胱相為表裡素問病機云諸寒收引皆屬於腎故藏氣發時論云腎苦燥急食辛以潤之開腠理致津液通氣也張元素云細辛味辛而熱溫少陰之經能散水氣去內寒李時珍謂辛能泄肺故風寒咳嗽上氣者宜之五味芍藥所以收肺氣之逆也李東垣曰酸以收逆氣肺寒氣逆宜與乾薑同用有痰者以半夏為佐皆本諸此也愚竊謂肺寒而氣逆者可以酸收若肺熱而氣滿者未可概用也觀仲景制方以大青龍之興雲致雨而脈微弱汗出惡風者猶禁止之曰不可用若誤用之尚有厥逆惕瞤之變至於小青龍則其制方之義周旋規矩不離方寸後人豈可亦以小青龍養成頭角翻江攪海為喻乎皆一時縱筆任意為快口之談耳恐未足為定訓也加減法若微利者去麻黃加芫花如雞子大熬令赤色既見微利則知水氣下走當因其勢而導使下泄去麻黃者恐內外兩亡津液也此説亦通然表寒重而全未解者尚當斟酌若竟去麻黃而留芍藥五味之酸收其如傷寒表不解何渴者去半夏加栝蔞根三兩夫渴雖一證而各經不同如太陽邪熱入里則五苓散之渴也陽明邪熱入胃白虎湯之渴也少陽則或渴或不渴皆以小柴胡湯主之若服柴胡湯已而渴者即屬陽明矣三陰本不應渴而少陰有引水自救之渴及厥陰之消渴皆非真渴也少陰更有咳而嘔渴之證亦不過以豬苓湯導水而已此條或渴之證乃水寒在胃下焦之氣液不得上騰而為涕唾故渴心下既有水氣豈可亦以栝蔞根為生津而用之邪若未以為然觀下文服湯已而渴為寒去欲解則知不必以撤熱生津為治矣若必用撤熱胡不去乾薑之辛熱邪況半夏本辛滑之品諸傢俱以其燥津液而去之何也李時珍本草列之滑劑中云引痰涎自小便去者則半夏茯苓之屬又云半夏南星皆辛而涎滑皆泄濕氣通大便蓋辛能潤能走氣能化液也或以為燥物謬矣濕去則土燥非二物性燥也以此推之必非仲景所加非王叔和即成無己輩倣佛小柴胡湯之加減而增入也以致朱奉議陶節庵輩凡遇渴證必去半夏而加栝蔞根曾不稍揆時義察其陰陽寒熱而率意妄為加減每效前人之非而不覺謂之一代名家是耶非耶若噎者去麻黃加附子一枚噎者心下有水氣而胃氣不通也所謂水寒相搏其人必䭇噎與䭇同蓋厄逆也夫厄逆有火厄實厄冷厄之不同此水寒相搏故加附子以溫散之若寒甚而陽氣虛者去麻黃而不使汗泄其虛陽亦可若小便不利少腹滿去麻黃加茯苓四兩小便不利而少腹滿為下焦無火不能氣化而出也真陽不足去麻黃而不使汗泄則可矣茯苓不過味淡滲泄而已豈能助下焦氣化之功哉若喘者去麻黃加杏仁半升去皮尖喘為肺氣逆滿之證加杏仁以助麻黃利肺氣可也若加杏仁而去麻黃施之於表不解之傷寒恐未切當若肺虛而喘則又宜補不宜瀉非惟麻黃當去並杏仁亦不可加矣傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之傷寒心下有水氣咳而微喘與上文同義發熱不渴者因心下有水氣故雖發熱亦不渴也服湯謂服小青龍湯也服湯已而渴則知心下之水氣已消胃中之寒濕已去但以發熱之後溫解之餘上焦之津液尚少所以反渴也前以有水氣故發熱不渴今服湯已而渴故知寒水去而欲解也辨誤小青龍湯主之句當在發熱不渴句下今作末句者是補出前所服之湯非謂寒去欲解之後更當以小青龍湯主之也注家謂寒去欲解仍以小青龍湯主之言以輕劑助其欲解之勢耳愚謂寒邪既去而欲解豈可再用麻黃桂枝發汗以耗其津液乾薑細辛之辛熱增其燥渴邪況麻黃桂枝幹薑各三兩五味子半升豈輕劑邪此與前發煩目瞑衄乃解之後及不發汗因致衄者皆以麻黃湯主之之義相同豈衄血之後更可用麻黃髮其汗邪因不先以麻黃湯發汗因致衄耳故下文曰當以麻黃湯主之蓋與此條同一補出之法也證象陽旦傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而譫語師言夜半手足當溫兩腳當伸後如師言何以如此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病症象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈兩條本是一義後段設為問答者即為上文作注腳也證象陽旦言症似桂枝也即形作傷寒病如桂枝之類乃風寒並感也證象陽旦者謂傷寒而脈浮自汗出小便數心煩皆似中風之脈證也倘按法治之當以桂枝湯汗解之乃為合法不知更有微惡寒腳攣急之證乃真陽虛弱寒在下焦也兼證如此則又不可以桂枝湯汗解而愈虛其陽氣矣若反與桂枝湯欲攻其表而使漐漐汗出此誤也故才得桂枝湯之汗解而虛陽敗泄即便四肢厥冷矣何也以四肢為諸陽之本故也太陰之脈布胃中絡於嗌少陰之脈循喉嚨挾舌本厥陰之脈上貫膈循喉嚨以虛陽而為盛陰所迫虛火上奔故咽中干也陽邪在上故鬱而為煩陰邪在下故發而為躁陰氣盛而上逆故吐逆也蓋以下半純是陰寒故兩脛拘急上截陽邪在胃所以譫語故曰按法治之而增劇也然何以知之因寸口脈浮而大故也浮則為風固人皆知之矣而不知大則為虛也脈大則當雲實何以反謂之虛乎蓋大而有力者為實若大而浮者是輕取之而有餘重按之則不足所謂大而無力者為裡虛也故曰大則為虛蓋言其脈雖大而浮也然中風之脈雖浮而未必大亦未必寸口獨大此但言寸口脈浮大而不及關尺者蓋寸主上焦惟寸口浮大為上盛下虛之象乃虛陽上泛之脈也浮為風邪在表故當生微熱寸口浮大則虛寒在下故兩脛拘攣此證雖屬傷寒而所見之病症象桂枝湯證故仍於桂枝湯中加附子參於其間則真陽有助不患其汗泄故又增桂令汗出以解衛分之陽邪也其所以加附子溫經者以下焦無陽故也此法即上篇誤汗亡陽桂枝加附子湯乃為傷寒脈浮自汗出小便數心煩微惡寒腳拘攣之正治也若不察其微惡寒腳拘攣之亡陽虛證已經反與桂枝湯誤攻其表使陽氣愈虛陰邪上逆以致厥逆咽中干煩躁又兼陽邪內陷致陽明內結譫語煩亂者且勿治其譫語以虛陽恐其易脫胃實可以暫緩故更當飲甘草乾薑湯以平其上逆之陰邪復其虛竭之陽氣至夜半陽氣還兩足當熱然足雖熱而兩脛尚微覺拘急者重與芍藥甘草湯以和陰養血舒其筋而緩其拘急脛乃得伸矣此時陰邪已退陽氣已復其胃氣不和猶譫語煩亂者然後少與調胃承氣湯令大便微溏則胃中熱邪下泄方能止其譫語而病可愈也若重發其汗復加燒針強逼其汗則亡陽殆甚幾於敗絶矣故當以四逆湯主之辨誤陽旦成注謂是桂枝湯之別名余閲原文中其發問之端則曰證象陽旦下文答語中則云病證象桂枝是仲景明明説出則成氏之説未為無據而喻氏非之云仲景之圓機活法妙在陰旦陽旦二湯以桂枝而有別名是必一百一十三方方方皆有別名然後可此亦膠固不通之論也如炙甘草湯亦可名復脈湯乃偶然耳豈有意為之而皆有別名邪觀其陽旦陰旦之説並未有所引據而云桂枝加桂曰陰旦湯桂枝加黃芩為陽旦湯謂陽旦者天日晴暖及春夏溫熱之稱陰旦者風雨晦冥及秋冬涼寒之稱遇時令溫熱則加黃芩名曰陽旦遇時令涼寒則加桂名曰陰旦豈時令溫熱之時更無陰寒之症時令寒涼之候必無溫熱之病邪若是則四逆理中必用之於秋冬白虎青龍必施之於春夏矣其何以謂之圓機活法乎且云病人得之便厥明明誤在黃芩助其陰寒若單服桂枝湯何以至是由此觀之是全不知黃芩之寒涼與陽虛之汗泄其害為孰大矣夫黃芩寒涼之小者也倘誤服之不過損其胃中之熱氣耳豈能令四肢便厥若夫陽虛之證而汗泄之則不唯更損其衛且敗泄其真陽矣焉得不至於得之便厥邪蓋以衛氣為真陽之所發真陽為衛氣之本根故也所以厥逆瞤惕及四肢微急難以屈伸之類皆誤汗亡陽所致二者相較為何如哉又云觀增桂令汗出一語豈不昭昭邪揣其微意不過因增桂令汗出一語遂以桂枝湯加桂為陰旦湯愚以為增桂令汗出是增桂枝而非肉桂也李東垣謂桂性辛熱陽中之陽也氣之薄者桂枝也氣之厚者桂肉也經云氣薄則發泄故桂枝上行而發表氣厚則發熱桂肉下行而補腎此所謂增桂令汗出者非桂枝邪若曰加桂為陰旦湯則上篇燒針令汗之桂枝加桂湯亦可稱陰旦湯矣今學者何以別乎陽旦一湯金匱要略云産後風續之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在耳可與陽旦湯注云即桂枝湯並無加黃芩之説亦無陰旦湯據活人書一百一十三方之外更有李根湯霹靂散葳蕤湯等雜方內有陽旦陰旦二湯其陽旦湯云治中風脈浮發熱汗出惡風頭項強痛鼻鳴乾嘔則仍是仲景桂枝湯脈證而以桂枝湯加黃芩為陽旦湯治之則黃芩之加出自朱奉議也明矣而謂仲景圓機活法妙在陰旦陽旦二湯然乎否乎至於陰旦湯則於桂枝湯中非唯不加桂而加乾薑黃芩一寒一熱之藥亦是後人雜亂之方恐亦未足深信尚當考訂云甘草乾薑湯方甘草四兩炙乾薑二兩炮上㕮咀以水三升煮取一升五合去滓分溫服甘草味甘性緩而和中用之以平其上逆之陰氣乾薑味辛性熱而守中以回其衰弱之虛陽為前附子溫經之助故能令其陽氣還兩足熱也芍藥甘草湯方芍藥四兩甘草四兩炙上二味㕮咀以水三升煮取一升半去滓分溫再服藏氣法時論云肝主春足厥陰少陽主治肝欲散急食辛以散之以酸瀉之芍藥味酸而益陰又云肝苦急急食甘以緩之甘草味甘而性緩所以用此方者蓋因脛尚微拘急耳拘急者筋不得舒也筋者足厥陰肝之合也筋不舒而攣急故以酸瀉之以甘緩之是以厥陰少陽主治治之也然兩足攣急乃下焦無陽之證雖用酸瀉甘緩曷足以伸兩脛之拘急因前增桂汗出附子溫經之後更飲甘草乾薑湯陽氣既還兩足已熱乘此溫熱已效之後續用此以但舒其筋所以脛乃得伸也調胃承氣湯方大黃四兩酒浸既云調胃當是二兩即今之五錢外甘草二兩當是一兩芒硝半斤大承氣止用三合既云調胃豈反過之當亦是二兩上三味㕮咀以水三升煮取一升去滓內芒硝更上火微煮令沸少少溫服調胃者調和胃氣也胃有實邪而譫語煩亂故以大黃芒硝之鹹苦泄之又恐其性力之峻更以甘草之甘緩和之所煮不過一升而又少少服之使胃氣和平而已若大邪大熱仲景以大承氣湯攻之其亡津液胃中乾燥大便難者乃無大熱邪之脾約也仲景即以小承氣湯和之不令大泄下及麻仁丸潤之而已此以證象陽旦之傷寒實陽虛陰盛之症而兼有陽明內結之實邪故譫語煩亂雖用桂枝加桂參附子以溫經更服甘草乾薑湯以和陰助陽夜半陽氣已還兩足已熱又以芍藥甘草湯伸其兩脛之拘急矣而陽明所留之內結譫語猶未除也乃胃中之實邪未去耳因虛陽初復未可峻下故少用調胃承氣湯令大便微溏以和其胃而譫語自止也然不特此也凡論中之胃實而無大熱邪者皆同其治也四逆湯方甘草二兩炙乾薑一兩半附子一枚生用破八片去皮上三味㕮咀以水三升煮取一升二合去滓分溫再服四逆湯者所以治四肢厥逆而名之也素問陽明脈解云四肢者諸陽之本也陽盛則四肢實即陰陽應象論之清陽實四肢也靈樞終始篇云陽受氣於四末陰受氣於五臟蓋以谷入於胃氣之清者為營行於脈中濁者降於下焦為命門真陽之所蒸騰其氣直達皮膚而為衛氣先充滿於四末然後還而溫肌肉密腠理行於陰陽各二十五度故四肢為諸陽之本此以真陽虛衰陰邪肆逆陽氣不充於四肢陰陽不相順接故手足厥冷而為厥逆咽中干也若重發其汗更加燒針取汗則孤陽將絶矣仲景急以溫經復陽為治故立四逆湯其以甘草為君者以甘草甘和而性緩可緩陰氣之上逆乾薑溫中可以救胃陽而溫脾土即所謂四肢皆稟氣於胃而不得至經必因於脾乃得稟焉此所以脾主四肢也附子辛熱直走下焦大補命門之真陽故能治下焦逆上之寒邪助清陽之升發而騰達於四肢則陽回氣暖而四肢無厥逆之患矣是以名之曰四逆湯也邪傳陽明白虎湯陽明胃熱之藥也本應在陽明篇中因太陽證罷即可傳入陽明故當在太陽三篇之末且白虎為溫暑主治之要藥亦當在治溫之青龍湯後所以編入太陽下篇下文即附溫病風溫及痓濕暍諸證於後為承上啓下之次序云傷寒脈浮滑此表有熱里有寒白虎湯主之前風寒並感雖鬱熱之甚而致於煩躁者其邪猶在太陽之表故以麻黃石膏製為大青龍湯以汗泄涼解之其輕者則以桂枝越婢及麻黃桂枝各半湯解散之而已自此以下皆用白虎湯主之者所以辨脈浮而邪在太陽者不可與白虎湯若邪熱已傳陽明而入里更察其無表證者即當以白虎湯之辛涼清其胃熱而潤其津液也但此條脈浮則風邪在裡不應即用白虎湯脈滑則實熱在裡又不應云里有寒矣而以白虎湯主之其義未詳恐有舛誤脫落未可知也今以白虎湯主之之義論之則下文所云傷寒脈浮發熱無汗表不解者不可與白虎湯是白虎湯為表邪未解之所忌用若云傷寒表有熱固非所宜而曰里有寒尤所當忌而仲景反以白虎湯主之何也以意推之恐是先受之寒邪已經入里鬱而為熱本屬寒因故曰里有寒邪既入里已入陽明發而為蒸蒸之熱其熱自內達外故曰表有熱合而言之實表裡皆熱若胃實而痛者為有形之邪當以承氣湯下之此但外邪入里為無形之熱邪故用寒涼清肅之白虎湯以解陽明胃腑之熱邪也然此條疑義因原文詞不達義理幻難知證治相反雖強解之終未知其然否也白虎湯方石膏一斤研細知母六兩甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服白者西方之正色虎者西方秋金之陰獸也故為西方兌金之神乃天地清肅之收氣也然非必有是物也以其為西方清肅寒涼之氣故以為喻也夫陽氣發泄之極至盛夏而酷暑炎蒸其熱淫之氣靡所止極故有秋氣以收之而金風薦爽炎暑方收白帝司權天地以肅人身之邪氣鬱蒸於肌表而不得發泄者以桂枝麻黃湯汗解之至於風寒鬱熱之甚煩躁不得汗泄者以大青龍湯涼解之至邪氣在裡而胃熱鬱蒸者方以白虎湯清解之也然非但為此而設也仲景實為夏至以後之暑病立一大柱也後人不知皆謂仲景但立麻黃桂枝以治風寒而遺溫暑之治致後人即以麻黃桂枝混治溫暑遺害無窮又輒嘆為不全之書何哉皆由不悟仲景立法之旨不曉麻黃為傷寒之大柱桂枝為中風之主劑青龍為溫病之提綱白虎乃暑病之主方而每恨以為殘缺不全者皆不知變通之故也豈知就此四柱而神明變化進退出入之則風寒溫暑之症無遺蘊矣石膏辛寒辛為金之味寒乃金之性也寒涼清肅故以為君知母辛苦性寒入足陽明手太陰瀉腎火而滋化源故以為佐甘草者緩其性也粳米者和中保胃氣也謂之白虎者猶虛嘯風生寒威凜冽使熱邪冰釋也傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之此所以申明太陽陽明表裡之辨而核其治法也脈浮風邪在表也發熱無汗寒邪亦在表也以風寒皆在表而不解則邪熱猶在太陽未入於裡當以解表為急猶未可以寒涼為治故曰不可與白虎湯恐其既不能解表而邪又未入於裡徒傷胃氣故也若渴欲飲水則知邪熱已入陽明之裡胃中之津液枯燥矣然猶必審其無表證者方以白虎湯解其煩熱又加人參以救其津液也然白虎一方但能除胃熱而不能治胃實倘舌苔黃黑燥裂脈實大而胃脘繞臍硬痛者仍當以承氣攻之也白虎加人參湯方於白虎湯方內加人參三兩余依白虎湯方法服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之此言太陽既罷而入陽明也前服桂枝湯法中本云令漐漐微似汗則邪氣解矣若使如水流漓則病必不除此因大汗出後遂至胃中津液耗竭陽邪乘虛入里至大煩渴而不解上篇之大汗出脈浮而微熱消渴者及中篇之發汗後脈浮數煩渴之證皆以誤汗亡陽下焦無火膀胱之氣化不行失其蒸騰之用故氣液不得上升而渴也然脈浮則其邪仍在太陽故以五苓散主之今大煩渴而脈見洪大則邪不在太陽而已傳入陽明矣即陽明篇所謂陽明脈大者是也故以白虎湯解胃中之煩熱加人參以補其大汗之虛救其津液之枯竭也辨誤條辨謂汗出過多亡津液而表裡燥熱更甚所以用白虎湯解表裡之熱尚論即仍其舊亦謂大汗津液外亡大煩渴則燥熱內極脈轉洪大既不曰邪傳陽明當用白虎以解胃熱而曰凶變將起計唯白虎湯可以兩解表裡之熱不思若至大煩渴不解脈已洪大是邪入陽明之裡胃中熱燥已極豈尚有表熱可解若表尚發熱則表症仍在又不宜白虎湯矣豈反忘上文表不解者不可與白虎湯邪況其上文注中已云白虎湯但能解熱不能解表必表證皆除但熱渴而求救於水者方可與之而此注又曰兩解表裡之熱一人之注前後不符皆因成氏有和表散熱之謬解所以後人皆蹈其轍迹耳傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之此所以嚴陰陽寒熱之辨也言傷寒本發熱無汗而曰無大熱者言邪不在表也口燥渴而心煩者邪已入里陽明病也成氏謂背為陽背惡寒口中和者少陰病也當與附子湯今口燥而渴背雖惡寒此里也惡寒亦不至甚故曰微惡寒與白虎湯此説最為中窾可見口中和之背惡寒與口燥渴之背惡寒其表裡陰陽迥別而附子湯與白虎湯之治亦天淵殊絶矣方氏以背為人身至陰之地不勝寒而有餘惡誤矣尚論尤而效之何也此言大約以老子所謂萬物負陰而抱陽故有是説不知老氏所謂負陰抱陽者言萬物肖天地之氣以為形一陽生於至陰之中如卵生者殼與黃白皆陰也黃中所含之精微則陽也胎生者則以胞胎為陰而胞中之子則陽也以草木言之則以甲拆為陰而以萌糵為陽也所抱之陽在內則所負之陰在外萬物皆陰中含陽以為生非獨以背為陰也易卦以背為艮止之象者以身為動物惟背則止耳此又以動靜為陰陽也若以人身之經脈言之則督脈為純陽而太陽之經脈挾督脈而行於兩旁任脈為至陰而太陰經之脈穴挾任脈而行於兩旁此腹背之陰陽也豈可以背為至陰之地乎若必以背為至陰之地則素問金匱真言論所云人身之陰陽則背為陽腹為陰豈經文反為謬語乎然此條之背惡寒口燥渴而心煩者乃內熱生外寒也非口中和之背惡寒可比擬而論也故以白虎加人參湯主之傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之傷寒但言吐下而不言發汗明是失於解表故七八日不解又因吐下之誤邪氣乘虛陷入故熱邪內結於裡表裡俱熱時時惡風似邪未盡入當以表裡兩解為是若大渴舌上乾燥而煩欲飲水數升則裡熱甚於表熱矣謂之表熱者乃熱邪已結於裡非尚有表邪也因裡熱太甚其氣騰達於外故表間亦熱即陽明篇所謂蒸蒸發熱自內達外之熱也時時惡風者言時常惡風也若邪氣在表只稱惡風而不曰時時矣謂之時者即上篇第七條所謂時發熱之時也熱既在裡而猶時時惡風即所謂熱則生風及內熱生外寒之義故不必解表而以白虎湯急解胃熱更加人參者所以收其津液而補其吐下之虛也
