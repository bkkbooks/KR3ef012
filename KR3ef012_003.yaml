body:
  text: 卷之三結胸心下痞臟結附結胸心下痞發源總論舊注咸謂風傷衛而陽邪陷入為結胸寒傷營而陰邪陷入為痞此誠千古之誤詳究論中中風亦有成心下痞者傷寒亦有成結胸者更有中風傷寒並見而祗作心下痞者有但傷寒而心下滿硬痛者為結胸但滿而不痛者為痞參互交錯未便分屬兩篇故另編一卷位置於上中二卷之後以見風寒均有此二證之意病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也此條義理最奧含蓄最深千古以來英賢輩出從無得其旨者余洗心滌慮沉默涵泳凡五易稿而後得其緒端故識之以告諸同志云此論結胸與痞之所由作乃痞結之綱領也發於陽者邪在陽經之謂也發於陰者邪在陰經之謂也反下之者不當下而下也兩反下之其義迥別一則以表邪未解而曰反下一則以始終不可下而曰反下也因者因誤下之虛也結胸則言熱入者以發熱惡寒表邪未解誤下則熱邪乘虛陷入而為結胸以熱邪實於裡故以大小陷胸攻之痞不言熱入者蓋不必言亦難言之也其不必言者何陰病本屬無陽一誤下之則陽氣愈虛陰邪愈盛客氣上逆即因之而為痞硬如甘草半夏生薑三瀉心湯證是也此等非唯無熱而言亦並無所入故不必言也其難言者何諸痞之中有有表證而發熱惡寒者如解表用桂枝湯攻裡宜大黃黃連瀉心湯及大柴胡湯者是也以雜在諸虛痞之中難於並言故亦不言也其兩不言者何以在此段綱領之中不能具言至後節條目中方悉言之也末句但言下早為結胸之故而不及痞者以邪在陽經而未解邪猶在表若早下之則裡虛而邪熱陷入致成結胸若表邪已解而下之自無變逆之患故以下早為嫌至於邪入陰經之證本無可下之理陰經雖有急下之條亦皆由熱邪傳裡非陰經本病也除此以外其可反下之乎以無可下之理故不以遲早為言即使痞症之有表證而發熱惡寒者如大柴胡湯一證亦以傷寒發熱汗出不解表裡皆實故用攻解兼施之法亦非由下早之故也唯大黃黃連瀉心湯一條為先下後汗而致心下痞者也然其表症猶在故先以桂枝解表而後以大黃黃連攻痞觀先用桂枝則知邪在太陽攻之而用大黃黃連則知熱入矣其治與結胸之用大陷胸彼此相為倣佛也唯此一條為熱入之痞其他瀉心各有區別未可概以熱入論之所以痞結雖皆曰反下而作結胸因熱入故獨申之以下早痞則非盡熱入故不可言下早也然此章義理糾棼證治盤錯未易明顯請更申之夫邪在陽經其表邪未解而反下之則正氣內虛熱邪因之而內陷必硬結於胸中是謂病發於陽言陽邪從陽經陷入於陽分其所發之病名曰結胸胸者中焦之上也位高而屬陽以諸陽皆受氣於胸中故膻中為氣之海上通於肺而為呼吸陽邪陷入必傷陽位故結於胸中也邪入陰經由傳變而入者或本經自感者若誤下之雖無熱邪陷入而胃中陽氣已傷陰邪內盛必因誤下之陽虛而陰邪痞塞於心下是謂病發於陰言邪入陰分所發之病名之曰痞痞者陰氣痞塞而不通也心下者腹之上心之下中焦之所屬胃脘之部分也較之於胸則位稍卑而為陰矣其但言因作痞而不言熱入者陰痞之證因誤下之後陽氣一虛陰邪自盛不必外入之邪而後成也陽邪必由陷入陰邪則不必也如日麗長空則陽和溫暖至金烏西墜則遍界陰寒自然之理何必外來故痞氣乃陰邪內結於中猶雲霧障空天地之氣不相交通而成痞非若熱邪之陷入也下文甘草瀉心湯條內云此非結熱但以胃中虛客氣上逆故使硬也客氣者陰邪也謂之上逆其非外入也明矣又何疑焉此為結為痞之攸分也半夏瀉心湯條內云若心下滿而硬痛者此為結胸也但滿而不痛者此為痞此尤仲景論中彰明較著之分也其分條論治則於結胸之證有大陷胸湯之結胸有大陷胸丸之結胸有小陷胸湯之結胸所以皆用攻下者以客邪陷入所謂熱入因作結胸也唯支結不攻者以外症未去故但以柴胡桂枝湯解之也至於心下痞之證義各不同未可以一端論也如十棗湯之痞乃陽邪傷胃津液不行致水飲停蓄此實而可攻者也有生薑瀉心湯之痞乃中氣不和胃寒不化脾弱不能為胃行其津液以致乾噫食臭脅下水氣留蓄此陽虛陰盛之痞故可溫補宣通以開之者也有甘草瀉心湯之痞乃下後陽虛胃寒不化下利清穀腹中雷鳴心下痞硬乾嘔心煩又復下之胃陽大虛陰邪上逆之痞此但可瀉其虛氣而不可攻者也有大黃黃連瀉心湯之痞此因先下後汗倒行逆施致熱邪已入表證未除乃先解後攻實熱之痞也有半夏瀉心湯之痞但滿而不痛乃氣痞耳不可攻者也有附子瀉心湯之痞因緊反入里故亦用大黃黃連又見惡寒汗出知其真陽大虛衛氣不固又加附子以回陽固衛者也有大柴胡湯之痞乃傷寒發熱汗出不解邪轉入里至嘔吐下利此表裡皆實宜解宜攻故用兩解之法也有旋覆代赭石湯之痞此汗吐下後邪雖已解胃陽已傷虛寒不運痰飲留蓄氣上走而為噫宜溫補宣通鎮墜而不可攻者也有赤石脂禹餘糧湯之痞此傷寒誤下而利不止致成痞硬服瀉心湯而又下之遂至利更不止病在下焦理中之所不能治故宜固下焦而澀其滑也痞證如此之條緒繁多虛實不一豈可以一言蔽之乎故曰仲景之不言蓋難言之也然各經初證大約由營衛而入營衛雖屬太陽至於成結成痞非必皆在太陽矣故結胸則必以太陽病三字冠之其所以然者蓋以結胸乃表邪未解邪在太陽因誤下而表邪陷入故也至心下痞諸條則止冠之以傷寒二字者何也寒邪雖必由表而入至成痞之證各經皆有故不可獨稱太陽也然非但痞結條下為然也仲景之於風傷衛諸證無不以太陽病稱之以寒傷營諸證唯一二有表證者以太陽病稱之因太陽主表故也至誤治失治傳變諸證則皆去之者以寒邪既不在表於各經無所不入入陽則為三陽里證入陰則為三陰里證其有各經自受者亦概以傷寒稱之或竟直取其病狀言之而已蓋因邪既入里或風或寒俱不得以太陽二字加之矣其所以不可加者以邪過營衛則入里之歧路紛爭雖同入而異變矣其或入於陽或入於陰皆隨其虛處而中之耳初無定分也後人未析其義遂以為風邪入里則為結胸寒邪入里則為痞證豈知仲景本意不論中風傷寒之邪在陽經者而表邪未解誤下陷入故有下早之誡所以有熱入之結胸並有熱入之痞實熱之痞結皆以客邪陷入故有攻無補所以有大陷胸之湯丸十棗湯之逐飲大黃黃連之瀉心及大柴胡之兩解也無論中風傷寒之邪在陰經者而誤下之其邪本不在表不須外入但因誤下之後胃氣虛損陰邪痞塞即可成痞所以但有反下之戒而無下早之文邪在三陰始終禁下故不以遲早為言故有甘草瀉心半夏瀉心生薑瀉心等溫散開補之法然何以陽邪必從外入陰邪不須外陷乎蓋以三陽在軀殼之三層三陰已在軀殼之裡矣所以仲景但以發於陽發於陰論之一云反下而言熱入一云反下而不言熱入一則云下之太早一則絶不言下早議論無多苞舉深廣雖未顯言意在言表曾未嘗以風寒營衛定痞結也故方氏注云發於陽而下之早者未嘗無痞發於陰而下之早者亦有結胸疾病之機每多不期之變愚謂兩早字雖不應並下於痞結則頗有圓機余細閲論中有心下因硬則為結胸又云若心下滿而硬痛者此為結胸是結胸亦可稱心下也有以傷寒中風並冠於首而曰心下痞者有獨稱太陽中風而曰心下痞硬滿引脅下痛者是陽邪亦能作心下痞也又傷寒六七日結胸熱實脈沉緊心下痛按之石硬者是陰邪亦能作結胸者也又太陽中風下利嘔逆其人漐漐汗出發作有時頭痛心下痞硬又太陽病醫發汗遂發熱惡寒因復下之心下痞此發於陽而亦作心下痞者也更有太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬又如厥陰篇中雲病人手足厥冷脈乍緊者邪結在胸中此二條雖有陰陽之分與結胸稍異此亦發於陰而作結胸者也由此觀之其陰陽互見痞結交作參伍錯綜縱橫變化如此則豈風寒營衛之說可擬發於陽發於陰之義乎尚論未悟其理妄取條辨之說以風為陽邪病發於中風陽邪未從外解而反下之熱勢乘虛陷入必硬結於胸上寒為陰邪病發於傷寒陰邪未從外解而反下之其熱勢乘虛陷入必痞塞於心間若作此解則熱入與不言熱入之義安在哉昔張兼善證成氏之誤曰既以無熱惡寒為發於陰焉有可下之理斯言之謬亦已甚矣不思仲景原因不可下而曰反下兼善豈反忘之耶又曰仲景所謂陰陽者指表裡而言也病在表當汗而反下之因作結胸病在裡尚未入腑而輒下之因作痞此論尤為乖謬病已在裡即攻下之已不為逆且病既入里而云尚未入腑豈所謂腑者又在裡之裡乎又以風邪入里為結胸寒邪入里為痞然則太陽中風下利嘔逆其人漐漐汗出而至於心下痞硬者非風邪入里之痞乎傷寒六七日結胸熱實心下痛按之石硬者非寒邪入里之結胸乎及傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿者非或風或寒而偏作心下痞者乎又傷寒五六日嘔而發熱柴胡證具而以他藥下之必蒸蒸而振心下滿而硬痛者為結胸但滿而不痛者為痞此又非寒邪入里而能結能痞者乎更以此較之則兼善之說果合仲景發於陽發於陰之義乎因思方喻兩家之說得非兼善為之前導乎是以不言熱入之故仲景確有深意如成氏以發於陰而反下之謂表中陰邪入里結於心下為痞豈知陽氣既虛陰邪自足成痞況尚有惡寒發熱表裡皆實之痞具在則此注已屬荒唐而方氏又謂不言熱入欲人同推也喻氏復不察仲景之意不辨方氏之訛遂誤信同推之說而竟推之曰二證皆由下早皆是熱入省文以見意也持論若此不幾乎淄澠不辨菽麥不分矣以盲引盲之誚可獨加諸前輩耶是故讀仲景書而不能得仲景之旨其不為盲者鮮矣此節疑義所以為千古未明之案者以仲景難言而未之詳言也然反復尋繹其文亦既言之矣但道無不祕未易顯言欲令後之學者從妙悟中求之而已蓋以聞道之所得者猶淺悟道之所得者彌深耳故曰若能尋余所集思過半矣結胸證治第三太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余無汗劑頸而還小便不利身必發黃也辨脈篇云陰陽相搏名曰動陽動則汗出陰動則發熱又云數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也此所謂動數者數而躁動也痛即下文頭痛也虛謂營陰弱也盜汗睡臥中之汗也陽以外衛乎皮毛陰以滋榮其血絡目閉則衛陽內入無以外衛營虛不守故陰液盜出此因風邪傷衛則衛強營弱毛孔不閉故微盜汗出也發熱盜汗即數則為虛之義言衛強則陽盛發熱而脈數營弱則陰虛惡寒而汗出也浮則為風以下四句即所以釋脈浮而動數也頭痛發熱微盜汗出而惡寒即風熱痛虛之見證也言浮則風邪在衛數則邪郁發熱躁動則風邪不得發越故頭痛脈數則陽邪勝而營陰虛弱故微盜汗出而惡寒即前太陽中風陽浮而陰弱陽浮熱自發陰弱汗自出嗇嗇惡寒之變文也此為表邪未解乃桂枝湯證也粗工不察而反下之則胃脘之陽氣大傷遂至動數之脈變而為遲矣遲者虛寒之脈也中氣既餒則表間陽邪乘胃氣之虛寒陷入胸膈邪盛正虛正邪相拒故作痛也曰胃中空虛非水穀盡出而空虛也乃胃中真陽因誤下之損而空虛也真氣空虛則陷入之客氣擾動胸膈而膻中呼吸之氣有所隔礙故短促不伸也膈間氣不得舒邪結於裡所以躁擾煩悶而心中若有所懊憹者然此皆陽邪內陷故心下因之而硬遂為熱入之結胸矣以動數之脈變而為遲雖為中氣已虛然邪熱結硬於胸中則為實邪在裡當以大陷胸湯主之若陽邪雖陷而不結於胸中但頭汗出者以諸陽脈皆上至頭頭為諸陽之會陽邪獨盛於上故但頭汗出也諸陰脈皆至頸從胸中而還然陰液為陽氣所蒸乃得為汗陰陽之脈絡雖交互於周身因陽邪在上無以蒸騰故余皆無汗但劑頸而還也熱邪內陷既不得汗泄而小便不利則又不得隨水液而下走濕熱鬱蒸故身必發黃也發黃不立治法者以有例在後也此條雖動數變遲終屬陽邪內陷故以大陷胸湯攻之熱邪內陷尚且動數變遲豈陰痞反有熱入同推之理乎故曰綱領中難於並言至條目中始能悉言之也喻氏謂動數變遲三十六字形容結胸之狀殆盡嘆其為化工之筆宜哉大陷胸湯方大黃六兩芒硝半升升法見小柴胡湯下甘遂一錢漢之六兩即宋之一兩六錢二分李時珍云古之一升今之二合半約即今之一甌也每服一甌約大黃五錢外結胸惡症理亦宜然未為太過況快利止後服乎上三味以水六升先煮大黃取三升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服陷胸者謂能治熱邪陷入胸中而名之也邪陷胸膈猶大敵入寇絶我津梁據我要害餉道不通樵蘇不爨堅壁固壘非勇敢之將鋒鋭之兵不能破也故用苦寒湧泄之將為君鹹寒軟堅之副為佐然邪結胸中胃氣不行津液不流水飲並結故又以逐水利痰之奇兵為使鼎足之形已定犄角之勢已成然後建大將旗鼓水陸並進而成衝鋒陷陳之功豈不偉哉然苟非熱入胃實之證如陰痞之屬則當以德化綏徠威鎮攝服而已未可窮兵黷武塗炭生民也其有表證而脈浮者尤所禁忌用者審之辨誤仲景為傷寒立法之祖雖後賢繼起鮮有不讀其書而師其訓者矣故凡讀之者各有議論雖或未能盡其典要而亦各鳴其所得或是或否皆不敢逾越其軌度然未有如丹溪朱氏之不善讀書者也如此條之痛斥仲景曰按太陽病在表未曾解在表而攻裡可謂虛矣而況所得之脈皆浮而動數乎今得誤下動數變遲矣而又曰胃中空虛又曰短氣躁煩虛之甚矣借曰陽氣內陷心下因硬而可迅攻之乎豈大陷胸之力緩於承氣況已下者不可再下寧不畏其虛乎上文曰結胸脈浮大者不可下下者死又曰結胸證悉具煩躁者死今曰脈浮又曰煩躁大陷胸果可用乎彼陽病實下後若胃中空虛客氣動膈心中懊憹者梔子豉湯吐胸中之邪況太陽失下後明有虛證乎如此議論豈非痛貶仲景敘證之差用藥之誤乎豈知仲景原因脈浮而動數頭痛發熱盜汗惡寒之表症未解為不可攻下故曰反下至誤下之後胃中真陽已虛所以動數之脈已變而為遲矣變遲之後陽邪已陷豈尚有浮脈耶仲景所謂浮而動數者蓋未下之前邪氣在表之脈也丹溪不曉此義此不善讀之一也又以動數變遲為虛不知正氣既虛熱邪已陷正虛邪實而膈內拒痛矣丹溪又不知此義其不善讀者二也又以胃中空虛為虛不知仲景之曰空虛蓋以胃中真陽虛損為言非水穀邪氣盡空也所以下文即有客氣動膈四字因胃氣虛故客氣得以入膈而變動此亦正虛邪實也豈可竟作虛論耶丹溪又不知此其不善讀者三也又以短氣躁煩為虛甚不知邪結胸膈氣道阻塞且熱邪內郁故短氣躁煩而心中懊憹也丹溪又昧其旨此不善讀之四也又云借曰陽氣內陷心下因硬而可迅攻之乎豈大陷胸之力緩於承氣況已下者不可再下寧不畏其虛乎王肯堂論大陷胸湯云傷寒錯惡結胸為甚此非不能通利須其迅速方能分解結邪丹溪識見又不至此其不善讀者五也又云上文曰結胸脈浮大者不可下下者死仲景於未結胸之脈浮動數者已云不可下恐誤下成結胸也至若既成結胸而尚往來寒熱者已不用大陷胸而用大柴胡湯表裡兩解之法矣況已結胸而脈尚浮大則在表之邪不可限量故曰不可下且此條動數變遲之後並無浮脈再見豈可引此以責仲景乎此不善讀之六也又曰結胸證悉具煩躁者死今脈浮又曰煩躁大陷胸果可用乎不知仲景之所謂悉具者言結胸所犯之脈證無所不備也此一節非真有此證乃仲景設言以訓後世之文故鋪敘自表入里所以致成結胸之故及描寫邪氣陷入而成結胸之狀歷歷如繪直至結胸已成然後云以大陷胸湯主之若如此以漸而入者即謂結胸症悉具則下文結胸熱實脈沉而緊心下痛按之石硬者當如何耶況尚有舌上燥而渴日晡潮熱從心下至少腹硬滿而痛不可近者又如何耶且所謂短氣躁煩心中懊憹胸猶未結也至陽氣內陷心下因硬則為結胸矣所謂躁煩者熱邪初入不得發越而躁煩非已成硬結胃氣將絶之煩躁可比煩躁躁煩義自不同丹溪又不能辨此不善讀之七也又言彼陽病實下後若胃中空虛客氣動膈心中懊憹以梔子豉湯吐胸中之邪況太陽失下後明有虛證乎此段乃仲景論中陽明條下脈浮而緊咽燥口苦腹滿而喘不惡寒反惡熱之證也非脈浮而動數發熱汗出反惡寒太陽表證未解之可比也且陽明條下原云若下之則胃中空虛客氣動膈心中懊憹舌上有苔而猶未結胸也故以梔子豉湯湧其未結之邪耳此條乃太陽脈浮動數之表邪因誤下而動數變遲遂致膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹然必陽氣內陷心下固硬而為結胸方用大陷胸湯攻之若熱邪未陷心下不硬則猶未成結胸不過胃中空虛客氣動膈心中懊憹初入胸中之邪而已豈有不用梔子豉湯以吐其未結之邪乎若猶未信但觀陽明篇中有云陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之非若心中懊憹而猶未結胸者之明證耶今陽氣已陷心下已硬結胸已成豈可亦以梔子豉湯吐之丹溪讀其書而不達其意昧其義而妄毀之是誠何心哉嗚呼斯道之晦斯民之厄也能無辨乎所以張介賓類經求正録云劉朱之言不息則軒岐之澤不彰信乎斯言之不謬也夫太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之此太陽入陽明之結胸也病本太陽中風當以桂枝湯汗解使漐漐微似汗可也乃重發其汗使如水流漓則病必不除而復早下之邪熱遂乘虛而陷入陽明矣因汗下兩竭其津液邪入胃中而燥熱故五六日不大便而舌上燥渴也日晡未申之時也所者即書云多歷年所之所也不大便舌上燥渴日晡潮熱皆陽明證也潮熱而曰小有則未離太陽而已入陽明矣故不似全入陽明之甚也邪在太陽而陷入則結於胸邪入陽明而歸里則實於胃此本太陽病因汗下之誤邪從太陽誤入陽明故從心上至少腹無少空隙皆硬滿而痛至於手不可近也前條但結胸而硬痛者尚以大陷胸湯主之況兼陽明胃實者乎故亦以大陷胸湯主之結胸者項亦強如柔痓狀下之則和宜大陷胸丸結胸本太陽陷入而成然猶在上焦陽位而未深入陽明也項強亦太陽表症也痓即痙也仲景之論痓病其總證曰病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭動搖卒口噤背反張者痓病也其分條曰太陽病發熱無汗反惡寒者名曰剛痓又曰太陽病發熱汗出而不惡寒者名曰柔痓其不言項強者總證中已敘之矣不必重復也大約無論痓病之剛柔皆身熱項強但以惡寒無汗者乃寒傷營之痓以寒主徑急故也汗出而不惡寒者乃風傷衛之痓以陽邪性緩故也此以結胸證而云項亦強者所以證其邪未離乎太陽之表未可攻也曰如柔痓狀所以狀結胸之汗出不惡寒者也以結胸而狀如柔痓之汗出不惡寒其無表證而宜下可知故曰下之則和既無表證又不言熱實硬痛則勢非甚劇也故不須以大陷胸湯之駃劑攻之而更立大陷胸丸治之足矣辨誤方注取成氏邪結胸中心下緊實能仰而不能俯之說謂邪結硬於胸俯則礙而不利勢必常昂有反張之疑似病已至劇喻氏復兼取兩說云結胸而至項強症愈篤矣胸間邪結緊實項勢常昂有似柔痓之狀藉此以驗胸邪十分緊迫耳皆失仲景本意豈知以柔痓之汗出不惡寒以證表邪既解為結胸之較輕者哉若猶未以為然試觀大陷胸湯之大黃六兩芒硝半升不過二次溫服而大陷胸丸雖大黃半斤葶藶芒硝杏仁各半升而究竟所用者止服如彈丸之一枚而已其大小之制為何如哉大陷胸丸大黃半斤葶藶芒硝杏仁各半升熬黑上四味搗篩二味內杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法大黃芒硝甘遂即前大陷胸湯之意白蜜二合亦即十棗湯中之大棗十枚也增入葶藶杏仁者蓋以胸為肺之所處膻中為氣之海上通於肺而為呼吸邪結胸膈硬滿而痛氣道阻塞則有少氣躁煩水結胸脅之害故用葶藶甘遂以逐水瀉肺杏仁以利肺下氣也所用不過一彈丸劑雖大而用實小也和之以白蜜藥雖峻而佐則緩也大陷胸湯之制六師並出也大陷胸丸之法分鋭攻略也陷胸湯一人獨用之劑也陷胸丸衆病分用之藥也其大小分合之迥異步伐止齊之不同奈何方注以為白蜜甘潤導滯最良名雖曰丸猶之散耳較之於湯力有加焉雖喻氏謂白蜜留戀潤導下行其緩斯得一宿乃下之旨矣豈如承氣陷胸湯之人行十里二十里之迅速哉傷寒六七日結胸熱實脈沉緊心下痛按之石硬者大陷胸湯主之歷來注家皆以中風誤下而成者為結胸傷寒誤下而成者為痞此千載未悟之惑也仲景原云發於陽發於陰而反下之並未言中風傷寒而反下之也前條皆中風之結胸此條以傷寒而亦成結胸則知非獨中風誤下而成也說見首章注中然此條並未誤下而亦結胸者蓋以邪在太陽稽久失治而致變者也脈沉緊者關脈沉緊也或曰此但以傷寒二字冠之何以知其邪在太陽乎曰以熱實二字推之即可知也又以大陷胸湯之鹹寒苦泄而知之也何以知其為失治乎曰以六七日言之乃行其經盡之期也又不言及汗下是以知其為失治也何以知沉緊為關脈乎曰臟結條云按之痛寸脈浮關脈沉名曰結胸也曰沉則然矣緊脈何以言之曰浮緊則為寒邪在表沉緊則為寒邪深入也蓋言以寒傷營之證頭痛發熱身疼腰痛惡風無汗者而經久不治至熱邪自陷硬結於胸中則熱邪內實於裡矣而脈見沉緊足見邪結深固所以心下不按自痛及按之則石硬也邪氣堅結如此非大陷胸湯何以破其堅結乎傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之此亦太陽失治之結胸也言寒傷營證而不以麻黃湯汗解至十日之久其邪雖未盡入而鬱熱之邪已內結於裡而為結胸似可攻之證矣復往來寒熱如柴胡湯證是半表之邪猶未下也表裡皆有邪未可以大陷胸湯攻之以陷胸但能攻在裡之熱邪而不能解散表邪也故以大柴胡湯兩解之若但結胸而身無大熱者其邪不在表可知此但因熱結在裡胃氣不行水飲留結於胸脅乃可攻之候也猶必但頭汗出者然後知其身雖大熱而邪氣不在陰經陽邪但在上焦陽分為結邪所隔不得下達水液留蓄亦不得下走故以大陷胸湯主之或曰何以知頭汗為陽邪在陽分乎曰少陽篇云陰不得有汗今頭汗出故知非少陰也且陷胸亦實熱之藥故知陽邪在陽分耳成氏謂但結胸無大熱者非熱結也豈知但結胸三字即指熱結在裡而言謂但有里邪也無大熱言不復往來寒熱謂無表邪也有里無表方可用大陷胸湯也苟非熱結則大黃芒硝豈非熱實之藥仲景肯妄用乎尚論言後人誤謂結胸之外復有水結胸一症又謂下文支結乃支飲結聚亦另是一症殊為可笑愚謂若水飲必不與熱邪並結則大陷胸方中何必有逐水利痰之甘遂乎可謂一言破惑小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之正在心下方氏謂不比大結胸之高而在上不知仲景原云若心下滿而硬痛者為結胸也又曰心下因硬則為結胸又曰結胸熱實心下痛按之石硬若此則知結胸本在心下非必心下痞而後稱心下也然則胸與心下之相去非甚相遠也不過鳩尾之間上脘之分耳若必責之胸膺則胸骨已硬豈能按之而知其硬且痛乎曰正在心下者言止在心下一處不若心下滿而硬痛及按之石硬結在胸脅之甚且大也按之則痛亦不似膈內拒痛及從心上至少腹硬滿而痛不可近者至於心下痛之不按自痛也脈之浮滑皆屬陽浮為陽邪滑近動數亦不比動數變遲及沉緊之脈為沉陷固結之深也故不須攻擊之鷙劑而以小陷胸湯主之也小陷胸湯方黃連一兩半夏半升栝蔞實大者一枚上三味以水六升先煮栝蔞實取三升去滓內諸藥煮取二升去滓分溫三服此因陷入之熱邪較輕故治法亦變其制而為小陷胸湯也然其小也非若小承氣之減其制而曰小亦非若小青龍之變其法而曰小也此所謂小者名同而藥實不同藥雖不同而用意則同用意雖同而其功用又不同也夫邪結雖小同是熱結故以黃連之苦寒主之寒以解其熱苦以開其結非比大黃之苦寒蕩滌也邪結胸中則胃氣不行痰飲留聚故以半夏之辛溫滑利化痰蠲飲而散其滯結也栝蔞實李時珍謂其甘寒不犯胃氣能降上焦之火使痰氣下降蓋亦取其滑潤也亦非比芒硝甘遂之鹹寒逐水之峻也然半夏栝蔞皆取其滑者何也蓋滑乃十劑之一謂滑可去著也著者有形之邪留著於胸膈腸胃之中無形之邪留著於經絡臟腑之間也古人云著而難去者以滑去之如油之洗物也此方之制病小則制方亦小即內經所云有毒無毒所治為主適大小為制也病在陽應以汗解之反以冷水噀之若灌之其熱被卻不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服病在陽者蓋指邪在太陽也然仲景但言病在陽何以知其獨指太陽乎曰仲景陽明篇首云身熱汗自出不惡寒反惡熱者為陽明外證既云汗自出不應再以汗解唯邪氣雖入陽明而太陽證尚未罷者方有用麻黃之葛根湯及桂枝葛根湯以汗解之此外則更無陽明發表之專藥矣是以知其非陽明也少陽雖有半表之邪而汗吐下皆有禁例又不當有應以汗解之句故又知其非少陽也唯太陽為最外一層專主營衛風寒犯之則必應以汗解矣此因不得汗解而煩熱非唯不以汗解而反以冷水噀之灌之噀者噴噀之也灌者灌洗之也以冷水噀灌之者蓋欲以寒治熱乃不知者之妄耳遂使皮膚鬱熱之邪為冷水所卻不得散去故彌更益增其煩熱也然煩熱雖甚其先所感之邪本已惡寒無汗又增噀灌之水寒外客皮膚故肉上之寒粟聳起意欲飲水者煩熱所致也反不渴者水寒侵入也見證如此似當仍以汗解為是因水寒外侵邪熱被卻已不在表故以鹹寒潤下利水之文蛤散導水下出若未效而不瘥者因水寒內犯太陽之腑膀胱受病當與五苓散助其下焦蒸騰之用則氣化流行而水氣自除矣即有表邪未解服五苓散法中更有多飲暖水使汗出之法可去也此條當與中風失治之渴欲飲水水入即吐之水逆證互看彼因飲水所致為內入之水寒此因噀灌所致為外入之水寒病情相似故治法亦相同也寒實結胸無熱證句乍讀之似不宜用小陷胸之苦寒細閲上文因冷水噀灌其熱已被卻不得去熱邪內入所以彌更益煩熱邪遂實結於胸乃熱因寒結故曰寒實結胸非謂寒氣實結於胸中也若果是陰寒當作心下痞矣故結胸之首條云發於陽而反下之熱入因作結胸謂之結胸則知是熱入而非陰寒之證矣若非熱邪則亦並不可謂之結胸矣此陰陽寒熱之辨也無熱證者謂無表熱蓋指上文肉上粟起而言非謂表裡俱無熱故與三物小陷胸湯以開其胸中實結之邪也白散雖峻蓋因寒實結於胸中水寒傷肺必有喘咳氣逆故以苦梗開之貝母入肺又以巴豆之辛熱有毒斬關奪門之將以破胸中之堅結蓋非熱不足以開其水寒非峻不足以破其實結耳亦治實不治虛之法也文蛤散方文蛤五兩文蛤似蛤而背有紫斑即今吳中所食之花蛤俗誤呼為蒼螺或昌蛾者是也上一味為散以沸湯和服一錢匕湯用五合三物小陷胸湯即前小陷胸湯白散方桔梗三分味苦者巴豆一分去皮心熬黑研如脂貝母三分上三味桔梗貝母為末內巴豆更於臼中杵之以白飲和服強人半錢羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯結胸證其脈浮大者不可下下之則死大凡邪氣在表則脈必浮結胸一證原因太陽表邪誤陷所致然既結之後邪已入里則關脈當沉矣豈容浮大之脈再見耶今胸既結矣而脈仍見浮大則未盡陷入之表邪尚盛且浮大之脈原屬裡虛症象陽旦條云浮則為風大則為虛正氣既虛而更下之使未盡之表邪再陷則外邪已陷復陷胸邪已結再結是所謂虛其虛而實其實也邪氣重陷正氣不支不死何待故曰不可下下之則死結胸證悉具煩躁者亦死此承上文而言更有不必再下亦死之證也悉具者言凡繫結胸所犯之證無所不具也其證悉具則邪氣之盛陷入之深不必言矣而更見煩躁煩為虛陽散亂躁則陰邪上逆劇邪堅結上下隔絶胃氣必敗內經熱論云營衛不行臟腑不通則死矣心下痞證治第四痞之為證陰陽參錯寒熱分爭虛實交互變見不測病情至此非唯治療之難而審察之尤不易也且勿論推求參考之難與臨證施治之難即以仲景之聖其立法詳辨亦甚難也所以著書者唯恐臨證者之難曉臨證者每嫌著書者之不詳不知六氣隨時之變態不同病者虛實之見證百出聖賢立訓之規格有限病情變幻之伎倆無窮猶之五官四體雖同絶無相同之面目傳真寫像各異豈有一定之鬚眉鄭子産云人心之不同如其面焉此之謂也前人創法唯規矩以度之繩墨以准之理以貫之義以一之變而通之神而明之未可按圖索驥也所以臨證者不知著述之艱難著述家又不知臨證之不易然但著書而不臨證不過紙上談兵但臨證而不著述每多不學無術皆非實學也余讀仲景書至痞結兩證茫無頭緒不覺掩卷而嘆故勉為之辨脈浮而緊而復下之緊反入里則作痞按之自濡乃氣痞耳濡音軟此以下三條乃寒邪入里之痞也下文陽虛陰盛之痞則又不同矣夫脈浮而緊浮為在表緊則為寒乃頭痛發熱身疼腰痛惡風無汗寒邪在表之脈麻黃湯證也而復下之者言不以汗解而反誤下之也緊反入里者言前所見緊脈之寒邪因誤下之虛陷入於裡而作心下痞滿之症也按之自濡言證雖痞滿以手按之則軟而不硬也此不過因表邪未解誤下里虛無形之邪氣陷入於裡而成痞耳其脈證不同治法各異者又於下條分出以為臨證施治之用心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之此二條承上文言同一誤下緊反入里而成痞其脈症稍異治法即殊故示人以不可概視而妄施治療也心下者心之下中脘之上胃之上脘也胃居心之下故曰心下也痞者天地不交之謂也以邪氣痞塞於中上下不通而名之也前所謂緊反入里者非即寒氣入里也乃寒邪鬱於營衛之間已發熱之傷寒邪氣乘誤下之虛入里而成心下痞也寒鬱為熱即熱論篇所謂人之傷於寒也則為病熱之義謂初感本是寒邪鬱於腠理則發熱矣按之濡即所謂氣痞也其脈關上浮者浮為陽邪浮主在上關為中焦寸為上焦因邪在中焦故關上浮也若結胸之脈則寸浮而關沉矣結胸因熱邪水飲並結按之石硬或心下至少腹皆痛不可近故治之以大陷胸湯此則關上浮按之濡乃無形之邪熱也熱雖無形然非苦寒以泄之不能去也故以大黃黃連瀉心湯主之按之濡而脈浮未可寒下太過故以麻沸湯漬須臾分服大黃黃連瀉心湯方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服麻沸湯者言湯沸時泛沫之多其亂如麻也全生集作麻黃沸湯謬甚謂之瀉心湯者非用黃連以瀉心臟之火也蓋以之治心下痞而名之也大承氣之治邪熱歸胃以陽明中土萬物所歸無所復傳故以大黃芒硝枳實厚朴專治胃實大陷胸之治結胸亦以太陽表邪誤下陷入因熱邪水飲並結故攻熱實而兼導飲十棗湯之攻痞以表邪已解非熱邪入里不過水飲停蓄於胸脅之間故不用大黃攻熱但以大戟芫花甘遂蠲飲泄水而已皆攻實之法也若夫大黃黃連瀉心湯者因傷寒鬱熱之邪誤下入里而痞塞於心下雖按之濡而屬無形之氣痞然終是熱邪故用大黃之苦寒泄之以攻胃分之熱邪黃連之苦寒開之以除中焦之鬱熱而成傾痞之功在五等瀉心湯中獨為攻熱之劑也然有是證有是脈者宜之設非其證者未可概用也麻沸湯百沸熱湯也成氏云但以麻沸湯漬服取其氣薄而泄虛熱也蓋因按之軟則胃中無大宿垢關脈浮則中氣不實故但漬而不煎為泄虛熱而非攻下之劑成氏此言可謂得仲景之旨矣心下痞而復惡寒汗出者附子瀉心湯主之此又承上文言如前應用大黃黃連瀉心湯之痞而復惡寒汗出者則治法又不同矣夫以心下痞而按之濡其脈關上浮者即前所謂緊反入里傷寒鬱熱之邪誤入而為痞原非大實而復見惡寒汗出者知其命門真陽已虛以致衛氣不密故玄府不得緊閉而汗出陽虛不任外氣而惡寒也人但知衛氣行於皮膚而不知乃下焦之真陽蒸穀氣而達皮膚乃為衛氣所以相火居於兩腎之間而屬少陰衛氣居於肌表而屬太陽為一根一葉故足太陽膀胱與足少陰腎經相為表裡而成一合也以熱邪痞於心下則仍以大黃黃連瀉之加附子以扶真陽助其蒸騰之衛氣則外衛固密矣因既有附子之加併入黃芩以為徹熱之助而寒熱並施各司其治而陰陽之患息傾痞之功又立矣附子瀉心湯方大黃二兩黃連一兩黃芩一兩附子一枚炮去皮破另煮汁上四味切三味以麻沸湯二升漬須臾絞去滓內附子汁分溫再服傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯傷寒寒傷營也以頭痛發熱惡寒無汗之證法當以麻黃湯汗之方為合法乃先大下之下後而表邪陷入矣醫見未解而復發其汗謂之復者蓋以誤下之後復用麻黃湯也汗雖發而從前陷入之邪已作心下痞矣心下已痞而仍惡寒者猶有表邪未解也前條同是痞證而惡寒以附子瀉心者因惡寒汗出所以知其為陽虛之惡寒也此則惡寒而不汗出是以知其為表未解也故曰不可攻痞若再攻之必已陷再陷矣所以必當先解其表俟表邪既解然後乃可攻痞也但傷寒解表不用麻黃而用桂枝者何也仲景以麻黃治傷寒桂枝治中風一定不移之法也其可亂乎若其法可亂則仲景不於桂枝湯條內特立禁止之文曰桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也當須識此勿令誤也此條既曰傷寒而又以桂枝湯解表豈立法者自相矛盾邪蓋因此證既已誤下胃中陽氣已虛又復發汗表間衛陽又損若再用麻黃必致陽氣竭絶而為亡陽之敗症矣且寒邪已經陷入其在表未解之邪有限故權用桂枝湯以解表間之虛邪也解後亦用大黃黃連瀉心湯者因此痞亦是發熱惡寒之傷寒邪熱因誤下入里所致即所謂緊反入里也因與熱入之痞同義故治法亦同與下文胃中不和腹中雷鳴客氣上逆者不得同論也傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非熱結但以胃中虛客氣上逆故使硬也甘草瀉心湯主之傷寒中風者言或中風或傷寒也謂無論傷寒中風之有表症者但誤下之皆可致變非後人所謂風邪入里則為結胸寒邪陷入則為痞也下利日數十行者誤下傷胃中氣失守隨藥勢而下奔也完穀不化胃寒不殺穀也腹中雷鳴誤下則胃陽已傷中焦虛冷氣滯不得流行脾弱不能轉運欲通而不得故但留滯於腹中作響而已是以陰氣填塞於心下硬滿而為痞也胃氣受傷陰邪上逆而乾嘔陽受陰迫虛陽上走而心煩不安也醫見心下痞滿以為熱邪未盡而復下之則胃中陽氣益虛其痞益甚不知此非熱邪所結但以胃脘之陽傷損真氣空虛故客氣得以上逆客氣者非外入之邪也乃胃陽已虛下焦之陰氣上逆以非本經之氣故為客氣客氣上逆致成痞硬耳當以甘草瀉心湯主之甘草瀉心湯方甘草四兩乾薑三兩半夏半升黃芩三兩黃連一兩大棗十二枚擘上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服此方以甘草為君前代名家皆疑其為甘補緩中之藥非痞滿所宜注中皆含糊抹過而不能明言其故余注解素問諸篇始知甘性雖緩其補瀉之用於五臟各有不同故藏氣發時論云肝苦急急食甘以緩之脾欲緩急食甘以緩之此皆用其甘和補緩之性也又云心欲耎急食鹹以耎之用鹹補之以甘瀉之其以甘瀉之句人皆讀而忽之豈知聖賢垂訓語無虛發雖一言一字無非精微之蘊唯仲景知之遂以此一句之義立法制方用之以治極難之證如世之讀內經而輒加刪削者又焉能得此精義哉夫所謂心欲耎者心乃藏神之臟五臟六腑之大主包絡代君行令邪不得犯犯之則死豈真有所耎硬乎謂之欲耎者蓋心之部分為邪所犯不得其平和故耎之瀉之耳仲景之瀉心亦瀉心下之痞氣非瀉心臟也故亦以甘瀉之猶素問陰陽別論所謂二陽之病發心脾非真心脾二臟受病也因胃病在心脾之間耳其義相同當以意度之可也故於肝則以甘緩其徑急之偏勝於脾則以甘益其濡潤之不足於心則以甘瀉其痞滿之虛邪也然雖曰以甘瀉之而瀉之之法亦必以痞之虛實為辨未可概用也其熱實之痞固不必言然苟非胃中虛冷脾氣下陷陰邪上逆下利完穀腹中雷鳴者而妄用之未有不反增其滿者也如李東垣補中益氣湯唯氣虛而致中滿者乃為的對倘施之於實脹未有不殆者也乾薑守中除裡寒而止下利半夏利膈神農本經言其能治傷寒寒熱心下堅硬二者皆辛溫而能散痞故重用之以為臣黃芩黃連乃苦以開之非方氏所謂解其邪熱之煩也然仲景明言此非結熱又曷為用之蓋取至真要大論之所謂熱因寒用也以陰邪痞塞於內驟進辛熱恐其拒格而不受故以寒藥導之使入也即經所云寒熱溫涼反從其病乃反佐以取之之法是以黃連止用乾薑三倍之一也但觀厥陰條中傷寒本自寒下復吐下之寒格更逆吐下食入口即吐而以乾薑黃連黃芩人參湯治之理自明矣寒熱兼施辛苦並用中氣不調故以大棗和之然用甘草而不用人參者陰邪在內濁氣留中人參非瀉劑故不用也舊注但云甘草坐鎮中州人但知生薑代乾薑之僭孰知以乾薑代生薑之散但知甘草能增滿孰知甘草能去滿哉不知李東垣原云以生薑代乾薑者以其不僭故也並非以生薑代乾薑之僭也本草云乾生薑即生薑之乾者主治各有不同而乾薑又別用法制造者也性味主治又不同矣且生薑散外而開發乾薑溫里而守中乾薑亦豈能代生薑之散哉而甘草所以去滿之故終未道出芩連之用又未通解竊恐未足以發明立方之義也傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯此條當在少陽壞病中因屬痞症故類附於此此以邪在少陽而成痞結故不曰太陽而但以傷寒二字冠之也五六日邪入漸深之候也嘔而發熱少陽之本證也以邪在少陽柴胡湯證已具而不用柴胡反以他藥誤下之他藥者即承氣之類非有別藥也因此證唯柴胡為對證之藥彼不當用者即指為他藥也若誤下之後無他變證而柴胡證仍在者當復與從前對證之柴胡湯必身體蒸蒸而振蒸蒸身熱汗欲出之狀也振者振振然搖動之貌即寒戰也言膚體蒸蒸然卻發熱汗出而邪氣解矣其所以戰而後汗者以下後正氣已虛難於勝邪故必戰而後汗也如此則雖有從前他藥誤下之失已幸而不為變逆矣若誤下之後柴胡症不仍在者則邪氣必乘虛陷入矣邪陷而心下滿按之硬痛者此為熱入之結胸也以大陷胸湯主之若但滿而按之不痛其非硬結可知已屬氣痞然雖按之不痛若如前其脈關上浮者仍是陽邪當以前條大黃黃連瀉心湯泄其虛邪矣此不言關上浮則知為下後胃中陽氣空虛身中之陰氣痞塞於心下而為虛痞也雖屬少陽本症今已變逆為陰痞則柴胡湯不中與之宜半夏瀉心湯辨誤前注家以中風誤下為結胸傷寒誤下為痞此條以傷寒而可結可痞矣又以陽邪入里為結胸陰邪入里為痞此則邪在少陽而誤下是陽經之邪亦能結能痞矣以此論之即仲景之發於陽發於陰尚未足以盡賅其義後人又豈能作一定之例以範之邪總當因時制變因勢定形就形以定名因變以施治耳故岐伯曰審察病機無失氣宜又曰知其要者一言而終不知其要流散無窮此之謂也半夏瀉心湯方半夏半升洗乾薑三兩人參三兩甘草三兩炙黃芩三兩黃連一兩大棗十二枚擘上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服半夏辛而散痞滑能利膈故以之為君半夏之滑見小陷胸湯方論中乾薑溫中除陰氣而蠲痞人參炙甘草大補中氣以益誤下之虛三者補則氣旺熱則流通故以之為臣黃芩黃連即前甘草瀉心湯中之熱因寒用苦以開之之義故黃連亦僅用三倍之一以為之反佐大棗和中濡潤以為傾痞之助云傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之傷寒汗出解之後言表邪俱從汗出而悉解也胃中不和以下皆言里症未除也此條非誤下所致乃邪傳太陰也然但曰胃中不和而不言太陰脾土者太陰陽明論云脾胃以膜相連足太陰之脈貫胃屬脾絡嗌與足陽明相為表裡也胃陽衰弱氣不流行陰寒閉塞故心下痞硬胃寒不能腐化脾弱不能健運故乾噫食臭也噫者噯食氣也胃寒不化宿食停留而噯食酸臭也靈樞口問篇云寒氣客於胃厥逆從下上散復出於胃故為噫素問脈解篇云太陰所謂病脹上走心為噫者陰盛而上走陽明也中焦痞塞脾不能為胃行其津液傳化失常津液不流故水氣旁聚於脅下氣滯不得流行所以腹中雷鳴中氣不守清陽不升脾氣下陷水穀不分而下利故以生薑瀉心湯主之生薑瀉心湯方生薑四兩切甘草三兩炙人參三兩乾薑一兩半夏半升洗黃芩三兩黃連一兩大棗十二枚擘上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服生薑瀉心湯即半夏瀉心湯而增入生薑也半夏瀉心本所以治但滿不痛之虛痞者也此則汗後外邪已解雖非誤下之變而中氣虛寒陽和不布三焦不能宣化津液不得流行尤甚於但滿不痛故加生薑以宣之徐之才曰宣可去壅生薑橘皮之屬是也李東垣云外感六淫之邪欲傳入里三陰實而不受逆於胸中天分氣分窒塞不通或噦或嘔所謂壅也三陰者脾也故必以破氣藥瀉其壅塞李時珍曰壅者塞也宣者布也散也鬱塞之病不升不降傳化失常必藥以宣布敷散之如承流宣化之意也蓋生薑辛而能散溫而能走故以為宣揚開發之主流通其鬱滯陰濁之氣鼓動其傳化轉運之機或曰脅下有水氣何以不用十棗乎曰十棗湯證乃太陽中風之邪入里下利嘔逆頭痛心下痞硬滿引脅下痛乾嘔短氣至汗出不惡寒表邪已解里邪已實故用之以逐飲和里此條乃脾胃虛寒太陰經之虛痞也故以乾薑半夏溫中蠲飲足矣減用乾薑至一兩者以生薑四兩故也又以人參炙甘草補助正氣使氣盛流行然後能宣通布散也黃芩黃連大棗之用一如半夏瀉心湯之制而已觀仲景五等瀉心湯之法其攻補進退陰陽虛實無不各盡其制其所以裁成輔相者為何如哉傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之此條亦不由誤下乃自表傳裡之痞也以寒傷營而頭痛發熱惡寒無汗之證汗之則當解矣乃汗之而不解非汗之不徹即邪氣深重也遂至傳入於裡而心下痞硬以客邪在裡不得發越故上吐下泄此為變逆已甚勢所必攻然其未盡入里之邪猶在半表若但下之恐其邪亦並陷入故以小柴胡湯入承氣之半名之曰大柴胡湯以雙解之庶幾外邪可解里邪得泄而成先否後喜之功也小柴胡去人參甘草者邪在裡也加芍藥者汗後下利斂陰氣也下利而用大黃者邪實則通因通用也此與結胸條中之大柴胡互相發明可見痞症之邪從外入者與熱入之結胸名雖異而實同其感受與治法不甚相懸也傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之言傷寒頭痛發熱惡寒無汗之證已發其汗又或吐或下表裡已解之後而心下痞硬噫氣不除者因邪氣雖去而胃中陽氣虛損陰寒痞塞陽氣不得流行脾弱不能健運故氣上逆而噯食氣也此條比前生薑瀉心湯同一傷寒汗出邪解之後而少胃中不和脅下水氣腹中雷鳴下利諸證為較輕矣故增減生薑瀉心湯之制而以旋覆代赭石湯主之也辨誤前注皆曰伏飲為逆而以旋覆半夏蠲飲不知陰邪痞塞胃氣不行凡水飲入胃皆可停蓄聚為痰飲何必執泥其說若能使胃氣通行則精液無不流貫矣注謂胃氣上逆全不下行有升無降而以素問之弦絶者聲嘶土敗者聲噦二句證之誤矣按素問寶命全形論黃帝問云君王衆庶盡欲全形形之疾病莫知其情留淫日深著於骨髓心私慮之余欲針除其病岐伯對曰夫鹽之味鹹者其氣令器津泄弦絶者其音嘶敗木敷者其葉發溯洄集云太素作木陳者其葉落病深者其聲噦人有此三者是為壞腑毒藥無治短針無取此皆絶皮傷肉血氣爭黑蓋此篇帝欲盡愈天下最深之病而伯對以病之深而將敗者豈能悉愈若留淫日深著於骨髓者如鹽之味鹹其氣味深入浸潤雖以磁器之堅亦能滲透而津泄其滷液以譬邪氣之浸淫於筋骨臟腑之中而難於洗拔且腎為潤下鹹水之臟若下泄不固則腎之元陽精氣敗絶矣又如絲絃之將絶則其音聲必破碎而嘶敗以譬脈之弦絶急者為肝氣將絶豈若木之敷榮者能生髮其枝葉乎所以病之深而難治者胃氣敗而脾絶聲必噦逆也謂之壞腑者人身之軀殼所以藏五臟六腑如藏器之府靈樞脹論曰臟腑之在胸脅腹裡也若匱匣之藏禁器也若人而有此三臟之敗是謂壞腑雖毒藥無能治短針不能取若徒用之適足以絶皮傷肉而無益也何也病情至此氣乖血死血氣爭黑而不可治也奈何注家引必死不治之經文以證仲景論中邪氣已解極輕不死之痞症致經論之旨並失且此篇經義自唐王太僕以來俱未之能解豈可引之以作證邪嗟乎素問雖上古典墳義深難解其旨豈終晦乎易曰書不盡言言不盡意然則聖人之意其終不可見乎倘後之人或有能解之者則如之何旋覆代赭石湯方旋覆花三兩人參二兩生薑五兩切半夏半升代赭石一兩大棗十二枚擘甘草三兩炙上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服金匱所謂七物旋覆代赭石湯者即生薑瀉心湯之意而增減之也以證有輕重故方亦因之而為損益也夫生薑瀉心之症水氣聚於脅下腹中雷鳴而下利以陰氣過盛故以生薑之宣散同乾薑之辛熱以開其陰痞又恐寒邪拒格入而不受故用芩連之反佐以導引之此條不過心下虛痞噫氣不除耳因減去乾薑故不須寒涼之反佐但多加生薑一兩以代乾薑增益其辛溫宣散之用助參甘而成溫補開豁之功而已旋覆花神農本經言其能治結氣脅滿除水下氣故用之以為君李時珍云代赭石乃手足厥陰之藥取其鎮重故能除上走之噫此方較之五瀉心湯為和平之正治無用出奇不須霸術所謂無黨無偏王道平平者乎傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便湯藥蕩滌之藥也他藥亦下藥也此條自傷寒服湯藥至利不止皆承前誤下成痞之義不必重看醫以理中與之一段蓋示人以病無一定之情治有變通之法當審察機宜隨時應變未可專守一法概治諸症也前五瀉心湯諸症無論寒熱攻補之法皆以邪在中焦為治而不知更有氣虛下陷利在下焦者故曰理中者但能理中焦之虛寒而已與下焦毫不相涉病藥相懸故其利益甚也謂之益甚者言藥不中病不能止而益甚非理中有所妨害而使之益甚也尚論以鄰國為壑譬之亦過情之論也病既在下大腸滑泄非重不足以達下非澀不足以固其脫故以赤石脂禹餘糧湯主之然此方此法猶是過文語氣非仲景著意處其所重者全在復利不止當利其小便句言元氣未盡虛脫不過大腸滑泄則以石脂餘糧澀之亦足以取效若已下再下真氣已虛下焦無火真陽不能司其蒸騰氣化之功則清濁不能升降水穀不得分消故利復不止豈澀藥所能治哉必使下焦有火氣化流行而後可以言治也其但言當利小便而不立方者以三焦膀胱氣化之說繁多非一言可蔽故不具載也若後之以道自任者學力優深經義精熟胸中自能瞭然何必多贅所以仲景自敘中雲觀今之醫不念思求經旨以演其所知各承家技終始順舊省疾問病務在口給而欲視死別生實為難矣膀胱氣化說見五苓散方論中赤石脂禹餘糧湯方赤石脂一斤研碎禹餘糧一斤研碎以上二味以水六升煮取二升去滓分三服徐之才曰澀可去脫牡蠣龍骨之屬是也李時珍云牡蠣龍骨海螵蛸五倍五味烏梅榴皮訶子粟殼蓮房棕灰石脂皆澀藥也而石脂禹餘糧皆手足陽明經藥石脂氣溫體重性澀澀而重故能收濕固下甘而溫故能益氣調中中者腸胃肌肉也下者腸澼泄痢也禹餘糧性澀故主下焦李先知詩曰下焦有病人難會須用餘糧赤石脂是也時珍又云脫有氣脫血脫精脫神脫脫則散而不收故用酸澀溫平之藥以斂其耗散然氣者血之帥也故氣脫當兼以氣藥血脫當兼以血藥及兼氣藥所以桃花湯之立治又不同也本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之言本以誤下之故以致邪氣入里而心下痞硬則當與瀉心湯矣然瀉心之用不一有誤下寒邪外入之痞即緊反入里也有下後胃虛內作之痞有汗解以後陰邪內結之痞所以有攻下熱實之法又有攻下而兼溫經復陽之法有溫中散痞之法有溫補宣開之法大抵皆因證而施故治法各異此所謂痞者蓋太陽表邪入里之痞也因膀胱為太陽之腑痞雖結於心下而邪已入里內犯膀胱雖用瀉心之法非惟痞不得解且其人渴而口燥煩小便不利矣夫足太陽膀胱者津液之府也必藉三焦之氣化而後行焉所謂氣化者下焦之氣上騰然後上焦之氣下降氣上騰則津液上行而為涕唾氣下降則津液下走而為便瀉邪犯膀胱則下焦之氣不上升而氣液不騰故口渴而燥煩下氣既不上升則上焦無以下降而小便不利故以五苓散主之說見五苓散方論中然渴而口燥煩與傷寒誤汗首條之脈浮數煩渴同義雖有誤汗誤下之殊而下焦虛寒無火則無異也但認定經絡審清脈理有何疑憚而至逡巡畏縮哉要之臨證狐疑處方猶豫皆平日信道不篤工夫未盡耳豈古人有所隱祕乎太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之舊說以風傷衛而誤下之則為結胸寒傷營而誤下之則作痞以此釋仲景發於陽發於陰之義前已有傷寒六七日之結胸熱實及傷寒十餘日之結胸無大熱矣又半夏瀉心湯條內以傷寒而且結且痞矣此條又以太陽中風而為心下痞硬則仲景之發於陽發於陰之意在乎陰經陽經而不在於中風傷寒也明矣此節不敘表證即曰下利嘔逆者邪熱已犯腸胃里已受邪似可攻下然邪雖入里必表邪已解者乃可攻之若表證未除者未可攻也漐漐熱汗微出也其人漐漐然身熱汗出而發作有時者即邪入陽明自汗潮熱之類是也頭痛非必表症而後有也邪結於裡陽邪怫鬱於上而頭痛也心下痞硬而滿牽引脅下痛者乃邪已入里痞塞於中焦胃脘之間故心下痞硬也若但屬氣痞則不至硬滿而引及脅下作痛矣因邪既入里胃不能行其津液以致水飲停蓄故心下硬滿氣不得伸其痛牽引脅下也即生薑瀉心湯條下所云心下痞硬脅下有水氣又所謂水結在胸脅者是也邪在胃中故氣逆而乾嘔中焦痞塞故中滿而短氣皆必攻之症也然必汗出而不惡寒者乃為表邪盡解已入陽明止里邪未和耳里未和者胃困於邪不能使津液流貫停蓄於胸脅之間非結胸熱實心下痛按之石硬者比也結胸有熱實故主之以大陷胸湯而以大黃芒硝為君此雖痞症之實者然終不若結胸之有實熱者也所以當蠲其水濕痰飲之邪則胃和而氣自流通矣故以十棗湯主之十棗湯方芫花熬甘遂大戟大棗十枚擘上上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養李時珍云仲景治傷寒蓋以小青龍治未發散之表邪使水氣自毛竅而出乃內經所謂開鬼門法也十棗湯驅逐里邪使水氣自大小便而泄乃內經所謂潔淨府去陳莝法也五飲之中水濕之流於腸胃者為痰飲令人腹鳴吐水胸脅支滿或作泄瀉芫花大戟甘遂之性逐水泄濕能直達水飲窠囊隱僻之處可徐徐用之取效甚捷余參考方書如控涎丹小胃丹舟車神祐丸等法雖後賢變通之法然皆本之於此夫芫花辛溫而有小毒能治水飲痰澼脅下痛大戟苦寒而有小毒能泄臟腑之水濕甘遂苦寒有毒而能行經隧之水濕蓋因三者性未馴良氣質峻悍用之可泄真氣故以大棗之甘和滯緩以柔其性氣裹其鋒芒然亦強者不過服一錢匕羸者減至半錢而已又以肥棗十枚煮汁八合和之若服之而下少病未除者又必至明日方可更服仲景制方之妙可謂臨深履薄惴惴焉矣而近世醫師猶絶不用之即遇其證及見此方讀之未終無不惶駭卻走齧指吐舌而已其所長者不過隱忍姑息以示慎重唯坐觀成敗聽其自為進退以圖僥幸成則妄自居功敗則委之命數而已豈知佳兵雖不祥之器然禁暴除亂非此不可苟欲戡禍亂而致太平者其可少乎哉仲景處方以柔制剛以寬濟猛其控御之法如無撫綏之衆紀律之兵以之治實又何虞焉況大棗之用其韜鋒斂鍔不啻虎皮包倒載之戈笏冕脫虎賁之劍矣易曰以此毒天下而民從之其斯之謂歟太陽病外症未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之解見上篇誤下條中因是心下痞硬故附録於此以便簡閲太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈太陽中風已自頭項強痛發熱惡寒而汗出矣醫不知而發其汗發汗者非誤用麻黃湯即犯如水流漓之戒病遂不除而發熱惡寒醫又以為邪氣不解而復下之致邪氣乘虛入里而痞塞於心下因汗下兩誤而表裡俱虛矣誤汗則衛外之真陽已亡誤下則內守之真陰亦竭故曰陰陽氣並竭既曰陰陽氣並竭而又曰無陽則陰獨者何也前所謂並竭之陰陽乃人身之真氣也此所謂無陽者指胃中之陽氣空虛也陰獨者謂唯有陰邪痞塞於中也言誤下之後胃中陽氣空虛獨有陰氣痞塞也醫又不知而復燒針以逼其汗火氣外入而內攻虛陽浮散而欲絶故胸煩也陽氣既無陰邪獨盛所以青黃之色現於面也膚瞤肌膚跳動也即前誤汗亡陽身瞤動振振欲劈地之瞤也膚肉瞤動青黃之色並見陽氣敗竭死之象也素問五臟生成篇云色見青如草茲者死黃如枳黃者死故曰難治色微黃者不見陰寒敗死之青色但有微黃之色也生成篇又云黃如蟹腹者生也靈樞終始篇云陰受氣於五臟陽受氣於四末素問陽明脈解云四肢者諸陽之本也陽盛則四肢實今手足溫則知陽氣猶未敗亡溫經復陽之治尚可施也故曰易治太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之以上二條解見並病條下因屬心下痞硬故亦重附於此陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散解見陽明篇中因亦屬心下痞硬附此以便尋覽傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿此條當在少陽篇中因屬心下痞硬故亦附入此篇言傷寒既吐且下而後發其汗是汗下顛倒邪氣已陷內外俱虛元陽乏竭虛火上炎故作虛煩而脈甚微細也至八九日不治陰邪得以乘胃中陽氣之虛而痞硬於心下氣滯不得流行故旁引脅下而痛也氣上衝咽喉而眩冒者陽虛而陰氣上逆也靈樞經脈篇云足少陽之脈起於目鋭眥其支者別鋭眥下大迎合於少陽下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街故病者咽乾目眩胸脅苦滿脅下痞硬足厥陰之脈交出太陰之後過陰器抵少腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後肝膽受邪陰氣上逆故氣衝咽喉汗吐下後虛陽上浮所以目眩昏冒也素問生氣通天論云陽氣者精則養神柔則養筋開闔不得寒氣從之乃生大僂陷脈為瘻此以陽氣散亡無以噓養經脈故惕然瞤動如此陰盛陽虛之證雖或僥幸而不至危殆若經久不愈必至陽虛不治筋弛骨痿而成廢疾矣病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散此條既非中風亦非傷寒當在風寒並感及風溫例中因胸中痞硬故亦附此桂枝證者乃風邪在衛發熱汗出惡風頭項強痛者是也以如桂枝證之發熱汗出惡風而頭不痛項不強則知非中風證矣然但寸脈微浮寸脈者氣口脈也即脈要精微論之上附上右外以候肺內以候胸中亦即靈樞禁服篇所云寸口主中人迎主外之義也謂之上附上者古人論脈自下而上猶易卦之從下而上也蓋以天地之陽氣自下而上故也自尺以上曰附上附上者關脈也寸在關上故曰上附上也言寸口之外半以候肺內半以候胸中也浮主風邪在表浮脈雖微亦發熱汗出惡風也浮主上焦故邪在胸中也然既非中風之邪入里而胸中痞硬上衝咽喉不得息者以胸中有寒邪故也胸有寒邪則陽氣不得宣通津液不能流貫致成痞硬其氣不得下達所以逆沖咽喉而不得息也邪在上焦因勢利導應從上越當用內經高者因而越之之法故以瓜蒂散吐之使邪從上越則胸中氣自和平矣然論中吐證不一其吐法亦自不同如太陽中暍神熱疼重而脈微弱此夏月傷冷水水行皮中也宜吐之此亦吐胸中之寒邪水氣使陽氣通行也又如少陽病頭痛發寒熱脈緊不大是膈上有痰也宜吐之此胸膈有痰而吐之也宿食在上脘者當吐之此以宿食填塞而吐之也懊憹煩躁不得眠未經汗下者謂之實煩當吐之此外邪鬱悶於胸中而吐之也病胸上諸實郁鬱而痛不能食欲人按之而反有涎唾下利日十餘行寸口脈微弦者當吐之此胸中或痰或食或寒積或鬱熱諸實邪在上濁氣痞塞則下焦清陽不升故日下利十餘行按之而有涎唾寸口脈弦尤知其實在上焦矣陰陽應象論云清氣在下則生飧泄所以即從上而越之實邪既去清陽得以升越所以利止也故李東垣曰難經云上部有脈下部無脈其人當吐不吐者死此飲食內傷填塞胸中食傷太陰風木生髮之氣伏於下宜瓜蒂散吐之則木得舒暢天地交而萬物通矣至於時行疫癘癍疹溫邪初感而噁心欲嘔尤當探吐則邪氣上越而發泄矣但尺脈絶者及諸亡血家不宜用耳明理論云梔子豉湯吐胸中虛煩客熱者也瓜蒂散吐胸中痰食宿寒者也由此觀之則凡諸有形無形之實邪在上而填郁胸膈者皆可吐非獨痰飲為然也此條寒邪在膈陽氣鬱塞津液不流精微不運痰飲在所必有奈仲景止曰寒而不曰痰注家偏曰痰而不曰寒不知何所證據豈寒邪在胸不須吐邪又忽另立痰病一門我恐以虛靈變化之圓機改而為膠柱鼓瑟之死法矣惜哉瓜蒂散方瓜蒂一分熬黃赤小豆一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與附臟結第五臟結結胸辨論問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治此設問以申結胸臟結之辨也然深哉仲景之文祕哉仲景之法而難於推測者也夫寸脈氣口脈也關脈右關脈也浮為陽表脈也沉為陰里脈也小細沉緊者寒邪深入之脈也何以知其為右寸關乎脈要精微論云上附上右外以候肺內以候胸中故也說見上文邪自太陽之表陷入上焦陽分故寸脈浮也邪入胸膈胃氣不行中焦隔絶故關脈沉也言熱邪陷入心胸之間按之而硬痛寸脈浮而關脈沉者名曰結胸也如結胸狀者狀如結胸而已未必如結胸之按之而硬且痛也若如結胸之硬痛則邪氣堅結胃脘不通而飲食不能如故矣王肯堂云謂之如結胸狀則與結胸當有分別矣成注云二者皆心下硬痛尚缺穩當如結胸狀飲食如故是按之不痛耳此可謂深得仲景之意者矣其所以謂之臟結者邪結於臟而非結於腑也所謂腑者胃也臟者脾也邪結於脾臟而不犯胃腑故飲食如故也但所結者太陰脾土之一臟耳非五臟皆結也然則邪氣何以結於臟乎以臟結與結胸相似雖有陰陽之分但能食與下利不同耳因外邪陷入未結於胸而入於脾之大絡名曰大包者其絡出腋下足少陽膽經之淵液穴下三寸是也其脈若羅絡之布於胸脅邪氣入之故結於脾臟也時時下利者何也蓋胃主納而為水穀之海故內經以腸胃為倉廩之本若脾則主於散精而為胃行其津液者也蓋人之便瀉以時若有以節之者以脾氣能約束之耳五運行大論云地在太虛之中大氣舉之也蓋岐伯以大地喻人身之脾土也是以胃陽過強則脾太約而大便不易出如陽明篇所謂趺陽脈浮則胃氣強大便則難其脾為約者是也寒邪結臟則脾不能攝而水穀不得藏如五臟別論云魄門亦為五臟使水穀不得久藏是也脈要精微論云五臟者中之守也倉廩不藏者是門戶不要也得守者生失守者死今寸脈浮而邪不結於胃所以飲食如故關脈小細沉緊則寒邪結於脾而時時便瀉也其所以然者氣口主胃而關脈應脾也脈證若此者乃名臟結也舌上白苔而滑者胃中有寒也凡胃中有熱實則舌苔黃黑枯燥此則脾臟已為陰邪所結必更見陽證乃為易治如三陰證中之手足溫及熱多厥少者方為可治今言舌苔白滑則胃腑無陽故曰難治臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也此承上文又以申明舌上白苔滑者難治之義也言無論中風傷寒之邪入陽經則為陽證入陰經即為陰證臟本屬陰邪陷入之已成陰結必兼有陽證者則尚有熱邪可攻但邪既結於陰則太陽與陽明證在所必無庶幾三陽之第三層在軀殼之裡層者則少陽也少陽與軀殼以內之臟腑最為親近或尚有未盡陷入之邪留於少陽則當往來寒熱矣而又曰不往來寒熱是邪氣全不在陽經故無陽症也然邪結於裡或有躁擾不寧而其人反靜靜則又屬陰矣其舌上所見之苔則又滑而不燥大凡六經見症三陽邪熱歸胃則有舌苔其生也自白而黃自黃而黑至芒刺燥裂種種各異憑之以驗寒熱虛實而溫涼補瀉之真百無一失若果能審察精當心領神會實萬舉萬得所以舌苔從不誤人非若脈症之陰陽變幻真假虛實之難測也至若三陰受邪舌苔甚少即或有之亦灰白濕滑而已此云舌上苔滑則胃氣亦寒純是陰邪必當溫經復陽矣若攻之必敗庸可攻乎故云不可攻也成氏旁引仲景濕證原文之丹田有熱胸中有寒解之遂致後人因之而有丹田陰也胸中陽也熱反在陰而寒反在陽之說更後而又有仍其舊者曰丹田陰也反有熱胸中陽也反有寒是則其病不在表裡而在上下上下之邪相悖而不相入議論若此不知令後人作何參解若何會悟耶籲我恐義理幽深並注家亦未之或知也病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死痞者陰寒之積也臍之中央神闕也神闕者任脈穴也臍旁之左右各半寸腎經肓俞穴也少腹至陰之分也會陰曲骨中極關元氣海等穴任脈之所自起也自陰股入毛中循陰器抵少腹者足厥陰之脈絡也橫骨大赫四滿中注等穴足少陰之脈穴挾任脈之兩旁而行於少腹者也陰筋者足厥陰之絡引睪丸而結於莖者也言病人脅下平素向有陰寒之痞積連在臍旁腹三行之陰分而又因傷寒臟結之證其痛下引少腹入厥陰而控引睪丸之陰筋者此等臟結以陰氣過極陽氣竭絶故曰死
