body:
  text: 附錄三百九十七法一百一十三方辨論附評陶氏謬說按長沙自序中但云傷寒卒病論合十六卷自成無己注後王叔和本已不可復見未知其篇卷何似及嚴器之為成氏作序文云聊攝成公注成傷寒論十卷有三百九十七法一百一十三方至宋林億等奉詔校理傷寒亦云百病之急莫急於傷寒今校定傷寒論十卷總二十二篇證外合三百九十七法除重複定有一百一十二方以此推之方法之數雖出自後人然亦必有所因但惜其原本已失遠不可考耳觀前人指某條為一法某條二法又此篇共幾法彼篇又幾法皆屬勉強及至緊要之法反遺失而不錄所以王安道溯洄集中三百九十七法辨云以有論有方諸條數之則不及其數以有論有方有論無方諸條通數之則過其數遂至寢食與俱細繹其說始悟其所計之數於理未通若以法言則仲景一書無非法也豈獨有方者然後為法哉且如論證論法與夫諄諄教戒按之以為準則者其謂之法乎非法乎閱王氏此論前疑已如冰釋然三百九十七法之說原非出之仲景氏未可強求印合大約六經證治中無非是法無一句一字非法也其有方者未嘗無法而法中亦未嘗無方故以方推之則方中自有法以法論之則法內自有方不必拘拘於三百九十七也若必支離牽合以實其數則鑿矣故未敢以臆見揣度膠泥古人之活法也至於一百一十二方現在論中者固可徵信即後人加減失宜者亦可詳辨其有訛偽失真者亦不得不辨論也今人有一百一十三方之說蓋因朱奉議活人書誤以桂枝附子湯改為桂附湯重出於第十二卷之第十七方耳若去其重出者仍是一百一十二方後人又因一百一十三方之說而欲強合其數遂以蜜導膽導兩法分而為二以符其說而盛行於世活人書又於一百一十三方之外另增雜方一百二十六首如升麻湯陰旦陽旦湯黑奴丸霹靂散葳蕤湯五積散陽毒升麻湯葶藶苦酒湯之類其適於用者固有而不近於理者亦頗多至陶節庵傷寒六書之殺車槌三十七法既以仲景方改名增減又以各家之方改頭換面殊屬可笑如麻黃湯改為升麻發表湯增入升麻羌活川芎白芷不知升麻白芷已入陽明非太陽經藥矣又加江西豆豉一撮為槌法不知何意豈知仲景以麻黃杏仁俱為肺經專藥因肺主皮毛為內經開鬼門之要藥借之以開發腠理故能治頭痛發熱體痛嘔逆惡風無汗之傷寒陶氏不知經旨豈能窺仲景立方之義乎以桂枝湯改而為疏邪實表湯增入防風川芎羌活猶可而白朮之加殊屬不解又加膠飴二匙為槌法既非桂枝原湯又非小建中湯叛經亂法莫此為甚小柴胡湯改為柴胡雙解飲既雲和解表裡又妄加芍藥之酸收而以生艾葉汁三匙為槌法令人難解葛根湯改為柴葛解肌湯不知仲景之葛根湯其有麻黃者為太陽無汗之傷寒初傳陽明而設其桂枝葛根湯為太陽有汗之中風初入陽明而設舍麻黃桂枝則風寒不辨入柴胡芍藥則經絡無分又加石膏末一錢為槌法邪尚在表豈可即用石膏況又止一錢真如兒戲矣白虎湯改為如神白虎湯如神二字已屬陋語況不分虛實概加人參五味麥冬等收補之品殊失仲景白虎湯及白虎加人參湯之義又加淡竹葉為槌法氣味輕薄其可謂之殺車槌耶桃仁承氣湯改為桃仁承氣對子增入柴胡白芍枳實且白芍為斂陰止血之藥則蓄血之治安在更以蘇木汁三匙為槌法豈以三匙之蘇木汁偏能破血而專力於此耶四逆湯改為回陽救急湯既云回陽救急又增入補滯收斂之人參白朮五味半夏茯苓臨服又加麝香三釐不知無陽之證最不宜於發泄用此香竄走竅之物殊非正道全不虞其耗散真氣耶又治汗後大虛頭眩振振欲擗地肉瞤筋惕之衛虛亡陽證不用仲景論中之真武湯而以生熟地人參白朮黃耆芍藥當歸茯苓甘草陳皮肉桂等甘緩膩膈之品以治之又加糯米一撮為槌法濁亂黏滯不幾氣血兼補之十全大補湯矣直是不知醫者之妄作耳其可為天下法乎又以大小承氣調胃承氣及大柴胡湯改為六一順氣湯即以大柴胡湯去半夏加芒硝為之是無表裡輕重之分大失仲景立法之制矣入鐵鏽水三匙為槌法而云千金不傳之秘非吾子孫焉肯泄露如此家秘而又刊行於世其設辭也不亦陋乎其於陰陽易之燒裩散仲景原只取婦人男子中裩近隱處剪下燒灰以水和服方寸匕並無他藥王海藏云脈在厥陰當以當歸四逆湯下燒裩散在少陰當以通脈四逆湯下之在太陰當以理中湯同下所用之藥各隨其經而效自速也不然則陰腫或縮少腹絞痛手足蜷脈絕而死矣其後人之青竹茹湯及豭鼠糞湯恐未必能合仲景原文中之諸陰證也而節庵之治陰陽易則以人參知母竹青如卵縮腹痛倍加黃連甘草滑石生地韭根柴胡犀角然後反加燒裩襠末為己之槌法一派寒涼豈能治體重少氣少腹裡急陰中拘攣熱上衝胸頭重眼花膝脛拘急之諸陰寒見證哉又以東垣補中益氣湯改為調榮養衛湯增入川芎生地細辛羌活防風全不知東垣引清陽上升之義而混入血藥及發散風寒之物又以蔥白一莖為槌法不知仿仲景白通湯之義乎抑欲使其辛散發汗乎即黃龍湯一方又非活人書之黃龍湯矣活人則用柴胡黃芩人參甘草此以承氣而加人參雖為虛人胃實之所宜用然其中當歸一味不知何意承氣湯為攻下胃實之氣藥而忽加一血藥或者以為油當歸能滑利腸胃而取之然其識趣亦卑且陋矣其後悔悟而改作全生集閱其條例似有可觀究竟但以仲景之言發其端仍以背謬不經之臆見終其說抹殺仲景而奄為己有猶之可也其叛經亂法遺誤後人則如之何若舉其書而悉辨之則有不勝其辨者姑節取其大謬者略論其一二如一卷第三條以頭疼發熱惡寒脈浮緩自汗即仲景之所謂中風者改稱鼻塞聲重之傷風蓋仲景之所謂中風非半身不遂口眼歪斜語言蹇澀痰涎壅盛之中風也乃六氣中之風邪傷衛與寒傷營證並峙齊驅者非鼻塞聲重傷風咳嗽之小疾也傷風僅傷肺氣故鼻塞聲重而咳嗽無入里傳經之變故為病之輕所謂中風者風為陽邪性緩而入淺故必中而後傷衛氣若云乎傷則又淺矣非若寒邪鋒銳傷之即入營而為傷寒矣若寒邪稱中則必深入而犯三陰矣即陽明為兩陽合明之盛陽寒邪中之即不能食矣故中傷二字之淺深不可不辨庸可亂乎其一卷第五條中有脈沉足冷面赤微熱謂之夾陰傷寒不知此即仲景少陰篇中之手足厥逆脈微欲絕身反不惡寒其人面赤或腹痛或乾嘔之通脈四逆湯症及厥陰篇中之脈沉遲其人面少赤身有微熱之戴陽下虛證也又以脈沉足冷面青小腹絞痛而無熱者謂之夾陰中寒不知此即仲景厥陰篇之手足厥冷小腹滿痛冷結在膀胱關元症也陶氏不言少陰厥陰而名之曰夾陰則經絡無分矣不思所謂夾者夾雜之意若於三陽證中偶然見一陰症方可謂之夾陰若手足厥冷而至戴陽脈沉足冷而至面青小腹絞痛則純是陰寒極盛之證其可謂之夾乎前第四條即有無熱惡寒面青少腹痛足冷脈沉蜷臥不渴吐利舌卷囊縮昏沉手足指甲皆青冷過肘膝心下脹滿湯藥不受陶氏但謂之腎經挾陰中寒以理論之其見證若此恐不止於少陰腎臟一經矣仲景論中雖少囊縮一證而素問熱病論中即有六日厥陰受之厥陰之脈循陰器而絡於肝故煩滿而囊縮則知其病已入厥陰矣陶氏全然不曉何也更有以頭痛身熱惡寒拘急噁心中脘痞滿或吐或嘔或痛或瀉謂之夾食傷寒不知頭疼身熱惡寒拘急噁心即仲景論中所謂頭痛發熱身疼腰痛惡風無汗麻黃湯主之之太陽傷寒也中脘痞滿或吐或嘔或痛或瀉者乃寒邪犯胃之太陰病也陶氏豈猶未辨混為一串不分經絡而改名為夾食傷寒耶又以頭痛身熱惡寒微汗微渴蜷臥懶言脅痛骨腿痠疼為勞力傷寒尤為錯雜紊亂夫頭疼身熱惡寒微汗乃仲景論中之中暍也蜷臥乃仲景論中少陰厥陰證也脅痛少陽證也骨腿痠疼太陽經風寒表證也經絡混淆見症雜合而強名之曰勞力傷寒仲景論中六經證治並無此名豈非杜撰下文夾痰夾氣二段傷寒論中俱未有此脈證名目至於心胸脅痛小腹有痛處不移一般頭疼身熱惡寒煩熱而謂之血鬱內傷外感夫外感乃風寒外感即仲景所謂中風傷寒也內傷是飲食內傷即東垣脾胃論之一則也若夫血鬱二字恐亦從無此說既非傷寒蓄血又非婦人經閉又不言陰分血分如何受病殊屬不解想今街坊里巷俗稱跌打損傷為內傷之意故謂之血鬱內傷又因一般頭疼身熱故又曰外感耳苟非庸俗者流而能立名若是耶下文既曰名正則言順而謂有傷寒傷風傷暑傷濕溫病熱病時氣寒疫冬溫溫毒風濕濕溫中暍等證皆以傷寒稱之而曰以傷寒為病之總名豈知仲景論中有中風而無傷風有中暍而無傷暑有傷寒而無寒疫熱病即是傷寒並未分論蓋言寒邪中人鬱而為熱耳故黃帝未明其故於熱病論中問曰今夫熱病者皆傷寒之類也岐伯對曰人之傷於寒也則為病熱因寒鬱為熱故傷寒即稱熱病自王叔和傷寒例中有春夏多溫熱病句後人宗之而朱奉議成無己王海藏輩皆惑之遂以溫熱暑並論而有夏月暑熱病之謬說矣而不知內經以先夏至日者為病溫後夏至日者為病暑並無夏月稱熱病之例後人以暑作熱豈非謬甚又如傷寒中風有柴胡證但見一證便是不必悉具此仲景但論少陽一經之證未可六經通用而陶氏乃云上工問證以知外察脈以知內全在活法但見一二證便作主張不必悉具豈非以此為六經通用乎又云此理不明攻之為逆一逆尚引日再逆促命期此二句乃仲景論風溫證之不可誤治豈可移論他證又云如少陰證用白虎湯四逆散寒藥也且勿論四逆散本非寒藥但不熱耳而仲景少陰篇中從無用白虎湯者亂經壞法貽誤後人若此之類正所謂不待教而誅者也其可家絃戶誦為天下法乎致今之醫者舍天人之理而不究棄陰陽變化而不察內經畏其難解經穴厭其糾纏惟讀陶氏之書不須辨察陰陽何必六經分講凡有表證者大約以沖和湯芎蘇散神術湯及柴葛解肌湯正氣散等為便用渴則加天花粉知母胸滿加枳桔噁心乾嘔加薑汁半夏泄瀉加蒼白朮熱甚加黃連黃芩夾暑加香薷腹痛加木香天寒無汗加麻黃蘇葉頭痛加川芎眩暈加天麻咳嗽加金沸草五味子腳痛加牛膝木瓜之類令人一見了然並無難處人皆易而習之以為醫之為道盡於此矣遂恃此以為根蒂便覺胸次滿足高談闊論旁若無人侮慢矜誇靡所不至自以為雖岐伯復生仲景再世亦不我若矣以此自欺以此自誤又其誰惜之而不知自欺者必至欺人自誤者必至誤人揆厥所由非立說者之咎歟動氣臆說動氣一證皆見於臍之上下左右故謂之臍間動氣但仲景六經證治中全不吐露半字而獨於叔和諸可與不可中見之何也想仲景氏本無此名自叔和始創立其說耳所謂動氣者即仲景所謂心下悸臍下悸臍旁悸是也心下臍下即臍上臍下也臍旁即臍之左右也悸者築築然跳動也想叔和因之改名立義則動氣二字較之悸字似覺顯明易曉然所嫌者但有禁汗禁下及誤汗誤下之變而不明言其故並不立治法使後人臨症束手既不能闡明仲景之意反沉埋仲景之法於幽暗之中令後之學者毫無罅縫可尋是所謂非惟無益而又害之也其可謂之立法善後乎愚竊論之仲景論中如小建中湯心中悸而煩之治也炙甘草湯脈結代而心動悸之治也桂枝甘草湯發汗過多叉手冒心而悸之治也真武湯頭眩身瞤動振振欲擗地發熱心下悸之治也茯苓桂枝甘草大棗湯發汗後欲作奔豚臍下悸之治也凡此諸悸皆太陽誤治之虛邪所致也更有太陽病而小便利者以里無熱邪故也胃無熱邪而飲水過多致水停心下而悸也少陽一經有傷寒脈弦細頭痛發熱者已屬少陽而不可發汗矣若發其汗則邪氣入胃而譫語此因胃不和則煩而悸此誤汗之悸也少陽中風兩耳無聞目赤胸滿而煩在少陽已禁吐下若吐下之則悸而驚矣此誤吐誤下之悸也至於三陰皆陰盛陽虛之悸惟陽明一經皆實熱之症故獨無悸病是以知動氣一證皆屬虛邪難於汗下況初症當汗之時本絕無動氣者病至動氣為日已多邪已在裡寧可更發其汗乎惟舌苔黃黑乾厚胃脘至腹按之尚痛者雖在動氣之時猶有可下之症然動之甚而邪結膠固形體瘦脫元氣虛竭者亦為不治若症不犯劇而可治者雖至愈後飲食漸增形體漸復尚有動氣未除者可見臍為人之命蒂臍中一穴名曰神闕上則水分建里三脘諸穴為後天脾胃之所居飲食變化之關隘下則陰交石門關元氣海等穴為先天真陽之所藏升降呼吸之根源左右則天樞二穴也至真要大論云身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處身半所謂天樞也上勝而下病者以地名之下勝而上病者以天名之此皆所以辨天地陰陽勝復之氣以及六氣屈復報氣者也觀此則臍之關係非細其可令邪氣犯之使臟氣受傷致升降流行之氣窒礙阻塞而至築築然跳動乎然雖非輕症而亦非不治之症惟隨證之輕重以為輕重而已如叔和諸可與不可中其不可汗條下有動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水愚謂病至動氣為日不少已屬虛邪在裡寧有發汗之理所以發汗則虛陽上厥故衄而且渴心苦煩矣而不知汗後亡陽則胃陽虛損中氣已寒飲即吐水矣當擬以水入即吐之治可也又云動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤愚謂此亦邪氣在裡而不必攻表故汗之則徒傷衛氣真陽敗亡而頭為之虛眩衛氣不密而汗出不止矣且無陽氣以柔養其筋脈則陰寒遍體而筋惕肉瞤也當擬以振振欲擗地及誤服大青龍法酌治可耳又云動氣在上不可發汗發汗則氣上衝正在心端蓋臍上雖屬天氣而為陽分然其動氣已見邪已入腑豈宜誤汗汗之則陽氣大虧下焦之陰氣逆上而衝心矣恐不可作上篇其氣上衝之治當如欲作奔豚之法而或益之以溫經之藥為宜又云動氣在下不可發汗發汗則無汗心中太煩骨節苦疼目眩惡寒食則反吐谷不得前愚謂動氣既在臍下邪氣不惟在裡已入陰矣萬無發汗之理凡汗之出也必藉陽氣鼓動然後陰液外泄邪既在陰無陽氣以蒸動津液故發汗則無汗也心中煩而目暈虛陽上奔也骨節疼而惡寒陽氣虛而陰寒盛也食則反吐而不納穀者胃中虛冷也此皆誤汗亡陽之變也其不可下條中又有動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也既無舌苔黃黑又非胃脘繞臍硬痛自無可下之理果屬虛邪而妄下之自然胃中之津液內竭虛火上炎而咽燥鼻乾頭眩心悸也又云動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷若動氣在左皆屬少陽厥陰本無實邪下之則胃中陽氣傷敗寒在中焦所以腹內拘急食不能下而動氣更劇也此時雖有虛陽浮散於外而身熱其臥則如少陰之狀而欲蜷臥矣動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌若動氣在上則近於胃如舌苔黃厚胃脘繞臍硬痛而下之可也倘胃中空虛而下之四肢為諸陽之本而實稟氣於胃所以脾主四肢誤下則胃陽傷敗故虛陽暴厥而掌握中熱煩也四肢雖熱厥而身上反浮冷矣孤陽欲絕而熱汗自泄欲得冷水自灌洗也此所謂真寒假熱陽虛暴脫之變人但知誤汗可以亡陽而不知誤下之亡陽尤甚也又云動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也動氣既在臍下已屬三陰部分又誤下之則胃陽大損脾臟虛寒故腹脹滿元氣虛甚卒起而頭眩眼花也凡三陰下利清穀皆以四逆湯主治此因誤下大傷陽氣所致然虛痞條中仲景原云此非結熱但以胃中虛客氣上逆故使硬也此八條乃動氣誤汗誤下之變症未知果出之前哲或叔和之臆見今姑從其說而強解之未知然否也至於脈濡而弱弱反在關濡反在巔微反在上澀反在下等語其究歸於陽氣不足厥而且寒為陰經誤汗之變何不直言濡弱微澀之陰脈而多此四個反字更多在關在巔在上在下等隱怪之語且巔字之義殊屬難解不知以頭之巔頂為巔為上乎抑以脈之上候為巔乎或以寸口為巔為上乎此種秘語豈可作訓後之詞後復有其形相像根本異源食則反吐谷不得前及口雖欲言舌不得前又有舌萎聲不得前及遲欲從後救安可復追還等語詞義鄙俚文理紕謬絕非長沙口角故皆棄而不錄讀者鑑之銖兩升合古今不同辨論陶隱居名醫別錄云古秤惟有銖兩而無分名今則以十黍為一銖六銖為一分四分成一兩十六兩為一斤雖有子谷秬黍之制從來均之已久依此用之漢書律曆志云虞書曰同律度量衡所以齊遠近立民信也一曰備數二曰和聲三曰審度四曰嘉量五曰權衡五數者一十百千萬也五聲者宮商角徵羽也五度者分寸尺丈引也五量者龠合升斗斛也五權者銖兩斤鈞石也權者所以稱物平施知輕重也本起於黃鐘之重一龠容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石銖者物由微成著可殊異也兩者兩黃鐘之重也二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易兩篇之爻陰陽變動之象也十六兩成斤者四時乘四方之象也鈞者均也陽施其氣陰化其物皆得成就平均也三十斤成鈞者一月之象也石者大也權之大者也四鈞為石者四時之象也重百二十斤者十二月之象也此班固之說也其以千二百黍為十二銖是以百黍為一銖而陶隱居以十黍為一銖乃十之一耳自西漢至梁雖多歷年所其多寡之不同乃若是耶恐不能無誤謬也李巡云黑黍中之一稃二米者曰秠古之定律者以上黨秬黍之中者累之以生律度量衡後人以此黍定之終不協律或曰秬乃黍之中者一稃二米此黍得天地中和之氣而生者蓋不常有有則一穗皆同二米粒並均勻而無大小故可定律他黍則不然矣此黍粒大小不同之辨也而其多寡之殊自當以班志為準陶說為非矣至於斤兩之不同乃今古異制所以輕重絕殊後人不加考訂故有古方不可治今病之說耳按唐蘇恭云古秤皆復今南秤是也後漢以來分一斤為二斤一兩為二兩古方惟張仲景而已若用古秤則較為殊少矣元李東垣云六銖為一分即二錢半也二十四銖為一兩古云三兩即今之一兩云二兩即今之六錢半也李時珍曰蠶初吐絲曰忽十忽曰絲十絲曰犛四犛曰疒貢十犛曰分六疒貢曰字二分半也十疒貢曰銖四分也四字曰錢十分也六銖曰分二錢半也四分曰兩二十四銖也八兩曰錙二錙曰斤二十四兩曰鎰一斤半也准官秤十二兩三十斤曰鈞四鈞曰石一百二十斤也今古異制古之一兩今用一錢可也愚謂二十四兩准官秤十二兩即後漢一斤分為二斤一兩分為二兩之說也東垣謂古云三兩即今之一兩又非一斤分二斤一兩分二兩之法乃一兩分三兩矣則二十四兩豈能准官秤之十二兩哉宋沈括夢溪筆談辨鈞石法云石者五權之名重百二十斤後人以一斛為一石自漢已如此所謂飲酒一石不亂是也挽蹶弓弩古人以鈞石率之今人乃以粳米一石之重為石凡石者以九十二斤半為法乃漢秤三百四十一斤也以此較之則漢之一兩約宋之二錢七分若以古之三兩計之則宋之八錢也又不及東垣李氏所謂古之三兩即今之一兩矣筆談又云予考樂律及受詔改鑄渾儀求秦漢以前之度量鬥每鬥計六斗即當今一斗七升九合也秤三斤當今十三兩也一斤當今四兩三分兩之一也一兩當今六銖半乃二錢六分也為升則中方古尺二寸五分十分分之三即今尺一寸八分百分分之四十五強也又以此與鈞石法較之則秦漢以前之法較漢秤又覺稍輕而實相去不遠矣若統論之李東垣之一兩准古秤三兩猶未詳加考較尚覺粗疏失之太重不若沈存中以儒臣兼理天文樂律奉詔改鑄渾儀制熙寧晷漏象數曆法靡不通曉則其理深學博運思精密有非東垣李氏之所能幾及者又如李時珍之所謂今古異制古之一兩今用一錢可也此言非由考訂而來乃以臆見強斷之詞也倘據此用之寧毋失之太少乎若果如此說如仲景之五瀉心湯及小陷胸湯中之黃連旋覆代赭湯中之代赭石桂枝大黃湯中之大黃桃花湯中之乾薑皆用古秤一兩而分三次服之若以一錢准之又分為三次服則每服止三分三犛矣其何以治最劇最險之危證乎恐不若以宋秤准之猶是二錢六七分尚有三次分服之理又恐今秤更重於宋元秤並不得二錢七分矣但一時無從考較耳如東垣但據隋唐間復古之權量所謂三而當一者而不知宋時之權量已大於唐元時之權量又大於宋矣東垣元人竟不知宋時制度今有明三百年來其立法之更換人事之變遷又不同矣豈可以今比昔而曰古方不可治今病哉況漢之一兩為宋之二錢七分至元則約二錢半矣越有明以來恐又不及二錢半矣其水之一升即以尋常升斗之升當以二合半准之約即今之一飯甌也藥之升合即刀圭方寸匕中之升合也當以陶隱居之升法准之見小柴胡湯加減法中權量考見日知錄三代以來權量之制自隋文帝一變杜氏通典言六朝量三升當今一升秤三兩當今一兩尺一尺二寸當今一尺左傳定公八年正義曰魏齊鬥稱於古二而為一周隋鬥稱於古三而為一隋書律曆志言梁陳依古鬥齊以古升五升為一斗周以玉升一升當官鬥一升三合四勺開皇以古鬥三升為一升大業初依復古鬥梁陳依古秤齊以古秤一斤八兩為一斤大業初依復古秤今考之傳記如孟子以舉百鈞為有力人三十斤為鈞百鈞則三千斤晉書成帝紀今諸郡舉力人能舉千五百斤以上者史記秦始皇紀金人十二重各千石置宮廷中百二十斤為石千石則十二萬斤漢舊儀祭天養牛五歲至二千斤晉書南陽王保傳自稱重八百斤不應若此之重考工記爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣禮記宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角五獻之尊門外缶門內壺君尊瓦甒注凡觴一升曰爵二升曰觚三升曰觶四升曰角壺大一石瓦甒五斗詩曰我姑酌彼金罍毛說人君以黃金飾尊大一碩每食四簋正義簋瓦器容鬥二升不應若此之巨周禮舍人喪記共飯米注飯以實口君用粱大夫用稷士用稻皆四升管子凡食鹽之數一月丈夫五升少半婦人三升少半嬰兒二升少半史記廉頗傳一飯鬥米漢書食貨志食人月一石半趙充國傳以一馬自佗負三十日食為米二斛四斗麥八斛匈奴傳計一人三百日食用米冓十八斛不應若此之多史記河渠書可令畝十石稽康養生論夫田種者一畝十斛謂之良田晉書傅玄傳白田收至十餘斛水田至數十斛今收穫最多亦不及此數靈樞經人食一日中五升既夕禮朝一溢米暮一溢米注二十兩曰溢為米一升二十四分升之一晉書宣帝紀問諸葛公食可幾何對曰三四升會稽王道子傳國用虛竭自司徒以下日廩七升本皆言少而反得多是知古之權量比之於今大抵皆三而當一也史記孔子世家孔子居魯奉粟六萬索隱曰當是六萬鬥正義曰六萬小鬥當今二千石也此唐人所言三而當一之驗蓋自三代以後取民無制權量之屬每代遞增至魏孝文太和十九年詔改長尺大斗依周禮制度頒之天下隋煬帝大業三年四月壬辰改度量權衡並依古式雖有此制竟不能復古至唐時猶有大斗小鬥之名而後代則不復言矣山堂考索斛之為制方尺而深尺班志乃云其中容十斗蓋古用之鬥小歐陽公集古錄有谷口銅甬始元四年左馮翊造其銘曰谷口銅甬容十斗重四十斤以今權量校之容三斗重十五斤鬥則三而有餘斤則三而不足呂氏考古圖漢好時官廚鼎刻曰重九斤一兩今重三斤六兩今六兩當漢之一斤又曰軹家釜三斗弱軹家甑三斗一升當漢之一石大抵是三而當一也古以二十四銖為兩五銖錢十枚計重二兩二銖今秤得十枚當今之一兩弱又漢書王莽傳言天鳳元年改作貨布長二寸五分廣一寸首長八分有奇廣八分其圓好徑二分半足枝長八分間廣二分其文右曰貨左曰布重二十五銖頃富平民掊地得貨布一罌所謂長二十五分者今鈔尺之一寸六分有奇廣一寸者今之六分有半八分者今之五分而二十五銖者今稱得百分兩之四十二俗云四錢二分是則今代之大於古者量為最權次之度又次之矣大斗大兩漢書貨殖傳黍十大斗師古曰大斗者異於量米粟之鬥也是漢時已有大斗但用之量粗貨耳唐六典凡度以北方秬黍中者一黍之廣為分十分為寸十寸為尺一尺二寸為大尺十尺為丈凡量以秬黍中者容一千二百黍為龠二龠為合十合為升十升為鬥三斗為大斗十斗為斛凡權衡以秬黍中者百黍之重為銖應劭曰十黍為疒貢十疒貢為銖二十四銖為兩三兩為大兩十六兩為斤凡積秬黍為度量權衡者調鐘律測晷景合湯藥及冠冕之制則用之內外官司悉用大者按唐時權量是古今大小並行太史太常太醫用古因太史有度數分抄晷漏時刻太常有樂律分寸太醫有刀圭分兩升合故皆從古他有司皆用今久則其今者通行而古者廢矣杜氏通典載諸郡土貢上黨郡貢人參三百小兩高平郡貢白石英五十小兩濟陽郡貢阿膠二百小斤鹿角膠三十小斤臨封郡貢石斛十小斤南陵郡貢石斛十小斤同陵郡貢石斛二十小斤此則貢物中亦有用小斤小兩者然皆湯藥之用宋沈括筆談云予受詔考鐘律及鑄渾儀求秦漢以來度量計六斗當今之一斗七升九合秤三斤當今之十三兩是宋時權量又大於唐也元史言至元二十年頒行宋文思院小口斛又言世祖取江南命輸米者止用宋鬥斛以宋一石當今七斗故也是則元之鬥斛又大於宋也長沙無朱雀湯說或問漢張仲景立傷寒論其中有三百九十七法一百一十三方以治風寒暑濕之邪東有青龍湯西有白虎湯更有北方之真武湯中央雖無勾陳之名而有建中理中之治獨無南方朱雀湯者何也意者南方屬火太熱而不可用歟抑制方時遺失而未之有歟曰非也張仲景乃漢建安時人舉孝廉官至長沙太守始受術於同郡張伯祖蓋儒而通於醫者也晉玄晏先生皇甫謐序甲乙經云伊尹以元聖之才撰用神農本草以為湯液漢張仲景論廣湯液而為傷寒論學貫天人理窮精奧凡陰陽消息變化屈伸靡所不通其所著之論但默具其理於六經證治之中而不顯言其故者蓋以陰陽理數奧妙難知恐天下後世賢愚不等不能盡通其理故耳此正顯仁藏用之妙非秘密而不宣也後之讀之者又誰得其皮與其骨哉今以子之問請試論之夫青龍者東方之神屬木而主疏泄猶天地之陽氣鬱伏至春木行令則陽氣上騰而為風陽氣鼓動雷雨滿盈而鬱結之氣得伸矣白虎者西方之神屬金而主清肅天地之暑熱鬱蒸至秋金行令則天氣下降涼風薦爽玉露沛零而鬱熱之邪解矣真武者北方之神屬水與火故玄武之中螣蛇附焉即坎卦一陽居於二陰之象也坎本坤體以坤體之中乾陽居焉所以專主閉藏其陽氣於寒水之中而為龍蛇之蟄故曰潛龍勿用若夫失精泄汗陽氣外泄真火虛衰無根失守亢害上炎下焦虛冷厥逆瞤惕故以真武湯救之導使歸源令龍火潛淵然後波恬浪息是北方治水之中已具南方治火之法不必朱雀湯也然朱雀者南方之神丙丁離火是也乃後天之火非前坎中之火也然朱雀之用能瀉後天能補先天可寒可熱所以能瀉能補隨其所在故不可有定名也如論中之大黃黃連瀉心湯竹葉石膏湯越婢一湯葛根黃連黃芩湯茵陳蒿湯梔子柏皮湯大小調胃承氣等湯皆瀉後天實火之劑也而無朱雀之稱者蓋有深意存焉是故風寒暑濕燥火者天之六氣也水火木金土者地之五行也六氣無形而五行有質故易曰在天成象在地成形所以日月星辰為天之四象而分陰陽水火土石為地之四象而分剛柔陰陽無形而日月星則無形中之有形者也至辰則終無形也剛柔有體而水土石則成形中之有質者也至於火則有形而無質矣是以邵子皇極經世云天辰不見地火常潛彼蒼蒼者辰初未嘗有十二辰之分界也不過推步家指畫其經界耳與九州之分野無異也即使大地原無界畔亦無過積算家分其畎畝阡陌耳與天辰之分為十二無異也至於火之一象用之則有舍之則無用時雖見其形而實無體滅之則形體全無矣既無定形又無實證故不可有朱雀湯也所以地理家五行皆有巒頭星體而火星終不結穴至理然也夫火之為物無處無之或寓諸金石或取諸鑽燧或藏諸冰土皎日之中得之陽燧幽陰之境野燒如焚至於積油生焰照酒延燒俱能無中生有火雖不能獨立形體必藉他物成形然無往而不為妙用使天地無火則不能生長萬物人身無火則不能常有其生水無火之暖則凝結而不流通木無火之暖則鬱遏而不條達金無火之熔化則不能成其器用土無火之噓培則不能發育萬類天地萬物無火不成無往而不為用故重於用而略於體也是以仲景立方在太陽經誤治中即有桂枝加桂湯桂枝加附子湯真武四逆等湯之用在陽明一經俱屬胃家實熱尚有吳茱萸湯及陽明中寒例中有陽明脈遲食難用飽又陽明中寒欲作固瘕及脈浮而遲表熱裡寒下利清穀等條亦有四逆湯之治此皆補先天火虛之劑也陽經用之可謂有經有權能變能化況三陰篇之陰寒證治乎是仲景雖不立朱雀湯而朱雀已無往而不用之矣其屢用之而不立湯名者蓋亦重其用而略其體也其深明羲皇之四象而預得康節地火常潛之義乎嗚呼苟非洞徹陰陽深知理數而能如是乎
