body:
  text: 卷之十厥陰篇厥陰證治第二十一厥陰傷寒厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止厥陰者至陰也陰氣至此而極故謂之厥陰太少兩陰交盡之經為陰極陽回之處草木得陽氣而勾萌於至陰坤土之中在卦為泰在十二辰為寅陽氣將出而未出為尚未透地之木故在人為厥陰肝木至陽氣透地而草木發生在卦為大壯在十二辰為卯乃已出土而抽條發葉之木在人則為少陽而屬膽經矣前太陰為陰氣之純全有陰無陽故專以溫經為治少陰則陽氣初生於盛陰之中右屬三焦相火左屬膀胱腎水水火相須若寒邪犯臟則以溫經復陽為治陽邪入里則以滋陰清降為治厥陰雖屬至陰而陽氣已長陰陽相半矣然終是陰中之陽其氣猶未透達故通篇以熱多厥少為病之退熱少厥多為病之進先厥後熱熱後不厥者愈熱後厥逆下利煩躁者死也寒邪固多敗證而熱氣有餘者必發癰膿有熱在裡必圊膿血然雖發熱不死終不似有陰無陽下利厥冷煩躁及厥不還者死之為甚畢竟陰經以陽氣為重也夫足厥陰之脈起於足大趾上循足胕上踝交出太陰之後上膕循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之之後上入頏顙連目系上出額與督脈會於巔其支者復從肝貫膈上注肺邪入其經則陰邪自下迫陽於上故氣上撞心心中疼熱而消渴也消渴者飲水多而渴不止也陰中之陽受迫而在上故消渴而胃覺飢然終是陰邪所以不欲食客熱尚不殺穀況陰邪乎即使強食陰邪不能腐化濕熱鬱蒸頃刻化而為蛔隨陰氣之上逆故吐蛔也若不知而以苦寒誤下之則胃陽敗絕真陽下脫故利不止也厥陰中風厥陰中風脈微浮為欲愈不浮為未愈厥陰雖屬至陰然亦自有經若為寒邪中傷則為厥陰傷寒風邪中之則為厥陰中風然入里者多在表者少況邪入陰經脈多沉遲細緊故其邪不易出表若得微浮為邪氣向外仍歸太陽而欲解矣所以下文有解表用桂枝湯者蓋脈微則為無力浮則又為在表微則輕細和緩而知其邪氣已衰浮則邪氣還表而知其邪氣將散故為欲愈也若脈不浮則邪未出表故為未愈厥陰病欲飲水者少少與之愈邪在厥陰唯恐其下利厥逆乃為惡候若欲飲水是陽回氣暖胃中燥熱而渴已復歸陽明矣若熱氣有餘則又有口傷爛赤咽喉不利吐膿血之變故可少少與之令陰陽和平則愈也厥陰病欲解時從醜至卯上厥陰肝臟乃含生土中尚未透地之木自子而一陽初生木之萌芽未長故不可言木醜為二陽則陽氣已長草木之根荄已勾萌於陰土之中至寅而三陽將及透地陽氣已旺萌芽茁長將出未出之時也卯則陽氣已出草木發生正厥陰木旺之時邪氣至此而解矣故曰從醜至卯上厥熱辨論諸四逆厥者不可下之虛家亦然素問陰陽應象論云清陽實四肢陽明脈解云四肢為諸陽之本陽盛則四肢實邪入陰經則陽衰陰盛陽氣不能充實於四肢故四逆而厥冷厥逆則陽氣已微急當以溫經復陽為治若以苦寒攻下胃陽必敗絕矣故曰不可下之然不但諸四逆厥者不可下即氣血已虛胃氣不固元陽衰弱者亦然也世俗但知汗多亡陽下多亡陰不知誤下之亡陽尤甚也所以太陽誤下每致胃陽虛損而成結痞及協熱下利諸證也辨誤尚論云厥陰證仲景總不欲下無非欲邪還於表而陰從陽解也愚竊謂三陰皆不可下以陽氣已虛不可更下故也惟上文脈微浮者為還表其餘攻下之證亦是邪氣復還陽明而成胃實之證乃還陽非還表也凡厥者陰陽氣不相順接便為厥厥者手足逆冷者是也人身之陰陽六經相為表裡營衛周貫一身素問陰陽離合論云少陰之上名曰太陽太陰之前名曰陽明厥陰之表名曰少陽此即陰陽表裡而為一合也靈樞營衛生會篇云人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外營周不休五十度而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽二十五度分為晝夜日入陽盡而陰受氣平旦陰盡而陽受氣如是無已故無病也陰陽之氣不相順接者二氣偏盛偏虛不相接續故為厥然陽氣虛則為寒厥陰氣虛則為熱厥故厥論云氣因於中陽氣衰不能滲營其經絡陽氣損陰氣獨在故手足寒也厥逆之義見四逆散注中傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤此論熱厥之見證及誤治之變也一二日至四五日言或一二日即厥或至四五日而厥也厥者必發熱言邪入厥陰之經而手足厥者厥後必發熱非若寒厥之但厥不發熱也前熱者後必厥若邪入陽經則但發熱而不厥矣此因邪入陰經故雖先發熱者後亦必厥也素問陰陽應象論云寒極生熱熱極生寒也厥深熱深厥微熱微者言厥冷之甚者則發熱亦甚為證之重厥冷之微者則其發熱亦微為邪之輕即至真要大論所謂氣之勝復也岐伯曰勝有微甚復有多少此之謂也謂之熱厥者邪氣在裡阻絕陽氣不得通達流注於四肢而厥也與陽虛之厥冷迥異故應下之使熱邪下泄則陽氣流通矣然非謂厥深熱深而可峻攻大下也即下文下利而譫語者亦不過以小承氣湯和胃而已以其終是陰經鬱熱之邪故不可大下也前所謂諸四逆厥者不可下皆指陽虛之厥而言也所以下文即云虛家亦然蓋逆厥與虛家並論則知虛寒者不可下熱深者為可下也以應下之熱厥而不下反以辛溫升發之藥發其汗則必助胃家之鬱熱而變生矣然胃開竅於口熱氣不得下泄而上炎故必口傷赤爛也傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日已熱五日故知自愈此申上文厥者必熱熱者必厥之義言天地間陰陽對待寒暑兩停晝夜相半然後二氣均平而無陰陽之患故寒邪之入厥陰也因寒勝而厥其手足厥逆者五日寒邪既勝陽氣必復故其發熱亦五日設五日之後至第六日寒氣又當厥矣若不厥者其病自愈何也以其厥逆之時自始至終不過五日以其發熱亦是五日陰陽勝復之氣已平故知自愈傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者必便膿血此條較前熱多於厥為陽勝於陰乃寒邪退而陽氣已回故其病當愈自復熱四日之後至七日而熱猶不除是陽氣太過亢而為害熱蓄於裡必傷陰血腐變而便膿血矣傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也此言厥多於熱為陰勝於陽乃寒邪盛而陽氣衰人以陽氣為生陽衰則病陽盡則死故寒多熱少為陽氣退而其病為進也傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血此申上文厥微熱亦微之義也指頭寒亦陽氣不充於四末也言其為厥也甚微不至四肢厥逆但指頭寒也默默不欲食陰靜而闔也蓋陽氣用則能言能食如陽明熱盛而狂言譫語中風則能食中寒即不能食乃厥陰之本證少陽之兼證也然兩經皆有此證者以厥陰之脈挾胃屬肝絡膽上貫膈布脅肋循喉嚨與少陽之經脈行度相同而為表裡所謂肝膽臟腑相連也以指頭寒之微厥陰邪在裡故默默不言且不飲食也煩躁者熱邪亦在裡也熱雖少而不得發越故煩躁也煩躁數日而小便利色白者以熱邪本少久則自解故為熱除也欲得食者熱氣已除陰邪亦解陰陽平而胃氣和故其病為愈若厥而嘔則厥之微者變而為厥之甚其厥已深故陰氣上逆而嘔也且嘔而胸脅煩滿為少陽之本證熱邪內鬱而煩滿則其熱亦深故其後必傷陰而為便血也傷寒先厥後發熱而利者必自止見厥複利此亦申上文厥者必發熱發熱者必厥也言寒邪入厥陰先見四肢厥冷則寒邪在裡非惟陽氣不能充於四肢而厥且胃寒而津液不守陰寒下注則為下利矣至厥後發熱則陽回氣暖脾胃運行其利必自止若熱後復見厥冷則又複利矣所以陰經受邪必以陽回為主故下文有云雖發熱不死也傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹此承上文先厥後發熱利必自止而言也上文言見厥必複利此言利止不復見厥而反汗出咽中痛者乃後發之熱太甚鬱蒸而為汗上炎而作咽中腫痛故曰其喉為痹若如前厥後發熱無汗出則利必自止若發熱而利不止者熱邪必隨勢下流重傷陰分腐化而為膿血矣便膿血而成痢者熱已下泄不得上攻故其喉不痹除中辨論傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也自始發熱至夜半愈是上半截原文所以然者至必發癰膿止乃仲景自為註腳也但厥反九日而利句下疑脫復發熱三日利止七字不然如何下文有恐暴熱來出而復去二句且所以然句下云發熱六日厥反九日復發熱三日並前六日亦為九日是明明說出其為脫落無疑矣然何以知其為復發熱利止乎上條云先厥後發熱利必自止況自食索餅後並不言利是以知其復發熱而利止也言始初邪入厥陰而發熱者六日熱後厥者九日是發熱止六日而厥反九日厥多於熱者三日矣故寒邪在裡而下利也厥後復發熱三日利必自止大凡厥冷下利者因寒邪傷胃脾不能散精以達於四肢四肢不能稟氣於胃而厥厥則中氣已寒當不能食今反能食者似乎胃氣已回但恐為下文之除中則胃陽欲絕中氣將除胃中垂絕之虛陽復焰暫開而將必復閉未可知也姑且食以索餅索餅者疑即今之條子面及饊子之類取其易化也食後不停滯而發熱則知已能消穀胃氣無損而尚在其病為必愈也何也恐其後發之暴熱暫來出而復去故也食後三日脈之而厥後之熱續在者即期之明日夜半愈所以然者以其本發熱六日厥反九日計後三日續發之熱又三日並前六日亦為九日與厥相應為陰陽相均勝復之氣當和故期之旦日夜半陰極陽回之後其病當愈所謂厥陰欲解時自醜至卯上也所謂後三日脈之其熱續在為陰陽相當而愈則其熱當止矣若脈仍數而其熱不罷者此為熱氣有餘陽邪太過隨其蘊蓄之處必發癰膿也傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死此申上文除中之故並所以訓誨後人誤治之害也脈遲則為裡寒六七日則永不發熱而虛寒已久胃陽衰弱急當溫中救里允為恰當粗工不習不知脈遲為寒乃與黃芩湯以撤其熱是所謂虛其虛而寒其寒也如是腹中應冷胃寒當不能食矣今反能食豈理所宜然乃胃氣本寒又遭寒涼之誤胃中之陽氣欲絕中氣將除垂絕而虛火反焰不久當即滅故暫時欲食而反能食也謂之除中者胃中之陽氣淨盡無遺猶掃除之義胃氣一絕則生氣盡矣故曰必死蛔厥辨論傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩者此為臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利陽衰則脈微陰盛則厥蓋寒邪肆逆陽氣衰微而不能充貫於四肢也至七八日之久陰邪愈甚陽氣愈衰而周身之肌膚皆冷其人發陰躁無片刻暫安時者此為寒邪直入中臟臟受寒邪而發厥也為至危之候即外灸厥陰內投四逆若陽氣不回則亦死矣非蛔厥也若厥陰之寒邪在胃蛔動而厥者其人當吐蛔今病者靜而復時煩則非臟厥之躁無暫安時可比此為寒邪犯臟臟寒而蛔不能安於胃中隨陰氣之逆上入胸膈故時煩也臟厥與臟寒之淺深各異陽煩與陰躁之輕重不同所以須臾復止此臟厥與蛔厥之辨也厥陰之木邪犯胃本飢不欲食故得食而嘔又煩者蛔聞食之臭味而上攻所以其人當自吐蛔也蛔厥者當以烏梅丸主之又主久利者利久則胃氣虛寒大腸滑脫宜於溫補酸收雖有黃連黃柏亦合內經熱因寒用之法矣烏梅丸方烏梅三百個細辛六兩乾薑十兩黃連一斤當歸四兩附子六兩炮蜀椒四兩桂枝六兩當是桂非桂枝也黃柏六兩人參六兩上十味各搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧子大先食飲服十丸日三服稍和至二十丸禁生冷滑物臭食等吐蛔證非獨陰經有之陽證亦常有之陽明胃實穀食不化谷之餘氣濕熱鬱蒸化而為蛔隨嘔逆而上出繼而遂有癍黃狂亂之陽毒見證皆非烏梅丸之可治惟陰寒在裡臟寒而蛔厥者乃為恰當以脈微而厥為陽氣衰少故用乾薑附子以溫經復陽方中桂枝乃後人之誤臟寒則陰邪在裡當用肉桂以溫里且平厥陰之木邪可耳衛分無邪豈反用桂枝之達表耶細辛本入少陰性味辛溫亦能散寒而通陽氣惟當歸乃血中之氣藥與蛔厥無涉未詳其義或者如汪機本草所謂恐陰虛則陽無所附故用血藥補陰亦未可知然亦勉強之詞也烏梅蜀椒乃伏蛔之要藥蓋蟲得梅之酸則軟而無力上攻得椒之辣而蟲頭不敢向上故蛔得椒而頭伏也況椒性熱而下行可以去寒邪而為恢復真陽之助乎人參補氣益胃同姜附則能溫補中州黃連黃柏成氏謂蛔得甘而動得苦則安恐未必然是必用內經熱因寒用之法蓋恐寒邪拒格故用寒藥以引之如本篇乾薑黃連黃芩人參湯及少陰白通加豬膽汁湯之義也況為成劑待用之藥所服不過十丸至二十丸方雖大而用則小藥雖多而服則少猶大陷胸丸之大劑小用未足為峻也病人有寒復發汗胃中冷必吐蛔病人有寒者非寒邪在表也若在表則宜於發汗矣謂之有寒蓋陽氣衰少寒邪在裡也若復發其汗則虛陽又隨汗外泄里無陽氣故胃中冷也胃冷則蛔不安於胃而上出故吐蛔也厥陰熱證傷寒脈滑而厥者里有熱也白虎湯主之滑者動數流利之象無沉細微澀之形故為陽脈滑主痰食又主胃實乃傷寒鬱熱之邪在裡阻絕陽氣不得暢達於四肢而厥所謂厥深熱亦深也為陰經之邪復歸陽明故當清瀉胃熱而以白虎湯主之嘔而發熱者小柴胡湯主之邪在厥陰惟恐其厥逆下利若見嘔而發熱是厥陰與少陽臟腑相連乃臟邪還腑自陰出陽無陰邪變逆之患矣故當從少陽法治之而以小柴胡湯和解其半表半裡之邪也嘔家有癰膿者不可治嘔膿儘自愈凡諸嘔家有麻黃湯之嘔大柴胡湯之嘔小柴胡湯之嘔豬苓湯之嘔柴胡桂枝幹薑湯之嘔葛根加半夏湯之嘔吳茱萸湯之嘔黃芩加半夏生薑湯之嘔真武湯之嘔四逆湯之嘔乾薑黃連黃芩人參湯之嘔烏梅丸之嘔諸嘔家雖有陰陽寒熱之不同而皆有治法此因厥陰一經實陰陽相半而陽伏陰中故二氣和平病當自愈所以厥少熱多其病當愈寒多熱少其病為進也然熱不除者必便膿血熱氣有餘則發癰膿癰潰而嘔乃胃中應出之膿故曰不可治嘔膿儘自愈也厥陰寒證乾嘔吐涎沫者吳茱萸湯主之此以下皆陰盛陽微之證也靈樞經脈篇云足厥陰之脈挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後動則病胸滿嘔逆蓋嘔逆厥陰之本證也涎沫黏飲白沫也邪入厥陰之經寒邪上逆而乾嘔胃中虛冷而吐涎沫故以補中暖胃之吳茱萸湯主之嘔而脈弱小便複利身有微熱見厥者難治四逆湯主之嘔而脈弱則知非陽經之嘔矣且小便複利尤知里無熱邪而顯屬陰寒上文云厥者必熱熱後當復厥不厥者自愈則熱與厥不應並見此云身有微熱而反見厥是陽微不能勝盛陰故為難治此非上文熱不除者可比急當以溫經復陽為治而以四逆湯主之手足厥寒脈細欲絕者當歸四逆湯主之四肢為諸陽之本邪入陰經致手足厥而寒冷則真陽衰弱可知其脈微細欲絕者素問脈要精微論云脈者血之府也蓋氣非血不附血非氣不行陽氣既已虛衰陰血自不能充貫當以四逆湯溫復其真陽而加當歸以榮養其陰血故以當歸四逆湯主之當歸四逆湯方當歸三兩桂枝三兩芍藥三兩細辛二兩甘草二兩通草二兩大棗三十五枚上七味以水八升煮取三升去滓溫服一升日三服四逆湯者仲景所以治四肢厥逆者也陽氣衰微陰邪肆逆以致陽氣不充於四末而為四肢厥冷故用甘草為君以緩陰氣之逆又以乾薑附子補助其陽氣之衰此仲景立法命名之本義也此條之手足厥寒即四逆也故當用四逆湯而脈細欲絕乃陽衰而血脈伏也故加當歸是以名之曰當歸四逆湯也不謂方名雖曰四逆而方中並無姜附不知何以挽回陽氣即有桂枝亦不過解散衛邪之藥耳李東垣所謂氣薄則發泄桂枝上行而發表豈能如乾薑之溫中散寒耶細辛雖能溫少陰之經亦豈能如附子之補真陽而入命門乎且芍藥不過斂陰通草無非滲利又焉能治手足厥寒脈細欲絕哉如下文內有久寒者但加茱萸生薑而不及乾薑附子則知為前方中已有之物矣豈仲景制方治極陰最寒之證獨遺此二物耶是以不能無疑也恐是歷年久遠散失遺亡訛舛於後人之手未可知也不然何湯名四逆而藥物與四逆迥異耶或曰四逆散亦名四逆而用藥不同者何也曰四逆散乃治熱厥之藥所以不同此則治手足厥寒脈細欲絕之寒厥者可同日而語乎從來注傷寒家皆委曲順解曾不省察其理亦何異於成氏之隨文順釋乎尚論以為陰血不足宜用歸芍以濟其陰不宜用姜附以劫其陰即其人素有久寒者以但增茱萸生薑觀之則乾薑附子寧不在所禁乎愚謂此論恐未為確切仲景之立四逆湯專為四肢厥逆而設故寒厥之證無不用之何獨於脈細欲絕之手足厥寒及內有久寒者偏為禁忌耶若不審原文但依方立論不幾與仲景立方之意兩相矛盾矣其如後起者何故擬議之以俟明者之鑑云若其人內有久寒者宜當歸四逆加吳茱萸生薑湯此承上文言手足厥寒脈細欲絕固當以當歸四逆治之矣若其人平素內有久寒者而又為客寒所中其涸陰冱寒難於解散故更加吳茱萸之性臊苦熱及生薑之辛熱以泄之而又以清酒扶助其陽氣流通其血脈也當歸四逆加吳茱萸生薑湯方於前方內加吳茱萸半升生薑三兩上九味以水六升清酒六升和煮取五升去滓分溫五服病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也手足厥冷則知陽微陰盛致陰陽不相順接而四肢厥逆矣不結胸則邪不在陽位而陽經無邪矣小腹滿按之痛者至真要大論云身半以下地氣主之靈樞經脈篇云足厥陰之脈起於足大趾叢毛之際上循足胕交出太陰之後循股陰入毛中過陰器抵小腹此因邪入厥陰寒邪結在膀胱關元故小腹滿按之痛也蓋熱結膀胱則熱蓄下焦迫血妄行故小便自利而血蓄於下此所謂冷結膀胱關元者言小腹者膀胱之所居也關元者任脈穴也在臍下三寸為小腸之募亦穴之在小腹者總指小腹滿痛而言故謂冷結在膀胱關元也寒在小腹下焦無火氣化不行故為冷結在膀胱關元也急宜溫暖下焦祛除陰翳乃其治也病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散上文言不結胸此言邪結在胸中同一手足厥冷之陰邪一則不結於胸而邪在下故小腹滿痛一則仍結於胸中而邪在上故心下滿而飢不能食在下則寒邪已入至陰之分所以當用溫法以回陽氣在上則寒邪猶在陽位所以當用吐法以去寒邪蓋以邪入之淺深而分補瀉也夫緊為寒脈在陽經則為寒邪在表在陰經則為寒邪在裡若手足厥冷則脈當沉遲矣乃忽見緊脈知寒邪猶未深入邪當結在胸中若見心下滿而煩飢不能食則其所以滿者陰邪在膈而脹滿也煩者膈間之陽氣不得伸也飢者胃陽猶未傷也不能食寒邪在胃也故為病在胸中若如前寒已深入則胃氣已傷陽氣已損則但有溫經扶陽之治而無汗吐下之法矣寒在胸膈則邪氣未深尚在陽分因其近而取之當用高者越之之法故須吐之宜瓜蒂散假借胃中之陽氣以湧出胸中之寒邪則無敗胃深入之患矣傷寒五六日不結胸腹濡脈虛復厥者不可下此為無血下之死五六日邪氣入里之候也不見邪結於胸而腹軟脈虛腹軟則里無邪結脈虛則正氣衰弱而復見四肢厥逆則知寒邪入厥陰而為無陽之證矣故不可下然不曰無陽而以腹軟脈虛為無血無血二字最為難解若不得已而強解之則經所謂脈者血之府也蓋氣血之動處為脈陽氣盛則陰血流行脈虛則陽氣不旺營血不充是以謂之無血若下之非但更亡其陰血並真陽而亦梏亡之矣故曰下之死義見霍亂條下傷寒脈促手足厥逆者可灸之辨脈法云脈來緩時一止復來者名曰結脈來數時一止復來者名曰促陽盛則促陰盛則結此皆病脈夫數脈所以候陽故曰陽盛則促促乃陽勝於陰陰氣不接而斷續也此條之脈促偏見之於手足厥逆似乎脈不應證或謂脈促而手足厥逆乃熱厥也然則何以云可灸之耶仲景之於陽邪最忌火劫已見於太陽篇矣豈有陽盛則促之熱厥而反有灸之之理此所謂脈促者非結促之促乃短促之促也陰邪太盛孤陽不守故脈作虛數而短促當急救其垂絕之虛陽故云可灸灸者如下文灸厥陰也傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死傷寒至六七日邪入已深正邪傳厥陰之候也脈微則陽氣大虛手足厥冷則陰邪肆逆故盛陰迫脅其虛陽而上逆所以陽欲盡而煩陰氣極而躁也邪在厥陰陽氣將竭於溫經復陽之外當灸厥陰經之脈穴即本經之井滎輸經合是也灸之而手足溫者生若手足仍冷陽氣不還者死也厥陰誤治傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之邪在少陽才屬半里已是禁下況三陰平蓋陰邪在裡皆陰盛陽虛之證故無下法即太陰有桂枝大黃湯之下法因大實而痛邪氣復歸陽明仍屬胃實故為可下然猶以胃弱易動尚宜減之少陰雖有急下三條亦是陽經傳邪及復還陽明之證所以可下至厥陰為陰中含陽之體陽氣藏於至陰之中乃陰之極處庸可大下乎所以本篇首條即有下之則利不止之禁也厥陰全篇惟厥深熱亦深者方為應下苟屬寒厥則又在禁例矣故有諸四逆厥者不可下之誡也此條脈證最劇在長沙已稱難治而猶立方主治者以厥陰與太少不同故也夫太陰為立冬之候純陰之臟也少陰為冬至之時乃陽氣之初生而厥陰則立春之氣陰中之陽氣已半將出地而未出之時陽氣已長但鬱結未之伸耳故厥者必熱而厥深熱亦深也傷寒之六七日已在大下之後則誤下已在六七日之前在陽經尚有表證未解者況陰經本不可下而妄下之使未解之經邪陷入於至陰之中矣寸脈者氣口也經云氣口獨為五臟主胃為水穀之海苦寒傷胃胃陽衰而寸脈沉遲也手足四肢也經云四肢為諸陽之本陽盛則四肢實此以陽虛故手足厥逆也下後陽虛於下故下部脈不至下寒則熱迫於上故咽喉不利而吐膿血也即前所謂厥後熱不除者必便膿血熱氣有餘必發癰膿及口傷爛赤之變詞也泄利不止寒邪在下所謂厥者必利亦即首條下之利不止之義也正虛邪實陰盛陽衰寒多熱勝表裡舛錯治寒則遺其熱治熱必害於寒補虛必助其實瀉實必虛其虛誠為難治仲景不得已立麻黃升麻湯主之辨誤原文咽喉不利吐膿血句成注謂厥陰之脈貫膈注肺循喉嚨邪在厥陰隨經射肺因亡津液遂成肺痿又引金匱要略云肺痿之病從何得之被快藥下利重亡津液故得之與麻黃升麻湯以調肝肺之氣尚論即取其說以為解而方氏條辨亦云唾膿血者肺金燥而痿也葳蕤門冬以潤肺三家之說雷同大約以葳蕤門冬起見故皆曰肺病不知原文中一則曰熱氣有餘必發癰膿再則曰咽喉不利唾膿血其後又總結叮嚀之曰嘔家有癰膿者不可治嘔膿儘自愈成氏於此條又另解之曰胃脘有癰則嘔而吐膿同一癰膿一解之曰肺痿一注之曰胃脘有癰前後不同始終各異使後學安所適從真所謂忘前失後漫不經心者矣愚竊以為未安潛推其義原文曰咽喉不利蓋咽通胃而喉通肺仲景但統而言之者非有肺胃之分也不過指熱邪在上而言耳曰唾膿血又曰嘔家有癰膿曰吐曰嘔並無一字關涉肺臟者若果屬肺痿自當云咳膿血矣既不曰咳則知不在肺矣既謂之吐又謂之嘔則癰膿必在胃脘矣更進而求之又知石膏知母黃芩乃清胃熱也葳蕤門冬所以滋養陰氣也豈為肺病而設哉況厥陰木邪多能傷土雖或有侮所不勝者然不能傷金至甚亦五行自然之理少陽篇雖有縱橫二證乃陽邪之變非陰邪之所能明於理數者當自知之無煩多贅也麻黃升麻湯方麻黃二兩半去節升麻一兩一分當歸一兩一分知母黃芩葳蕤各十八銖石膏白朮乾薑芍藥天門冬去心桂枝茯苓甘草各六銖上十四味以水一斗先煮麻黃一二沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈陰經惟以陽氣為重而無下法蓋厥陰之陰陽相半尤為不可偏勝大凡厥陰寒邪必至發熱之後則陽回氣暖而解矣若其發熱不止則又為熱氣有餘若熱在下焦必便膿血熱在上焦則吐膿血即有當下之時亦無大下之理一誤下之危變立至矣此因誤下寒邪陷入陰中故以麻黃為君升麻為臣桂枝為佐以升發其寒邪發越其陽氣也知母黃芩為臣所以殺其鬱熱之邪也石膏為佐所以清肅上焦利咽喉而解胃熱也當歸葳蕤天冬芍藥養血滋陰所以治膿血也白朮補土乾薑守中甘草和脾茯苓淡滲皆所以溫裡寒而理中焦補下後之虛治泄利之不止也此條脈證雖繁治法雖備然終是寒邪誤陷所致故必待麻黃升麻桂枝之汗解而後可愈故麻黃升麻之分兩居多也或問此條原文中如寸脈沉遲乃寒脈也手足厥逆乃寒證也下部脈不至下焦虛寒也泄利不止中氣虛寒也唯咽喉不利唾膿血方為熱證以脈證論之寒多於熱而仲景立方治熱者反多治寒者反少何也曰仲景醫聖洞曉陰陽深知消息故能立法垂訓豈有誤哉蓋因此條之寸脈沉遲手足厥逆等陰寒脈證皆誤下之變非本然自有之證即使如上文本證自見之厥亦有熱鬱之厥故厥者必發熱而有熱不除及熱氣有餘之變證熱藥可重用耶況寒證雖現而咽喉不利吐膿血之熱證亦現即上文厥者必發熱之註腳也又何怪其立方之寒多於熱哉至下文下利厥逆者乃為有陰無陽之證方有四逆湯之治矣至既發熱而厥利至甚躁不得臥則陽氣竭絕而死矣故不得不以溫熱為治也但熱勝不過發癰膿便血耳無陽則生氣絕滅矣故陰經必以陽氣為重也傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之本自寒下謂本來所犯之證已自寒中下利醫不知其為裡寒而復以寒藥吐下之乃所謂虛其虛而寒其寒也遂至胃陽敗損寒踞中焦寒邪拒格比前本症之寒下不同更變逆而為上吐下利矣所謂寒格者若食入口即吐則藥入口亦即吐寒中而投之以熱藥是裡寒拒外熱也治之之法當以乾薑黃連黃芩人參湯主之乾薑黃連黃芩人參湯方乾薑三兩黃連三兩黃芩三兩人參三兩上四味以水六升煮取二升去滓分溫再服方氏條辨云寒格謂藥寒致成拒格也乾薑人參正治以遏其吐下黃連黃芩反佐以通其拒格可謂詞簡理明深得素問至真要大論熱因寒用之旨所謂奇之不去則偶之偶之不去則反佐以取之寒熱溫涼反從其病之義及仲景白通加豬膽汁湯之法也尚論謂用黃連黃芩之苦以下逆氣而解入里之熱邪誤矣以傷寒本自寒下又寒格更逆吐下矣豈又有熱邪入里耶方喻兩說大相懸絕矣傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也傷寒而大吐大下則胃中陽氣極虛矣復極汗出者非又汗之而極出也因大吐大下之後真陽已虛衛外之陽不能固密所以復極汗出乃陽虛而汗出也愚醫尚未達其義以其人外氣怫鬱本是虛陽外越疑是表邪未解復與之暖水以發其汗因而得噦噦者呃逆也其所以噦者蓋因吐下後陽氣極虛胃中寒冷不能運行其水耳非水冷而難消也水壅胃中中氣遏絕氣逆而作呃忒也治法當擬用五苓散理中湯甚者四逆湯可耳傷寒噦而腹滿視其前後知何部不利利之則愈噦者胃陽將敗氣不流行而呃逆也腹滿寒在中焦太陰脾病也前後者大小便也夫噦之為病最不易治得愈者少而曰利之則愈者蓋以腹滿故也若胃敗之噦中氣已壞真陽欲絕庸可愈乎素問寶命全形論云絃絕者其音嘶敗木敷者其葉發病深者其聲噦是謂壞腑毒藥無治短針無取矣此所謂腹滿者乃腹中脹滿裡實之證水穀不得分消中焦壅塞胃氣不得流行之噦乃淺證也非胃氣傷敗之噦故云視其前後知何部不利若小便不利則利其小便大便不利則利其大便前後得利則腹滿消胃氣行而愈矣厥陰熱利熱利下重者白頭翁湯主之謂之熱利非復如前厥後之熱直本熱之利也熱邪在裡濕熱下滯故以白頭翁湯主之白頭翁湯方白頭翁三兩黃連三兩黃柏三兩秦皮三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升白頭翁神農本經言其能逐血止腹痛陶弘景謂其能止毒痢東垣李杲曰仲景治熱利下重用白頭翁湯蓋腎欲堅急食苦以堅之即成氏之說也又云治男子陰疝偏墜蓋亦厥陰專經之藥故仲景用之為君以治厥陰熱利黃連苦寒能清濕熱厚腸胃黃柏瀉下焦之火若中氣虛寒及寒濕下利者最忌熱利則非此不可故以之為臣秦皮亦屬苦寒李時珍云梣皮色青氣寒味苦性澀乃厥陰肝少陽膽經藥也治下痢崩帶取其收澀也以此推之則創法立方之義殆可見矣下利慾飲水者以有熱故也白頭翁湯主之此又申上文熱利之見證以證其為果有熱者必若此治法也夫渴與不渴乃有熱無熱之大分別也里無熱邪口必不渴設或口乾乃下焦無火氣液不得蒸騰致口無津液耳然雖渴亦不能多飲若胃果熱燥自當渴欲飲水此必然之理也寧有里無熱邪而能飲水者乎仲景恐人之不能辨也故又設此條以曉之曰下利渴欲飲水者以有熱故也白頭翁湯主之辨誤羅天益云少陰自利而渴乃下焦虛寒而用四逆者恐不可以渴不渴分寒熱也正當以小便黃白別之耳愚考羅天益乃前輩中之頗著者而猶作此論何也前注傢俱以原文自利不渴者屬太陰自利而渴者屬少陰截去下文不講遂欲以為定論致羅氏亦有不可以渴不渴分寒熱之語不知仲景原云自利不渴者屬太陰下文即曰以臟有寒故也當溫之宜服四逆輩因太陰以純陰為體無虛假之見證此陰寒不渴之正體也云自利而渴者屬少陰下文即曰虛故引水自救小便色白者以下焦虛有寒不能制水故令色白此又因少陰為坎水其卦為復乃陰中含陽之體龍火藏焉故陰盛逼陽於上所以陰邪在下則自利虛陽在上則渴此陰寒反見之假證也其理隱微豈能智愚均曉仲景恐人之不喻也故但云引水自救而已下文仍證云以下焦虛有寒則知非有熱而渴乃渴之變體也至於厥陰一經雖為陰之極處而陽氣已長其卦為泰乃陰陽相半之體陽氣且出因寒邪在裡故有飢不能食食則吐蛔之陰寒見證而陰氣迫陽上逆遂有氣上撞心心中疼熱而消渴矣此又渴之反體也若此者真假虛實其辨甚微羅氏亦稱著述家豈猶未知陰陽消息昧於至理而立說若是耶若云不可以渴不渴分寒熱當以小便黃白為別不知三陽證中亦有邪未入里而清便自調者亦有陰寒條下小便不利者孰知小便之多者似乎無熱其色尚有黃赤者或陰寒在裡氣化不行小便短少而色亦有黃者總之小便多則其色漸淡少則其色便黃又不可以陰陽寒熱拘也大約小便多者為無熱或熱在血分而無傷於氣分耳小便少者陰陽寒熱皆有之當以他證合辨則庶乎其不差矣肯堂王氏於準繩注中亦即以羅說為解恐未足為後學之指南故聊為之置辨下利後更煩按之心下濡者為虛煩也宜梔子豉湯此以下二條乃自陰還陽之證治也下利後者言下利已過之後也下利得止則知陽氣已回矣而更煩則知陽已稍勝雖不能更上而作喉痹亦不得下走而更便膿血矣然則陽邪在膈而煩按之心下軟者既非胃實可下之證亦非熱邪在胃欲作癰膿之比乃下利之後正氣已虛熱氣初復之勝氣所致乃六氣勝復之虛邪是為虛煩虛邪在膈無用攻發故當如太陽汗吐下後之心中懊憹虛煩不得眠心中結痛等證之法及陽明下後之胃虛煩熱之治亦宜以梔子豉湯吐之下利譫語以有燥屎也宜小承氣湯陰邪下利無譫語之證然苟非陽明胃實焉得譫語若無形之邪或可自陰還陽仍歸陽明中土至若燥屎乃腸胃有形之宿垢豈能轉移於經絡臟腑之間乎世俗但見下利惟苦其利而欲求其止不知譫語之下利乃胃中之實熱有燥屎故也宜小承氣湯微利之燥屎得去利自止矣內經所謂通因通用是也有燥屎而用小承氣者以陰經無大熱非比陽明熱邪之盛即太陰篇所謂胃弱易動故也厥陰寒利三陰皆有下利要皆不離乎太陰至厥陰則木邪賊土陰寒傷胃較之他經尤甚故其見證頗與前兩經有相似者但總載厥陰篇後以便臨證彷彿其治非謂厥陰一經獨有之證也傷寒厥而心下悸者宜先治水當用茯苓甘草湯卻治其厥不爾水漬入胃必作利也金匱云水停心下甚者則悸太陽篇中有飲水多者心下必悸此二語雖皆仲景本文然此條並不言飲水蓋以傷寒見厥則陰寒在裡裡寒則胃氣不行水液不布必停蓄於心下阻絕氣道所以築築然而悸動故宜先治其水當服茯苓甘草湯以滲利之然後卻與治厥之藥不爾則水液既不流行必漸漬入胃寒厥之邪在裡胃陽不守必下走而作利也傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也傷寒四五日邪氣入里傳陰之時也腹中痛寒邪入里胃寒而太陰脾土病也轉氣下趨少腹者言寒邪盛而胃陽不守水穀不別聲響下奔故為欲作自利也下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯此言有表有里之下利也陰寒在裡則腹必脹滿寒邪在表則身體疼痛表裡俱寒故成寒下之證也下利而腹脹滿者太陰脾臟已為厥陰寒邪所傷胃陽將敗所當急救而其在表之寒邪未致即成敗證故先溫其里乃攻其表溫里宜四逆湯以驅除寒氣恢復真陽然後用桂枝湯攻表以散經邪然桂枝湯原為傷寒之禁劑而身體疼痛乃寒傷營之表證也以寒傷營之表證而又以桂枝湯攻表者以陰經無陽之證非比陽經表實之寒邪故不宜以麻黃湯更亡其陽而反宜以桂枝湯通行其陽氣以芍藥收斂其泄利之脾陰更和之以薑棗則表邪解而愈矣此所謂不宜之宜仲景之圓機活法也下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也此言裡寒甚而表證微不須解表但當治裡寒之下利也下利而脈見沉遲則寒邪在下面少赤則虛陽在上身有微熱則稍有表邪下利清水完穀則胃氣虛冷而裡寒甚矣裡寒則逼陽於外故必至於鬱冒汗出而解也如此者病人必四肢微厥推其所以然之故蓋其人面少赤者陰寒上逆虛陽受迫而上浮其面赤為戴陽乃下焦真陽大虛故也下利清穀不可攻表汗出必脹滿此有里無表之下利也下利清水完穀則寒邪已甚而無身體疼痛之表證則知寒邪在裡而不在表矣故不可攻表若不知而妄發其汗汗出則陽氣隨汗而泄胃陽大損而裡寒更甚故必脹滿也下利清穀裡寒外熱汗出而厥者通脈四逆湯主之此又立外熱非表症之辨也言下利清穀則裡寒已甚而又外熱似有表邪然猶自汗出而四肢厥冷者乃冱寒在內逼陽於外其外熱非表證也真陽大虛衛氣不密故汗出而厥非前鬱冒之汗也當於四逆湯內倍加乾薑名通脈四逆湯主之大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之若有表邪而大汗出則熱當去矣汗出而熱不去又似陽明入里之證而不知內拘急者即經所謂諸寒收引也四肢疼者陽虛而不充於四肢也既大汗熱不去而又下利厥逆而惡寒者是陰邪盛極於裡陽氣飛越於外非表邪也急當收復陽氣驅散寒邪故以四逆湯主之大汗若大下利而厥冷者四逆湯主之上條大汗出而熱不去此條大汗出而不言熱是無熱矣或曰上文下利厥逆而惡寒且多內拘急四肢疼之證此條亦大下利厥冷而不惡寒其不言熱乃陽氣猶未飛越於外得毋較前為稍輕乎曰無熱則陽氣更微大下利則陰邪更盛故仲景亦以四逆湯主之下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死晬時周時也夫寒邪下利而六脈已絕手足厥冷萬無更生之理而仲景猶云周時脈還手足溫者生何也夫利有新久若久利脈絕而至手足厥冷則陽氣以漸而虛直至山窮水盡陽氣磨滅殆盡脈氣方絕豈有復還之時惟暴注下泄忽得之驟利而厥冷脈絕者則真陽未至陡絕一時為暴寒所中致厥利脈伏真陽未致陡絕故陽氣尚有還期此條乃寒中厥陰非久利也故云晬時脈還手足溫者生若脈不見還是孤陽已絕而死也下利手足厥冷無脈者灸之不溫若脈不還及微喘者死陰寒下利而手足厥冷至於無脈是真陽已竭已成死證故雖灸之亦不溫也若脈不還反見微喘乃陽氣已絕其未盡之虛陽隨呼吸而上脫其氣有出無入故似喘非喘而死矣傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也六七日邪不在表入里傳陰之時也陰寒在裡則當下利邪不在表則不當發熱以六七日而未見下利乃忽發熱而反見下利者上文云先厥後發熱利必自止今發熱而反利前云發熱無汗利必自止今發熱下利而汗出不止則知其證有大相徑庭者矣夫先見之厥利乃陰寒所致發熱則陽氣已回寒邪解散故利必自止此云六七日不利便發熱而利非惟利者不能因發熱而自止即不利者因發熱而反利矣同一發熱而有利止與反利之大異何也蓋因此條之發熱既曰有陰無陽則非陽回之發熱乃陰邪太甚真陽失守而飛越於外故陽虛而腠理不密所以汗出不止也惟其真陽外越而發熱所以汗出不止又因汗出不止則真陽益隨汗而盡泄所以陽亡而死也仲景之文雖意在言表令人自悟乃著書之體也然於末句仍直指之曰有陰無陽故也後世學者果能尋繹其文不幾思過半乎發熱而厥七日下利者為難治上文云厥者必發熱前熱者後必厥又云發熱四日厥反三日復熱四日厥少熱多其病當愈厥四日熱反三日復厥五日寒多熱少其病為進又云先厥後發熱利必自止見厥複利皆以陽回陰退為愈陰勝陽負為劇之明驗也今先發熱而厥七日則厥之多不待言矣厥多而寒盛於裡復至下利則腔腹之內臟腑經絡純是陰邪全無陽氣雖真武四逆白通等溫經復陽之法恐亦未能挽回陽氣故曰難治傷寒發熱下利至甚厥不止者死發熱則陽氣已回利當自止而反下利至甚厥冷不止者是陰氣盛極於裡逼陽外出乃虛陽浮越於外之熱非陽回之發熱故必死也傷寒發熱下利厥逆躁不得臥者死發熱下利厥逆與上文同義躁不得臥者陰極而虛陽受迫陽氣將絕而躁擾不得安寧故死也即上文寒邪中臟七八日膚冷躁無暫安時之臟厥是也傷寒下利日十餘行脈反實者死傷寒而至下利則裡寒而胃陽不守可知其脈自當沉遲微弱矣況一日十餘行則其利已甚脈當大虛寧有反實之理此所謂實者乃陰寒下利真陽已敗中氣已傷胃陽絕而真臟脈現也真臟脈者如素問陰陽別論所謂肝至弦絕急十八日死言肝木之邪剋土則脈弦絕而急至十八日而死矣其所以十八日者以四季各土旺用事十八日言十八日之內土旺則不死至不旺則死矣又如平人氣象論云如新張弓弦曰肝死銳堅如烏之喙如鳥之距如屋之漏水之流曰脾死發如奪索辟辟如彈石曰腎死之類是也寒利回陽下利有微熱而渴脈弱者令自愈此以下所以申上文先厥後發熱而利者必自止之義也言陰寒下利設身有微熱而渴乃陽氣漸回陰邪已退之兆非大熱而熱氣有餘之比若虛陽飛越於外而熱則寒盛於裡雖熱亦不渴矣故知為欲愈也然必脈弱者方見其裡氣本然之虛無熱氣太過作癰膿便膿血及喉痹口傷爛赤之變故可不治令其自愈也若或治之或反見偏勝耳下利脈數而渴者令自愈設不瘥必清膿血以有熱故也此承上文言下利而渴者固不必治療當令其自愈矣設病不瘥必清膿血清與下文圊字同義即便膿血之痢也其所以然者前脈弱者里無熱邪故可令自愈此因脈數有熱在裡故也下利脈數有微熱汗出令自愈設復緊為未解此又總申上文下利身有微熱而脈數之義也言前條所云陰寒下利身有微熱而渴為陽氣漸復若脈弱者可不治而令其自愈矣次條又言下利脈數而渴者本可自愈設不瘥以有熱在裡必清膿血此脈弱與脈數之異也脈弱乃虛陽漸復之機猶少陰篇所謂脈微續者生之義也脈數則嫌其復還之熱太過所以必圊膿血也何也以厥陰之體陰陽相半不可偏勝故也此條又言下利微熱而脈數若汗出者亦可自愈脈數則太過之熱邪內郁故必清膿血汗出則熱氣外泄故膿血可免而亦令自愈也設其脈復緊在陽經為寒邪在表在陰經則為寒邪在裡其下利之證猶未解也平脈篇云假令下利以胃中虛冷故令脈緊也下利寸脈反浮數尺中自澀者必圊膿血浮為在表數則為熱厥陰下利寒邪在裡脈必沉遲不應有浮數之脈故曰反也寸脈指氣口胃脈而言也何以知之試觀平脈篇中每以趺陽寸口並論蓋以胃脘之陽為二十五陽之主水穀之海五臟六腑之大源後天資生之本也即仲景自序中所云人迎趺陽三部不參者是也人迎結喉兩旁各一寸半之動脈也趺陽足跗上之動脈也氣口右手寸脈手太陰之脈也三者皆胃脈故素問陰陽別論指胃脘之陽曰三陽在頭三陰在手所謂一也在頭指人迎在手則寸口也靈樞謂營行不休如環無端衛氣則晝行於陽二十五度夜行於陰二十五度五十度而復會於太陰故素問經脈別論云經氣歸於肺肺朝百脈也辨脈篇亦云出入升降刻漏周旋水下二刻一周循環當復寸口虛實見焉此以寸口而反浮數則知復還之熱氣太過胃中已有熱邪矣即辨脈篇所謂趺陽脈浮而數浮則傷胃數則動脾之義也蓋氣口與趺陽皆胃脈則其脈證自當相符矣胃氣已為復來之熱氣所傷而統血之脾陰亦為鬱熱所動陰血已傷且尺脈見澀澀為陰血受傷之脈則離經之血已凝滯下焦所以必隨下利而圊膿血也下利脈沉弦者下重也脈大為未止脈微弱數者為欲自止雖發熱不死寒邪下利其脈本當沉遲虛細然沉主下焦弦則堅勁故脈沉則陰寒在下脈弦則裡寒未解所以仲景有下利脈數令自愈設復緊為未解之文然則弦亦緊之類也故沉弦為下焦之寒邪甚盛其氣隨下利之勢而下攻必裡急後重也脈大者在陽經熱痢若發熱脈大則邪不可量當為劇症此雖陰邪然脈大則亦其氣未衰故為未止若脈微弱則陽氣雖弱而寒邪已衰數則陽氣漸復故為欲自止也然脈微弱則陰氣已虛脈數則熱氣必盛而發熱矣以陰陽相半之厥陰唯恐其寒邪獨盛而為死證又恐其復熱太過而為癰膿便血及喉痹等變然癰膿便血皆非必死之證而陰極無陽則死矣故曰雖發熱不死瘥後諸證證治第二十二陰陽易傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之舊注云大病新瘥氣血未復餘熱未盡強合陰陽而得病者名曰易男子病新瘥未平復而婦人與之交婦人得病名曰陽易婦人病新瘥未平復而男子與之交男子得病名曰陰易以愚意推之蓋以二氣絪縕其構精之時乃化醇之候也二氣不雜兩精融一故能化生所謂二五之精妙合而凝也然男病易之於女女病易之於男其受病之人並非氣血未復者實為注家之誤但男女一交之後自然元氣空虛餘邪錯雜於精氣之中走入精隧溢入經絡乘其交後虛隙之中入而浸淫於臟腑筋骨脈絡腧穴之間則正氣因邪而益虛邪氣因虛而益盛故有此陰盛陽衰之諸證也邪入陰經身體必重真陽虧損三焦不運宗氣不行所以少氣邪從陰竅而溜入少陰厥陰故少腹裡急若裡急之甚或引陰中拘攣皆陰邪之所致也陰邪在下而虛陽上走故熱上衝胸頭重不欲舉眼中生花下焦虛冷所以膝脛拘急也此真所謂陰陽之患故以燒裩散主之燒裩散方上取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子裩襠燒灰或謂陰陽易之證近於變幻故用燒裩之法亦近於厭禳曰非也有至理存焉男女之交媾易所謂二氣感應以相與也以未淨之邪隨交合之情精神魂魄無不動搖翕然而感感而遂通混入於少陰之裡故以近隱處之裩襠引出其陰中之邪所謂物從其類同氣相求之義也但此方當為導引之藥其餘當隨其脈症之陰陽寒熱治之可也如王海藏之脈在厥陰當以當歸四逆湯下燒裩散在少陰當以通脈四逆湯下燒裩散在太陰當以理中丸同下燒裩散所用之藥各隨其經而效自速也不然則有陰腫或縮少腹絞痛手足蜷脈絕而死者其後人之青竹茹湯及豭鼠糞湯恐未必能合原文中之諸陰症也大凡易病必有如前諸證者方是如無此見證不過傳染之證耳勞復食復大病瘥後勞復者枳實梔子豉湯主之若有宿食者加大黃如博棋子大五六枚凡大病新瘥真元大虛氣血未復精神倦怠餘熱未盡但宜安養避風節食清虛無欲則元氣日長少壯之人豈惟復舊而已哉若不知節養必犯所禁忌而有勞復女勞復食復飲酒復劇諸證矣夫勞復者如多言多慮多怒多哀則勞其神梳洗沐浴早坐早行則勞其力皆可令人重複發熱如死灰之復燃為重複之復故謂之復但勞復之熱乃虛熱之從內發者雖亦從汗解然不比外感之邪可從辛溫發散取汗也故以枳實梔子豉湯主之惟女勞復雖為勞復之一而其見證危險治法迥別矣女勞復者男子大病瘥後早犯女色不易於他人而己復病者亦如陰陽易之頭重不舉目中生花腰背疼痛小腹裡急絞痛憎寒發熱陰火上衝頭面烘熱心胸痞悶後人雖有竹皮湯豭鼠屎湯用月布作赤衣散仍用燒裩散及當歸四逆湯吳茱萸酒等救法至卵縮入腹手足蜷冷脈斷離經者必死不救所以吳綬謂前人有大病新瘥如大水浸牆水退牆酥不可輕犯之喻也若有宿食者是為食復凡病新瘥自宜先用陳倉米少許煎湯少飲俟其無恙漸次增濃胃氣漸旺穀食漸增至胃氣復舊然後少進肉味樽節愛養自無復證若不遵法度餘熱未除元氣未復飲食驟進腥羶雜沓未有不復熱者所以內經熱論篇云熱病已愈時有所遺者熱甚而強食之故有所遺皆病已衰而熱有所藏因其穀氣相薄兩熱相合故有所遺又曰病熱少愈食肉則復多食則遺此其禁也故復證之發熱者以枳實梔子豉湯發微似汗以解之若驗其脈症而有宿食者舌苔必黃胃脘按之必痛當微利以去之故加大黃如博棋子大五六枚也枳實梔子豉湯方枳實三枚梔子十四枚擘豉一升上三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗或問前太陽篇中傷寒發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹用梔子豉湯吐之若少氣者加甘草嘔者加生薑下後心煩腹滿臥起不安者加厚朴枳實而去豉皆隨證加減吐虛邪之法也此條病後勞復亦用加枳實之梔子豉湯並不取吐而反取微似汗者何也曰梔子原非吐藥其性苦寒神農本經言其能治五內邪氣胃中熱氣蓋能清上焦之熱瀉三焦之火而去胃熱者也豉性亦非必吐之藥蓋能治時疾發汗除煩熱利胸膈故李時珍謂其能發能散得蔥則發汗得鹽則吐前太陽篇之吐法或服後探之方得吐耳勞復則胸中已無外邪特因熱鬱不散且病後已虛不宜取吐但令微似汗則熱氣消散而解矣枳實苦能開結香能破氣消宿食寬胸痞雖曰勞復發熱然病瘥之後豈能不犯穀食故加之以利胸膈化痰食也漿水本用粟米飯熱投冷水中浸五六日而成者味酢色白性涼善走解煩渴而化宿滯本草云煎令酸可止嘔漿味本酸自七升空煮至四升更煮至二升則其味益酸蓋因梔子豉湯本為吐劑煎酸則可使不吐也且無外邪不忌酸斂此正制方之妙欲吐則吐欲其不吐則又以漿水制之此操縱之權術也若復熱之證胗其脈則實大察其舌則黃黑按其腹則滿痛此食復也為有宿食者即於枳實梔子豉湯內加大黃如博棋子大五六枚因病後新虛不宜峻下故僅用五六枚不細銼而如博棋子者取其味不全出但求其宿食之去不令其更傷胃氣也然柴胡加龍骨牡蠣湯之大黃亦切作棋子塊者以其尚是初次之病故可用二兩此則病後復證所以止用五六枚其虛實輕重之權衡又不可不知者也學者閱方每不及此設臨證施治處方用藥其可少忽哉脾胃虛弱病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈病人脈已解是邪氣衰去矣而日暮猶微覺煩悶者何也以邪氣初解為病之新瘥脾胃氣尚虛弱則胃未能消脾不能運人強與谷谷不能消故至申酉陽明旺時胃中之穀氣鬱蒸而煩也若日將暮時而發熱則是胃中停穀不化已成日晡潮熱乃陽明胃實之證即當以下法解之矣此不過病後新虛胃不勝谷穀氣稍重耳故其煩亦微也不須藥物但節損其谷則自愈矣瘥後發熱傷寒瘥以後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之傷寒既瘥以後更發熱者若病後餘氣作虛熱固當以柴胡黃芩清解餘熱以人參補其病後之虛而以薑棗和之若復感外邪而發熱亦屬病後新虛理宜和解但察其脈證之有類於半表半里之少陽者以小柴胡湯主之若脈浮則邪盛於表必有可汗之表證仍當以汗解之但病後新虛不宜用麻黃過汗使傷衛亡陽若脈沉實者沉為在裡實則胃實仍當用下法解之但衛氣已虛不宜用承氣峻下宜消息其虛實或小承氣或調胃或如博棋子之法隨其輕重以為進止可也瘥後水氣大病瘥後從腰以下有水氣者牡蠣澤瀉散主之大病後若氣虛則頭面皆浮脾虛則胸腹脹滿此因大病之後下焦之氣化失常濕熱壅滯膀胱不瀉水性下流故但從腰以下水氣壅積膝脛足跗皆腫重也以未犯中上二焦中氣未虛為有餘之邪脈必沉數有力故但用排決之法而以牡蠣澤瀉散主之牡蠣澤瀉散方牡蠣澤瀉栝蔞根蜀漆洗去腥苦葶藶商陸根海藻洗去咸以上各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三服牡蠣咸而走腎得柴胡方能去脅下硬同滲利則下走水道澤瀉利水入腎瀉膀胱之火為滲濕之要藥栝蔞根解煩渴而行津液導腫氣蜀漆乃常山苗也二者功用相同水在上焦則能吐水在脅下則能破其澼為驅痰逐水必用之藥苦葶藶泄氣導腫十劑云泄可去閉葶藶大黃之屬故能去十種水氣下膀胱水去通身腫脹療肺壅喘咳但有甜苦二種苦者能導腫泄水甜者但能清瀉肺邪而已丹溪謂其殺人甚健李時珍云肺中水氣膹滿喘急者非此不除肺平水去則止何至久服殺人此千古之明辨也商陸苦寒沉而降其性下行專於行水治腫滿小便不利赤者同麝香搗爛貼臍白者入藥無毒海藻咸能潤下寒能泄熱引水故能消癭瘤結核除浮腫腳氣留飲濕熱使邪氣自小便出也立方之義蓋以腎為主水之臟肺為水之化源故內經水熱穴論云其本在腎其末在肺皆積水也又曰腎者胃之關也關門不利故聚水而從其類上下溢於皮膚故為胕腫聚水而生病也辨誤成注引金匱腰以下腫當利小便與牡蠣澤瀉散不知金匱原云諸有水者腰以下腫當利小便腰以上腫當發汗乃愈此仲景活法也金匱治水氣利小便之法如五苓散豬苓湯栝蔞瞿麥丸蒲灰散滑石白魚散腎氣丸種種各異蓋以寒熱不同也尚論遂以此方為定法乃謂大病後脾土告困不能攝水致水氣泛溢而用牡蠣澤瀉散峻攻何反不顧其虛可見活人之事迂疏輩必不能動中機宜庸工遇大病後悉行溫補自以為善熟知其鹵莽滅裂哉愚竊謂水氣在腰以下乃水性下流未為泛溢腹未脹滿脾胃亦未損傷仲景但用牡蠣澤瀉散以決水者蓋濕熱下流有餘之證耳非脾胃虛衰土崩水泛也原文中雖有證無脈似無從考其證之寒熱然據方論證當自曉然其為濕熱在下矣倘必概以溫補為庸工鹵莽之治設遇病後虛寒土不制水下焦無火氣化不行水濕腫脹者然則仲景之五苓散腎氣丸等方豈亦為鹵莽滅裂哉不然下文大病瘥後喜唾胃中有寒者以理中丸溫之則如之何恐一言之蔽貽誤後人所以不得不辨也瘥後喜唾大病瘥後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸大病既瘥唯恐其久為熱邪耗爍津液枯燥今反喜唾是脾虛不能收攝津液而至久而不了者因胃上有寒也胃上者胃之上口賁門也賁門屬胃之上脘胃脘有寒則津液不耗脾虛不能為胃行其津液故涎沫湧出也脾胃虛寒當以丸藥溫補故宜理中丸然不用理中湯而用理中丸者非取其緩也因病後餘證不必用大劑力救但欲其常服耳蓋以中土為資生之本飲食日用之器最易損傷所以大病瘥後每致食復者多矣此因脾胃既傷胃上已寒焉得不以溫補久服而求其堅固哉辨誤尚論注云身中津液因胃寒凝結而成濁唾久而不清其人必消瘦索澤故不用湯藥盪滌而用丸藥緩圖然仲景瘥後才用此方在太陽邪熾之日不得已而合桂枝用之即更名曰桂枝人參湯又云醫以理中與之利益甚理中者理中焦此利在下焦非其治也於此見用法之權衡愚竊謂胃寒則當吐清水恐未必凝成濁唾況津已凝濁則當日少豈能久唾耶理中作湯大能溫補脾胃未為盪滌丸藥本欲常服亦非緩圖且太陽證中之人參桂枝湯亦因誤下之虛遂成協熱下利利下不止雖曰太陽誤下而下利已屬太陰故用理中加人參所以太陰本篇即稱臟寒而用四逆輩矣又因太陽外證未除故仍以桂枝解散之也至於醫以理中與之利益甚理中者理中焦此利在下焦非其治也等語則又屬一義與此無涉難於引用此皆注者之失瘥後虛羸傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之傷寒邪氣已解自當熱退身涼得谷而愈矣但邪之所湊其氣必虛此其常也乃虛弱羸瘦氣少力綿呼吸短淺更氣上逆而欲吐者此胃氣虛而未和也仲景雖未言脈若察其脈虛數而渴者當以竹葉石膏湯主之虛寒者別當消息也竹葉石膏湯方竹葉一把石膏三兩半夏五錢人參五錢甘草五錢粳米半合麥冬一兩上七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服竹葉性寒而止煩熱石膏入陽明而清胃熱半夏蠲飲而止嘔吐人參補病後之虛同麥冬而大添胃中之津液又恐寒涼損胃故用甘草和之而又以粳米助其胃氣也
