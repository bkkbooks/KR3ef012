body:
  text: 卷之六陽明篇綱領陽明受病原始問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也此設為問答以別陽明之外證與太陽不同也如太陽中風則發熱汗出而必惡風惡寒若陽明中風雖同一身熱汗自出即不惡寒而反惡熱矣反惡熱者以邪入陽明之經也靈樞陰陽系日月篇云辰為左足之陽明巳為右足之陽明此兩陽合明於前故曰陽明蓋辰巳之前午居離位乃至陽之地邪並於陽陽盛則熱也故陰陽別論以胃脘之陽為二十五陽之主所以能運化腐熟而為水穀之海也邪氣入之則陽邪熾盛故不惡寒而反惡熱也以後凡稱陽明病者皆必有此等證然後可稱陽明病也問曰病有一日得之不發而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也此又設問以辨陽明本經自感之表邪與太少二陽經之表證迥異也夫寒邪之在太少二陽經也有六七日表證仍在者有八九日不解表證仍在者有四五日身熱惡風項強脅滿者五六日往來寒熱者惟陽明本經自感之寒邪亦由營衛而入營衛屬太陽故有一日得之不發熱而惡寒者然一日之後邪入陽明肌肉之分由漸入里故不待解散其惡寒將自罷即自汗出而反惡熱矣不似太陽傳經之邪必待誤汗誤下及利小便或汗不徹然後轉屬陽明也問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也此又以明陽明傷寒入里而不惡寒之故也曰惡寒何故自罷曰陽明之經在太少二陽之間胃為陽明之腑又在心肺之下肝腎之上而居中與脾臟以膜相連而為表裡猶大地居天之中故為中央土也土為萬物之所歸邪氣入胃不比在經之邪而能遊行傳遍至此而無所復傳惟有攻下之法而已經所謂土鬱則奪之也故始初之一日尚在表而惡寒至二日漸入陽明之裡而自止此為陽明之裡證也然邪氣初到陽明何以即入里乎曰若分而言之則太陽有經故外以經脈為表內以膀胱為里是以里證少而表證多陽明亦有經故亦以經脈為表而以胃腑為里里證多而表證少所以太陽治表之法居多其治里之法惟五苓散而已陽明治里之法居多其治表之法惟葛根湯而已然葛根湯之治表亦必藉太陽之麻黃桂枝方能發表以邪從營衛而入必由太陽故也若以大概言之則太陽專主乎表必因誤治而入里陽明專主乎里六經之邪皆可歸入入則無所復傳而成陽明下證故謂之萬物所歸也二日自止者即內經熱論所云一日巨陽受之二日陽明受之之謂也然此亦陽明之大意立法之常經猶未盡其變也若在經之邪至入里之候或遲或速其不齊正未可量也問曰何緣得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明病也此又以明邪在太陽因誤治而傳入陽明之裡也曰因何緣故而得陽明病乎曰太陽病若誤發其汗或早下之及利其小便皆足以喪胃中之津液損胃陽之真氣使熱邪乘虛入里故為亡津液而胃中乾燥因熱邪轉屬陽明胃經故使不更衣更衣者凡貴人大便後必更換所服之衣故稱大便曰更衣不更衣則內實而大便難此名陽明病也不曰不大便有燥屎而曰不更衣大便難者緩詞也言此不過無津液而大便難非若正陽陽明之熱邪實於胃有燥屎而譫語潮熱不大便也故一以小承氣和之一以大承氣攻下之也不大便則絕不能大便今曰大便難則猶欲大便而但覺難也本太陽初得病時發其汗汗先出不徹因轉屬陽明也言寒邪初入太陽因邪氣在表而發其汗汗多固嫌於太過然汗少亦為不及不及則汗不徹而留邪內入由太陽轉屬陽明矣此示人以太陽傳入陽明之故也傷寒轉系陽明者其人濈然微汗出也轉者以此轉屬於彼即傳經之謂也系連屬也濈然濈濈然微汗潤濕之貌言以無汗之傷寒才入陽明即濈然微汗而現陽明經證矣此示人以驗邪入陽明之候也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也寒邪在表則發熱無汗寒邪在胸則嘔不能食皆太陽寒傷營之表證也以無汗之傷寒而反汗出濈濈然者是太陽之經邪失治而轉屬陽明以陽明病法多汗故反濈濈然汗出也陽明病欲解時從申至戌上此概言陽明病欲解之愈時也陽明者兩陽合明也至真要大論帝曰願聞陰陽之有三也何謂岐伯曰氣有多少異用也帝曰陽明何謂也曰兩陽合明也曰厥陰何謂也曰兩陰交盡也天元紀大論云帝曰何謂氣有多少鬼臾區曰陰陽之氣各有多少故曰三陰三陽也以愚意測之庖犧氏之作易也陰陽各一太少耳惟人身之經脈有三故帝亦不知而有此問也其所以謂之多少異用者蓋以少為陰陽之初生故謂之少太為陰陽之盛極故謂之多少則其氣必盈陰盈則陽必虧陽盈則陰必虧故其用異太則其氣必虧陰虧則陽必盈陽虧則陰必盈故其用亦異也是故陽明者太少兩陽合明之盈氣厥陰者太少兩陰交盡之盈氣也若以經脈言之陰陽離合論云少陰之上名曰太陽太陰之前名曰陽明厥陰之表名曰少陽蓋以三陽居三陰之上而在外陽明又在二陽之間居身之前其太少之氣各有多少至陽明兩陽併合而為盛陽故曰陽明又云中則為陰其衝在下名曰太陰太陰之後名曰少陰少陰之前名曰厥陰三陰居三陽之下而在內厥陰又在二陰之中居身之下其太少之氣亦各有多少至厥陰兩陰交盡而為至陰故曰厥陰靈樞陰陽系日月篇云足之十二經應十二月合之於脈則辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合於前以上半年為三陽之所屬而陽明又居於太陽少陽之中故曰兩陽合明也又曰戌者九月主右足之厥陰亥者十月主左足之厥陰為兩陰之盡以下半年為三陰之所屬而厥陰又居於太陰少陰之間故曰兩陰交盡而仲景以從申至戌為陽明之旺時者是不以經脈言而以陽氣之生旺言也夫寅卯為陽氣初出而發生故為少陽巳午為陽氣盛長而暢達故為太陽至申酉而陰已長成收氣雖至正陽極之時如初秋之收氣已至而炎暑未除熱氣猶盛此正太少兩陽之所歸故胃雖六月之未土而大腸又兼謂之陽明燥金也至戌而為陰盛剝陽之時一日之氣亦同故其氣不能更旺於戌故曰戌上陽明上中下三篇綱領問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也此又設問以明邪入陽明之證治各有不同有太陽之邪初入陽明境界仍當用太陽治表之法者如用桂枝湯麻黃湯及葛根湯桂枝加葛根湯者是也有邪雖深入陽明太陽症猶未罷而不可下者有邪在太陽誤汗吐下更利其小便致胃中亡津液而乾燥大便難而為脾約者是為太陽陽明有邪入陽明之裡既無太陽未罷之證又無傳入少陽之兼證乃陽明中土萬物所歸無所復傳而為胃實攻下之證者是謂正陽陽明有陽明之邪或太陽之邪傳入少陽但見少陽一症便不可汗吐下止以小柴胡湯和之者有邪氣既在少陽因誤發其汗利其小便令胃中津液乾燥煩實乃邪氣復歸陽明而大便難者皆謂之少陽陽明此三節乃陽明三篇之綱領今即以此三節分置三篇之前以三節之所屬分隸其下以便檢閱其解各見本條之下陽明風寒辨證陽明病能食者為中風不能食者為中寒能食為中風者風性雖溫而客熱不能殺穀然合胃熱則能消穀善飢故能食也不能食為中寒者寒邪在胃則不化不納故不能食也前太陽以營衛分風寒此以能食不能食為辨者何也豈陽明本經自受之邪不由營衛乎曰非也前得之一日不發熱而惡寒非營衛而何且有陽明病而用麻黃湯桂枝湯者非由營衛而入乎靈樞邪氣臟腑病形篇云諸陽之會皆在於面方乘虛時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽陽明居身之前雖主肌肉亦必待腠理開而中於邪邪氣由外而入安得不由營衛乎然仲景不以營衛立辨而以能食不以食為別者因太陽居身之表為最外一層脈證疑似表裡參錯千蹊萬徑變幻無窮最難察識非營衛無以為辨故不得已而用之至邪入陽明內關胃氣即以能食不能食證之風寒判然何等明白何等顯易一言破惑智愚盡曉何快如之又何必喋喋於極難辨別之營衛乎此仲景立法之所以妙也辨誤此條本所以別陽明本經自感之風寒而條辨謂是太陽傳來之辨驗非陽明自中而然也不知太陽有經陽明亦有經若果自太陽傳來則仲景已有明訓曰太陽得病時汗先出不徹因轉屬陽明又曰傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也又曰傷寒轉系陽明者其人濈然汗出也觀此條之語氣以能食不能食辨別風寒猶為初症豈非陽明經之自感乎至於中風中寒之稱方氏又謂中寒即傷寒之互詞中傷二字之於風寒亦從來之通稱通篇雖無傷風一說然以中寒論之則中風得稱傷風亦可推也此說雖近似有理然仲景立法垂訓寧肯模糊籠統使後人於暗中摸影邪愚考之論中自太陽篇中至三陰諸證凡寒邪為病無不稱傷寒者此條為陽明綱領獨有中寒二字已自不同後節條目中更有陽明病若中寒不能食及陽明病不能食攻其熱必噦胃中虛冷故也陽明脈遲食難用飽諸證皆陽明中寒也蓋傷則邪入猶淺中則邪入較深所以即能傷犯胃氣而不能食也試觀太陽誤治乘虛陷入不痞結於胸中即入里而傷胃何況陽明本經受邪入胃尤為易便故有得之一日不發熱而惡寒二日惡寒自罷即便汗出而惡熱從可推矣蓋風之中人也僅傷於衛寒之傷人也已傷其營俱為在表之邪而已至失治誤治方得入里若寒邪之中氣已達內非復風邪之中人可比是以六經條下風必稱中者風本陽邪性溫而緩必待中而後能傷衛若傷風不過鼻塞聲重咳嚏而已豈得與傷寒並峙乎寒本陰邪其性鋒銳傷之則透衛入營中之則內犯胃氣而不能食矣至三陰證中仲景雖不言中而太陰之嘔吐自利腹滿而痛少陰脈沉足冷吐利煩躁身蜷四逆厥陰之嘔吐涎沫下利清穀以至囊縮等證豈非後人之所謂直中乎然則中傷二字方氏既有箭中刀傷之喻而又謂之通稱之互詞然歟否歟陽明上篇太陽陽明證治第十一陽明中風陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯邪在太陽則以浮緩為中風陽明已在肌肉之分與太陽稍異故不曰緩而曰遲所謂遲者非寒脈之遲乃緩脈之變稱也又非中寒之陽明脈遲也若陽明脈遲即不能食矣下文陽明中風者皆能食但此條以風邪在太陽之表仍是風傷衛分故不言能食而亦以桂枝湯主之也汗出多者太陽中風已是陰弱而汗自出矣而陽明證又法當多汗二證兼併故汗出多也太陽中風本惡寒邪入陽明當不惡寒而反惡熱矣今風邪尚在太陽衛分故仍惡寒但邪氣已屬陽明故雖惡寒而亦微也然汗出已多邪氣當解而不惡寒矣以汗多而仍惡寒是以知太陽之表證尚未解也故云可發汗宜桂枝湯太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之舊注云𠘧𠘧伸頸之貌動則伸頸搖身而行項背強者動則如之此成氏之說也夫項背已強縮而不得伸又安能伸頸搖身而行乎𠘧𠘧按字義本屬象形言鳥之短羽者飛則𠘧𠘧然所以形容病人之頸項俱病俯首不能自如之貌蓋因太陽之經自頭而行於背故項強陽明之經自面而行於身之前故頸病靈樞脈經篇云足太陽之脈其直者從巔入絡腦還出別下項挾脊抵腰中足陽明之脈旁約太陽循頤後出大迎循頰車過客主人循髮際其支者下人迎循喉嚨入缺盆以二經並皆受邪故頸項皆病所以不得引伸而𠘧𠘧然也此條與陽明傷寒之𠘧𠘧無汗惡風者互相對待彼以太陽寒邪初入陽明其無汗惡風之太陽表證仍在故以有麻黃之葛根湯主之此以太陽風邪初入陽明其汗出惡風之太陽表證仍在故以桂枝加葛根湯主之蓋無汗惡風及汗出惡風皆太陽中風傷寒之見證惟𠘧𠘧為頸病故屬陽明以太陽證多陽明證少故仍謂之太陽病而各以傷寒之麻黃中風之桂枝為主治而加入葛根以解陽明初入之邪也夫陽明本多汗太陽中風亦自汗出此以太陽中風傳入陽明本當汗出而謂之反者非陽明中風不應汗出而曰反也蓋因陽明傷寒條下有𠘧𠘧無汗惡風故此曰反汗出也桂枝加葛根湯方葛根四兩桂枝三兩芍藥二兩生薑三兩大棗十二枚擘甘草二兩上六味以水一斗煮取三升去滓溫服一升如桂枝湯法於桂枝湯方內加葛根三兩余依桂枝湯法辨誤按太陽陽明𠘧𠘧證二條其治反汗出惡風既名之曰桂枝加葛根矣無汗惡風者乃傷寒初入陽明故仍用麻黃湯之汗泄而加入葛根以解陽明初入之經邪本當名之曰麻黃加葛根湯兩方並峙則風寒各異自無交互舛錯之病矣不意但名之曰葛根湯其名義稍覺模糊致後之昧於理者攪亂錯雜以桂枝湯中之芍藥誤入有麻黃之葛根湯中芍藥乃斂陰收汗之藥豈宜用之於無汗惡風之傷寒至以葛根湯中之麻黃誤入桂枝加葛根湯中豈反汗出者之所宜況太陽中風本自汗出陽明又多自汗寧可更用麻黃又發其汗乎恐不止於津液枯竭而有亡陽之禍矣前注皆失於覺察相沿傳習其害有不可勝言者故特拈出以辨千載之誤陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出邪在太陽以浮緊為寒浮緩為風在陽明則緊為在裡浮為在表脈浮而緊者言浮而且緊也謂邪雖在經大半已入於裡也邪入於裡必發潮熱其發作有時者陽明氣旺於申酉故日晡時潮熱也潮熱則已成可下之證矣但脈尚兼浮則為表邪未盡猶未可下也若但浮者風邪未全入里其在經之邪未解必盜汗出也陽明本多汗多眠故有盜汗然不必陽明始有盜汗如太陽上篇脈浮而動數因自汗出之中風即有盜汗蓋由目瞑則衛氣內入皮膚不闔則盜汗出矣此示人當以脈症辨認表裡未可因潮熱而輕用下法也陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛但頭眩者熱在上也不惡寒即陽明篇首所謂不惡寒反發熱之義也能食陽明中風也咳者熱在上焦而肺氣受傷也中風之陽邪壅於上焦故咽門必痛也若不咳者上焦之邪熱不甚故咽亦不痛此條純是熱邪當與陽明中寒之不咳不嘔手足不厥頭不痛一條兩相對待蓋示人以風寒之辨也脈浮發熱口乾鼻燥能食者則衄脈浮發熱邪在表也口乾鼻燥陽明之脈起於鼻之交頞中下循鼻外上入齒中還出挾口環唇下循喉嚨入缺盆熱論云陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也能食者陽明中風熱邪能殺穀也陽明郁甚不得汗泄逼血妄行而出於上焦清竅也陽明病口燥但欲漱水不欲咽此必衄口燥者熱在上也但欲漱水不欲咽者邪熱未入於胃也若熱邪入胃則必渴欲飲水今但漱而不欲咽是邪未入里陽邪獨盛於上故迫血妄行而上溢所以必衄也若渴欲飲水口乾舌燥白虎加人參湯主之承上文言不但口燥若口乾舌燥且渴欲飲水者方是邪熱歸胃胃中熱燥而津液枯涸也當清胃熱而滋養其津液故以白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之脈浮發熱太陽表邪猶未解也渴欲飲水當屬胃熱若渴欲飲水而小便不利者仍是足太陽膀胱之裡證非胃中熱燥也蓋膀胱為州都之官津液藏焉太陽熱邪歸腑則熱聚膀胱氣化失常下焦之氣液不得上騰故渴欲飲水下焦之地氣既不得升則上焦之肺氣不降是無高源之水矣水熱穴論云腎為本而肺為末膀胱者腎之腑也本末不相通故渴而小便不利也若邪氣止在太陽一經而內犯膀胱者仲景必以五苓散治之矣若太陽上篇之中風發熱六七日不解而煩渴欲飲水水入則吐者又如太陽中篇發汗已脈浮數煩渴者又如本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者皆以五苓散主之此條因是太陽陽明兼證且陽明乃兩陽合明至陽之腑又中風而非中寒故不宜用桂但以豬苓湯滲泄膀胱之熱邪使陰陽升降氣液通行邪可分消矣豬苓湯方豬苓去皮茯苓阿膠滑石嫩者研細澤瀉以上各一兩上五味以水四升先煮四味取二升去滓內下阿膠烊消溫服七合日三服豬苓及茯苓澤瀉義見五苓散論中滑石者十劑中之通劑也李時珍曰滑石利竅不獨小便也上能利毛腠之竅下能利精溺之竅蓋甘淡之味先入於胃滲走經絡遊溢精氣上輸於脾肺為水之上源下通膀胱津液藏焉氣化則出故滑石上能發表下利小便為蕩熱燥濕之劑阿膠乃濟水之伏流陰水也能清肺益陰用此水以攪濁水則清蓋濟水質清而性重其性趨下故也成氏謂阿膠之滑以利水道不知何所考據陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯複利其小便故也陽明病法當多汗若汗出多則胃中之津液已外泄矣其渴固所宜然且又無小便不利之證故不可與豬苓湯何也以汗出既多則胃中之津液枯燥若更與豬苓湯複利其小便是又下竭其津液矣焉得不為脾約乎當滋其津液渴自止矣病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯此亦太陽入陽明之辨證法也言病人煩熱至汗出而後解者又或如瘧狀必至日晡時發熱者即潮熱也如此則邪氣已屬陽明矣然表裡之分當以脈辨之若按其脈而實大有力者為邪在陽明之裡而胃實宜攻下之若脈浮虛者即浮緩之義為風邪猶在太陽之表而未解宜汗解之謂之浮虛者言浮脈按之本空非虛弱之虛也若虛弱則不宜於發汗矣宜詳審之脈實者下之以其胃熱故宜與大承氣湯浮虛者汗之以其風邪未解故宜與桂枝湯陽明病脈浮而緊咽乾口苦腹滿而喘發熱汗出不惡寒反發熱身重若發汗則燥心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之脈浮為邪在陽明之經緊則入於裡矣解見上文第十三條胃開竅於口咽則胃之門戶也邪熱在胃故咽燥口苦而腹滿也喘者腹滿而脹氣不得息非肺家之痰喘即陰陽應象論所謂身熱喘粗也發熱汗出陽明表證也不惡寒反惡熱邪入陽明之本症也腹滿身重本屬太陰經云脾胃以膜相連邪熱在胃陽明胃腑受病則太陰脾土亦病故身重也表裡皆有邪若治其表而以辛溫發汗則亡津液而胃中熱燥必使心神憒憒反增譫語若以燒針取汗則陽邪受火愈增煽動故心神為之怵惕驚恐陽盛而煩陰虛而躁故不得眠也若下之則表邪未解里邪未實徒傷胃氣曰胃中空虛者非謂胃中之水穀盡出乃胃中之陽氣空虛也正氣虛而客邪動於膈間故心中懊憹懊憹者若有所憂悶悔恨然也但言舌上苔而不言其色與狀者以意揆之當是邪初入里胃邪未實其色猶未至於黃黑焦紫必是白中微黃耳邪氣初入既不可汗下而燒針又非陽邪所宜邪在膈間治無他法不得已而用高者越之之法故以梔子豉湯主之陽明病下之其外有熱手足溫不結胸心中懊憹飢不欲食但頭汗出者梔子豉湯主之雖誤下之而外仍有熱是邪氣猶在外也四肢為諸陽之本而稟氣於胃誤下之而手足尚溫是胃氣未傷而邪未入陰也不結胸邪未盡陷也心中懊憹飢不能食但頭汗出者熱客胸中虛邪攪擾於膈間也頭為諸陽之會陽邪鬱蒸於上陰陽之脈絡不得相輸故但頭汗出而身無汗所謂劑頸而還也當用梔子豉湯以吐胸中之邪吐則並可得汗而解外也陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也口苦咽乾腹滿微喘即上文咽燥口苦腹滿而喘也脈浮而緊亦與上條同義上文發熱汗出不惡寒而反惡熱邪入陽明已深以其經邪未解故不可下此條尚發熱惡寒則知太陽之經邪亦未解也庸可下乎若早下之則胃氣空虛表邪陷入而腹更滿陽氣虛損三焦不運氣化不行津液不流而小便難矣陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治脈弦少陽風木之邪也浮為風邪在表大則陽明熱邪在裡矣腹滿陽明裡證也腹都滿言遍腹皆滿也滿甚而氣不得通故短氣也脅下及心痛即少陽篇所謂胸脅滿痛也少陽之脈合缺盆下胸中貫膈絡肝屬膽循脅裡故脅下及心胸間皆痛也久按之氣不通者言不按已自短氣若久按之則氣愈不通蓋言其邪氣充斥也鼻乾陽明之脈絡於鼻也邪入陽明法多汗不得汗則陽明之經邪愈不得泄矣嗜臥陽明裡邪也蓋邪在陽明之表則不得臥邪在陽明之裡則嗜臥也一身及面目悉黃因不得汗泄熱邪不能發越而陽明瘀熱在裡故也小便難者邪熱閉塞三焦不用氣化不行也若小便利則不能發黃矣潮熱陽明裡實也時時噦者邪熱傷胃胃氣不通氣逆而作呃忒也耳前後腫雖三陽之脈絡皆至耳陽明之脈已見前第十二條然少陽之脈起於目銳眥上抵頭角下耳後其支者從耳後入耳中出走耳前風熱上壅故前後皆腫也刺之小瘥者刺少陽陽明之絡則熱邪暫泄經氣稍通故腫處小瘥也里證如此深重則外證亦可以已矣若外證猶未解者是邪未盡入也病情至此其脈當不浮矣既有外證未解病過十日而其脈續見浮者則陽明裡邪有向外復出之機重歸少陽之經故與小柴胡湯和解之以引出其半表半裡之邪若脈但浮浮為邪氣在表且從前諸餘症悉無者是邪盡還表復出太陽營衛之間矣治之無難一汗而愈矣故重與麻黃湯然治中風而以麻黃湯者以邪氣重大深入致腹滿發黃潮熱不得汗小便難之劇證非復桂枝湯可啜粥汗解之症矣況陽明本應多汗今不得汗而脈浮故以麻黃湯發其汗經所謂開腠理致津液通氣也若邪不復外出而鬱於裡則大氣不得升降津液不得流行而三焦之氣化絕故不尿中氣閉塞而腹滿甚胃陽敗絕而加噦者乃必死不治之證故無治法也中風脾約太陽陽明者脾約是也太陽陽明者言病在太陽無論中風傷寒因誤治失治而傳入陽明或已傳陽明而太陽證猶未罷者若發汗若下若利小便亡津液而胃中乾燥大便難者遂為脾約也脾約以胃中之津液言胃無津液脾氣無以轉輸故如窮約而不能舒展也經脈別論云飲入於胃遊溢津氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行陽明脈解云脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰蓋水穀入胃脾主為胃行其津液散精四布以滋養灌溉夫一身內外者也若汗吐下及利其小便竭其胃中之精液使脾氣無精氣可散絕上下之轉輸而為屯膏之吝故謂之約所謂脾約者非但下文浮澀相搏方謂之脾約也歷來注家但見此條中有其脾為約句皆指以為脾約其餘無此句者遂不曉矣不知凡太陽陽明證不論中風傷寒因誤吐誤汗誤下及利其小便致胃中津枯而大便難者皆謂之脾約非獨麻仁丸一條而已也故成注云如論中之太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯即是太陽陽明脾約病也觀此則知正陽陽明乃熱邪宿垢實滿於胃故曰胃實而有盪滌之劑太陽陽明因胃中津液枯燥脾氣無精可散腸胃枯澀故曰脾約所以僅有和胃潤燥之法義詳下文其脾為約句下辨誤中此不多贅但看胃實與脾約二義一責之脾一責之胃命名立義涇渭迥殊寧可混為一例邪太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散緩浮弱皆言脈之虛也寸為氣口緩則胃氣虛關主中州浮則無力乃脾土弱也尺為命門弱則真陽衰矣皆誤下所致乃下截醫下之之張本也發熱汗出復惡汗者太陽中風之表證猶未除也不嘔則邪未入少陽且胸為太陽之分不嘔則邪不在胸因邪陷入里故但心下痞也若此者皆以表邪未解之時為醫誤下之所致也如其未經誤下者必無邪陷之變病人不惡寒而渴者此太陽之邪轉屬陽明也若更小便數則津液下滲故知大便必硬然以小便數又知其里無大熱不過因汗出小便數以致津液枯燥而成脾約耳里無熱邪但有宿食雖不更衣十日無所苦也若渴欲飲水乃胃中津液少非胃熱也當少少與之以潤其涸燥多則恐無熱以消之也但以法救之句所包者廣非一法也如壞病所謂隨證治之以法治之之意也若不大便則以小承氣湯和胃若津液虛竭則以白虎加人參湯救津液之類皆救法也當因時制義可也渴用五苓散曰宜而不曰主之者謂可用則宜用也言假如既非陽明熱實之證渴欲飲水而水不能止其渴非胃熱也如太陽上篇大汗出胃中干煩燥不得眠欲得飲水者少少與之胃和則愈矣若飲水不止當仍是太陽之邪內犯膀胱下焦氣化不行不能蒸騰其氣液上升而為津唾故渴也所以宜五苓散陽明病本自汗出醫更復發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也言脾約本因津液枯竭非熱邪燥結可比未可輕下更傷元氣也病在陽明本自汗出醫更重發其汗病雖已瘥尚微覺煩悶其語言神志若有所不了了者此內中大便必硬故也無他皆以汗出過多內無津液胃中乾燥遂為脾約故令大便硬也然且勿輕下當問其小便每日幾行若本小便日三四行今日僅再行故知大便不久出何也今為小便較前日所行之數已少其半是下焦之氣能蒸騰上行津液當還入胃中能自潤其枯燥故知不久必大便自出也陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導言陽明病已自汗出若又發其汗小便又自利者此為滲泄之極使胃中之津液內竭然大便雖硬其小便自利則知里無熱邪不可攻之當須自欲大便而不可得宜用蜜煎法導而通之若土瓜根及大豬膽汁皆可潤導蜜煎導法白蜜七合一味入銅銚中微火煎老試其冷則硬勿令焦入豬牙皂角末少許熱時手捻作梃令頭銳根凹長寸半者三枚待冷硬蘸油少許納穀道中其次以銳頭頂凹而入三枚盡以布著手指抵定若即欲大便勿輕去俟先入者已化大便急甚有旁流者出方去手隨大便出豬膽導法極大豬膽一枚用蘆管長三寸余通之磨光一頭以便插入穀道用尖鋒刀刺開膽口以管插入膽中用線扎定管口抹油捻入穀道插盡蘆管外以布襯手用力捻之則膽汁盡入方去之少頃大便即出陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服此條雖無小便自利之津液下走然汗多則津液之枯一也故胃中燥大便必硬而為脾約也至硬則譫語比前不同矣前大便雖硬皆未譫語此獨譫語者以胃中少有熱邪導法止入穀道不由胃中而下不能逐熱故以小承氣湯和之所以一服譫語止即禁止之曰更莫復服蓋以些小實熱不須峻下故中病即止恐復服則再傷津液損壞元氣所以叮嚀戒謹如此發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死夫陽者氣也汗者營血中之陰液也陽氣鼓動陰液外泄而為汗陰液外泄則陽氣隨之而散亡矣此言太陽受病之時已多發其汗若邪轉陽明又重發其汗發之不已以致陽氣隨汗而喪亡故曰亡其陽神者陽之靈也陽亡則神散而不守陰者胃中之津液也汗多則陰竭而胃燥故譫語也脈者氣之先血之府也脈之動陽氣鼓之也陽亡陰竭故脈短促而死也但言亡其陽而不及陰者重陽氣也其獨重陽氣者何也蓋無陽則陰無以生也若汗雖多而脈自和者則真元未散陽氣猶未亡也故曰不死雖云不死然亦危矣脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絕此二條總結上文汗下及利小便亡津液而致脾約之見證也浮為陽邪盛芤為陰血虛搏聚也浮芤並見故曰浮芤相搏陽邪盛則胃氣生熱陰血虛則津液內竭故其陽則絕絕者非斷絕敗絕之絕言陽邪獨治陰氣虛竭陰陽不相為用故陰陽阻絕而不相流通也即生氣通天論所謂陰陽離決精氣乃絕之義也注傢俱謂陽絕乃無陽之互詞恐失之矣趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之趺陽足趺上動脈也又名衝陽胃脈也浮為陽脈趺陽浮則陽邪入胃而胃中熱故曰胃氣強非胃陽之正氣強也澀為陰脈趺陽澀則津液熱燥而小便短數故云小便數非氣化行而津液多之頻數也浮澀兩相搏聚則知胃氣熱而津液枯矣所以大便難而其脾為約也所謂脾約者胃無津液脾氣無精可散而窮約也脾既無精可散胃終熱燥而大便難故當以通腸潤燥為治而以麻仁丸主之麻仁丸方麻子仁二升杏仁一升芍藥半斤厚朴一斤枳實半斤大黃一斤上六味為末煉蜜為丸桐子大飲服十丸日三服漸加以和為度麻仁味甘而潤李時珍云麻仁阿膠之屬皆潤劑也杏仁苦辛油滑皆潤燥之劑芍藥酸收所以益陰而斂津液也厚朴辛溫下氣而寬中枳實味苦能破結利氣大黃苦寒下泄而能蕩除實熱藥物雖峻實和胃之法也觀蜜丸則其性滯緩分服則力小而綿飲服則又和之矣又云未效漸加以和為度則進步舒緩此所以為和胃潤燥之劑歟辨誤脾約一證成注謂儉約之約又為約束之約內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾主為胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數大便難愚謂胃強脾弱之說固屬誤謬而約束津液不得四布之論尤背經旨何也脾氣既弱豈反能約束胃中之津液邪況津液既不得四布豈能但輸膀胱太陰陽明論云四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰以此推之則胃中之津液必待脾氣散精而後津液通行若云脾弱而不能為胃行其津液則可若云胃強脾弱而約束津液則不可曾不知津液本在胃中脾氣既弱豈胃強而反自為約束乎條辨亦云胃強則脾弱脾弱則不能為胃行其津液以四布使得偏滲膀胱而為小便數致大便乾而為胃實猶反被胃家約束而受制故曰脾約方論雖與成氏無異然偏滲膀胱之說尤屬不經不思經文本云脾氣散精上歸於肺然後能通調水道下輸膀胱水精四布既云脾弱不能為胃行其津液以四布又云使得偏滲膀胱而為小便數然則偏滲之路又何途之從而能使小便數邪尚論因反被胃家約束而受制之說故設門人問云以胃強脾弱不能為胃行其津液一如懦夫受悍妻之約束乎喻氏答云仲景但云胃強未說脾弱所謂胃強正因脾之強而強蓋約者省約也脾氣過強將三五日所受之谷省約為一二彈丸而出是脾氣過燥故令大腸之津液日漸乾枯所以大便為難也豈脾弱不能約束胃中之水反能約束胃中之谷邪若必傳會前人而以脾約為脾弱將指殺妻之吳起為懦夫乎觀前人議論大約雷同而喻氏獨能立異似乎識見不同然其實皆非也其但云胃強未說脾弱二句最為精當若云胃強正因脾之強而強遂云脾氣過強又太過之詞也不知仲景但云胃氣強亦未云脾氣過強但云亡津液胃中乾燥亦未云脾氣過燥凡此之類悉非仲景之旨皆過情之論也夫脾約原非脾弱所以仲景不責之脾但責之胃故獨云趺陽脈浮而澀浮則胃氣強澀則小便數即上文浮為陽芤為陰浮芤相搏胃氣生熱之義也蓋趺陽胃脈也所謂浮者非邪氣在表之浮也以趺陽之胗但主胃氣不主表邪故也所以浮則為胃中之陽邪有餘芤則為胃中之陰液不足浮芤之脈並見於趺陽一部使陰陽偏勝偏枯失亢害承製之道所以胃氣生熱故曰胃氣強謂之強者非胃陽之真氣強乃熱邪在胃而強也澀則小便數者胃不能藏津脾不得散精胃中枯燥水精不得四布故不能下輸膀胱故小便短促而頻數也數則胃中之津液愈竭而陰氣大虧所以趺陽脈澀然非因脈澀而致小便數也小便數則脈澀矣此仲景倒用之文後學惑焉故不能解耳惟不能解所以止曉麻仁丸之一條有其脾為約四字便獨認為脾約此外更不知有脾約矣不思仲景云太陽陽明者脾約是也以一句而總該太陽陽明一篇之義其旨甚廣豈獨指浮澀相搏之一證乎若推脾約之義胃氣非必真強脾亦何弱有但因汗吐下及利小便之後胃中枯燥已無津液脾雖不弱有何精氣之可散津液之可行故困約而不能舒展其運用猶巧婦不能作無米之炊耳非脾病而不能為胃行其津液也以胃無津液可行如窮約之狀耳豈胃氣真強脾氣真弱哉是以太陽陽明篇首即有太陽入陽明之文曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明病也又云脈陽微而汗出多者為太過陽脈實而發其汗汗出多者亦為太過太過為陽絕於里亡津液大便因硬也又云太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈又太陽病寸緩關浮尺弱其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也又云其熱不潮者未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下凡此諸證皆亡津液而大便難無大實熱之脾約證也所謂大便難非不大便也蓋欲出而堅澀不得出也其他雖有不言亡津液而大便難者亦皆論太陽邪入陽明之故匯合而成太陽陽明篇也若但以麻仁丸一症為脾約豈能盡合仲景通篇立名之義乎至若太陽陽明之脾約與少陽陽明之胃中燥煩實大便難者實為相近蓋太陽以誤汗誤下且利其小便故令胃中乾燥空虛而邪氣入胃雖無大熱實而亦必以小承氣和之麻仁丸潤之也少陽亦禁汗下若妄汗下之且利其小便故令胃中燥煩實大便難亦是邪氣入胃仲景不言治而其法可類推矣奈何尚論必以為不可觸類而推又設難以為熱邪必自太陽而陽明陽明而少陽必待日久而後津液受爍大便方難其邪在太陽未入於胃何得津液即便消耗持論如此是太少畢竟不相連屬則太少兩經之合病並病何來太陽之邪未入胃則太陽陽明之名義安在若曰津液不當即耗豈忘卻篇首之若汗若下若利小便之亡津液胃中乾燥之語邪又謂脾約之症乃未感之先其人素慣脾約故邪未入胃而胃已先實此論尤為背理仲景為天下後世立法安肯因平素燥結之人遂立傷寒誤治之太陽陽明脾約一例邪總因但曉浮澀相搏之一症為脾約猶未協通篇立法之旨耳陽明傷寒陽明病脈浮無汗而喘者發汗則愈宜麻黃湯邪在太陽之表則脈有浮緩浮緊之分病有風寒營衛之別若陽明之經已在肌肉之分營衛之內以胃腑為里故前以能食不能食辨別風寒此亦不以緊緩為辨但見脈浮則知初入之邪猶在太陽無汗而喘則知與太陽中卷之首條無異矣故曰發汗則愈宜麻黃湯然此條脈證治法皆寒傷營也若無陽明病三字不幾列之太陽中篇而仲景何故以陽明病冠之耶蓋以太陽中篇之第一條曰惡寒體痛脈陰陽俱緊者名曰傷寒其次條又曰惡風無汗而喘者麻黃湯主之此條雖亦無汗而喘然無惡風惡寒之證即陽明所謂不惡寒反惡熱之意是以謂之陽明病也太陽病項背強𠘧𠘧無汗惡風者葛根湯主之此與前陽明中風第十二條反汗出惡風相對待前為中風之邪初入陽明而設此因傷寒邪氣初入陽明而設也義在陽明中風條下然項背強無汗惡風皆太陽經寒傷營之本證也以才見𠘧𠘧一證便是太陽寒邪已入陽明之經矣以邪氣初入陽明之一二故以葛根湯主之葛根湯方葛根四兩麻黃三兩桂枝二兩芍藥二兩後人誤入甘草一兩生薑三兩大棗十二枚上七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌葛根湯即麻黃湯加入葛根也因項背強無汗惡風純是太陽傷寒表證故仍以麻黃湯汗解其寒邪然較之麻黃湯證不喘故去杏仁但以𠘧𠘧為頸項俱病項雖屬太陽而頸已屬陽明是以知太陽寒邪已經透入陽明疆界故入葛根以解陽明初入之經邪也李時珍曰本草十劑云輕可去實麻黃葛根之屬蓋麻黃為肺經專藥肺主皮毛故可以發太陽之汗葛根乃陽明經藥兼入脾經脾主肌肉故能解肌二藥皆輕揚發散而所入則迥然不同也辨誤見前桂枝加葛根湯下傷寒嘔多雖有陽明症不可攻之嘔者邪在胸膈胸屬太陽故傷寒首條云太陽病惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒若傷寒嘔多則太陽表證未罷雖有陽明見證未可輕下下之必有變逆之患故曰不可攻之陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈見證雖屬陽明而心下尚硬滿心下者心之下胃之上也邪未入胃尚結於胸膈之間即太陽結胸之類也雖屬陽明猶未離乎太陽也故不可攻之攻之則裡虛邪陷隨其誤下之勢利遂不止者正氣不守真元暴亡所以死也即太陽篇之結胸證脈浮大者不可下下之則死其義一也若利止者中氣足以自守真元不致驟脫故邪去而能愈也脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絕於里亡津液大便因硬也浮候為脈之陽沉候為脈之陰微則經邪衰而表氣虛實則經邪盛而表氣實陽明證本多汗中風又汗自出故浮候之陽脈既微則邪氣已衰而汗出自少少則津液不耗正氣不虛故為自和也若脈陽微則表氣已虛若汗出多者必亡津液而虛正氣故為太過陽明證雖多汗而傷寒亦可無汗風邪盛者亦可發微汗所以太陽陽明證中有項背強𠘧𠘧反汗出惡風者用桂枝加葛根湯無汗惡風者以用麻黃之葛根湯主之是皆發微似汗以解之也故陽脈實者因發其微似汗而邪氣得解足矣若令汗出多者亦為太過凡此二太過者皆足以泄衛陽而喪津液者也何也谷入於胃胃中陽氣蒸腐水穀其精華之清氣化而為營行於脈中變赤化血所以滋養一身谷之濁氣降於下焦下焦之真陽蒸騰其濁中之清氣是謂清陽之氣直達皮膚而為衛氣所以捍衛風寒固密皮毛者也汗出則陽氣鼓動陰液外泄太過則胃中之陽氣孤絕故曰陽絕於里陽亢而津液消亡使腸胃枯槁而大便因硬也傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語四五日邪氣入里之時也在太陽則四五日亦有表未解者若脈沉則邪已內入而歸里矣故喘滿也滿者邪入於胃也喘者滿而氣促非肺病也所謂滿則必喘也脈沉既為在裡而反發其汗是病在裡而反攻其表也表既無邪發汗則徒使津液外越胃中乾燥遂成脾約故大便難也妄發其汗則表氣愈虛津竭便難則里邪更實所以久則譫語也譫語皆由胃實仲景雖未立方推其汗後津枯表虛里實大約亦如下文小承氣和之而已傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之邪氣在表至七日而六經已盡至十三日而再經亦盡故謂之過經過經而譫語者以邪入陽明之裡胃中有實熱也故當以湯下之曰湯而不曰承氣者以上四句是起下文語乃借客形主之詞故在所忽也若小便利者其水穀自別津液下滲大便當硬矣而反下利下利則脈不當調今脈自調和者非變症使然知醫以丸藥誤下所致也以理推之上截譫語而胃中有熱故當以湯下之此因小便利則里無大熱可知大便雖硬無熱不須峻下當以調胃承氣湯和胃令大便微溏足矣不然膽導蜜導法可耳豈容以峻厲丸藥下之邪故曰非其治也若不因誤下而自下利者脈當微厥微厥者忽見微細也微厥則正氣虛衰真陽欲亡乃虛寒之脈證也今下利而脈反和者此為內實內實者胃中本有實邪也然內實則脈象亦當實大而脈反和者何也蓋不下利之內實脈方實大此以丸藥誤下氣已下泄故脈僅得調和而不能實大也內雖實而脈和且小便自利則里無大熱不須攻下故以調胃承氣湯主之調胃本云少少溫服以平胃實胃和則愈矣太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈邪在太陽無論桂枝麻黃皆取微似汗而已凡吐下發汗皆足以傷胃氣而損津液令胃氣空虛虛邪入胃故微煩也微煩則里無大熱故小便頻數數則津液又從下竭而氣液不能上騰還胃故大便因硬而成脾約也以汗吐下後胃氣已虛津液已竭且無大熱不必攻下故與小承氣湯令微溏以和之則愈矣陽明中寒陽明病脈遲食難用飽飽則微煩頭眩必小便難欲作谷疸雖下之腹滿如故所以然者脈遲故也脈遲中寒也食難用飽飽則微煩者胃寒不化強飽則滿悶而煩也頭眩者谷不腐化而濁氣鬱蒸也必小便難者寒邪在裡下焦無火氣化不行也食既不化小便又難則水穀壅滯所以欲作谷疸謂之欲作蓋將作未作之時也谷疸者寒在中焦胃不能化脾不能運穀食壅滯中滿發黃也通評虛實論云黃疸暴痛五臟不平六腑閉塞之所生也此雖下之腹滿如故不為少減者皆以脈遲而寒邪在裡所以寒下無效也陰陽應象論云寒氣生濁熱氣生清又云濁氣在上則生䐜脹若不溫中散寒徒下無益也陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也若字不必作如字解若中寒不能食者言陽明若為寒邪所中而不能食者即前不能食者為中寒之義也小便不利者寒邪在裡三焦之氣化不行也濈然汗出邪入陽明之本證也手足濈然汗出則又不同矣陽明脈解云四肢者諸陽之本也靈樞終始篇云陽受氣於四末太陰陽明論云四肢皆稟氣於胃如下文陽明脈遲有潮熱而手足濈然汗出者為大便已硬此胃氣實而手足濈然汗出也此所謂手足濈然汗出者以寒邪在胃欲作固瘕致四肢不能稟氣於胃陽氣不達於四肢衛氣不固故手足亦濈然而冷汗出也寒邪固結中氣不行所以欲作固瘕固瘕者寒聚腹堅雖非石瘕腸覃月令所謂水澤腹堅之意也初硬後溏者胃未中寒之時中州溫暖尚能堅實自中寒之後胃寒無火化之功三焦無氣化之用水穀不分胃氣不得堅實而溏也故又申明其旨曰所以然者以胃中冷水穀不別故也辨誤注家以前人堅固積聚為謬而曰大便初硬後溏因成瘕泄瘕泄即溏泄也久而不止則為固瘕愚以固瘕二字推之其為堅凝固結之寒積可知豈可但以溏泄久而不止為解況初硬後溏乃欲作固瘕之徵非謂已作固瘕然後初硬後溏也觀欲作二字及必字之義皆逆料之詞未可竟以為然也陽明病初欲食小便反不利大便自調其人骨節疼翕然如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈初者陽明本經受病之初也欲食非能食也仲景原云能食為中風不能食為中寒曰初欲食者謂陽明受病之初寒邪在經尚未深入胃氣猶在故欲食也胃無邪熱小便當利今小便不利故曰反也寒邪固閉三焦不運氣化不行故小便反不利也若陽明熱邪歸里大便當硬今反自調尤知無裡熱也骨節疼者在經之寒邪未解也翕翕如有熱狀寒氣衰而陽欲復也奄然發狂鬱伏之陽迅發汗欲出而煩躁如狂也翕然有熱奄然發狂則陽回氣潤陽蒸陰而為汗故濈然汗出而寒邪得解也水不勝穀氣與汗俱並未詳其義或曰水者津液也穀氣者胃氣也水不勝者津液不足以作汗也脈緊則愈者在太陽則緊為寒邪在表在陽明則緊為裡氣充實脈浮為邪氣在經緊則浮去而裡氣充實也原其所以然之故皆由寒邪鬱滯無陽氣以蒸騰則津液不得外達而為汗故曰水不勝也胃陽之穀氣既不能蒸津液而為汗故穀氣與汗共並而不得發泄也素問評熱論云人之所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也以此推之則人身之汗皆生於胃中之穀氣精者津液之謂也穀生於精者言津液乃穀氣所化也穀氣者胃中之陽氣也陽氣勝則能蒸津液而為汗故為邪卻而精勝若寒邪勝陽氣不能蒸津液而為汗故謂之水不勝也穀氣說見太陽上篇火劫第四條陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦不能食陽明中寒也攻其熱者以寒藥治之也噦呃逆也其所以然者蓋以陽明中寒胃中虛冷故也以其人平素胃氣本屬虛寒而粗工淺智妄擬為熱而以寒下之藥攻之致苦寒傷胃令胃陽敗絕而成呃逆難治之證也若胃中虛冷不能食者飲水則噦言胃中虛冷而不能食者胃脘之陽大衰非但以寒攻熱而致噦也即以冷水飲之則噦矣脈浮而遲表熱裡寒下利清穀四逆湯主之此與少陰厥陰裡寒外熱同義若風脈浮而表熱則浮脈必數今表雖熱而脈遲則知陰寒在裡陰盛格陽於外而表熱也虛陽在外故脈浮陰寒在裡故脈遲所以下利清穀此為真寒假熱故以四逆湯祛除寒氣恢復真陽也若以為表邪而汗之則殆矣陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛陽明本經受病固當自汗出即從太陽轉入陽明者亦當濈然汗出矣此以無汗故曰反也其所以無汗者寒在陽明之經也小便利者里無熱邪也二三日嘔而咳則知無汗在二三日之前矣二三日前即稱陽明病尤知其為陽明本經自入之邪非太陽傳經之邪矣然邪由營衛而入必假道於太陽而入所以無汗也一日無汗而小便利至二三日嘔咳手足厥者寒邪入里也嘔者寒邪深入而犯胃也咳者有聲無痰之稱陰盛迫陽於上肺氣上逆而咳也四肢為諸陽之本太陰陽明論云四肢皆稟氣於胃寒邪入胃則陽氣不充於四肢致陰陽不相順接而厥也嘔咳而厥則陰邪縱肆格陽於上故虛火上浮而必苦頭痛也若不嘔不咳不厥則無陰盛格陽之病故頭亦不痛也辨誤此條與陽明中風之但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛之條一寒一熱恰相對待蓋示人以辨證之法也奈何注家以為無汗嘔咳手足厥者得之寒因而邪熱深也不知厥陰條內之厥者必熱前熱者後必厥因是陰陽相半之經故有厥深熱亦深厥微熱亦微之論所以又云反發其汗者必有口傷爛赤之患此條雖屬陽明實陽明中寒之證並無熱邪在裡豈可亦作此論且又云若不咳不嘔不厥而小便利者邪熱必順水道而出竊恐既有邪熱在裡小便未必順利即使能利邪熱亦未必肯從小便而出若曰不從汗少偏從水道而出吾不信也成氏以傷寒寒邪內攻立論方氏以寒勝為解當亦不甚相遠也陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也邪在陽明於法當多自汗今反無汗而身如蟲行皮中狀者皆由寒邪鬱於肌腠之間不得發泄故也此無他不過因元氣素虛無陽氣以鼓泄其陰液以為汗使邪氣欲出而不得之所致也食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也此所以辨太陽陽明之疑似也食谷欲嘔似乎陽明中寒之不能食故曰屬陽明也胃寒不納故以吳茱萸湯溫胃若得湯反劇者非胃寒也仍是太陽之表邪在胸而嘔猶未入胃故為屬上焦也婁氏謂得湯反劇者火也當用生薑黃連治之其意因得熱反劇故以苦寒為治而加生薑止嘔不知仍是太陽嘔逆尚屬表邪仲景雖未立方若發熱無汗尚未發表外邪將次入胃而嘔者邪猶在胸當以梔子豉湯湧之庶幾近似吳茱萸湯方吳茱萸一升洗人參三兩生薑六兩大棗十二枚上四味以水七升煮取二升去滓溫服七合日三服吳茱萸一升當是一合即今之二勺半人參三兩當是一兩即宋之二錢七分生薑六兩當是二兩即宋之五錢余大棗當是四五枚水七升亦當是三升觀小承氣湯止用水四升調胃承氣只用水三升此方以辛熱補劑而用之於表裡疑似之間豈反過之大約出之後人之手非仲景本來升合分兩學者當因時酌用銖兩升合法見卷首陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下脈遲陽明中寒之脈也表邪未解當惡寒而無汗今雖汗出而不惡寒者是邪氣已入陽明之裡然終是脈遲為陰寒邪氣脾胃以膜相連故有其身必重短氣腹滿之太陰兼症也邪實中焦所以腹滿身重滿則胃中填脹故短氣而喘也既汗出不惡寒而又潮熱乃外證欲解邪已入胃可以攻裡之候也然四肢皆稟氣於胃胃氣實則手足濈濈然汗出此為大便已硬然後可以大承氣湯主之若其人汗多微發熱而惡寒者則又不然汗多則知邪氣已在陽明發微熱惡寒則又知太陽之表症未罷故曰外未解也凡邪實於胃至申酉陽明氣旺之時必發潮熱若其熱不潮則陽明裡邪未實大便猶未硬也故未可與承氣湯然雖未可下若腹大滿不通者不得已而欲下之可與小承氣湯微和其胃氣勿令大泄下何也終以脈遲之故胃中無大實熱所以不可大下也大承氣湯方大黃四兩酒洗厚朴四兩炙去皮枳實五枚芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一兩沸分溫再服得下余勿服熱邪歸胃邪氣依附於宿食粕滓而鬱蒸煎迫致胃中之津液枯竭故發潮熱而大便硬也若不以大承氣湯下之必致熱邪敗胃譫語狂亂循衣摸床等變而至不救故必鹹寒苦泄之藥逐使下出則熱邪隨宿垢而泄猶釜底抽薪薪去則火亦隨薪而出矣然非必宿垢滿實而泄之也胃中之熱邪盛者亦在所必用古人所謂用之以逐熱邪非下糟粕也其制以苦寒下泄之大黃為君鹹寒軟堅下走之芒硝為臣又以辛溫下氣之厚朴為佐破氣泄滿之枳實為使而後可以攻堅瀉熱也若脈弱氣餒熱邪不甚者未可輕用也辨誤成氏謂承順也邪氣入胃胃氣鬱滯糟粕秘結壅而為實是正氣不得舒順也以湯盪滌使塞者利而閉者通正氣得以舒順故曰承氣也愚謂此解猶未足以發仲景立方之義謂之承氣者蓋承其邪盛氣實而以鹹寒苦泄盪滌攻下之也但熱實氣盛者可用無實熱而正氣虛餒者不可攻也若胃氣已敗正氣將絕雖力攻之亦不得下矣此無氣可承之故也即內經亢則害承乃制之義謂熱邪亢害而以鹹寒苦泄承製之非舒順其正氣之謂也觀太陽陽明脾約之治以無大實熱但胃中津液枯燥故僅以小承氣及麻仁丸和潤其胃燥不令大泄下則曉然矣小承氣湯方大黃四兩既名之曰小當是二兩漢之二兩即宋之五錢外分二次服耳厚朴二兩當是一兩枳實三枚以上三味以水四升煮取一升二合分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之小承氣者即大承氣而小其制也大邪大熱之實於胃者以大承氣湯下之邪熱輕者及無大熱但胃中津液乾燥而大便難者以小承氣微利之以和其胃氣胃和則止非大攻大下之駃劑也以無大堅實故於大承氣中去芒硝又以邪氣未大結滿故減厚朴枳實也創法立方惟量其緩急輕重而增損之使無太過不及適中病情已耳若不量虛實不揆輕重不及則不能祛除邪氣太過則大傷元氣矣臨證審之陽明中篇正陽陽明證治第十二陽明胃實陽明之為病胃家實是也邪自太陽傳來或本經自受皆屬在經之邪可更傳少陽亦可傳入三陰或邪欲自解亦可還表仍入太陽所謂傳經之邪也其在經之時可以此傳彼故曰轉屬陽明又曰屬陽明也若此者未可即謂之陽明胃實也唯經邪內入陽明之裡邪熱實於胃腑方可謂之胃實夫陽明居中土也萬物所歸至無所復傳之地而成可下之證故曰陽明之為病胃家實是也傷寒三日陽明脈大邪在太陽則有浮緩浮緊之脈而不言脈大在少陽則有弦細弦數之脈而亦不言大即太陽陽明及少陽陽明亦不言大唯邪氣獨在陽明無太少兩經之兼證者為正陽陽明胃實之症乃兩陽合明之經水穀之海多氣多血且邪並於陽故惡熱而脈大也陽明傷寒必至三日而脈大者蓋得之一日尚不發熱而惡寒邪猶在表也二日惡寒自罷即自汗出而惡熱則陽明證已見矣三日陽明之裡熱盛故脈大也惟大則為陽明胃家實熱之脈不大不足以言胃實也若陽明病而脈不大者即脈遲及浮緩浮緊浮弦之類皆太少兼證之脈也正陽陽明者胃家實是也凡邪自太陽傳來雖陽明見證居多若略見太陽症有未罷者尚當解散太陽邪氣未可攻下若已傳少陽才見少陽一二證陽明症雖多汗下在所必禁故仲景謂傷寒中風有柴胡證但見一證便是不必悉具即使邪入陽明適太陽證已罷少陽證未見而熱不潮者亦尚未可與承氣以邪氣尚在陽明之經胃邪未實故猶未可下必邪入陽明之裡胃實而發潮熱者知其大便已硬當亟用攻下以逐外入之邪存胃中之津液而病卻如失矣此所謂無所復傳之地當下之候故胃實為正陽陽明也太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之蒸蒸發熱猶釜甑之蒸物熱氣蒸騰從內達外氣蒸濕潤之狀非若翕翕發熱之在皮膚也邪在太陽已三日表證未解發熱惡寒無汗之候發汗則當熱退身涼而解矣乃邪氣仍不解反蒸蒸然發熱則其身熱汗出不惡寒之陽明證已現邪不在太陽可知矣而蒸蒸之熱又為熱氣自內而出並不在陽明之經已入陽明之腑故曰屬胃也邪既入胃必致熱耗津液故當調和其胃氣謂之調胃者蓋以大黃去胃熱而以甘草和胃也其所以止用調胃者以未至潮熱便硬故不須攻下既無潮熱便硬等胃實之證而三日即用調胃者以邪既入里必損胃中之津液且無太陽表證故不以為早也陽明病不吐不下心煩者可與調胃承氣湯心煩者胸中煩悗也然煩有虛實之不同此以陽明病而未經吐下則胃中之津液元氣無損為熱邪在胃之煩可知但不若潮熱便硬之胃實所以不必攻下而可與調胃承氣湯也陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉矢氣者此有燥屎乃可攻之若不轉矢氣此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便硬而少也以小承氣湯和之不轉矢氣者慎不可攻也此以下四條皆示人以用承氣之法若認證未的不可輕投峻劑當先以小承氣探其虛實以為進止不可忽遽以致誤也言病在陽明因潮熱而知其大便微硬者可與大承氣湯不硬者不可與之若不大便已六七日惟恐其有燥屎然猶未知其燥與不燥欲知之法當先少與小承氣湯湯入腹中轉矢氣者此有燥屎欲出也乃可攻之若不轉矢氣則知胃無實熱大約但初頭硬後必溏故不可攻之攻之則胃陽敗損中氣虛寒而脹滿不能食也欲飲水者胃熱未甚不可與也若與水則水寒傷胃而噦矣噦者呃忒也若服小承氣雖不轉矢氣而其後又復發熱者乃潮熱之類也以此測之則胃邪雖非大實而未盡全空必大便雖硬而少也少則仍不必攻當以小承氣湯和之足矣不可用大承氣湯故又繳云不轉矢氣者慎不可攻也辨誤其後發熱句當從不轉矢氣句落下為是觀末句復云不轉矢氣者慎不可攻則前後照應顯然矣而注家謂攻後重復發熱胃熱至此方熾誤矣若既攻之後脹滿不能食又至飲水則噦胃氣已是虛冷豈能重複發熱使大便復硬乎此必無之事下筆詳慎智慮周密者當不應若是得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯二三日邪未深入之時也脈弱虛寒之候非可小之脈也無太陽柴胡證邪氣已在正陽陽明矣煩躁心下硬胃實之徵也以日數尚少恐胃邪未實延至四五日胃邪當實矣雖能食者蓋能食則為中風之陽邪且能食又疑其胃未實滿似不當攻下又以脈弱之故未可遽下故用小承氣湯少少與之以微和其胃氣使胃邪稍緩令得小安至六日量其胃邪果實方與承氣湯一升以盡其邪若初病至六七日不大便者其胃氣當實而其小便少者乃下焦無火氣化不行也雖不能食似乎胃中實滿而不知不能食者為陽明中寒胃無熱邪其大便但初頭硬後出者必溏恐未必一定皆成硬所以攻之必溏也須待也言當待其三焦之陽氣流行則膀胱之氣化能出而小便分利陽氣旺而水穀分消屎定成硬乃可攻之以六七日不大便又待其小便利而屎已硬故宜用大承氣湯辨誤注謂胃弱而膀胱氣化之源窒恐未必然若膀胱氣化豈可責之於胃乎經云膀胱者州都之官津液藏焉氣化則能出矣又云三焦者決瀆之官水道出焉膀胱雖藏津液非三焦之火氣運行則不能氣化而出蓋三焦為命門之用乃先天真陽之氣也又何關乎後天之胃弱乎又謂此段之雖能食雖不能食全與辨風寒無涉云另有二義豈仲景立法理無一貫又令後人二三其說邪陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉矢氣者更服一升若不轉矢氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也邪在陽明而譫語發潮熱則邪熱當實於胃而為可下之證矣脈滑則食停於胃疾則熱邪過甚躁動已極其變態有不可測者以未見實大之脈不可輕下故不用大承氣湯而以小承氣湯主之因與承氣湯一升若腹中行動而轉矢氣者此胃中有實熱也更服一升以去其熱邪宿滯若不轉矢氣者是胃無實邪也勿更與之至明日而竟不大便其脈反微澀者知其內無真氣矣脈微則真陽衰澀則陰氣竭陰陽俱虛故曰裡虛也裡氣既虛以滑疾之脈而反變微澀是邪盛正虛所以為難治如此者正氣將敗斷不可更虛其虛是以不可更與承氣湯也陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯前陽明上篇有下之而胃中空虛客氣動膈心中懊憹舌上苔者不用攻下而以梔子豉湯主之及下之不結胸心中懊憹飢不能食亦以梔子豉湯主之者一以脈尚浮緊發熱汗出一以其外有熱但頭汗出此皆表未解而誤下所致雖未結胸而邪已入膈乘其將陷未陷之時故用高者越之之法以湧出其邪耳此以陽明病而不言外證是已無表邪也既無外證而下之心中懊憹而煩者當是熱邪在裡也察其脈症若舌苔黃黑按之而痛者或脈大沉實者乃胃中有燥屎可攻之證也若腹微滿則知證兼太陰里無大熱可知若攻之必初頭硬後必溏泄故不可攻之也若上截所謂胃中有燥屎者乃胃實之證宜大承氣湯病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也不大便五六日而繞臍痛者燥屎在腸胃也煩躁實熱鬱悶之所致也發作有時者日晡潮熱之類也陽明胃實之裡證悉備是以知其有燥屎故使不大便也病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯凡小便不利皆由三焦不運氣化不行所致惟此條小便不利則又不然因腸胃壅塞大氣不行熱邪內瘀津液枯燥故清道皆涸也乍難大便燥結也乍易旁流時出也時有微熱潮熱之餘也喘者中滿而氣急也冒者熱邪不得下泄氣蒸而鬱冒也胃邪實滿喘冒不寧故不得臥經所謂胃不和則臥不安也若驗其舌苔黃黑按之痛而脈實大者有燥屎在內故也宜大承氣湯大下後六七日不大便煩不解腹滿痛者此有燥屎也宜大承氣湯陽明胃實而大下之邪食皆可去矣下後又六七日不大便其煩悶終不解反腹滿而痛者此尚有燥屎未盡也非更為攻下不可故宜大承氣湯汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯陽明外證本已自汗出而中風亦汗自出然譫語而汗出則胃家實熱也所以有燥屎在胃中風者陽邪也此因太陽中風之陽邪傳入陽明胃腑之所致故曰此為風也但胃中之燥屎須下之然必過經乃可下之過經者非所謂過經十餘日及十三日方謂之過經言太陽之表邪已罷邪氣已過陽明之經入里而胃實乃可下之若有太陽證未罷固不可下即陽明之經邪尚未入里亦不可遽下下之若早則胃氣一虛外邪必陷必至熱甚神昏語言必亂蓋以表間之邪氣皆陷入於裡表空無邪邪皆在裡故謂之表虛里實也邪既盡入於裡則邪熱實於胃中故下之則愈宜大承氣湯陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳宜大承氣湯此條示人以機宜活法未可以能食不能食執泥其法以為中風中寒而致誤也陽明病而譫語潮熱邪熱已實於胃矣反似陽明中寒之不能食故曰反也然所以不能食者何也若果中於寒必有如中寒條內胃中虛冷之變矣今譫語潮熱乃因胃中實滿故不能食是以知必有燥屎五六枚也若能食者胃中未至實滿之極但屎硬耳然硬亦在所當下故皆宜大承氣湯傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服傷寒法當先汗此但曰若吐若下後不解明是當汗不汗而誤吐誤下以致外邪內陷而不解也邪既入里而不大便五六日則熱邪鬱結於內再上至十餘日鬱蒸愈久熱邪愈深矣日晡未後申酉之間陽明氣旺之時也潮熱為陽明裡證當下之候也不惡寒陽明之本證言無外邪也獨語譫言妄語也如見鬼狀邪熱熾盛不得下泄濁邪上迫目昧神昏而妄見也劇者病之甚也發發作之時也言病之劇者其發作之時邪熱肆虐蔽塞清道奪人聰明亂人心志故令不識人也循衣遇衣則捫而循之也摸床摸其所臥之床也言兩手無措撮空之狀也惕而不安動惕不能安臥即經所謂病則惡人與火聞木聲則惕然而驚也微喘氣短促而呼吸無力也直視目光直而睛不轉動也素問解精微論云夫心者五臟之專精也目者其竅也華色者其榮也有德則氣和於目王太僕云神內守則外鑑明蓋熱邪壅盛神志俱奪而不守也金匱真言論云東方青色入通於肝開竅於目故直視又為肝氣將絕也弦脈屬肝弦則少陽之生氣未絕三焦之真氣尚行且弦脈氣旺而有力故生若如新張弓弦則亦真臟之絕脈未必生矣澀脈屬陰澀則陰氣虛竭陽邪迫爍精枯髓涸故死也病之劇者則然若邪之輕微者但發熱譫語而已當以大承氣湯主之邪熱既微若一服即利止後服陽明病發熱汗多者急下之宜大承氣湯潮熱自汗陽明胃實之本證也此曰汗多非復陽明自汗可比矣汗多則津液盡泄衛陽隨之而外走頃刻有亡陽之禍故當急下庶可以留陽氣而存津液故宜大承氣湯然必以脈症參之若邪氣在經而發熱汗多胃邪未實舌苔未乾厚而黃黑者未可下也發汗不解腹滿痛者急下之宜大承氣湯邪氣在表發汗則當解矣若發汗不解顯系邪不在表已入里而為胃實故腹滿而痛也腹滿且痛治之不可少緩緩則必致傷胃故當急下宜大承氣湯腹滿不減減不足言當下之宜大承氣湯此承上文言下之而腹滿不減雖或稍滅而不足以言減是胃中邪食過於堅實不為攻下所奪也當下之宜大承氣湯然有下之而脈症不為少減者死證也傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯六七日邪氣在裡之時也不了了視物不能明瞭也睛目瞳子也睛不和精神不能貫注故視不明也外既無發熱惡寒之表證內又無譫語腹滿等里邪且非不大便而曰大便難又非發大熱而身僅微熱勢非甚亟也然目中不了了是邪熱伏於裡而耗竭其津液也經云五臟六腑之精皆上注於目熱邪內爍津液枯燥則精神不得上注於目故目中不了了睛不和也此終為邪熱內實於裡也當急下之以救陰液宜大承氣湯夫實則譫語虛則鄭聲鄭聲重語也譫語譫妄之語也鄭聲鄭重之聲也邪熱內實則神昏顛倒言詞錯亂故語無倫次也正氣內虛神思雖昏不能譫妄但模糊作重聲而已或曰虛則氣少輕微當語言無力矣豈能作重語邪曰正氣虛故音響深沉邪氣實故鄭聲重語雖曰虛則鄭聲實正虛邪實所致也若但虛無邪則亦不作鄭聲矣向以重字讀平聲恐誤王肯堂云只一語而頻言之蓋神有餘則能機變而亂語神不足則無機變而但守一聲也此說雖亦有重疊之意然其理頗通直視譫語喘滿者死下利者亦死譫語雖非死證直視則心神不守而精氣竭目系不轉而肝將絕以直視譫語而加之以喘滿喘則膻中迫促而氣不接滿則傳化不通而胃氣絕故死五臟別論云魄門亦為五臟使脈要精微論云倉廩不藏者是門戶不要也得守者生失守者死以直視譫語若下利則中氣不守而脾已絕腎主二陰下利則真氣不攝而下焦脫乃所謂門戶不要失守者死也陽明發黃陽明病無汗小便不利心中懊憹者身必發黃此言發黃之由皆因無汗及小便不利之所致也邪入陽明之經本當身熱汗自出及入陽明之腑亦必潮熱自汗若無汗則邪不得外泄而熱鬱於內小便不利則水不得下瀉而濕停於裡濕氣鬱熱瘀熱在胃不得發泄故心中懊憹而知其必發黃也黃者中央脾土之色也胃為脾之腑脾乃胃之臟脾胃以膜相連而為一合胃實鬱蒸故脾病而現黃色也脾本惡濕況濕熱並郁乎陽明病面合赤色不可攻之必發熱黃色小便不利也此言表邪未解誤下而致色黃也面合赤色成注謂合通也陽明病面色通赤熱在經也方氏云合應也面應赤色攻之則亡津液其說非也當以成說為是蓋陽明居身之前其脈起於鼻之交頞中靈樞邪氣臟腑病形篇云諸陽之會皆在於面其中人也方乘虛時及新用力若飲食汗出腠理開而中於邪中於面則下陽明故熱在陽明之經皆現於面所以面色通赤此時邪方在經尚未入里不可攻之攻之則胃虛邪陷熱鬱於裡其所以必發熱色黃者以小便不利濕與熱並鬱蒸於裡故也若小便利必不能發黃矣陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之此又詳言發黃與不發黃皆由汗之有無小便利與不利以反復互明前義也然此條又當與太陽中風脈浮動數之末證參看謂邪氣雖在太陽誤下則邪陷入里濕熱即可入胃鬱蒸而發黃非有陽明太陽之別也言邪在陽明而發熱汗出乃其本證若此者為熱邪已經隨汗發越於外雖或另有他證然必不能發黃也若但頭汗出則陽邪獨盛於上身無汗則熱邪不得外泄劑頸而還者三陽之經絡皆上至頭三陰之經絡皆至頸而還足見邪熱固閉陰陽離異營衛不行腠理不通也邪熱熾盛而三焦不運氣化不行故小便不利水濕不得下瀉且胃熱枯燥而渴飲水漿則水濕又從上入其濕蒸鬱熱瘀蓄在裡故身必發黃其濕熱之邪急宜攘逐故以茵陳蒿湯主之茵陳蒿湯方茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也茵陳性雖微寒而能治濕熱黃疸及傷寒滯熱通身發黃小便不利梔子苦寒瀉三焦火除胃熱時疾黃病通小便解消渴心煩懊憹鬱熱結氣更入血分大黃苦寒下泄逐邪熱通腸胃三者皆能蠲濕熱去鬱滯故為陽明發黃之首劑云陽明病被火額上微汗出小便不利者必發黃此言陽明無汗而以火劫之反增火邪以致小便不利而發黃也陽明被火即太陽中風以火劫汗之屬也以中風之陽邪被火是亦兩陽相熏灼也若能通身得汗則熱越而不能發黃矣今云額上微汗則周身無汗可知更小便不利則濕氣又不得下泄是與上文但頭汗出身無汗劑頸而還之證同而更增火邪矣故必濕熱壅滯鬱蒸而發黃也傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之此言陽明發黃之色狀與陰黃如煙燻之不同也傷寒至七八日邪氣入里已深身黃如橘子色者濕熱之邪在胃獨傷陽分故發陽黃也小便不利則水濕內蓄邪食壅滯而腹微滿也以濕熱實於胃故以茵陳蒿湯主之傷寒身黃髮熱者梔子柏皮湯主之發黃本由乎濕熱此以傷寒而不言無汗更不曰小便不利但曰身黃髮熱者是熱勝於濕無形之邪鬱蒸而發黃也故不必茵陳大黃而以梔子柏皮湯主之梔子柏皮湯方梔子十五個甘草一兩黃柏二兩上三味以水四升煮取一升半去滓分溫再服梔子苦寒解見前方黃柏苦寒神農本經治五臟腸胃中結熱黃疸瀉膀胱相火故用之以瀉熱邪又恐苦寒傷胃故以甘草和胃保脾而為調劑之妙也傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之瘀留蓄壅滯也言傷寒鬱熱與胃中之濕氣互結濕蒸如淖澤中之淤泥水土黏濘而不分也故成注引經文云濕熱相交民多病癉蓋以濕熱膠固壅積於胃故曰瘀熱在裡身必發黃也麻黃之用非熱在裡而反治表也赤小豆之用所以利小便也翹根梓皮所以解鬱熱也上文云無汗而小便不利者身必發黃故治黃之法無如汗之則濕熱從毛竅而散利其小便則濕熱由下竅而泄故以麻黃連軺赤小豆湯主之麻黃連軺赤小豆湯方麻黃二兩去節赤小豆一升即今赤豆之小者連軺二兩連翹根也杏仁四十個去皮生梓白皮一升甘草一兩炙生薑二兩切大棗十二枚以上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升分溫再服赤小豆非今一頭紅黑者古人以黑豆黃豆為大豆綠豆赤豆白豆䝁豆皆為小豆以小豆中之赤者故曰赤小豆李時珍曰以緊小而赤黯色者入藥稍大而鮮紅淡紅者並不治病花似豇豆而小淡銀褐色莢長二三寸比綠豆莢稍大三青二黃時即收之可煮可炒可作粥飯餛飩餡並佳也麻黃湯麻黃桂枝杏仁甘草也皆開鬼門而泄汗汗泄則肌肉腠理之鬱熱濕邪皆去減桂枝而不用者恐助瘀熱也素問至真要大論云濕上甚而熱以汗為故而止王冰注云身半以上濕氣有餘火氣復郁郁濕相薄以苦溫甘辛之藥解表流汗而祛之是也赤小豆除濕散熱下水腫而利小便李時珍云赤小豆小而色赤心之谷也其性下行通乎小腸能入陰分治有形之病故行津液利小便消脹除腫止吐治痢解酒病寒熱療癰腫通乳汁下胞衣產難服之降令太過津血滲泄所以令人肌瘦身重也吹鼻瓜蒂散及闢瘟疫用之亦取其通氣除濕散熱耳梓白皮性苦寒能散溫熱之邪其治黃無所考據連翹根陶弘景雲方藥不用人無識者王好古云能下熱氣故仲景治傷寒瘀熱用之李時珍云潦水乃雨水所積韓退之詩云潢潦無根源朝灌夕已除蓋謂其無根而易涸故成氏謂莫味薄不助濕氣而利熱也傷寒脈浮而緩手足自溫者是為系在太陰太陰身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也傷寒脈浮而緩與太陽下篇大青龍湯第二條相同然邪在太陽為傷寒而見中風之脈則有發熱惡寒之表證此條不言表證者以邪不在三陽也夫緩者脾之本脈故在太陽則浮緩為中風而有發熱惡寒之表證在太陰則浮緩為傷寒而無發熱惡寒之表證此陰陽經絡之分也然同曰傷寒脈浮而緩何以別其為太陽太陰乎但觀手足自溫則知通身無熱矣即所謂無熱惡寒為發於陰也況脾主四肢手足本關足太陰者乎曰自溫則又知非少陰厥陰之四肢厥冷矣非太陰而何故曰是為系在太陰也然太陰濕土之邪鬱蒸當發身黃若小便利者其濕氣已從水道而去故不能發黃也濕氣已去至七八日大便硬者為太陰復轉陽明胃實而成可下之症也此條當細加體認上半節與太陰篇無異此以七八日大便反硬為轉屬陽明彼以七八日後暴煩下利為脾家實一症而各陰陽一源而分涇渭病情之變化如此故入陽則為陽邪而成陽症入陰則為陰邪而成陰症矣寧有一定之可擬哉陽明蓄血陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈下血男子婦人均有之證也男子必由腸胃婦人則以經血為主耳譫語本陽明胃熱之證然下血而譫語則又不同矣因陽明熱邪煎迫使陰血損動經脈乍開熱邪乘間突入故為熱入血室也血室者衝脈也衝脈起於氣街出於胞中為血之海故謂之血室且脈要精微論云脈者血之府也五臟生成篇云諸血者皆屬於心熱入血室則經脈受邪所以心神昏亂而譫語也但頭汗出可見惟三陽之經脈流通三陰之經皆至頸而還營衛不通則周身無汗故營陰血分之邪不得外泄也期門者肝之募穴也足厥陰之脈起於足大趾之大敦穴終於乳下之期門從此內入腹中而屬肝絡膽矣以肝為藏血之臟邪既入血則熱邪實滿於經脈故刺之以泄其實邪所以謂之隨其實而瀉之也經氣得泄自當濈濈然邪隨汗出而愈矣然不以桃核承氣及抵當等湯治之者仲景原云熱入血室毋犯胃氣及上二焦蓋以熱邪在厥陰之經無關氣分故也陽明病其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之喜忘者語言動靜隨過隨忘也言所以喜忘者以平日本有積久之瘀血在裡故也前太陽證中因鬱熱之表邪不解故隨經之瘀熱內結膀胱所以有如狂發狂之證此無瘀熱故但喜忘耳素問調經論云血氣未並五臟安定血並於下氣並於上亂而喜忘者是也屎雖硬大便反易者以氣分無熱所以不燥況血乃濡潤之物故滑而易出也屎皆瘀血所成故驗其色必黑宜以抵當湯下之病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯上四句所以發疑證之端自假令以下方進而推求疑證之實以見臨證之不易宜詳審而不可忽也無表裡證者言不惡寒而但發熱則邪不在太陽之表但發熱而不潮熱譫語則邪又不在陽明之裡矣既無表裡證而又發熱其證已屬可疑其熱邪自有留蓄之處矣脈浮數為邪熱在表然發熱至七八日量其邪熱已入陽明即所謂身熱不惡寒反惡熱之證故脈雖浮數似有表症未除亦為可下之證也下之則胃中之熱去脈數可以解矣假令已下之後而脈數仍不解者是邪不在胃與氣分無涉而在陰分血分矣若苟邪熱在胃則熱傷氣分非惟客熱不能殺穀且有潮熱譫語腹滿煩躁之證矣豈能消穀善飢邪或邪不在胃但虛無熱則當胃氣平和亦不至消穀善飢此因熱在血分雖不在胃而人之營衛氣血兩相交互環注於一身內外者也雖以空虛無邪之胃而胃中虛陽與血分熱邪併合則能消穀善飢故曰合熱則消穀善飢蓋熱邪留著之處則異而其熏蒸之氣則同受也前發熱已七八日血受煎迫而已內溢矣靈樞百病始生篇云陰絡傷則血內溢內溢則後血者是也自此而又六七日不大便則離經之血瘀蓄不行故宜抵當湯下之若脈數不解而下利不止必協熱而便膿血也言若已下而脈數不解邪熱已傷陰血而中氣已虛腸胃不固既不能消穀善飢又不能六七日不大便遂因下後之虛熱邪乘勢下走而下利不止者必至以虛協熱使離經之血溢入迴腸即隨下利而便膿血也如厥陰經之厥少熱多而熱不除者必便膿血下利脈浮數者必圊膿血況陽明為兩陽合明之經乎以此推之無論陰經陽經但陰陽之氣偏勝偏虛即可為病無經絡之定分也陽明下篇少陽陽明證治第十三少陽陽明少陽陽明者發汗利小便已胃中燥煩實大便難是也此言少陽入陽明之由也少陽陽明之證有陽明之經邪傳入少陽者有少陽之經邪歸入陽明胃腑者皆可稱少陽陽明雖兩經之兼證然論中已有明訓曰傷寒中風有柴胡證但見一證便是不必悉具又申之以禁例曰少陽不可發汗不可吐下若此則凡見少陽一症汗吐下三法皆在所禁矣若以少陽證而發其汗且利其小便令胃中之津液乾燥而煩是少陽之邪並歸於胃故曰燥煩實實則大便難也蓋以少陽膽經內藏精汁不出不納無本經里證既不內入三陰故復歸陽明中土而大便難既歸陽明則邪氣已離少陽而汗下之禁已弛其治當與太陽陽明之脾約不遠矣仲景雖不言治法而但曰胃中燥煩實大便難則是與前太陽陽明之亡津液胃中乾燥大便難之證無異其和胃之法從可推矣服柴胡湯已渴者屬陽明也以法治之此亦邪自少陽入陽明也服柴胡湯者邪在少陽故也無論他經傳入或本經自感但見少陽證即當用之以和解半表半裡之邪無他法也服已而渴非復少陽證之或渴或不渴矣夫少陽之渴熱猶在經而未入里故雖渴不甚但以小柴胡加栝蔞根治之而已至服湯之後當邪解而渴止矣乃服已而渴知邪已入胃胃中津液枯燥即前渴欲飲水之渴故曰屬陽明也但云以法治之而不言法者蓋法無定法也倘雖屬陽明而少陽證尚有未罷猶未可輕犯少陽之禁若竟歸陽明即當以治陽明法治之不必更拘少陽法也邪熱既以歸胃當審其虛實而治之可也假令無形之熱邪在胃爍其津液則有白虎湯之法以解之若津竭胃虛又有白虎加人參之法以救之若有形之實邪則有小承氣及調胃承氣湯和胃之法若大實滿而潮熱譫語大便硬者則有大承氣攻下之法若胃氣已實而身熱未除者則有大柴胡湯兩解之法若此之類機變無窮當隨時應變因證便宜耳豈有一定之法可立又豈因久遠遺亡之所致哉辨誤夫邪之入少陽也或從太陽與陽明傳來或本經自受蓋太陽主外而居表邪氣由此假途而入在所不免然未必一定從陽明傳入也雖云太陽總營衛而主第一層陽明主肌肉而為第二層少陽主軀殼之裡而為第三層而其經脈則太陽之脈行身之背陽明之脈行身之前少陽之脈行身之側雖各有支別行度而不亂然其交互盤錯則有不能必相離異者故其受邪必不能按次循序先後不紊若云必由太陽而傳陽明陽明而傳少陽挨次輪傳則太少有所間隔何謂兩陽合明乎且合病並病條中不當有太少合併之病矣更曷為有柴胡桂枝湯之太少兩解及柴胡桂枝幹薑湯乎注家謂風寒皆從陽明而傳少陽此又云少陽重轉陽明則邪還陽明豈知陽明傳少陽者乃在表之經邪也故謂之傳經少陽屬陽明者乃入胃之腑邪也為自經入里非惟三陽之邪自經歸里皆必入胃胃實而後可下即三陰證中如太陰症之腹滿時痛至大實痛者即以桂枝大黃湯主之及腐穢當去之類又如少陰症中之承氣湯急下三條厥陰證中之下利譫語有燥屎者以小承氣湯皆邪氣入胃所謂陽明中土萬物所歸無所復傳之地也惟此三陰下證然後可稱重轉陽明邪還陽明以既入三陰理難再返故曰重轉若在三陽不過邪氣入里謂之轉屬陽明而已豈宜膠固其層次之說而又茫然混稱其為重轉陽明也哉陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之此陽明兼少陽之證也邪在陽明而發潮熱為胃實可下之候矣而大便反溏則知邪雖入而胃未實也小便自可尤知熱邪未深故氣化無乖而經邪尚未盡入也胸脅滿者邪在少陽之經也少陽之脈循脅裡其支者合缺盆下胸中胸脅之滿未去其邪猶在半表半裡之間故為少陽陽明然既曰陽明病而獨以少陽法治之者蓋陽明雖屬主病而仲景已云傷寒中風有柴胡證但見一證便是不必悉具故凡見少陽一證便不可汗下惟宜以小柴胡湯和解之也陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也此亦陽明兼少陽之證也上文雖潮熱而大便反溏小便自可此雖不大便而未見潮熱皆為陽明熱邪未實於胃之證前云胸脅滿未去此云脅下硬滿而嘔皆為少陽見證而似瘥有輕重以致後人有少陽為多之解然仲景之意不過互相發明初無少異但訓人以見證雖有不同其理本無二致也言證見陽明而又脅下硬滿此證兼少陽也少陽之脈行身之側循脅裡邪氣入經故硬滿也不大便為陽明裡熱然嘔則又少陽證也少陽之支脈合缺盆下胸中邪在胸中故嘔也舌苔之狀雖各有不同而寒熱虛實及邪之淺深證之表裡無不畢現智者明睿所照自是纖毫無爽若熱邪實於胃則舌苔非黃即黑或乾硬或芒刺矣舌上白苔為舌苔之初現若夫邪初在表舌尚無苔既有白苔邪雖未必全在於表然猶未盡入於裡故仍為半表半裡之證邪在半里則不可汗邪在半表則不可下故可與小柴胡湯以和解之少陽之經邪得解則胸邪去而其嘔自止脅邪平而硬滿自消無邪氣間隔於中則上焦之氣得以通行無滯故胃中之津液得以下流而大便自通胃氣因此而和遂得表裡暢達通身濈然汗出而解矣上焦得通津液得下胃氣因和三句成氏未悟其旨故不能解方氏已知津液得下為大便行矣喻氏因之故曰既云津液得下則大便自行亦可知矣而猶未知上焦得通胃氣因和之義故有風寒之邪協津液而上聚膈中之說又多一篇泛論蓋小柴胡非上焦之藥因少陽之脈絡循胸脅邪入其經故脅硬滿而嘔胸脅如此所以上下不通既得和解而少陽之經脈流通硬滿已消一無障礙故上焦之氣得以通行而胃中之津液亦隨氣下走燥去而大便通矣胃氣因和者因大便通而胃氣得和也即前太陽陽明證中小承氣和胃之義也前以汗吐下後又利其小便雖無大熱奈胃中之津液枯涸故成脾約胃中既無津液無以流通故不得已而以小承氣和胃及麻仁丸潤燥令胃和則愈此以未經汗下津液無損故不必小承氣而後和但得和解而氣通津下大便自通胃氣自和矣仲景之文雖未顯言然推其詞氣已無餘蘊矣若但舉其所知而遺其所不知是終未得其全旨恐於後學終無益也
