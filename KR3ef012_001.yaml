body:
  text: 卷之一陰陽發病六經統論病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六也此一節提挈綱領統論陰陽當冠於六經之首自叔和無己諸家錯簡於太陽脈證之後致喻氏以未熱注無熱悖於立言之旨矣蓋仲景以外邪之感受本難知發則可辨因發知受有陰經陽經之不同故分發熱無熱之各異以定陽奇陰偶之愈期也發於陽者邪入陽經而發也發於陰者邪入陰經而發也即陰陽應象論所謂陽勝則身熱陰勝則身寒陰陽更勝之變也發熱惡寒者如太陽居身之表營衛之所流行也營衛者即谷之一氣所化也衛行脈外本下焦命門之真陽蒸穀氣而布皮膚司開闔而固毛孔者也營行脈中本上焦太陰之真氣降中焦穀氣之精華以滋養灌溉充貫夫一身者也若風傷衛則衛陽受邪故頭項強痛發熱惡風而汗出也寒傷營則營陰受邪故頭項強痛發熱惡寒無汗體痛嘔逆也營衛雖有淺深其發於太陽則一也若陽明之經已在營衛之內肌肉腠理之中雖無關營衛亦必由營衛而入故有一日得之不發熱而惡寒者逮邪氣既入陽明則惡寒自罷身熱汗自出不惡寒而反惡熱矣然汗雖多尚微發熱惡寒者猶為外證未解也若入里則發潮熱矣故熱不潮者尚未可與承氣湯也少陽為軀殼之裡層自此以外由陽明而達太陽故屬陽分而為表少陽猶是三陽之內面故稱半表自此以內則腸胃臟腑也故為陰分而為里少陽乃胃腸臟腑之匡郭故為半里蓋統系隸乎表而部位接於裡也邪氣犯之非若太陽居表邪之所客者淺近惡寒即能發熱發熱即能惡寒寒熱每多並作唯少陽一經邪之所入者深遠其出而達於皮膚營衛不易故其發也則如瘧而往來寒熱矣夫三陽發熱狀雖不同而發熱則無不同也至於三陰本無發熱之例四逆惡寒其常也間有反發熱反不惡寒手足反溫其變也如太陰表證並無發熱者一則曰太陰中風四肢煩疼陽微陰澀而長者為欲愈又曰太陰病脈浮者可發汗宜桂枝湯又曰傷寒脈浮而緩手足自溫者系在太陰皆太陰無熱之表證也至少陰病則曰始得之反發熱矣發熱而曰反者因無熱者而又發熱故謂之反也乃少陰虛寒之表證故以麻黃附子細辛湯主之少陰證得之二三日口中和其背惡寒者當灸之而以附子湯主之又如少陰病惡寒身蜷而利手足逆冷者少陰病四逆惡寒而身蜷脈不至不煩而躁是皆惡寒而無熱之謂也又若少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒此又以不惡寒為反也其外熱面赤亦非發熱之熱乃陰盛格陽於外也至少陰病下利若利自止惡寒而蜷臥手足溫者可治少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解少陰病吐利手足不逆冷反發熱者不死此又以手足溫及發熱為反皆發於陰而無熱之謂也謂之不死者以陰邪漸退陽氣將回溫經復陽之治可施也若在厥陰發熱者極多惡寒者甚少而實陰陽相半然仍以陽氣為重故熱者必厥厥者必熱而以厥少熱多為病之退厥多熱少為病之進也至若發熱下利厥躁者非真發熱也乃陰盛陽絶陰陽離隔必死之證也夫發於陰者本無熱故凡有熱者不曰反發熱則曰反不惡寒反之為言不當得而得當然而不然也凡此真寒假熱之證悉標舉於三陰見證之中豈非無熱為三陰之根據乎其所謂發於陰者舍三陰而何指乎乃成氏舊注謂陽為熱陰為寒以發熱惡寒為寒傷陽無熱惡寒為寒傷陰固不足以窺仲景之籓籬而喻氏仍方氏之舊以風為陽衛亦陽故病起於陽寒為陰營亦陰故病起於陰若論邪氣止在太陽一經其說猶可若以此該貫六經則有大謬不然者矣況又以無熱惡寒句謂指寒邪初受未郁為熱而言少頃鬱勃於營間則仍發熱矣若以未郁為熱之少頃即謂之無熱恐仲景立言未必若是其歧也若必以風傷衛為發於陽寒傷營為發於陰則在三陽經之稱傷寒者皆可謂之發於陰矣然則三陰條中亦有以中風冠之者亦可謂之發於陽乎以理燭之豈其然乎所謂陽七日陰六日者概言其理所當然而非必然者也七者陽之復少陽之數也六者陰之極老陰之數也蓋陽數始於一而終於九陰數起於二而極於六此天地陰陽之至數也然一極之中分陰分陽而為兩儀兩儀各分太少而為四象則陰陽各有太少矣何獨陽取其少而陰取其老乎蓋陽以少為用陰以老為極陽少則為生氣陰極則為陽生故皆為愈期此陰陽消長之自然也其所以陽七日者陽動而變故能遊行於經脈之表七日經盡而邪衰如素問熱論所謂其不兩感於寒者七日巨陽病衰頭痛少愈也其所以陰六日者陰靜而守不若陽經之循行周遍至六日而陰極陽回如三陰證中之手足溫熱勝於厥而自愈也其有不應期而愈者則當察其失治誤治或邪盛或正虛或入里或犯臟及過經等證又不可以常理拘也夫發熱無熱辨證之源也發陽發陰知治之本也陽奇陰偶收效之數也豈非貫始終括六經標全論之宗旨乎余讀仲景書而見其參同於易也夫全易一奇偶也全論一陰陽也六子之生於乾坤六經之稟於陰陽也六經之淺深正變旁行疊見形能百出則卦爻之動變象數之紛淆也聖人以言不盡意而圖理於象使人即象以窮理仲景以法不盡證而以寒熱分陰陽使人辨證以盡法故首標易知之寒熱易辨之陰陽然後申其證變出其方法而後可以言治也夫證即象也法即理也三百九十七法不出六經之中六經不出乎陰陽之外能讀仲景書者其唯深於易者乎太陽經綱領太陽上中下三篇總脈總證太陽之為病脈浮頭項強痛而惡寒此舉中風傷寒之總脈總證而言乃太陽三篇之大綱也太陽者膀胱寒水之經也膀胱曷為稱寒水乎夫腎者天一之水也上古天真論云腎者主水聚五臟六腑之精而藏之者也蓋以腎與膀胱一臟一腑相為表裡而為一合也既為寒水曷為又稱太陽乎腎為坎水一陽居於二陰之間真陽藏於真陰之內水中有火谷入於胃其清氣化而為營行於脈中谷入濁氣降於下焦而腎中之真陽蒸騰其氣行於脈外直達皮膚而為衛氣故膀胱雖為腎臟寒水之腑而寒水之中其所以蒸騰發越而為衛氣者則又腎中之真陽也故衛氣之行一日一夜五十周於身晝行於陽二十五周夜行於陰二十五周平旦陰氣盡陽氣出於目目張則氣上於頭循項下太陽矣故曰太陽太陽者盛陽也陽不盛不足以密腠理而衛風寒故為六經之首為皮膚營衛之總統靈樞營衛生會篇云太陰主內太陽主外生氣通天論云陽者衛外而為固也又曰陽因而上衛外者也皆言太陽之統營衛而為最外之第一層也脈浮者脈有浮中沉三候浮者其上候也浮脈行於肉上而主表以風寒初入皮毛營衛邪氣在太陽之表故獨盛於上候而脈浮也足太陽之脈起於目內眥上額交巔從巔絡腦還出別下項連風府循肩膊內挾脊抵腰中挾督脈而行風寒客之故頭項強痛也風寒在表則惡寒皮部論云邪之始入也泝然起毫毛開腠理玉機真藏論云風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發是也言惡寒而不言惡風者以惡寒者未必不惡風惡風者未嘗不惡寒舉一即可該其義也此條見症為中風傷寒之所並有故總舉之為篇首至太陽上篇則由此脈證而申出中風諸證以別風傷衛者如此中篇亦由此脈證而申出傷寒諸證以見寒傷營者如此至下篇則又因此脈證而申出風寒兼有之證以辨風寒兩傷營衛者又如此然後各因其證而立法施治也以後凡稱太陽病者皆具此脈浮頭項強痛而惡寒者方是也太陽病頭痛至七日以上自愈者以行其經盡故也若欲再作經者針足陽明使經不傳則愈頭痛太陽證也七日以上謂七日之內也經者經脈也太陽之經即所謂起於目鋭眥上額交巔絡腦下項連風府挾脊抵腰貫臀入膕過髀出外踝至小趾之端者是也行其經盡者言邪入太陽之表遊行於太陽經脈之中經盡而邪氣衰去即內經熱論所謂七日巨陽病衰頭痛少愈者是也再作經者邪氣再傳一經也謂太陽經盡邪氣未衰欲再傳足陽明其勢正未已也當候其邪氣已傳即針足陽明之經穴以泄其邪使經邪不傳則愈矣此經所謂迎而奪之以瀉其盛離合真邪論又云卒然逢之早遏其路之義也然不於太陽刺之而獨針陽明者何歟蓋胃為水穀之海多氣多血素問熱論云陽明者十二經絡之長其血氣盛靈樞終始篇所謂陽明主胃大富於穀氣故可日二取之他經則或日一取之或二日一取之蓋取其可瀉之經而刺之也前注以為陽明中土萬物所歸無所復傳非也此乃仲景論陽明入里之邪胃實可下之證故曰無所復傳然非所論於在經之邪也若邪未入胃則經經可傳何獨陽明唯邪入陽明可刺之經而刺之乃可遏其傳路耳觀行其經盡欲再作經使經不傳之三經字則在經在裡判然分明矣太陽病欲解時從巳至未上經云邪之所湊其氣必虛邪既入太陽之經雖或氣衰欲解然經氣已虛無以自振必待經氣旺時方能決去其邪夫太陽者盛陽也旺於巳午巳為純陽乾卦主之午雖一陰初生然陽氣旺極之時也生氣通天論云日中而陽氣隆日西而陽氣已虛故曰從巳至未上欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也煩之為病不一有表裡陰陽虛實之不同此則表邪怫鬱將解未解之時不得發越而煩也天地之氣鬱則陽蒸陰而為雨人身之氣鬱則陽蒸陰而為汗陽氣鼓動陰液外泄邪氣隨之而出矣脈為氣血之先邪氣在表則浮若鬱蒸煩悶則氣欲外泄故脈先浮脈浮是以知其必汗出而解也太陽上篇中風證治第一中風正治太陽病發熱汗出惡風脈緩者名為中風前總證中所有之脈浮頭項強痛而惡寒乃太陽經中風傷寒所均有之脈症而猶未分其所以為中風為傷寒也故此篇即於上條之脈浮頭項強痛之總證而增入發熱汗出惡風脈緩以別其為中風者如此也中風風傷衛也風者春令陽氣上騰呼吸而為風所以發生萬物者也其太過不及之氣乃為淫慝之邪感之則為中風矣然非獨春令為然也四時皆有之唯春時為當令耳發熱者風邪客於衛而鬱蒸也汗出惡風者風邪襲於毛孔衛氣不能司其開闔之常玄府不閉故汗自出腠理疏而不克任受風寒故惡風也風寒雖可互言此篇則仍重於風也緩者緊之對稱非遲脈之謂也風為陽邪非徑急之性故其脈緩也此一條為太陽中風之綱領以下凡言中風發熱汗出脈緩之太陽病用桂枝湯者皆同此脈證也以風傷衛為第一層故列為太陽上篇也太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之陽浮陰弱者即所以釋前總症中脈浮之義也熱自發汗自出即所以申上文發熱汗出也脈法以浮候屬陽沉候屬陰謂之陽浮者衛行脈外陽邪中之則脈盛於外故陽脈浮也陰弱者營行脈中營未受邪則覺脈弱於內故陰脈弱也若總言之浮候實則沉候虛唯其沉候虛乃見其為浮脈也蓋以陽受邪而實陽實則陰虛也熱自發汗自出之兩自字皆易詞也言風為陽邪衛為陽氣二陽兼併邪正不容主客相爭氣鬱而熱自發非若寒邪之客於腠理至陽氣不得發泄必待郁甚而始發熱也衛為表之表營為表之裡衛統皮毛風邪中之則毛孔不閉營中陰液內為熱邪所蒸外為衛氣固密故汗易出又非若寒邪入腠玄府緊閉陽氣不得外泄而無汗也夫衛陽不能外固則營陰不能自持如婦之無夫失其蔽護無以自立唇亡則齒寒故陽浮熱自發則陰弱汗自出也蓋衛主皮毛猶門戶之司開闔也風邪客衛如有物之梗礙於門中而不得闔也不得闔則入者一任其入出者一任其出矣任其入故惡風寒也任其入則汗自出矣嗇嗇猶言颯颯如風寒之侵逼也淅淅猶言淅瀝若風聲之微動也嗇嗇惡寒營陰弱於內也淅淅惡風衛陽疏於外也中風而亦惡寒者衛傷而營弱也陽強陰弱營衛不得和諧故風寒皆惡也翕翕熱從外發覺熱氣烘灼於皮膚之間也肺主皮毛開竅於鼻風在皮毛內通於肺故氣寒熱壅鼻息嘶鳴也乾嘔噁心也胸屬太陽風邪在衛邪氣犯膈而嘔也此皆風邪傷衛之證當解肌發汗宜桂枝湯主之主者主其治也凡見以上脈證皆當以桂枝湯主其治即有變證亦以此方為主而損益之如下文桂枝加桂及桂枝加附子湯桂枝去芍藥加附子湯之類是也桂枝湯方桂枝三兩芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘仲景云桂枝者取枝上皮也後人不知藥性氣味而曰去皮誤矣不知桂味皆在皮若曰去皮則木心有何氣味乎肉桂亦大樹身皮耳豈亦舍其皮而用其木心耶然必以氣味甜辣者方有辛溫發散之功無氣味者非真桂也不可入藥上五味以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥停後服不必盡劑若不汗更服依前法又不汗後服小促役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物桂陽木也生長於東南蓋得東南震巽發生之全氣者故能補助命門生髮中州益下焦氣化之功宣通百脈而為氣血之要藥其枝則得陽氣而暢茂條達者也夫木性之陽春生髮為天地發散其三冬伏藏之鬱結者也況桂為純陽之木氣味皆厚且又生髮新長之枝乎故能達衛陽之分而散解其鬱滯之風邪是以辛溫發散之陽以解陽分之陽邪也陰陽應象論所謂辛甘發散為陽也東垣謂桂枝湯為陰經營藥而能閉衛氣使陰氣不泄方有執謂桂枝固衛而善走陰均失之矣臣之以芍藥者收陰氣而斂津液所以救營陰之弱而滲泄也佐之以甘草者甘以緩之佐桂枝則甘溫能除大熱也使之以薑棗者姜以助其辛散而止嘔棗以和其中氣而調停之也將佐皆得其人操縱各適其用則衛不覺其強而營不患其弱邪解氣平而自和諧矣適寒溫者恐太熱則不能驟進若徐飲則其勢已分太寒則熱氣衰而無以鼓動其陽氣也啜熱稀粥以助藥力者桂枝不過解肌原非發汗之猛劑恐其力綿故以熱稀粥為後徑所以助其溫散之功也內經云汗出皆生於穀故以谷充其氣也漐漐身熱汗欲出貌氣蒸膚潤之情狀也微似有汗言汗微而似有似有而實微也衛在皮毛邪氣浮淺使肌膚暫開僅令衛分之風邪消散而不使過多有傷營分之弱陰也若強逼太過使汗出如水流漓是發盡營中之汗衛邪仍不能解適足以愈弱其陰故曰病必不除也小促役者方土之語楊雄郭璞所謂方言也謂暫停半日許如可令人催促之頃也又小促役宋板作小從容禁臭惡等物者使清穀入胃則清濁之升降得宜營衛之流行無滯庶漸得安和而無反復之虞也太陽病頭痛發熱汗出惡風者桂枝湯主之頭痛雖見之於太陽總證而未見於中風之首條首條雖具脈證以正中風之名而尚未顯言其治法此條雖有證無脈而前後互見並詳明其治法矣其脈症治法於三處互見仲景立言或詳或略忽現忽隱正神龍見首不見尾見尾不見首之妙開後學辨證施治之法門其為天下後世慮也深矣太陽病外證未解脈浮弱者當以汗解宜桂枝湯脈浮弱即前陽浮陰弱之義也外證即前發熱汗出頭項強痛惡寒等證也言凡見外證未解而脈浮弱者無論為日多少未經傳變者其病猶在太陽不可誤以麻黃髮汗及犯下早之戒仍當用解肌之法以桂枝湯汗解之此所以示叮嚀之意也太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯主之衛以受邪而覺強營未受邪而覺弱太陽經之有營衛如衣之有表裡也表以垢膩而覺厚里無垢膩故反覺薄耳以發熱汗出為衛強營弱即所以申明陽浮熱自發陰弱汗自出也邪風即風邪顛倒反復皆以明桂枝湯之用也病常自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故爾以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯此又言營氣和以明營弱衛強為陰弱汗自出之故而詳言其治法也言太陽中風之所以汗常自出者此為營氣本未受邪而自和然營氣雖和而營外之衛氣則為風邪所中邪氣附著於衛而鬱熱受困不得與內之營氣兩相和諧浹洽之所致爾蓋營為穀氣之清者其精專之氣出自中焦化而為赤行於脈中故曰脈者血之府也然非謂營即血也乃血中之氣也以血非氣則無以流行氣非血則無所依附血本屬陰故血中之氣亦為陰氣也衛為穀氣之濁者降於下焦為命門真火之所蒸騰其真陽慓悍之氣不循經脈直達皮膚而行於脈外營則浸灌滋潤衛則溫暖固密一營一衛兩相和協故無病也生氣通天論云凡陰陽之要陽密乃固陰平陽祕精神乃治陽強不能密陰氣乃絶以此推之即可以該衛強營弱而汗自出之義矣然衛氣之不與營氣和諧因風中之而強也治之之法無他勿以汗常自出之故而疑之仍當以桂枝湯復發其汗使衛分之邪解則營衛和諧而愈矣病人臟無他病時發熱自汗出而不愈者此為衛氣不和也先其時發汗則愈宜桂枝湯主之上文但言營氣和而外不諧猶未宣明外不諧者即衛氣不和也此條復補出衛不和以反復詳盡中風用桂枝湯之義也臟無他病謂平日內臟並無他病也時發熱者謂其發熱有時也言病人臟無他病唯表中於風以致有時發熱自汗出而不愈者此為風邪載於衛氣之中邪正不相和也若至已發熱時則邪氣已動而汗自出是治之失其時矣不若乘其未發熱時則邪伏於衛用桂枝湯先其時發汗則衛邪可去營分無傷邪隨汗出而愈矣太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈服桂枝湯法有一服不解而至三服者有病重一劑不解而至二三劑者此條乃初服桂枝湯其邪未得即解亦常有之事耳曰反煩則不止於不解是藥後轉加煩悶矣煩則風邪鬱於肌表煩悶不得發越陽邪熾盛充塞於太陽之經服湯不能驟解故用刺法以分泄之也夫太陽之經脈四行挾督脈而行於兩旁者也風府一穴本督脈穴也在項上入髮際上同身寸之一寸在大筋宛宛中疾言則其肉立起言休則立下乃督脈陽維之會刺可入同身寸之三分而禁灸風池二穴本足少陽穴也在耳後發陷中為足少陽陽維之會針入七分留七呼三穴雖非太陽本經脈穴而氣府論云足太陽脈氣所發者七十八穴其浮氣在皮者凡五行而風池風府三穴皆五行中之穴也以其為風邪出入之門戶故刺之以泄風邪之盛而殺其勢也正王啓玄所謂浮氣而通之可以去熱者也刺之而邪氣分泄卻仍以桂枝湯汗解之則愈矣此又以邪氣太盛用刺法為助以兩解之也風家表解而不了了者十二日愈風家表解是服桂枝湯而表邪已解也了了決也不了了言了而未了也謂中風家表邪已解猶有餘邪故未得遽安汗之則不須更汗攻之則里內無邪雖欲治之無可治也方注及喻氏皆以為當靜養以需不可喜功生事也十二日愈者言經盡兩周邪去而正自復也此內經立法之常經若至過經不解則又為法外之變又當別論矣凡服桂枝湯吐者其後必吐膿血也其後必吐膿血句乃未至而逆料之詞也言桂枝性本甘溫設太陽中風投之以桂枝湯而吐者知其人本陽邪獨盛於上因熱壅上焦以熱拒熱故吐出而不能容受也若邪久不衰熏灼肺胃必作癰膿故曰其後必吐膿血也此以不受桂枝而知之非誤用桂枝而致之也乃各注傢俱言胃家濕熱素盛更服桂枝則兩熱相摶中滿不行勢必上逆而吐熱愈淫溢蒸為敗濁必吐膿血此一大禁也不知桂枝隨已吐出何曾留著於胸中豈可云更服桂枝兩熱相摶乎前人遂以此條列為桂枝四禁豈不謬乎若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也此條辭義明顯不須注解其特設此義者所以別上文服桂枝湯吐者之不同也前以熱邪上壅胸膈而吐此以酒客之濕熱常在胸膈而嘔前以不受溫而吐此以不喜甘而嘔如此則吐膿血與不吐膿血亦自明矣凡酒客中風風性本溫酒性濕熱此真所謂兩熱相合也至真要大論云風淫於內治以辛涼佐以苦以辛散之但不必以甘緩之矣其於桂枝湯則當謹避之耳桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也當須識此勿令誤也此一條真乃桂枝湯之禁例也浮緊傷寒之脈也發熱汗不出傷寒之證也具此脈證其為寒傷營而為麻黃證也明矣桂枝湯之本義蓋以桂枝辛溫發散為解肌和衛之藥芍藥酸收斂液所以救營弱而汗自出者也唯其衛強故以桂枝汗解其衛分之風邪唯其營弱故以芍藥收斂其營中之陰液今寒既傷營則寒邪閉於營分鬱而為熱汗不出而頭痛項強身腰骨節皆疼惡風而喘矣寧可仍用桂枝舍營分之陰邪不發反空發衛分之陽邪乎更不知肅殺之寒邪在營而反以酸寒收斂之芍藥固之豈非誤治反治乎故曰不可與也當須識此勿令誤也非謂桂枝反能收汗固衛也歷代名家如成無己但隨文順釋而不能辨王好古謂麻黃治衛實桂枝治衛虛以致方氏之辨有風中衛而衛不固發熱汗出而惡風桂枝救護之熱粥釋散之曾不思風中於衛若非桂枝發汗解肌豈一粥之所能釋散乎遂至世俗不曉其中意義更忘桂枝湯原文中有復發其汗當以汗解句及服桂枝湯法中雲汗出病瘥不汗更服等語而謂麻黃髮汗桂枝閉汗故一遇汗出便用桂枝不知麻黃汗解營分之寒邪桂枝僅解衛分之風邪所以桂枝與芍藥同行一以汗解其衛邪而衛氣和一以救其營弱而汗液收矣若必以為桂枝止汗豈不見麻黃湯中亦有桂枝乎豈有用麻黃而欲發其汗又以桂枝收之乎唯此義未明所以方氏於麻黃湯論中有用麻黃而監之以桂枝為節制之妙此皆相沿相習之惑也蓋麻黃為肺經之專藥杏仁所以助麻黃而利肺氣開皮毛而定喘者也皆為發泄魄汗之要藥其所以亦用桂枝者既欲泄脈中營內之寒邪有不先開脈外一層之衛氣乎此皆仲景制方之妙深得內經客者除之結者散之開之發之之意也尚論不知桂枝湯義亦但云使寒邪漫無出路貽患無窮豈亦仍方氏之舊說歟發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯此二條所以辨既非傷寒亦非中風也然證同而治亦同又以一汗一下為言者蓋示人以病不在表徒汗無益病不在裡徒下亦無益又不可更疑其邪在表而更行桂枝湯以致誤也汗出而喘者肺主皮毛邪熱但在肺臟也無大熱者言表裡皆無邪也邪在表則發翕翕之熱邪在裡則發蒸蒸之熱此不言不熱又不言微熱而曰無大熱者蓋肺主皮毛因邪熱在肺或時有微熱未可知也然非若表裡有邪之熱也既汗既下仍然汗出而喘足見邪不在表裡治非其治矣不可更行桂枝湯者恐助熱而斂邪也言肺為人身之天氣所以通呼吸主皮毛而司開闔者也熱邪實於肺中則肺氣滿而喘矣肺病而清肅不行失其治節皮毛不密開闔失司是以汗出也若疑似之間誤認為太陽中風之汗自出則桂枝之辛溫能不助肺家之熱芍藥之酸收寧不斂肺分之邪乎故曰不可更行桂枝湯可與麻黃杏仁甘草石膏湯也麻黃杏仁甘草石膏湯麻黃四兩去節杏仁五十個去皮尖研甘草二兩石膏半斤研上四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升辨誤成氏之說固為背謬方氏謂不當用桂枝固衛故用麻黃以發之喻氏亦謂誤用桂枝固衛寒不得泄故變青龍之制允為的對不思若邪果在太陽而汗出可復用麻黃以發之耶汗出而加之以喘豈猶未知為肺病乎此所謂麻黃杏仁甘草石膏湯者所以解肺家之邪熱非所以發太陽之汗也若仍用麻黃以發之則不必另立一名當命之曰麻黃去桂枝加石膏湯不然則又當曰青龍去桂枝芍藥湯矣何必另立名義乎其別立一名者所以別乎其非青龍麻黃之汗劑耳李時珍云麻黃乃肺經專藥雖為太陽發汗之重劑實發散肺經火鬱之藥也杏仁利氣而能泄肺石膏寒涼能肅西方金氣乃瀉肺肅肺之劑非麻黃湯及大青龍之汗劑也世俗不曉惑於活人書及陶節庵之說但見一味麻黃即以為汗劑畏而避之唯恐不及不知麻黃湯之制欲用麻黃以泄營分之汗必先以桂枝開解衛分之邪則汗出而邪去矣何也衛在營外營居衛中欲泄其內必先開其外也前人每謂桂枝能固衛止汗者誤甚若果能固衛止汗何仲景又以此解太陽中風之邪使漐漐似汗而又警人以如水流漓之戒且又云一服汗出病瘥止後服若不汗更服若汗不出者服至二三劑其第四條曰外證未解脈浮弱者當以汗解宜桂枝湯非其明訓乎所以麻黃不與桂枝同用止能泄肺邪而不至大汗泄也況服麻黃湯法原令微似汗而未許人大汗出也觀後賢之麻黃定喘湯皆因之以立法也若夫大青龍之制則以寒溫並感故以麻黃全湯合桂枝去芍藥湯以兩解之又以熱鬱煩躁之溫邪更入之以白虎之半以解其煩熱耳注傢俱不知其義又烏足以窺仲景哉以上十四條皆太陽中風之脈證及應用桂枝湯之情形方法禁例也正治之法已盡於此其誤治失治之變逐門條列於後即壞病條中之已發汗若吐若下若溫針之誤治而仍不解者之變也觀其脈證知犯何逆隨證治之之法也從來正治誤治雜亂不分混淆於一篇之中不知誤汗吐下即壞病也誤汗吐下之治即壞病治法也又另立壞病一門而謂仲景壞病治法失而不傳遂為千古恨事今讀之者眩目惑心用之者茫然無措謂非從前編次之失何可得歟余為分其緒端各立條目使正治誤治之法井井不紊庶可為將來之助云太陽壞病太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之太陽中風之三日邪猶在表當用桂枝湯取微似汗以解之乃為正治若曰已發汗是以麻黃湯誤汗之矣與夫若吐若下若溫針而誤用之於邪氣在表之時皆足以致裡虛邪陷之變故仍不解也何以言之以本未壞之太陽病而以誤汗吐下溫針壞之乃為醫所壞也故曰壞病非前注所謂過經不解日久不痊亦非治法多端無一定可擬而謂之壞病也既因汗吐下溫針之誤必有變證蜂起非復桂枝之舊證矣故曰桂枝不中與也但觀其所變之脈證即知其所犯因何而變逆隨其見證而治之可也論中凡屬誤汗吐下之變皆壞病也故治之之法即下文誤汗誤吐誤下誤燒針諸條是也辨誤從來立言諸家俱謂仲景既有壞病一則惜其不立治法但曰隨證治之以法治之而已使後人臨證束手誠為缺典或曰仲景有法必有方大約因久遠遺亡遂成不全之書良可嘆也不知仲景本意原以太陽病三日之一條以冠中風誤治之前又以本太陽病不解一條列於少陽誤治之始其下文誤汗誤吐誤下誤溫針諸條即其治也向因王叔和編次之失致雜亂於正治誤治之中紛紜難辨故使後人有此疑嘆耳初非不立治法也豈意後賢殫心竭慮終不可得故又別立壞病一門而其治法究無所措是以知讀仲景書之不易也然六經之中仲景獨以陽經之太少為言者蓋以在表之誤治居多在裡之誤治少也且二經之表裡虛實疑似多端難於察識其誤治獨多變逆尤甚其害有不可勝言者故特立此一法以重其事也學者其可忽諸中風失治太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之脈之陰陽有關以前為陽關以後為陰者蓋寸口為陽主乎上焦天氣尺中為陰主乎下焦地氣而關則陰陽之分界也此所謂陰陽者即辨脈首章所云大浮動數滑為陽沉澀弱弦微為陰也謂之陽者邪氣在表之脈謂浮候也謂之陰者邪氣在裡之脈謂沉候也停者停止之謂猶暫停略停少停之義也振栗者振動而戰栗也以太陽病未解之時陰陽脈俱忽然停止而不見乃正氣本虛難於勝邪致正邪相爭陰陽擊搏振栗將作所以陰陽脈皆暫時潛伏乃正氣欲復邪氣將解之徵故必先振栗則陽氣鼓動正氣得伸然後汗出而解也若邪止在表但見浮大動數之表脈而忽見微弱者為陽脈已微則知表邪已衰必先汗出而解其所以先汗出而解者以表邪既衰腠理自通故知必先汗出而解也若邪止在裡但見沉實弦滑之裡脈而忽見微弱者為陰脈已微則知里邪已弛下之而邪氣解矣若欲下之以陰脈既微為邪氣已衰不必力攻大下故止宜以調胃承氣湯主之然里邪必下之而後解者以有形之滓必須假借藥力方能決去非比無形之表邪可自行渙汗而解也所以仲景但有下法而無汗法也辨誤此條自成注以來諸傢俱以停字作均停解而曰陰陽兩停補無偏勝若果如此則是無病之脈矣邪氣安在何庸汗解乎唯程氏之再辨有云陰陽俱停止者是陰極而陽欲復也其義頗精可稱卓識但惜其一篇之中唯此一句耳至於脈之陰陽成氏又引辨脈法中之寸口關上尺中三處大小浮沉遲數同等以證之誤矣此乃關前為陽關後為陰之說也若以寸口為陽則尺中為陰矣設尺陰既微汗且仲景以為不可況下之乎不知此所謂陰陽也以一寸口而分陰陽豈非大浮動數為陽而主表沉澀弱弦為陰而主裡乎各注傢俱畏難而置之不辨使後學安所適從且仲景之文容光必照豈容終晦乎中風發熱六七日不解而煩有表裡證渴欲飲水水入即吐者名曰水逆五苓散主之此因不早解肌久而不解致邪氣入里而變逆也六七日經盡當解之候也猶不解而煩者蓋因不用桂枝湯汗解風邪不得外泄表邪猶在故仍發熱而不解也為日已多不解之表邪透漏入里已在胸膈之間故作煩悶也靈樞五亂篇云清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於胸中是為大悗故氣亂於心則煩心者是也外熱里煩故曰有表裡症渴欲飲水者邪入胸膈熱在上焦也水入則吐者邪未入胃里無熱邪也上熱所以渴欲飲水裡寒所以雖入不受而為寒格之證故曰水逆夫病在太陽而渴乃膀胱之氣化不行非胃熱而渴也李東垣以渴為膀胱經本病者何也蓋太陽者膀胱之經也膀胱為津液之所藏水濕之道路也然必藉命門之真陽化三焦之運用蒸騰其水濕之氣上行而為涕唾則不渴矣靈樞決氣篇所謂上焦開發蒸五穀味熏膚充身澤毛若霧露之溉者是也下焦則蒸動其水濕之濁氣滲入膀胱而為小便靈樞衛生會篇云下焦者別回腸注於膀胱而滲入故蘭靈祕典云三焦者決瀆之官水道出焉此其義也以太陽之經邪不解而內犯膀胱則下焦不蒸而氣液不得上騰無津液之潤故渴欲飲水又以胃無熱邪且下焦之火不蒸所以水入則吐寒格而為水逆也故以五苓散主之以助其下焦蒸騰之用使氣液升而渴自止又恐其表症之發熱未解故又飲暖水使汗出邪解而愈矣此條有證無脈故難於擬議以理測之尺中微弱量可知矣辨誤原文中仲景以發熱不解為表證以煩為里證故云有表裡證皆責人以不早汗解而致入里之意也至渴欲飲水水入則吐然後用五苓散主之以桂助其下焦蒸騰之陽氣使津回氣潤以治其渴而止其水逆仍以表邪未解多服暖水令汗出而愈並非以一五苓散而能使表裡之邪盡解也成氏不知此義以煩為表邪已屬誤謬又以原文有表裡症句遂謂與五苓散和表裡及本篇誤汗首條發汗後大汗出脈浮小便不利微熱消渴者與五苓散亦以脈浮為表未解而曰以五苓散和表裡豈既發其汗而大汗出表邪猶未解耶至於傷寒誤汗條中有發汗已脈浮數煩渴者五苓散主之亦以脈浮數為表邪未盡云與五苓散和表潤燥致後人皆以五苓散為兩解表裡之劑而以桂枝易桂究竟原方中仍是桂去粗皮半兩則桂豈解表之藥乎一人之誤令後世千萬人皆誤非成氏作俑之罪乎五苓散豬苓十八銖去皮茯苓十八銖澤瀉一兩六銖白朮十八銖桂半兩去粗皮古以二十四銖為一兩漢之三兩准今之一兩以後凡見銖兩者皆準此上五味為散以白飲和服方寸匕日三服多飲暖水汗出愈術性燥濕扶土製水使脾氣健而足以散精胃氣強而津液自運李時珍云術除膀胱之濕則氣得周流又云茯苓氣味淡而滲其性上行生津液開腠理滋水之源而下降利小便潔古謂其屬陽浮而升言其性也東垣謂其為陽中之陰降而下言其功也潔古又云淡為天之陽陽當上行何以反利水而瀉下氣薄者陽中之陰所以茯苓利水瀉下不離陽之體故入手太陽豬苓淡滲令氣升而又能降故能開腠理利小便與茯苓同功但不入補藥耳澤瀉氣平而味甘淡淡能滲泄氣味俱薄所以利水而泄下脾胃有濕熱滲去其濕熱亦隨去而土得令清氣上行使天氣清爽愚按陽中之陰者天氣也人身之肺氣也唯其地有陽氣上升然後天有陰氣下降天氣下降然後有雨霈露零之妙所以諸利小便之藥皆氣味輕薄而上行於肺至肺氣下行而小便滲利故肺為水之化源也世人不知氣交升降之義但曰水出高原僅以肺為化源淺矣邵子皇極經世之遠取諸物篇云羽族八竅以無肺之一臟故無小便也桂性辛熱而下行入腎而走命門膀胱者腎之腑也經云州都之官津液藏焉氣化則能出矣三焦者決瀆之官水道出焉以膀胱為津液之府而三焦能決其水者何也蓋三焦為命門真陽之火氣總領臟腑經絡營衛內外左右之氣而遊行於上中下一身者也故命門為三焦之原三焦為命門之使所以命門為體而三焦為用也所謂氣化者濕化為氣而上騰氣化為水而下出桂者所以助下焦之陽氣上蒸而使地氣上升者也升已而上焦之天氣還而下降其氤氳之氣入胞中而滲入膀胱是為便溺也是皆由氣化而入更由氣化而出者也若非下焦陽氣之蒸騰惡得有氣化而為升降出入之妙乎是以五苓之有桂猶釜底之有薪火也其率淡滲以為功猶兵之有將帥也人皆不知此義畏其熱而不敢用有改而為四苓者有更桂而用桂枝者故前人方論中皆曰以桂枝之辛甘發散和其肌表互相傳習衆論雷同於雜證中猶知用桂於傷寒家無不皆然孰知仲景桂枝湯中必曰桂枝三兩五苓散內但曰桂去粗皮半兩試思果用桂枝因何止一桂字況桂枝豈有粗皮可去此一可辨也倘五苓散中可稱桂枝為桂則桂枝湯中亦可止用一桂字矣又何必以兩字稱之耶一字兩字之稱定之於前人而後人終不能改何議論中偏改桂為桂枝耶且東垣李氏曰桂性辛熱陽中之陽也氣之薄者桂枝也氣之厚者桂肉也氣薄則發泄桂枝上行而發表氣厚則發熱桂肉下行而補腎此天地親上親下之道也豈有以五苓滲濕下泄之劑而反用上行發表者乎此皆未燭其理所以畏熱而不敢用故亦更張其議論也然仲景原云桂枝者取枝上皮也今方書皆注曰去皮此不知者之訛耳深所以誤後人者也桂之氣味在皮豈反去之而用淡然無氣味之木心亦何益乎不然則肉桂亦當去皮而貨其木矣有是理乎蓋肉桂之外皮以霜皮為無味而去之也曰去內外皮而為桂心者亦失之矣夫桂之甜辣而有氣味者在內寧可內外皆去耶所謂桂心者外去其無味之皮內除其無味之木其皮內之著於木上者氣味俱厚乃為桂心耳此義從來誤謬而李瀕湖先生本草綱目之正誤下亦有去內外皮之一語豈非智者之一失乎故並識之太陽病小便利者以飲水多必心下悸小便少者必苦裡急也病在太陽而小便利者以熱邪未犯太陽之腑膀胱無恙所以飲水雖多其氣化流行故小便利也然雖欲飲水當少與之可也若飲水過多小便雖利里無熱邪水寒傷胃停蓄不及即行必令心下悸動心下者胃之部分也悸者水滿胃中氣至不得流通而動惕也若飲水多而小便少者是下焦無火水濕不流膀胱蓄水不得氣化而出必苦裡急蓋指五苓散證而言也辨誤前注皆以心下悸為水乘心火心受制而悸者俱失之矣蓋驚悸者因驚駭而心為之悸動故為心病如炙甘草湯之心動悸及小建中湯之心中悸而煩雖亦可謂之心病然炙甘草湯之悸乃氣血皆虛小建中湯之悸乃中氣不足也至於心下悸則在心之下矣以心在膈膜之上胃在膈膜之下故曰心下此條之心下悸即水停心下之義也若夫臍下悸者去心已遠與心何涉而亦謂之心氣虛乎此皆不經之論也其所以亦謂之悸者不過言其跳動之狀如心病之動悸而已不可皆謂之心病也中風火劫微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也欲申火劫之誤先示警戒之詞蓋此條以本虛而禁灸也言虛人受邪鬱而不散本虛邪實則其脈微細而數微者細小而無力也數者熱鬱之脈也微則為虛數則為熱微則正氣已虛數則陰不勝陽凡見此者慎不可灸灸之則陽邪因火而愈盛令人煩悶而為火逆之證矣蓋因不察其為陽強陰弱之證陰氣本虛乃乘虛追逐其衛分之實邪驅使內入營分營氣本行於脈中者也經云脈者血之府也邪受火迫風乘火勢排闥直入以陰血而遇火逼之陽邪能不為之流散乎然自外觀之則若火氣甚微而不知其內攻於皮肉筋骨之中則甚有力也慎勿視一灸為微而誤犯之必令人筋骨焦傷將來脈中之陰血必難克復也可不慎歟脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血此以邪實而禁灸也言邪實而熱甚者當以汗解若不循法度而反以火灸之不知此為衛強邪實之病也灸法中雖有補瀉之分然但宜用之於虛寒而不宜施之於實熱此而灸之是實症而以虛治之此所謂實其實也所以熱邪因火勢而上炎故令咽中乾燥陽盛搏陰故血菀於上而為唾血也諸血證中唯血之唾者屬腎咽燥唾血蓋以火熱太甚傷腎家之真陰故也太陽病以火熏之不得汗其人必躁到經不解必清清當作圊血名為火邪太陽中風不用汗解以火熏逼而終不得汗陽邪被火熱鬱愈甚其人必煩躁不寧至七日以上行其經盡之時當解而不得解則熱邪必入里而內傷陰血火熱煎逼故溢入腸胃下行而圊血也此非太陽本病即上文所謂因火為邪故曰名為火邪太陽病二日反躁反尉其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也二日反躁者非成氏所謂熱氣行於里也乃陽邪怫鬱不得汗泄而躁也因欲發汗而反以火尉其背乃得大汗出即火劫之謂也然因火尉之誤而大熱之邪即乘大汗之虛遂陷入陽明胃腑故胃中之津液皆枯竭也枯燥燔灼故發躁煩躁則汗後陽虛而陰動於下煩則熱邪歸胃而陽盛於上胃熱神昏必發譫語矣若此者十餘日邪氣漸衰正氣將復故忽發戰栗戰栗者即戰汗也以大汗出而大熱入胃胃中之水已竭又能自下利者津液還胃而大便出也大凡寒戰已為邪氣欲解而胃熱躁煩譫語之症本應以承氣下之今得自利熱邪下泄故為欲愈也故其汗從腰以下不得汗者言前大汗出時若其汗從腰以下不得有汗則下半截之邪不得外泄因汗後陽虛下焦之氣化不行故欲小便不得氣上逆而反嘔也欲失溲者邪郁下焦陽虛不固腎不能司二陰之竅啓閉失常故既如癃閉又欲失溲也足下惡風者腰以下無汗風邪未去下焦陽氣不通故足下惡風也大便硬小便當數而反不數者邪歸陽明也陽明篇云本自汗出醫更重發汗以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少津液當還入胃中故知不久必大便也此條亦以大汗出後大熱入胃胃中水竭故令大便硬然熱邪在裡小便當數而反不數所以津液當還入胃而大便當出矣及大便出而且多則熱邪盡從下泄矣大便已而頭卓然痛者熱邪驟從下泄上焦乍虛故虛陽上浮而覺卓卓然痛也足心為湧泉穴足少陰腎脈之所自出下焦真陽之所自始也靈樞謂水穀入胃谷之濁氣下走為下焦之陽氣所蒸清陽騰越而為衛氣晝行於陽夜行於陰常從足少陰而行於五臟六腑者也前因邪熱據胃阻絶穀氣而不得下行下焦之陽氣不得旋轉故足下惡風邪氣既去經脈流通陽氣從足少陰而出所以足心必熱也穀氣者衛氣也衛氣乃胃中谷氣下流之所化實即胃氣也故曰有胃氣者生無胃氣者死此則胃氣已行故云穀氣下流也靈樞終始篇云凡刺之屬三必刺至穀氣故一刺則陽邪出再刺則陰邪出三刺則穀氣至穀氣至而止所謂穀氣至者已補而實已瀉而虛故已知穀氣至也詳推經義乃谷入於胃化而為精微沖和之氣也雖有宗氣營氣衛氣之分實谷之一氣所化故曰穀氣豈方氏所謂食氣也哉太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿而喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治此亦言不用汗解而以火劫致誤也蓋風為陽邪不當以火劫之法取汗以邪風而被火熱煎迫則熱傷陰分使血氣沸騰不循其常行之經脈隧道而橫流妄溢故曰失其常度邪風又得火熱故為兩陽相熏灼陽邪不得外泄故內走陽明熱傷血分胃土鬱蒸熱瘀肌肉故其身發黃也陽邪熾盛血熱妄行故欲衄陽盛則陰虛而津液涸故小便難曰陰陽俱虛竭者以小便難已知其為陰氣虛竭矣上文曰陽盛似不當言陰陽俱虛竭然前所謂陽盛者蓋指陽邪而言也此所謂陽虛者以正氣言也以熱邪過盛陽氣亦為之銷鑠矣經所謂壯火食氣故陽氣亦虛竭也如此則陰液消亡無以滋養灌溉而身體枯燥也若陽盛而得衄則陽邪得泄當漸解矣既不得汗又不得衄邪氣壅塞至於陰陽離異邪熱獨盛於陽故但頭汗出劑頸而還靈樞云諸陰脈皆至頸從胸中而還諸陽脈皆上至頭以陽邪熾盛於陽分與陰氣阻絶所以頭汗劑頸而還自頸以下陰脈所至之處皆不得汗泄也經云陰陽離決精氣乃絶陰陽既不流通邪並於胃在外則不得汗泄在內則不得下出故腹滿而喘膻中為氣之海上通於肺而為呼吸者也陽邪蓄積於中其氣不得流布於臟腑經絡故盛滿而為喘所謂滿則必喘也陰陽應象論云陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死者是也胃開竅於口咽為胃之門戶胃熱鬱蒸故口乾而咽爛也或久不大便則實熱久留於胃煎熬熏灼致神昏而譫語也甚者至於實邪上逆而為噦噦者厄逆也宣明五氣篇云胃為氣逆為噦非王太僕所謂噫亦非李東垣所謂乾嘔也夫四肢為諸陽之本陽邪盛則四肢實故手足躁擾而為捻衣摸床此九死之證也若其人小便猶利者則真陽猶未盡虛尚能施其氣化陰氣猶未盡竭尚能滲其津液猶或可以速逐陽邪急救陰氣也故曰其人可治燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上一壯與桂枝加桂湯更加桂二兩燒針者燒熱其針而取汗也玉機真藏論云風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也或痹不仁腫痛可湯尉及火灸刺而去之觀此則風寒本當以汗解而漫以燒針取汗雖或不至於因火為邪而針處穴孔不閉已被寒邪所侵矣八正神明論云天溫日明則人血淖液而衛氣浮故易瀉氣易行天寒日陰則人血凝泣而衛氣沉是以天寒無刺天溫無凝天忌不可不知也離合真邪論云吸則納針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉必先捫而循之切而散之推而按之彈而怒之抓而下之通而取之外引其門以閉其神呼盡納針靜以久留以氣至為故如待所貴不知日暮其氣以至適而自護候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補夫針之為道合天地之至數通不測之神機其法至精至妙苟不能造其精微則必有誤人之害所以燒針取汗邪氣已泄大氣皆出而不知氣至之後適而自護推闔其門之法使熱針驟去寒邪侵入其未闔之針孔故腫起如核皮膚赤色直達陰經陰邪迅發所以必發奔豚氣也蓋奔豚者腎藏陰寒之氣上攻也豚本黑色故屬北方亥水戌則一陽未剝子巳一陽初生唯亥純陰故以豕喻之也豕性遲鈍駭怒則奔突腎肝之陰氣上逆有類奔豚亦象形取義也足少陰腎經之脈穴自橫骨大赫氣穴四滿皆在任脈關元氣海之兩旁足厥陰肝經之脈穴循陰股入毛中過陰器抵小腹是以奔豚之氣從少腹而上逆衝心即如厥陰之為病亦氣上撞心也治之唯有溫經散寒而已故即於核上各灸一壯以驅其入處之寒邪又即於解肌正治劑中加桂以溫散陰經之寒邪乃為的治注皆謂桂伐腎邪然桂非伐腎邪也命門之火氣衰微則寒邪為患補益下焦之真火即益火之源以消陰翳也桂亦非能伐肝也下焦之陽氣衰弱則木鬱不達地中之陽氣上騰則草本暢茂人身腎中之元陽即地中來復之一陽也其上騰之陽氣即人身三焦之氣化也三焦本於腎中之陽猶天地生化萬物之陽氣本於黃鐘初動一點來復之陽也肝乃含生於土中勾萌未達之木也故猶屬厥陰厥陰者陰極陽生之處也膽即透地條達之木故為少陽少陽者初生方長之陽也蓋天地非陽氣則陰寒之鬱結不得發散草木非陽氣則勾萌之生長不能條達明乎此則用桂之義無不瑩徹矣桂枝加桂湯即於桂枝湯方內更加桂二兩成五兩余依桂枝湯法辨誤方氏云所加者桂也非枝也方出增補故有成五兩之說經止云加減原無載方舊本因後人增補成方類附卷末而多誤謬今依增校勘以便用者之尋討云以此推之則不過於原方更加桂而已二兩二字已屬不經豈有桂之辛熱驟加二兩之理即使漢之三兩為今之一兩則此二兩亦已六錢六分寧無太熱之慮乎而喻氏云所以用桂三倍加入桂枝湯中是加而又加矣故於本條原文下去二兩二字以合三倍之說恐不能無誤謬也若六經條下已有桂枝加桂一湯至此又加乃可云更加而謂之三倍然後可也不知此所謂桂枝加桂湯更加桂二兩者其意蓋謂桂枝加桂湯當於桂枝湯中更加桂二兩而已非謂桂枝加桂湯又更加桂也更有辨者別條既無桂枝加桂之用而獨用於此則何不一總加入而必一加再加乎此又不辨自明者也前輩用心偏於此等處模糊其何以翼仲景而訓後世哉脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮為風邪在表宜以汗解乃為合法醫反以火灸取汗而終不得汗邪氣遂無從而出陽邪因火而愈盛其鬱蒸之濕熱下流故從腰以下必重而痹也痹者筋骨拘攣而不能屈伸即素問生氣通天論所云濕熱不攘大筋緛短小筋弛長之義也此亦因火變逆是以名之曰火逆中風誤吐太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致此為小逆病在太陽自當惡寒發熱今自汗出而不惡寒已屬陽明然陽明當身熱汗出不惡寒而反惡熱今不發熱及關上脈見細數則又非陽明之脈證矣其所以脈證不相符合者以醫誤吐而致變也夫太陽表證當以汗解自非邪在胸中豈宜用吐若妄用吐法必傷胃氣然因吐得汗有發散之義寓焉故不惡寒發熱也細則為虛數則為熱誤吐之後胃氣既傷津液耗亡虛邪誤入陽明胃脘之陽虛躁故細數也關上者蓋指右關而言也即脈要精微論所謂附上右外以候胃內以候脾也右關本以候脾胃而關上則兼指氣口也何以知其指氣口乎五臟別論曰氣口何以獨為五臟主曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口也此以誤吐損胃故知關上兼指氣口而言也一二日邪在太陽之經因吐而散故惡寒發熱之表證皆去雖誤傷其胃中之陽氣而胃未大損所以腹中猶飢然陽氣已傷胃中虛冷故口不能食陽明篇首云能食者為中風不能食者為中寒蓋有陽氣則能納能消無陽氣則不能消納也三四日則邪已深入較前已不同矣若誤吐之損胃尤甚胃氣虛冷狀如陽明若中寒不能食故不喜糜粥也及胃陽虛躁故反欲食冷食及至冷食入胃胃中虛冷不化朝則陽氣隆而猶能受納暮則陰氣盛而脹滿故上逆而吐也此雖因誤吐致變然表邪既解無內陷之患不過當溫中和胃而已此為變逆之小者也不若誤汗誤下火劫之變尤大也此條當與下文誤汗變逆第五條之病人脈數數為熱之一節互看此以誤吐傷胃陽氣衰微陽虛脈數不能消穀而吐彼以誤汗陽虛胃冷客熱不能消穀而吐也太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也再言誤吐之變所以反復申明上條之義也言太陽表證本當惡寒今反不惡寒且不欲近衣者恰似陽明證所謂不惡寒反惡熱也其所以然者以吐後外邪雖去而胃氣虛損其虛陽在內原屬陽明之虛邪作煩故也中風誤汗太陽病發汗後大汗出胃中干煩燥不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之此條當作兩截解發汗後大汗出二句乃一條誤汗之總領自胃中干至胃氣和則愈是誤汗之虛邪犯胃故不須立治但飲水而使胃和則愈自脈浮小便不利至五苓散主之是邪氣未曾犯胃因太陽之經邪誤汗而犯太陽之腑膀胱受病故以五苓散主之也言太陽中風當用桂枝湯取微似汗以解之乃為正治此曰發汗則非解肌矣又曰大汗出非誤用麻黃湯即犯如水流漓之戒矣大汗出而胃中津液乾枯致燥熱而煩不得眠者經云胃不和則臥不安也胃中乾燥而煩故欲得飲水也曰少少與之者恐大汗出後胃中陽氣已虛不能消水而為水逆故也如得水之後津回氣復胃氣和調則愈矣若大汗出後其脈浮而小便不利者又非入胃之虛邪矣夫脈浮本為風邪在表此已發其汗而大汗出矣豈表邪猶未解耶所謂脈浮者蓋因誤汗亡陽真陽失守虛火上浮故脈見浮耳亡陽則命門無火下焦無氣化之用所以小便不利也虛陽浮越於上故微熱而消渴也消渴者飲水無度也陽虛則下焦無火氣化不行無蒸騰之用則下焦之氣化不升而上焦無津液之潤與厥陰首條之消渴相似故用五苓散中之桂以助其下焦腎藏蒸騰之氣四苓以沛其上焦肺家氣化之功則三焦施化升降流行津回便利而愈矣此條當與中篇發汗已脈浮數煩渴條互看辨誤成注以脈浮為表邪未解固屬不知者之謬解而尚論亦取方氏脈轉單浮為邪見還表五苓散導濕滋乾等語作一串講而謂脈見單浮為邪還於表脈浮本當用桂枝何以變用五苓耶以熱邪得水雖不全解勢必衰其大半邪既還表其熱亦微兼以小便不利證成消渴則腑熱全具故不從單解而從兩解凡飲水多而小便少者謂之消渴裡熱熾盛何可復用桂枝之熱故導濕滋干清熱唯五苓有全功耳愚竊謂汗既大出豈有表邪尚在之理既云證成消渴腑熱全具邪氣入腑焉有還表之時且云消渴之裡熱熾盛以桂枝尚憚其熱而不可復用然則五苓散中之肉桂又能滋干清熱否耶若以桂枝湯為單解五苓散為兩解是誤認五苓散之桂為桂枝矣不知五苓散方中原云桂去粗皮半兩桂枝湯固為解表而設然五苓散中之桂豈亦能解表耶假使五苓散中亦果用桂枝則何故偏以桂枝湯中之桂枝為熱而不可復用以五苓散中之桂枝為滋干清熱耶若此毋怪其太陽中篇傷寒發汗已脈浮數煩渴條下五苓散注中有術用蒼桂用枝之謬語良可嘆也義詳五苓散方論中此不多贅太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之太陽中風本衛不和而毛孔不閉營陰弱而不能內守所以陽浮熱自發陰弱汗自出也而又誤發其汗遂至衛陽愈疏而不能外固營陰愈弱而汗漏不止也如此非唯病不能除而亡陽之變生矣惡風乃陽虛生外寒非尚論所云為風所襲也以衛陽不密腠理空疏不能任受風寒雖無風而亦畏惡也小便難亦非津液外泄而不下滲也蓋衛外之陽即下焦真陽之所升發者也汗漏不止而陽氣散亡於外則真陽敗泄於內命門無火三焦不能施化氣化不行故膀胱之水道不利也四肢微急難以屈伸者素問陽明脈解云四肢為諸陽之本靈樞終始篇云陽受氣於四肢陰受氣於五臟邪客篇云衛氣者出其悍氣之慓疾而行於四末分肉皮膚之間而不休者也此因誤汗亡陽而陽氣不能充於四肢故也生氣通天論云陽氣者精則養神柔則養筋無陽氣則筋寒而拘攣故微急而難以屈伸也若此者是犯誤汗亡陽之逆也當隨證治之而桂枝湯不中與也故以桂枝加附子湯主之桂枝加附子湯方於桂枝湯方內加附子一枚炮去皮破八片余依前法此方於桂枝湯全方內加附子者故多一加字傷寒八九日風濕相搏條下之桂枝附子湯芍藥已去非桂枝全湯乃另是一方故無加字太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之尚論取方氏之說謂此條為誤服大青龍因而致變者立法誤矣大凡汗多亡陽及三陰無陽之證皆以附子溫經復陽乃治之大經理之自然一定之法也豈獨一青龍之誤為然哉其所以疑之者蓋以太陽下篇之誤服大青龍而致厥逆筋惕肉瞤之變者亦以真武湯救之之故也然服桂枝湯而強逼其汗遂可使如水流漓亡陽致變矣況於麻黃大青龍以及火劫乎所以謂之發汗而不曰解肌也汗出不解仍發熱者非仍前表邪發熱乃汗後亡陽虛陽浮散於外也若仍因表邪發熱焉有全不顧表而竟用真武湯之理乎觀長沙立治義自明矣此所謂心下悸者非心悸也蓋心之下胃脘之上鳩尾之間氣海之中靈樞謂膻中為氣之海也誤汗亡陽則膻中之陽氣不充氣不得伸而呼吸不利所以築築然跳動也蓋因汗多則陽虛陽虛則龍火上炎無根失守扇動君火故心下若怔忡之狀頭旋眩暈身體為之瞤動也振振欲劈地前注家皆置之不解而方氏引毛詩注云劈拊心也言拊心而無可奈何也若此是拊心而非劈地矣喻氏謂汗出過多衛氣解散其人似乎全無外廓故振振然四顧倣徨無可置身欲闢地而避處其內汗多亡陽欲入土中避虛就實也愚謂此論又覺過於深求不能無穿鑿之病以意解之則振振欲劈地者即下文所謂發汗則動經身為振振搖之意言頭眩而身體瞤動振振然身不能自持而欲仆地因衛分之真陽喪亡於外故命門之龍火飛越於上與誤服大青龍之變無異矣焉得不以真武湯收其散失之陽導使歸源令龍潛海底方得波恬浪息也故以真武湯主之方見青龍湯下發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之此本中風而以麻黃湯誤發其汗遂使陽氣虛損陰液耗竭不能充灌滋養故身疼痛而脈沉遲非傷寒脈浮緊而身疼痛之可比也浮緊則知其表邪未解沉遲則知其陽氣已虛陰陽應象論云陽氣者精則養神柔則養筋生氣通天論云聖人陳陰陽而筋脈和同此以誤汗亡陽無以噓培筋骨所以身疼痛故仍以桂枝湯和解衛陽因誤汗之後多加芍藥之酸收以斂營陰之汗液生薑以宣通其衰微之陽氣人參以扶補其耗散之元真故名之曰桂枝新加湯然身疼痛而脈沉遲皆無陽之證而不加附子以溫經復陽者以未如肉瞤筋惕汗漏不止之甚故不必真武湯及桂枝加附子湯救急之法也若服而而未除者恐亦必當加入也辨誤前注傢俱認作傷寒發汗後寒邪不能盡出所致誤矣夫傷寒發汗即或寒邪未盡既汗之後亦無身反疼痛之理身疼雖屬傷寒本證設汗後未除則脈當浮緊何反沉遲況桂枝本為解肌於寒傷營之證已在禁例且叮嚀告戒曰不可與也當取識此勿令誤也若傷寒而用桂枝豈仲景立法自犯乎桂枝湯已在所禁可更加芍藥人參以收補之耶此不辨自明者也既曰桂枝新加而原方不改則知仍桂枝之舊更加芍藥生薑人參矣治法不離乎桂枝則尤知其為太陽中風矣復何疑乎尚論謂名之曰新加者明非桂枝湯中之舊法也恐誤桂枝新加湯方桂枝三兩芍藥四兩甘草二兩炙人參二兩生薑四兩大棗十二枚擘上六味以水一斗一升微火煮取三升去滓分溫服如桂枝法義在注中不另立論病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也言病人脈數數則為熱若胃熱當消穀善飢而引食矣而反吐者皆以發汗之故令陽氣微膈氣虛脈乃數也靈樞經謂谷入於胃其精專之清氣化而為營行於脈中谷之濁氣降於下焦為真陽所蒸其清陽之氣慓悍滑疾行於脈外直達皮膚而為衛氣其宗氣積於胸膈之膻中上通於肺而為呼吸然雖有營氣衛氣宗氣三者之分實即谷之一氣所化也誤汗而衛外之陽氣敗亡則膈間之宗氣胃中之陽氣悉隨汗出之精液而外泄矣素問評熱論云人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也以經義揆之此條之義蓋以發熱汗自出之中風而又誤發其汗致令衛外之陽與胃中之陽氣皆微膈間之宗氣大虛故虛陽浮動而脈乃數也素問陰陽別論云凡陽有五五五二十五陽所謂陽者胃脘之陽也若胃脘之陽氣盛則能消穀引食矣然此數非胃中之熱氣盛而數也乃誤汗之後陽氣衰微膈氣空虛其外越之虛陽所致也以其非胃脘之真陽故為客熱其所以不能消穀者以胃中虛冷非唯不能消穀抑且不能容納故吐也汗下顛倒本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆此論證有表裡法有汗下若顛倒錯誤則為治之逆也逆之則變生矣夫邪氣在表本當發汗而反下之必有變逆之患此為治之逆也若先發其汗則治不為逆邪氣在裡本當先下之而後他治若反汗之則必有變逆之患故亦為治之逆若先下之則治不為逆矣此治法之先後次第也太陽病下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得里未和然後下之治病雖有權變汗下豈宜顛倒此承上文言邪氣在表當先以汗解今反下之而不愈因復發其汗下之則先虛其里汗之則又虛其表以此一下一汗而表裡俱虛矣其人邪氣雖未內陷而元氣已虛即欲得汗而邪氣鬱滯於表一時未得發越因而致冒冒者蒙瞀昏眩若以物覆冒之狀也其所以冒者以邪氣欲出而未得故也冒家得汗出則邪氣得泄而自愈矣其所以然者以汗出表和故也表氣既和之後方審其里有未和然後下之可耳觀此則知表邪在所必解若夫下與不下須察其里之和與不和非汗後必當下也況未汗之前可先下之乎此長沙示人以平常顯易之法戒人勿顛倒錯誤也下之後復發汗必振寒脈微細所以然者以內外俱虛故也誤下之後復發其汗陽氣大虛必振栗惡寒而脈見微細其所以然者以下之則胃中之陽氣已虛汗之則表間之衛陽又損致脈證皆見虛寒故曰內外俱虛也下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之上文言下後復發汗必振寒而脈微細知其為內外之陽氣皆虛矣而此條之下後復汗致晝日煩躁不眠夜而安靜者何也蓋晝者陽也夜者陰也煩雖屬陽而躁則陰盛迫陽之所致也夫衛陽與營陰和協則能安臥陽虛而煩陰盛而躁故不得眠也下而復汗陽氣大虛陽虛則陰盛晝則陽氣用事且衛氣行陽二十五度之時陽氣雖虛尚能與陰爭故晝日煩躁不得眠月令仲夏仲冬二至之候陰陽偏勝則陰陽爭即易所謂陰凝於陽必戰為其嫌於無陽之義也夜則陰氣獨治陽微不能與爭故安靜也發熱惡寒嘔逆者太陽之表證也嘔而寒熱者少陽之表邪也太陽熱邪犯腑則渴欲飲水陽明熱邪入里必渴欲飲水至於邪在少陽則或渴或不渴矣不嘔不渴則知病不在陽經矣況無表證身無大熱而脈見沉微沉則陰寒在裡微為陽氣大虛故當以乾薑附子為溫經復陽之治也乾薑附子湯方乾薑一兩附子一枚去皮生用上二味以水三升煮取一升去滓頓服義具注中大下之後復發汗小便不利者亡津液也勿治之得小便利必自愈大下之後復發汗無他變證但小便不利者以汗下兩亡其津液且陽虛而氣化不行也且勿治之恐利其小便又下竭其津液而致變也姑待其下焦真氣漸復津回氣化得小便利必自愈矣中風誤下太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之未言誤下之逆先申下早之禁以致其叮嚀戒警之意也夫太陽中風其頭痛項強發熱惡寒自汗等表證未除理宜汗解慎不可下下之於理為不順於法為逆逆則變生而邪氣乘虛內陷結胸痞硬下利喘汗脈促胸滿等證作矣故必先解外邪欲解外者宜以桂枝湯主之無他法也太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之中風本應解肌不當發汗即用桂枝湯亦有如水流漓而病不除者況前條亦有初服桂枝湯而反煩不解必待先刺風池風府使風邪得泄然後卻與桂枝湯則愈者可見表證未解未可遽用他法也醫見汗後不解疑其邪已入里而復下之仍見脈浮而不愈者何也因脈浮為風邪在外不應反下之下之而不愈者以藥不中病故令不愈也今以脈仍浮故知邪尚在外幸而猶未陷入也當須仍解其外邪則愈矣宜以桂枝湯主之太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之太陽中風外證未解之時而誤下之則胃氣虛損邪氣乘之當內陷而為痞為結下陷而成協熱下利矣以下後而其氣上衝則知外邪未陷胸未痞結當仍從外解可與桂枝湯不須加減悉照前方服法可也若其氣不上衝者恐下後邪或內入胃氣已傷將有逆變尚未可知桂枝湯不可與也姑待其變然後隨證治之可耳辨誤條辨及尚論皆曰以桂枝湯加入前下藥內則表邪外出里邪內出即用桂枝大黃湯之互詞也不知彼太陰條下因本太陽病誤下而致腹滿時痛故屬太陰雖然屬太陰而未離太陽故仍以桂枝湯解表又以脾陰受傷故倍加芍藥直至大實痛者已兼陽明方用桂枝加大黃湯以兼攻其胃實耳豈此條可比今以下之而但其氣上衝未生他變已屬幸免寧可再用從前下藥使一誤再誤耶恐有識者必不以為然也太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之桂枝證風傷衛也反下之不汗解而反誤下之也利遂不止因誤下之故熱邪隨之而內犯也脈促者非脈來數時一止復來之促也即急促亦可謂之促也促為陽盛下利則脈不應促以陽邪熾盛故脈加急促是以知其邪尚在表而未解也然未若協熱下利之表裡俱不解及陽虛下陷陰邪上結而心下痞硬故但言表而不言里也喘而汗出者經脈別論云太陽臟獨至厥喘虛氣逆是陰不足陽有餘也蓋邪熱上盛故脈促而氣喘也汗出汗自出也若陰脈弱而汗自出猶是桂枝證也今脈促汗出而表未解則知為誤下之變邪氣已誤越陽明之境矣喻氏所謂太陽熱邪未傳陽明之經已入陽明之腑矣所謂桂枝湯不中與也故以葛根解陽明之表芩連清邪熱之盛而和之以甘草者所以撫定中州也葛根黃連黃芩湯方葛根半斤黃連三兩黃芩二兩甘草二兩炙上四味以水八升先煮葛根減二升內諸藥煮取二升去滓分溫再服太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之此亦犯誤下之禁而脈不言促雖喘而微此變逆之小而輕者也其所以致之者亦因表邪未解而妄下之之故也以風邪仍在太陽故仍用桂枝又以誤下則胃受傷而中氣逆滿故用厚朴之辛溫以下氣微喘則邪壅上焦故用杏仁之苦辛以利上焦之肺氣也桂枝加厚朴杏仁湯方於桂枝湯方內加厚朴二兩杏仁五十個余依桂枝湯法喘家作桂枝湯加厚朴杏子佳此示人以用藥之活法當據理合法加減不可率意背理妄加也言凡作桂枝解肌之劑而遇有氣逆喘急之兼症者皆邪壅上焦也蓋胃為水穀之海肺乃呼吸之門其氣不利則不能流通宣布故必加入厚朴杏仁乃佳杏子即杏仁也前人有以佳字為仁字之訛者非也太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之成注云下條太陽病下之其脈促不結胸者為欲解此條下後脈促而復胸滿則又不得為欲解矣蓋由下後陽虛表邪漸入而客於胃中故與桂枝湯以散客邪通行陽氣也此說最為近理尚論謂誤下脈促與上條同以無下利不止汗出等證但見胸滿則陽邪仍盛於陽位此論恐未愜仲景之旨稍不如成氏之說矣何也觀下文云若微惡寒者即於方中加附子則知早已屬下後陽虛之證矣焉可謂之陽邪仍盛於陽位乎蓋同一誤下脈促上條多一下利不止但因喘汗而知其為陽盛尚用芩連清熱此條少一下利不止但因胸滿而即知其為陽虛非唯不用寒涼抑且於桂枝湯中減去芍藥者以桂枝湯中之芍藥原因陰弱汗自出故用之以益陰斂液扶陰氣之孱弱也非邪入胸滿陽虛者之所宜故去之耳可見胸滿一證雖未成痞結而近於痞結矣所以下早熱入致結胸而硬痛者可與大陷胸及大黃黃連瀉心湯其心下氣痞者皆下後胃陽虛損陰邪上逆搏結而成即下章所云此非結熱但以胃中虛客氣上逆故使硬也故諸瀉心湯中皆以乾薑黃連並用以開其堅凝之痞結及內經熱因寒用之法也故此條以桂枝去芍藥以解散陽邪流通陽氣治下後陽虛之脈促胸滿若增微惡寒則陽氣大虧致陽氣不能衛外而陽虛生外寒矣故加附子以溫經復陽也桂枝去芍藥湯方於桂枝湯方內去芍藥一味余依桂枝湯法桂枝去芍藥加附子湯方於桂枝湯方內去芍藥加附子太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者心下血此條詳言誤下之脈證以盡其變見病在太陽決無可下之理也前條脈促以喘汗而知其為陽邪上盛故用芩連以徹其熱次條同一脈促以胸滿而知其為下後陽虛表邪入客於胸中將成結胸故仍用桂枝去芍藥以散陽邪此條亦下後脈促既不能盛於上而為喘汗亦不至陷於內而為結胸脈雖促而陽分之邪已自不能為患是邪勢將衰故為欲解此誤下之僥幸者也若誤下之後脈仍浮者可見表邪甚盛不為下衰將必乘誤下之裡虛陷入上焦清陽之分而為結胸矣若下後脈見緊者則下後陽虛裡寒已甚夫膀胱者足太陽寒水之腑也足少陰腎者足太陽寒水之臟也故太陽與少陰表裡而為一合也誤下之後陽虛陰盛下焦之虛陽為少陰之陰寒所逼循經上衝必作咽痛也何也靈樞經脈篇云足少陰之脈其直者從腎上貫膈入肺中循喉嚨挾舌本是動則病舌乾咽腫嗌乾及痛者是也弦為東方木氣肝膽之病脈也下後而見弦脈則知邪犯少陽之經矣經脈篇謂足少陽之脈貫膈絡肝屬膽循脅裡出氣街動則病口苦善太息心脅痛不能轉側素問熱論云其脈循脅絡耳故胸脅痛而耳聾所以知其邪入少陽也脈細數者細則為虛數則為熱下後虛陽上奔故頭痛未止若脈見沉緊則為下後陽虛致下焦陰邪上逆而嘔也沉為在裡沉主下焦滑為陽動滑主裡實誤下里虛熱邪陷入虛熱相協中氣失守水穀下趨隨其誤下之勢必為協熱下利也脈法云浮為在表滑主痰食似與血分無涉然誤下里虛若兩尺浮滑者則邪熱下走陰分受傷故必下血也辨誤尚論謂脈浮句當增一促字其浮字貫下四句言浮而促者浮而緊者浮而弦者浮而細數者為是因論中省一個促字三個浮字後之讀者遂眩未知從何考訂豈別見之於他本歟抑不過出之臆見歟吾恐仲景之文反復詳密猶恐後人不悟豈故吝此三四字而省之耶且下文浮滑之浮字又不省去何哉太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之外證未除一誤下之已足致變況數下之乎頻數下之焉有內氣不虛者乎裡虛而邪熱內陷矣正氣既虛則不能卻邪外出邪氣既陷亦不能自出還表中氣虛而無以內守邪熱陷則勢必下攻以虛協熱故下利不止也協合也同也言但熱不虛但虛無邪皆不足以致此也熱邪協虛中氣不守津液下奔循其誤下之勢利遂不止致胃中陽氣虛竭故陰氣上逆堅結於胃中而痞硬也心下者胃居心之下也舊注皆以正虛邪實解之正虛固不必言邪實則熱邪實於裡矣豈反有參朮乾薑之用耶不知證雖協熱而下利胃又因下利而陽虛下利則熱邪下走陽虛則陰邪上逆故心下痞硬也甘草瀉心湯條內明言此非結熱但以胃中虛客氣上逆故使硬也所以下文有心下痞無陽則陰獨之論此誤下成痞一貫之理也表不解者以外證未除而言也里不解者以協熱下利心下痞硬而言也若欲表裡兩解則桂枝湯不中與也當以桂枝人參湯主之桂枝人參湯方桂枝四兩甘草四兩白朮三兩人參二兩乾薑三兩上五味以水九升先煮四味取五升內桂更取三升去滓溫服一升日再服夜一服以桂枝甘草為君者桂枝所以解衛分之陽邪以外證未除故也甘草所以緩虛痞之堅結救中土之崩陷猶甘草瀉心之義也臣之以參朮所以補正氣之虛救下利之不止也然脾胃之虛寒中焦之痞結以及不止之下利非以溫熱守中之乾薑佐之不能建奇功也曰桂枝而去芍藥者蓋桂枝湯中之芍藥以陰弱汗自出故用之以斂營氣而收陰液者也誤汗者宜之誤下而表邪未解者不可與人參並用也雖名曰桂枝人參湯實桂枝人參理中湯也以其辛溫而能解散外邪溫補而能守中消痞故為兩解表裡之劑云太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也二三日表邪未解將入里而未入里之時也不能臥但欲起者邪勢攪擾坐臥不寧之狀也若此則知邪已在胸次之陽位矣以尚未入胃故知心下必結必者決詞也本文雖不言治法以理推之即梔子豉湯之類症也若此症而脈見微弱者其中氣本屬虛寒尤為不可下之證而反下之若利隨下止則陷入之邪不得乘勢下走必硬結於胸中矣若三日下之而利未止者第四日復下之則已誤再誤有不至中氣不守胃氣下陷以虛協熱而下利者乎此所以重以為戒也前條誤下而利下不止故因虛寒而成痞硬此條誤下利止亦因虛寒而成結胸均屬太陽未解之證一痞一結似有虛實之殊然脈微弱而本有寒分者其可竟以實熱待之耶協熱二字當與前條不甚相遠也可見發於陽者而亦痞亦結是終無一定之例也但當以寒熱虛實為準則可耳中風蓄血太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯太陽之經脈起於目內眥之睛明穴上額交巔從巔入絡腦還出別下項挾脊抵腰中入循膂絡腎屬膀胱而終於足小趾之至陰穴故太陽為膀胱之經膀胱為太陽之腑此以太陽中風之陽邪不解熱邪內走而結於膀胱則熱在下焦即下文所謂太陽隨經瘀熱在裡也其人如狂者調經論云血並於陰氣並於陽故為驚狂生氣通天論云陰不勝其陽則脈流薄疾並乃狂謂之如狂者狂而未甚之詞其語言動靜或是或非猶未至於棄衣而走登高而歌逾垣上屋妄言罵詈不避親疏之甚也熱在下焦故迫血自下血下則熱邪隨血下泄故愈也若其血不得自下而留蓄於少腹者當攻之然外證未解者恐裡虛邪陷故尚未可攻必當先解外邪得外邪已解但覺少腹急結者乃可攻之宜以桃仁承氣湯下盡蓄血則愈矣桃核承氣湯方桃仁五十個去皮桂枝二兩大黃四兩芒硝二兩甘草二兩桂枝二兩是後人所改推仲景立方本意當是肉桂五錢漢之五錢即今之一錢二分也分三次服之是每服止五分而已與硝黃同用亦未為太過也上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利承氣即大小承氣之義神農本經謂桃仁主瘀血血閉潔古云治血結血祕通潤大腸破蓄血東垣謂桃仁苦重於甘氣薄味厚沉而降陰中之陽乃手足厥陰藥也苦以泄滯血甘以生新血故破瘀血者用之其功治熱入血室泄腹中滯血除皮膚血熱凝聚大黃下瘀血積聚留飲宿食蕩滌腸胃推陳致新芒硝鹹寒下泄咸走血咸軟堅熱淫於內治以鹹寒之義也桂之為用雖曰補五勞七傷通九竅利關節益精補腎暖腰膝治攣縮續筋骨生肌肉引血化膿作汗等效然通血脈消瘀血尤其所長也甘草所以保脾胃和大黃芒硝之寒峻耳此即至真要大論之所謂君二臣三奇之制也辨誤此條之如狂成氏謂熱在膀胱與血相搏未至於狂但不寧爾條辨以為心主血而屬火膀胱居下焦而屬水膀胱熱結水不勝火心火無制熱與血搏不歸經而反侮所不勝故走下焦而為蓄血心雖未病以火無制故悖亂顛倒與心狂無異又曰少腹者膀胱也急結者有形之血蓄積也尚論因之遂以為熱邪搏血結於膀胱膀胱為太陽寒水之經水得熱邪必沸騰而上侮心火故其人如狂若少腹急結則膀胱之血蓄而不行余歷觀注傷寒家動輒以驚狂譫語及心下悸者皆作心病論已屬乖謬而血蓄膀胱之說恐尤為不經愚謂仲景之意蓋以太陽在經之表邪不解故熱邪隨經內入於腑而瘀熱結於膀胱則熱在下焦血受煎迫故溢入回腸其所不能自下者蓄積於少腹而急結也況太陽多血少氣陽明多氣多血腸胃為受盛之器傳化糟粕之濁道百物之所匯血熱妄行豈有不歸腸胃者乎且膀胱為下焦清道其蒸騰之氣由氣化而入氣化而出未必能藏蓄血也即另有溲血一證亦由腎臟受傷下焦氣化乖離故有氣血錯亂之病然自小便流出者亦非瘀蓄留滯成形作塊之血也若果膀胱之血蓄而不行則膀胱瘀塞下文所謂少腹硬滿小便自利者又何自出乎歷見蓄血必從大便而出未見有傷寒蓄血而出於小便者若果出於小便因何反用桃仁承氣及抵當通其大便乎恐有識者必不以為然也方中之桂枝王肯堂先生已於傷寒準繩中斷云以上證詳玩之當是桂非桂枝也蓋桂枝輕揚治上桂厚重治下成氏隨文順釋未足據觀此論可以正千古之訛復仲景之舊矣奈何以後注家又云仍加桂枝分解外邪恐餘邪少有未解其血得以留戀不下耳桃仁承氣之桂枝解外與大柴胡湯之柴胡解外相仿益見太陽隨經之熱非桂枝不解耳余詳味原文仲景原云外不解者尚未可攻當先解外外解已但小腹急結者乃可攻之觀外解已三字則表邪已去下文但字之義則更無餘邪是桃仁承氣湯未許用之於外證未解之前但可用之於外證已解之後外證既解又何必仍加桂枝以分解外邪乎此方自成氏以來即改桂為桂枝其何故也揣其臆見是必因熱結膀胱迫血妄行畏桂之辛熱而不敢用故易之以桂枝耳不知血既瘀蓄而以大黃之苦寒芒硝之鹹寒下之非以桂之辛熱佐之安能流通其凝結融化其瘀滯乎況硝黃得桂則無苦寒之慮桂得硝黃亦無辛熱之虞矣嗚呼仲景醫聖豈其立法尚有偏弊必待後人規正耶此非仲景誤人乃後人誤仲景耳嗟夫太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之太陽中風至六七日乃邪當入里之候不應表證仍在若表證仍在者法當脈浮今脈反微而沉又非邪氣在表之脈矣邪氣既不在表則太陽之邪當陷入而為結胸矣今又反不結胸而其人發狂者何也蓋微為陽氣虛沉為邪在下以邪不在陽分氣分故脈微邪不在上焦胸膈而在下故脈沉熱在下焦者即上文所謂熱結膀胱也熱邪煎迫血沸妄溢留於少腹故少腹當硬滿熱在陰分血分無傷於陽分氣分則三焦之氣化仍得運行故小便自利也若此者當下其血乃愈其所以然者太陽以膀胱為腑膀胱以太陽為經本經自為表裡其太陽在經之表邪隨經內入於腑其鬱熱之邪瘀蓄於裡故也里非三陰也乃太陽之裡膀胱也熱瘀膀胱逼血妄行溢入回腸所以少腹當硬滿也上條不言脈此言脈微而沉上條言如狂此言發狂上條云少腹急結此云少腹硬滿上條之血尚有自下而愈者其不下者方以桃仁承氣下之此條之血必下之乃愈證之輕重迥然不同故不用桃仁承氣湯而以攻堅破瘀之抵當湯主之抵當湯方水蛭三十個油熬虻蟲三十個去翅足熬桃仁二十個去皮研大黃三兩酒浸上四味為末以水五升煮取三升去滓溫服一升不下再服水蛭苦鹹與虻蟲皆為肝經血分之藥性皆嗜血故善咂牛馬人血聞氣即著其喙鋒利所以為攻瘀破血之精鋭合桃仁大黃而為抵當湯丸也抵當者言瘀血凝聚固結膠黏即用桃仁承氣及破血活血諸藥皆未足以破其堅結非此尖鋭鑽研之性不能抵當故曰抵當世俗畏水蛭入腹再活皆不敢用不知彼雖易生之物若不得天地雨露之氣泥水濕熱之助豈得再生況已經熬炒絹濾去滓已是無形但存氣味矣又受人腸胃之火氣運行消鑠已達病所消化瘀血隨大便而並出矣焉得更留於人腹耶愚醫每每惑之然則仲景肯誤人耶殊屬可笑成氏謂苦走血咸勝血凡本草醫書皆宗之素問宣明五氣篇云咸走血陰陽應象論云咸勝苦蓋血為水類鹹味入之故血之味鹹苦為火味咸為水味水能制火故咸勝苦成氏之說終不知其何所自出也太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之此又以小便之利與不利以別血證之是與非是也身黃遍身俱黃也沉為在裡而主下焦結則脈來動而中止氣血凝滯不相接續之脈也前云少腹當硬滿此則竟云少腹硬脈證如此若猶小便不利者終是胃中瘀熱鬱蒸之發黃非血證發黃也故為無血若小便自利而如狂則知熱邪與氣分無涉故氣化無乖其邪在陰血矣又知血在下焦所以脈沉結少腹硬也如此乃為蓄血發黃此血證最詳最審更無差誤之真諦也故必以抵當湯主之
