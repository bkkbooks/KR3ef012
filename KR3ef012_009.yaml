body:
  text: 卷之九少陰篇少陰前篇證治第十九少陰見證少陰之為病脈微細但欲寐也少陰者陰中含陽之體也十一月冬至子之半陽氣萌於黃泉在六十四卦為復在八卦為坎一陽居於二陰之中寒水之內陽氣潛藏易所謂潛龍也凡陰陽之初皆含生於少陰五月之夏至一陰生於少陰心火之中離之象也十一月之冬至一陽生於少陰腎水之中坎之象也以天地陰陽之氣非少不生故皆生於二少陰猶女子之非少不生故子女皆生於少婦之腹此天地陰陽之至數也人身之腎與丨丨丨丨丨同體即古篆文水字之形也二陰之中命門之真陽藏焉左腎屬膀胱藏津液而為腎水之腑右腎屬三焦運真陽而為命門之用故腎為膀胱之裡而膀胱為腎之表三焦為命門之使而命門為三焦之原其經起於足掌心之湧泉穴出然谷循內踝之後入跟中上腨出膕上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中邪入其經所以有足冷嘔咳咽痛等證故為少陰病也平脈篇云大浮動數滑為陽沉澀弱弦微為陰脈微細者皆陰脈也陽氣少則微陰氣盛則細微細者陽虛陰盛也但欲寐者陰靜而闔也夫陽主動而陰主靜動則闢而靜則翕易曰闔戶謂之坤闢戶謂之乾此動靜闔闢之理也陰邪用事故目閉而但欲寐也按靈樞衛氣行於陽二十五度行於陰二十五度分為晝夜氣至陽而起至陰而止是故平旦陰盡陽氣出於目而目張則氣上行於頭日入陽盡而陰受氣夜半而大會萬民皆臥命曰合陰又靈樞大惑論曰夫衛氣者晝常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤今但欲寐者陰邪盛而陽氣弱衛氣不能上出於陽故也又云衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉即此義也以後凡稱少陰病者必見此等脈證者是也少陰病欲解時從子至寅上少陰為一陽初生之處坎中之陽也初陽之孕育必假少陰之體以為之胞胎人身之真陽必賴兩腎之寒水以為之閉藏則癸盡甲出貞下元生矣故少陰之於子太極元氣涵三為一而陽氣初生醜為二陽則陽氣方長之候寒邪值此陽回而自解矣至寅則陽氣上達欲出胞胎而將為少陽正陽氣生旺之地故曰從子至寅上少陰禁例少陰病脈微不可發汗亡音無陽故也陽已虛尺脈弱澀者復不可下之微者細小軟弱似有若無之稱也脈微則陽氣大虛衛陽衰弱故不可發汗以更竭其陽以汗雖陰液為陽氣所蒸而為汗汗泄而陽氣亦泄矣今陽氣已虛故曰亡陽故也若陽已虛而其尺脈又弱澀者知命門之真火衰微腎家之津液不足不惟不可發汗復不可下之又竭其陰精陽氣也此條本為少陰禁汗禁下而設故不言治然溫經補陽之附子湯之類即其治也少陰病飲食入口即吐心下溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯欲吐不吐之證本屬少陰飲食入口即吐心下溫溫欲吐而又復不能吐者寒在胸膈也此證於始得之時即手足寒者乃本經直受之寒邪肆虐陽氣不達於四肢也弦則為實遲則為寒脈弦而遲者為寒邪實於胸中不可用苦寒攻下也大凡熱邪之實於胃者方為可下熱邪在胸已不可下況寒邪乎寒既在胸因其近而取之以上出為功當用高者因而越之之法故云當吐之若膈上素有寒飲停積而常作乾嘔者是中氣本寒胃氣本虛更不可用瓜蒂散等苦寒之藥吐之重傷胃脘之陽而致變逆也當急溫之宜四逆湯少陰傷寒少陰病始得之反發熱脈沉者麻黃附子細辛湯主之此言少陰之表證也曰始得之者言少陰初感之邪也始得之而即稱少陰病則知非陽經傳邪亦非直入中臟乃本經之自感也始得之而發熱在陽經則常事耳然脈沉則已屬陰寒篇首云無熱而惡寒者發於陰也發於陰而又發熱是不當發之熱故云反也況少陰證中以惡寒厥冷為本證邪在陰經本難發汗然臨證之時有經有權察其發熱則寒邪在表胗其脈沉則陰寒在裡表者足太陽膀胱也里者足少陰腎也腎與膀胱一表一里而為一合表裡兼治故以麻黃髮太陽之汗以解其在表之寒邪以附子溫少陰之裡以補其命門之真陽又以細辛之氣溫味辛專走少陰者以助其辛溫發散三者合用補散兼施雖發微汗無損於陽氣矣故為溫經散寒之神劑云麻黃附子細辛湯方麻黃二兩細辛二兩附子一枚泡去皮破八片上三味以水一斗先煮麻黃減二升去上沫內藥煮取三升去滓溫服一升日三服少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也言邪入少陰已得之二三日而猶可以麻黃附子甘草湯微發其汗者以二三日無脈微沉細吐利厥冷煩躁之裡證故也非若下文所謂脈沉細數則為在裡而不可發汗及脈微者為亡陽而不可發汗也曰無里證則有表證可知故微發汗也但較之前條無反發熱脈沉之甚故不須更用細辛之溫散又以甘草緩其性而和之則有等差降殺之不同矣麻黃附子甘草湯方麻黃二兩甘草二兩附子一枚炮去皮上三味以水七升先煮麻黃一二沸去上沫內諸藥煮取三升去滓溫服一升日三服少陰病得之一二日口中和其背惡寒者當灸之附子湯主之此所以證前反發熱之意也素問熱論云一日太陽受之二日陽明受之三日少陽受之四日太陰受之五日少陰受之以此言之則一二日非少陰受病之時也非其時而見少陰證亦本經自受之病非傳經之邪也口中和者言口中不燥渴足見里無熱邪也若三陽熱證不待熱邪歸里而已口中不和矣口中和則知陰寒在裡矣前云反發熱則太陽尚有發熱之表邪此云背惡寒則陽分亦有陰寒之見證矣夫督脈者人身陽脈之都綱也且太陽之經脈四行皆挾督脈而行於兩旁素問金匱真言論云人身之陰陽則背為陽腹為陰以背為陽而亦惡寒則內外皆寒矣然但惡寒而不發熱則知非三陽表證之惡寒乃陽虛生外寒也以口中和而知其里背惡寒而知其表曰少陰病則又知脈之微細三者合而胗之自表至里皆屬虛寒是以知真陽虛憊陰邪莫制矣故當灸之謂灸少陰之脈穴如湧泉然谷太谿復溜陰谷等井滎輸經合即素問三部九候論之所謂下部地足少陰也王啟玄注云謂腎脈在足內踝後跟骨上陷中太谿之分動脈應手者是也灸之者所以溫少陰之經也更以附子湯主之者又所以溫補其腎家之真陽而散其寒邪也附子湯與真武湯之藥物相仿真武湯因腹痛四肢沉重下利而有水氣或咳或嘔邪氣未去故不用人參之補而加生薑以宣通陽氣辛散陰邪附子湯之用雖背惡寒乃陽虛所致非在表之寒邪口中和則里亦無邪故用補氣之人參以裨附子之溫補佐之以術芍所以扶中土而斂陰氣蓋五行無土不成水臟之邪非土莫制也茯苓淡滲導入水源而成入腎補陽之劑王太僕所謂益火之源以消陰翳也如下文身體痛手足寒骨節痛以脈沉論之皆非太陽傷寒脈緊之體痛骨節疼可比故亦以附子湯主之也但附子二枚恐其辛熱太甚或如真武湯之一枚可耳不然臨證時權其輕重乃為合法未可執泥以為定法也附子湯方附子二枚去皮破八片茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服少陰病身體痛手足寒骨節痛脈沉者附子湯主之身體骨節痛乃太陽寒傷營之表證也然在太陽則脈緊而無手足寒之證故有麻黃湯發汗之治此以脈沉而手足寒則知寒邪過盛陽氣不流營陰滯澀故身體骨節皆痛耳且四肢為諸陽之本陽虛不能充實於四肢所以手足寒此皆沉脈之見證也故謂之少陰病而以附子湯主之以溫補其虛寒也即此推之太陽篇之發汗病不解虛故也以芍藥甘草附子湯及發汗後身疼痛脈沉遲者桂枝加芍藥生薑人參新加湯主之者皆汗多亡陽陰盛陽虛之證即此義也少陰病脈沉者急溫之宜四逆湯脈沉者浮候取之則全無中候切之猶未見重按之而方得也沉則在裡在下沉則為陰為寒曰急溫之則知非沉數沉實沉滑之沉乃沉遲沉細沉微之沉也脈沉為邪入少陰下焦之真火衰微陰寒獨盛故當急溫之而宜四逆湯也若不急溫則陽氣愈虛陰寒愈盛而四肢厥逆吐利煩躁之變作矣少陰病惡寒而蜷時自煩欲去衣被者可治但惡寒而不發熱為寒邪所中也蜷臥者蜷曲而臥諸寒收引惡寒之甚也時自煩欲去衣被乃陽受陰迫虛陽上浮煩躁不寧乃真陽欲去之機也然自煩而欲去衣被則陽氣猶存溫經復陽之治可及故曰可治少陰寒利病人脈陰陽俱緊反汗出者亡音無陽也此屬少陰法當咽痛而復吐利此言少陰里證也太陽中篇第一條曰脈陰陽俱緊者名曰傷寒其第二條曰頭痛發熱身疼腰痛惡風無汗而喘者麻黃湯主之此曰病人脈陰陽俱緊則寒傷營之脈也傷寒本無汗今反汗出者以寒邪不在太陽之表而在少陰之裡命門之真火衰微不能升越其清陽而為衛氣衛陽不密玄府不閉故反汗出也蓋太陽脈緊則寒邪在表少陰脈緊則寒邪在裡以陰陽脈俱緊者當無汗而此又汗出故謂之反陽氣不能外固故曰無陽然真陽藏於兩腎之中故又曰屬少陰少陰之脈循喉嚨挾舌本蓋少陰真火衰微虛陽上泛故咽痛也陰邪上逆胃中虛寒則吐寒邪在裡中氣不守則利猶太陰之腹滿而吐自利益甚也能不以溫經復陽為治乎辨誤尚論云無陽以護外所以邪不出而汗先出誤矣若太陽寒邪在表則當有汗出邪出之論若少陰寒邪在裡但復其陽陽回則陰寒自消猶東風解凍大氣一至堅冰自泮又何邪出之有哉少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也欲吐不吐者少陰真火衰微寒在下焦陰氣上逆寒邪犯胃胃寒故也心煩者少陰之脈從肺出絡心注胸中寒盛於下虛陽上迫故心煩也但欲寐與前第一條同義五六日邪傳少陰之候也自利而渴者陰寒在裡則胃陽不守故自利下焦無火則津液不升故渴也素問熱論云五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴況又見欲吐心煩但欲寐之證故云屬少陰也然渴非陽邪因下焦無火不能蒸動氣液上焦無灌溉之潤且自利則水穀下趨而津液消亡矣夫腎者水臟也上古天真論云腎者主水聚五臟六腑之精而藏之者也上枯下竭水臟虛涸故引水自救非熱燥而渴也如果熱邪作渴小便當赤若小便色白而又有欲吐心煩但欲寐之少陰病形悉具則其所以小便白者以下焦命門火虛但有寒氣在下無火不能制水故令色白也如此者急當以溫經復陽為治不可因渴生疑誤用寒涼枉人生命也少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之陽氣衰少則脈數寒邪在經則脈澀陰邪下走則利上逆則嘔也腎臟之真陽衰微不能升越而為衛氣衛氣不密故汗出也必數更衣反少者即裡急後重之謂也蓋古之所謂滯下今之所謂痢疾利與痢同蓋古人所通用也此因寒邪下利非濕熱痢之可比乃下焦陽虛清陽不能升舉少陰寒甚陰氣內迫而下攻也陽氣陷入陰中陰陽兩相牽掣致陰邪欲下走而不得故數更衣陽氣雖不得上行猶能提吸而使之反少經云清氣在下則生飧泄清氣者下焦清陽之氣也皆寒在下焦清陽不升之病也當溫其上前注皆謂灸頂上之百會穴以升其陽蓋百會乃督脈之巔頂為諸陽之總會灸之亦足以提吸陽氣但未知果合仲景立法之義否或曰仲景無明文未可強解以意測之非必巔頂然後謂之上也蓋腎居下焦而胃雖居中然亦在腎之上胃脘之陽為後天根本故有胃氣者生也言數更衣而反少則下利不快但因下焦無火不得以苦寒之藥攻其下當以補暖升陽之藥溫其胃且灸之則下焦之清陽升越胃中之陽氣流行清陽升而濁陰降水穀分消而下利自止矣灸之者灸少陰之脈穴或更灸胃之三脘也即前所謂當灸之附子湯主之之法及下文灸少陰七壯之類也少陰病下利便膿血者桃花湯主之見少陰證而下利為陰寒之邪在裡濕滯下焦大腸受傷故皮坼血滯變為膿血滑利下脫故以溫中固脫之桃花湯主之桃花湯方赤石脂一斤一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓內赤石脂末方寸匕溫服七合日三服若一服愈余勿服桃花湯非濕熱暴利積多氣實之所宜蓋所以治陰寒虛滑之劑也李時珍云赤石脂手足陽明藥也體重性澀故能收濕止血而固下味甘氣溫故能益氣生肌而調中中者腸胃肌肉驚悸黃疸是也下者腸澼泄利崩帶失精是也白入氣分赤入血分故仲景用桃花湯治下利便膿血取赤石脂之重澀入下焦血分而固脫乾薑之辛溫暖中焦氣分而補虛粳米之甘溫佐石脂乾薑而潤腸胃也少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之腹痛小便不利下利不止而便膿血者蓋陰寒下利也二三日至四五日陰邪在裡氣滯腸間故腹痛也下焦無火氣化不行故小便不利且下利不止則小便隨大便而頻去不得瀦蓄於膀胱而小便不得分利也下利不止氣虛不固而大腸滑脫也便膿血者邪在下焦氣滯不流而大腸傷損也此屬陰寒虛利故以澀滑固脫溫中補虛之桃花湯主之辨誤腹痛小便不利下利不止便膿血者痢疾也蓋夏秋時行疫痢或濕熱流行或寒濕浸淫皆六氣淫慝之所致凡濕火所犯從下而上先傷手陽明大腸使廣腸腫潰皮傷血瘀變為膿血積滯氣道閉塞清陽不升濁氣下墜腸腫路窄時時欲便而不快故少腹痛而下重治宜清濕熱瀉大腸宜通不宜澀經所謂通因通用也若不急治而邪氣上行犯胃則必至於胸滿不食噁心乾嘔胃氣傷敗而死矣今所謂噤口痢者是也更有時行厲氣隨犯隨禁者皆難治之證也至若寒濕陰邪動則先犯陰經中滿腹痛脾胃受傷小腹絞痛下利膿血氣化不行小便點滴治之之法宜溫宜升久則宜補宜澀所謂治寒以熱也其更甚者大孔開張血不成積胃口敗絕而殞矣痢雖一證而陰陽虛實之治法不同此條自成氏以來凡注皆以腹痛為裡寒惟尚論以腹痛小便不利為少陰熱邪云注家見用乾薑謂是寒邪傷胃欠清蓋熱邪挾少陰之氣填塞胃中故用乾薑之辛以散之若混指熱邪為寒邪寧不貽誤後人耶詳推此論未必能矯前人之失蓋腹痛為太陰本證即有熱邪亦必有宿食積滯方能作痛豈但有熱邪在內能作腹痛耶況熱邪挾少陰之氣句尤為難解若果熱邪填塞胃中如何可用乾薑之辛熱以散之似屬背理竊恐指為寒邪者未為大誤指為熱邪者反貽誤後人不小矣若以乾薑為誤其誤當責之立法之仲景矣但觀痢證有用大黃黃連而愈者有用乾薑肉果人參附子而愈者豈非明證耶少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之少陰病者即前脈微細但欲寐及惡寒脈沉足冷等證也二三日不已言少陰本經自感之邪非三陽傳邪也若自陽經傳來內經熱論云五日少陰受之則二三日猶在陽明少陽豈得即稱少陰病而又云不已哉至四五日漸久而寒邪愈深故里寒而腹痛也小便不利者陰寒盛極下焦無火氣化不行也四肢為諸陽之本陽氣旺則清陽實四肢陽太盛則四肢實而能登高而歌及棄衣而走也此以陽衰陰盛故四肢沉重疼痛也寒邪已當自利若裡熱而小便不利則水為熱邪所耗矣以寒邪在裡而小便不利是氣化不行寒水停蓄水穀不分而下利故為有水氣非水停心下及腫脹之水也然病無定情證有不齊非必以腹痛小便不利四肢沉重為定證也若其人或因少陰脈貫腎絡於肺陰邪在下虛火上迫肺氣上逆而咳者或下焦火不能制水小便利而色白者或寒邪在裡胃陽敗損腎不能司二陰之竅而下利者或陰邪上逆犯胃而嘔者皆是也夫陰邪縱肆真陽不守急宜恢復真陽消除陰翳故宜以真武湯主之真武湯論見青龍湯下真武湯方成氏舊本原在此條之下其方論前已移附大青龍湯下此不重贅然後加減法為後世俗醫所增察其文理紕繆惡其紫之亂朱故重附於此並逐一指摘其誤使學者有所別識云後加減法若咳者加五味子半升細辛乾薑各一兩此三味小青龍湯證中因心下有水氣乾嘔而咳或利或喘皆水寒傷肺肺寒氣逆所致故用芍藥細辛乾薑五味等藥以收肺氣之逆此條亦有水氣或咳或利或嘔當與小青龍證同治故從彼方移入此方深得仲景之意可稱恰當升法見小柴胡湯注中若小便利者去茯苓小便利則氣化尚行或水氣去未可知也然茯苓雖淡滲亦有補虛益氣之功故為君子之藥雖溫補下焦之八味丸亦仍用之此方既與附子白朮芍藥同用留之何害而必去之耶若下利者去芍藥加乾薑二兩下利加乾薑極為允當但去芍藥之說其義未妥張元素曰白芍入脾經補中焦乃下利必用之藥蓋瀉利皆太陰病故不可缺得甘草為佐治腹中痛熱加黃芩寒加桂此仲景神方也李時珍云白芍益脾能於土中瀉木何反去芍藥耶若嘔者去附子加生薑足成半斤嘔加生薑固為穩當而去附子之說是屬何意少陰寒邪下攻則下利上逆則嘔吐其用附子處如飲食入口即吐而用四逆湯非吐而用附子耶如下利清穀裡寒外熱手足厥逆脈微欲絕或腹痛或乾嘔而用通脈四逆湯者非嘔而用附子耶如利不止厥逆無脈乾嘔而煩用白通加豬膽汁湯者非嘔而用附子耶如此之類不可枚舉豈加減家猶未之見而獨於真武湯去之耶想但見千金方嘔家多服生薑之語而忘其為少陰證之腹痛小便不利四肢沉重疼痛下利等證耶其加減如此謂非出自後世俗醫之手而何少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈脈緊見於太陽則發熱惡寒而為寒邪在表見於少陰則無熱惡寒而為寒邪在裡至七八日則陰陽相持已久而始下利則陽氣耐久足以自守矣雖至下利而以絞索之緊忽變而為輕細軟弱之微脈微則恐又為上文不可發汗之亡陽脈矣為之奈何不知少陰病其脈自微方可謂之無陽若以寒邪極盛之緊脈忽見暴微則緊峭化而為寬緩矣乃寒邪弛解之兆也曰手足反溫則知脈緊下利之時手足已寒若寒邪不解則手足不當溫脈緊不當去因脈本不微而忽見暴微故手足得溫脈緊得去是以謂之反也反溫反去寒氣已弛故為欲解也雖其人心煩然煩屬陽而為暖氣已回故陰寒之利必自愈也少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之吐利陰經之本證也或但吐或但利者猶可若寒邪傷胃上逆而吐下攻而利乃至手足厥冷蓋四肢皆稟氣於胃而為諸陽之本陰邪縱肆胃陽衰敗而不守陰陽不相順接而厥逆陽受陰迫而煩陰盛格陽而躁且煩躁甚而至於欲死故用吳茱萸之辛苦溫熱以泄其厥氣之逆而溫中散寒蓋茱萸氣辛味辣性熱而臭臊氣味皆厚為厥陰之專藥然溫中解寒又為三陰並用之藥更以甘和補氣之人參以補吐利虛損之胃氣又宣之以辛散止嘔之生薑和之以甘緩益脾之大棗為陰經急救之方也少陰病下利若利自止惡寒而蜷臥手足溫者可治陰寒在裡則胃陽不守而下利若利自止則知胃氣復固陽氣復能自守惡寒者陽虛不能勝任外氣也蜷臥者身體四肢皆蜷曲而臥惡寒之情狀也大凡熱者偃臥而手足弛散寒則蜷臥而手足斂縮下文惡寒蜷臥而手足逆冷者即為真陽敗絕而成不治矣若手足溫則知陽氣未敗以其陽氣尚能溫暖四肢故曰手足溫者可治然治之之法亦無外乎溫經復陽之法也方氏不知四肢為諸陽之本而曰四肢屬脾溫者脾土和也土和則萬物生故曰可治其謬殆甚少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯前吳茱萸湯條內言吐利手足厥冷煩躁欲死此雖吐利而手足不逆冷則陽氣未損陰經當無熱而惡寒今反發熱足見陽氣已回故曰不死既有可生之機而脈不至則是陽雖未絕寒邪固閉脈道鬱伏而不通故灸少陰七壯少陰穴即前背惡寒所灸之穴及井滎輸經合也可見吐利而手足逆冷惡寒蜷臥不發熱而脈不至者即為不治之證矣少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之其脈即出者愈清穀清水完穀也裡寒外熱陰盛格陽於外也寒甚於里故下利清穀四肢厥逆而脈見微細欲絕也寒甚則當惡寒而反不惡寒寒甚則面不當赤而反赤色虛陽上浮而戴陽也寒邪在裡或作腹痛陰氣上逆或作乾嘔少陰之脈循喉嚨若陰盛迫陽於上或作咽痛寒凝水涸而利反止陰盛陽衰之極營血不流陽氣不行而至於脈不出者當以通脈四逆湯主之前陽明中寒表熱裡寒下利清穀者尚以四逆湯主之況少陰乎服湯後陽回氣動其脈即出而仍還於有者乃陽氣未竭一時為盛寒所抑鬱伏不出耳故即出為愈也然即出之脈與下文暴出者異所謂即出者言即漸而出至於復有自有而常有所以為愈不若暴出之自無而忽有既有而仍無如燈光之回焰乃陽氣已竭得湯之溫暖而作返照之光則陽氣欲絕而死矣通脈四逆湯方甘草三兩炙乾薑三兩附子大者一枚生去皮破八片上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈通脈四逆湯即四逆湯而增入甘草一兩倍加乾薑也四逆湯義見太陽下篇陽旦條下愚竊論之以四逆湯而倍加乾薑其助陽之力或較勝然既增通脈二字當自不同恐是已加蔥白以通陽氣有白通之義故有是名疑是久遠差訛或編次之失致原方中脫落未可知也其後加減法揣其詞義淺陋料非仲景本意何也原文中已先具諸或有之證然後出方立治則一通脈四逆湯其證皆可該矣豈庸續用加減邪況其立意庸惡陋劣要皆出於鄙俗之輩未敢竟削姑存之以備識者之鑑云面色赤者加蔥九莖面色之赤乃陰盛格陽虛陽上泛附子之溫能直達命門大補坎中之真陽自能引火歸源導龍歸海何必蔥白其所以用蔥白者蓋為陽氣不得流通下利脈微至厥逆無脈而設也夫脈者氣血流行之發現處也陰血非陽氣不行寒邪固閉陽氣鬱伏故以蔥白通行陽氣助姜附溫經復脈之功耳然蔥之功力豈能導火歸根而能治面色之赤哉吾不信也腹中痛者去蔥加芍藥二兩寒邪在裡而腹痛既有姜附自可溫中即加芍藥更為相宜矣脈又不至何必去蔥揆之於理豈非庸俗之見乎嘔者加生薑二兩姜能宣通陽氣而解散寒邪且千金謂生薑為嘔家聖藥加入為宜咽痛者去芍藥加桔梗一兩此所謂少陰咽痛者以少陰之脈貫腎絡於肺循喉嚨挾舌本所謂咽者陰陽應象論云地氣通於嗌嗌者咽物之咽也地氣者腎中命門之陽氣也猶天地之氣一陽生於黃泉之義此以陰盛迫陽下焦真陽失守虛火在上故作咽痛附子峻補真陽直走下焦引火歸根其痛自止未可與下文熱在少陰二三日咽痛與甘草桔梗湯同論也一寒一熱陰陽迥殊況桔梗為舟楫之劑乘載藥力以入肺不使下行之品正欲令其虛火下降為宜豈可更與上焦風熱肺家天氣病之喉痛同日而語哉至於芍藥性雖酸收亦可斂火下降其去留亦無大關係又何足論哉利止脈不出者去桔梗加人參二兩桔梗固為當去而人參之加亦可以助姜附而補下利清穀之虛並可以補氣血而鼓動其不至之脈可稱允當少陰病下利白通湯主之上文下利已多皆屬寒在少陰下焦清陽不升胃中陽氣不守之病而未有用白通湯者此條但云下利而用白通湯者以上有少陰病三字則知有脈微細但欲寐手足厥之少陰證觀下文下利脈微方與白通湯則知之矣利不止而厥逆無脈又加豬膽人尿則尤知非平常下利矣蓋白通湯即四逆湯而以蔥易甘草甘草所以緩陰氣之逆和姜附而調護中州蔥則辛滑行氣可以通行陽氣而解散寒邪二者相較一緩一速故其治亦頗有緩急之殊也白通湯方蔥白四莖乾薑一兩附子一枚生用去皮破八片上三味以水三升煮取一升去滓分溫再服義見注中少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通湯加豬膽汁湯主之服湯脈暴出者死微續者生上文少陰下利即以白通湯主之矣此則下利而脈微足見陽氣愈微故與白通湯以恢復真陽消除寒氣不謂服湯之後利仍不止反見四肢厥逆而無脈陰邪上逆而乾嘔虛陽受迫而作煩悶者此非藥之誤也以陰寒太盛熱藥不得驟入陰邪縱肆猖獗扞格而不入耳故用素問至真要大論中熱因寒用之法從而逆之反佐以取之所謂寒熱溫涼反從其病之義也故用鹹寒下走之人尿苦寒滑下之豬膽以反從其陰寒之性導姜附之辛熱下行為反佐入門之導引王啟玄所謂下嗌之後冷體既消熱性便發使其氣相從而無拒格之患也服湯後其脈忽暴出者是將絕之陽得熱藥之助勉強回焰一照而熄故死若得湯而其脈微續漸出者為陽氣復回故為生也陰寒至此真陽或幾乎熄矣危哉少陰負趺陽者為順也少陰負趺陽句疑有脫字不然何至詞不達義耶前注皆以少陰為水趺陽為土恐土不能制水得以泛溢而為嘔吐下利予其權於土土強則水有制而平成可幾愚恐猶未合於至理夫少陰腎也水中有火先天之陽也趺陽胃脈也火生之土後天之陽也此承上文下利而言凡少陰證中諸陽虛陰盛之證而至於下利及下利清穀之證皆由寒邪太盛非惟少陰命門真火衰微且火不能生土中焦胃脘之陽不守故亦敗泄而為下利少陰脈雖微細欲絕而為陰寒所勝則為少陰之真陽負矣若趺陽脈尚無虧損則是先天之陽雖為寒邪之所鬱伏而後天胃脘之陽尚在為真陽猶未磨滅所謂有胃氣者生故為順也若趺陽亦負則為無胃氣而死矣少陰病脈微沉細但欲臥汗出不煩自欲吐至五六日自利後煩躁不得臥寐者死首條云少陰之為病脈微細但欲寐也此條又見沉脈則寒邪更深汗出者內無真陽衛氣不固而腠理不收也不煩者虛陽猶未上奔也自欲吐即前欲吐不吐之證也少陰之見證如此乃當急溫急補之時失此不治至五六日而更加自利乃至不煩之證至陽欲亡而作煩陰迫陽而發躁以但欲寐者而不得臥寐則陽神飛越真氣敗亡而死矣雖欲溫之所謂渴而穿井鬥而鑄兵不亦晚乎少陰病惡寒身蜷而利手足逆冷者不治前惡寒而蜷因有煩而欲去衣被之證為陽氣猶在故為可治又下利自止惡寒而蜷以手足溫者亦為陽氣未敗而亦曰可治此條惡寒身蜷而利且手足逆冷則四肢之陽氣已敗故不溫又無煩與欲去衣被之陽氣尚存況下利又不能止是為陽氣已竭故為不治雖有附子湯及四逆白通等法恐亦不能挽回既絕之陽矣少陰病吐利煩躁四逆者死寒邪上逆則吐下攻則利陽虛則煩陰極則躁而四肢乃諸陽之本也以吐利煩躁並作而又四肢逆冷為陽氣竭絕故死雖不言脈脈亦可知矣少陰病下利止而頭眩時時自冒者死前條利自止而手足溫則為可治此則下利止而頭眩頭眩者頭目眩暈也且時時自冒冒者蒙冒昏暈也虛陽上冒於巔頂則陽已離根而上脫下利無因而自止則陰寒凝閉而下竭是亦所謂上厥下竭矣於此可見陽回之利止則可治陽脫之利止則必死矣正所謂有陽氣則生無陽氣則死也然既曰死證則頭眩自冒之外或更有惡寒四逆等證及可死之脈未可知也但未備言之耳少陰病四逆惡寒而身蜷脈不至不煩而躁者死惡寒身蜷而利手足逆冷者固為不治此條但不利耳下文吐利煩躁四逆者死此雖不吐利而已不見陽煩但見陰躁則有陰無陽矣其為死證無疑況又脈不至乎前已有脈不至者因反發熱故云不死又有脈不出者雖裡寒而猶有外熱身反不惡寒而面赤其陽氣未絕故有通脈四逆湯之治此則皆現陰極無陽之證且不煩而躁並虛陽上逆之煩亦不可得矣寧有不死者乎少陰病六七日息高者死少陰病而至六七日不解其本經之自受者至此則陰邪已深臟氣已敗若傳經之邪自陽入陰五日而少陰受之又已三日亦不為不深矣一呼一吸為一息人身陽氣出自下焦故命門為三焦之原陽氣上行而為宗氣聚於膻中故膻中為氣之海上通於肺而為呼吸一息而脈行六寸一日一夜共一萬三千五百息當萬物之數脈行八百一十丈其氣皆由丹田之關元氣海而出謂之胞中氣街者是也所以肺主出氣而腎主納氣一呼一吸而腎為之本肺為之末以少陰腎臟受邪至於喘息之聲已高是膻中之氣有出無入欲歸丹田而納諸腎臟其可得乎陽氣離根已從上脫有不立盡者耶少陰後篇證治第二十少陰中風少陰中風陽微陰浮者為欲愈脈之陰陽辨脈載之詳矣然其所以分陰陽者有三一曰大浮數動滑為陽沉澀弱弦微為陰故曰陰病見陽脈者生陽病見陰脈者死其二曰寸口脈陰陽俱緊以一寸口而曰陰陽脈是浮候為陽沉候為陰也其三曰寸口脈微名曰陽不足尺脈弱者名曰陰不足此以尺寸分陰陽即關前為陽關後為陰之法也前後注家俱置之不講模糊抹過恐注家亦未明曉所以作依樣葫蘆耳殊非先覺之所宜也前太陽中風陽浮而陰弱蓋以浮候沉候分陰陽也此所謂陽微陰浮者是以寸口尺中分陰陽也若以浮沉二候分陰陽則沉候豈有浮脈耶此不辨自明者也夫少陰中風者風邪中少陰之經也脈法浮則為風風為陽邪中則傷衛衛受風邪則寸口陽脈當浮今陽脈已微則知風邪欲解邪入少陰唯恐尺部脈沉沉則邪氣入里今陰脈反浮則邪不入里故為欲愈也少陰病脈細沉數病為在裡不可發汗少陰病承上文中風而言也微細為少陰首條之本脈然風為陽邪沉則邪入已深數則熱鬱陰分故為病已在裡而不可發汗非前寒邪在表之反發熱可與麻黃附子細辛湯及二三日無里證之可與麻黃附子湯微發汗也脈微細之傷寒與脈沉數之中風迥異而在表在裡尤所當辨故有是禁少陰誤汗少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也邪入少陰致咳而下利譫語者以強逼其汗故也邪在陰經苟非真陽欲亡衛氣不固仲景於少陽篇中已明言陰不得有汗矣醫以其無汗而妄用燒針取汗之法致火氣入里少陰之脈貫腎絡於肺循喉嚨火氣循經上逆故為咳從里下攻則下利陰經本無譫語而火氣留中亂人神志一如陽明胃熱之狀揆其所由皆被火氣逼劫故也肺金受爍化源已竭水穀不分而津液已亡尚有譫語之火氣在裡則氣化必乖小便必難也此無他皆以火氣強責少陰汗故也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治此又以申上文強責汗之誤也言如前篇陰邪入少陰陽氣衰微不能充實於四肢則厥脈陰陽俱緊而反汗出者為亡陽厥則陽氣將敗汗出則真陽外走故皆用附子湯真武湯及四逆白通等回陽之法此以陽邪入少陰腎家之真陽不得流貫故但見外寒而厥陽氣未至敗亡故無汗況三陽在表三陰在裡邪在陰經本不得有汗醫不知而強發之豈知既入少陰邪已在裡欲其復從表散烏可得哉乃不達其義或以辛溫升發或用燒針火劫強逼取汗邪氣在裡既不能蒸陰液而為汗若熏熨燒針徒足以鼓動其陽邪煎迫其陰血故云必動其血陰受陽迫火挾血而上升必走上竅但未知其從何道而出或從口鼻或從目出未可知也名曰下厥上竭者謂寒熱之厥皆起於下也素問厥論云陽氣衰於下則為寒厥陰氣衰於下則為熱厥其必起於足下者陽氣起於足五趾之表陰氣起於足五趾之裡也乃以強發之故鼓激其少陰鬱伏之邪自下而厥逆上奔致陰血湧出而上竭其陰液故名下厥上竭然既在少陰已屬陰厥寒涼在所難用而陰血已動溫補又屬難施所以謂之難治也以一強發之誤其變如此遂至跋前疐後進退維谷臨證者其可草率從事邪少陰咽痛少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯風邪入少陰之經其脈貫腎絡肺循喉嚨系舌本邪氣循脈上行故二三日咽痛然此所謂咽痛者非比前篇陰盛迫陽之證可以通脈四逆湯引火歸源為治也中風本屬陽邪乃客熱內犯少陰之經耳邪氣輕微故二三日才見咽痛一證但終屬病發於陰不必驟用寒涼故僅用甘草湯以和緩其邪即鳳髓丹用甘草以緩腎急之意也如不瘥者又與苦辛之桔梗以清肺氣利咽喉同甘草和之而已甘草湯方甘草二兩上一味以水三升煮取一升半去滓溫服七合日一服桔梗湯方桔梗一兩乃苦桔梗非甜桔梗也甘草二兩上二味以水三升煮取一升去滓分溫再服少陰病咽中痛半夏散及湯主之前條云二三日咽痛初邪尚輕故但以甘草桔梗湯和緩陽邪清肺下氣而已此條云咽中痛則陽邪較重故以半夏之辛滑以利咽喉而開其黏飲仍用桂枝以解衛分之風邪又以甘草和之後人以半夏辛燥桂枝溫熱而疑之不知少陰咽痛陰經之陽邪非半夏之辛滑不足以開咽喉之鎖結風邪在經非桂枝之溫散不能解衛分之陽邪況所服不過一方寸匕即使作湯亦一二方寸匕煎三沸待小冷而少少咽之耳且半夏本滑而不燥桂枝亦溫而不熱少少用之亦復何害半夏散及湯方半夏洗桂枝取皮甘草炙以上各等分以上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煮七沸內散一兩方寸匕更煎三沸下火令小冷少少咽之論附註中少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之前人以一咽痛而有治法三等之不同遂至議論紛出不知第一條咽痛少陰之邪氣輕微故但以甘桔和之而已其二條因經邪未解痛在咽中痰熱鎖閉故以半夏開豁桂枝解散此條則咽已生瘡語言不能聲音不出邪已深入陰火已熾咽已損傷不必治表和之無益故用苦酒湯以半夏豁其咽之利雞子白以潤咽滑竅且能清氣除伏熱皆用開豁潤利收斂下降而已因終是陰經伏熱雖陰火上逆決不敢以寒涼用事也苦酒湯方半夏如棗核大十四枚洗淨破雞子一枚去黃內上苦酒著雞子殼中上二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不瘥更作三劑服之少陰之陰熱上攻終非三陽之熱邪可比故始終禁用寒藥然非辛溫滑利不足以開上焦痰熱之結邪故用半夏為君鬱熱上蒸則上焦天氣不清所以咽中傷爛肺受火刑金實無聲故語言不能聲音不出肺為人身之天氣象形以為用故以雞子白之清涼滑竅為臣李時珍云卵白象天其氣清其性微寒卵黃象地其氣渾其性溫兼黃白而用之其性平精不足者補之以氣故曰卵白能清氣治伏熱目赤咽痛諸疾形不足者補之以味故卵黃能補血治下利胎產諸疾卵則兼理氣血故治上列諸疾也陰火上逆非寒涼可治當用酸斂以收之故用味酸性斂之苦酒為佐使陰中熱淫之氣斂降如霧斂云收則天清氣朗而清明如故矣謂非窮理盡性格物致知而能用意如是耶今之優人每遇聲啞即以生雞子白啖之聲音即出亦此方之遺意也少陰病下利咽痛胸滿心煩者豬膚湯主之少陰下利本屬臟寒然中風陽邪所感因少陰之脈其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中陽邪入絡故咽痛胸滿而心煩皆陰經之伏熱也寒涼既不利於陰經之治而溫藥又非伏熱所宜故仲景不得已旁出奇治而以豬膚湯主之蓋以滋養腎臟之真陰滑利咽喉之逆氣潤下其心胸之客熱使邪氣貼服而不犯寒熱之禁忌其斯以為聖乎豬膚湯方豬膚一斤甘寒上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和相得溫分六服豬膚一味方中向未註明以何者為膚致使前後注家議論紛然各異如吳綬謂燖豬時刮下黑膚也方有執謂本草不載義不可考說者不一用者不同然既曰膚當以燖豬時所起之皮外毛根之薄膚為是王好古以為豬皮尚論云若以為燖豬皮外毛根薄膚則薟劣無力且與熬香之說不符但用外皮去其內層之肥白為是其說頗通若果以燖豬時毛根薄膚則薄過於紙且與垢膩同下熬之有何香味以意度之必是毛根深入之皮尚可稱膚試觀刮去毛根薄膚毛斷處毛根尚存皮內所謂皮之去內層極為允當蓋以豬為北方之水畜膚近毛根取其色黑而走腎滋陰加白蜜之滑潤以利咽潤燥風從衛入以北方之性引少陰之邪仍向皮毛而消散則客熱可除至於白粉五合亦未明言是何谷之粉致歷代註釋俱無分辨愚考之本草李時珍云惟粟之味鹹淡氣寒下滲乃腎之谷也腎病宜食之虛熱消濁泄痢皆腎病也滲利小便所以泄腎邪也降胃火故脾胃病宜之以此擬之既曰熬香味亦可啖仲景所用或此意也成氏以為益氣斷利意亦相同或有所自未可知也但毫不置辨為異耳後人但能譏其隨文順釋而亦無片言分剖何哉少陰熱厥少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之成氏云四逆四肢不溫也其說似與厥冷有異方氏謂人之四肢溫和為順不溫和為逆則不溫即冷也仲景於厥陰篇中即自為註腳云凡厥者陰陽不相順接便為厥厥者手足逆冷者是也由此觀之厥即逆冷逆冷即厥初無少異況厥陰篇中以厥少熱多厥多逆少為病之進退以熱對厥則知不止於不溫而實四肢逆冷矣但厥逆有輕重之不同寒熱之各殊所以素問厥論中有熱厥寒厥之分也故論中或云厥或云厥逆或云四逆或云厥冷或曰手足寒或曰手足厥寒皆指手足厥冷而言也然厥逆雖皆手足寒冷而其所以致厥之故則有寒熱之不同若寒邪在裡陰寒肆逆則陽氣不充於四肢故有厥逆之患若熱邪內郁邪氣阻絕則陽氣不達於四肢故亦有厥逆之變人身陽氣起於足少陰之湧泉故靈樞云衛氣晝行於陽二十五度夜行於陰二十五度常從足少陰出入者也所以少陰腎中命門真陽之氣遊於一身而布化則為三焦達於皮膚而固密則為衛氣邪在少陰之裡無論寒熱之邪皆足以阻絕二氣之流行蓋陰血無陽氣則無以流行陽氣無陰血則無以附麗二者相依並行不悖頃刻不離故生氣通天論云陰陽離決精氣乃絕絕者阻絕之謂也若此者其即陰陽不相順接之謂歟此所謂少陰病者即前所云脈微細但欲寐之少陰病也已見四逆之變而又有或咳或悸或小便不利或腹痛或泄利下重諸陰邪之見證若果屬寒厥則當以四逆湯及附子湯主之矣而仲景以四逆散主之者何也蓋因本系中風之陽邪或邪自陽經傳來者本屬陰中之陽邪雖未可以寒涼施治亦不可率以四逆湯之辛熱妄投致誤故以甘緩升解開結斂陰之四逆散和之而已然四逆散性味和平非療厥治逆一定不移之定法也前輩輒以為寒涼之劑未可以之治療寒厥誤矣夫甘草枳實本非寒藥且柴胡但能升解鬱熱並無寒性芍藥走陰酸斂亦非寒物又何寒涼之有竊推仲景之意蓋以甘草之甘和以緩陰邪之急枳實之苦以開中氣之結柴胡以升發其陽氣之郁芍藥以收斂其陰氣之逆所服不過一方寸匕一日三服而已所以藥力輕微製劑褊小者無過和解其邪耳若和之而證減厥除則其邪解矣若陰邪寖盛厥逆不解則溫經復陽之四逆等湯具在若厥後發熱不惡寒而反惡熱口燥舌乾煩躁不眠譫語便秘則為自陰還陽已非陰經之舊證前治陽明法可用也此正所謂持其兩端觀釁而動之法與兵家無異若仍泥諸四逆厥冷為不可下之例則又非變通之活法矣四逆散方甘草枳實柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服義具注中後加減法咳者加五味子乾薑各五分並主下痢悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令拆泄利下重者先以水五升著薤白三升煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服詳推後加減法凡原文中每具諸或有之證者皆有之如小柴胡湯小青龍湯真武湯通脈四逆湯四逆散皆是也愚竊揆之以理恐未必皆出於仲景如小柴胡證之或咳去人參而用小青龍法加五味子半升乾薑二兩雖或可用然肺寒氣逆者宜之肺熱而痰氣壅盛者非所宜也前小青龍症本以水寒侵肺表證未解又與麻黃桂枝同用故不畏其收斂在小柴胡湯已當量其寒熱虛實而施不可鹵莽從事矣況其他乎真武湯之或咳亦加五味子半升細辛乾薑各一兩此乃少陰寒證或亦可用然少陽少陰自當略有區別至此條四逆散之或咳亦加五味子乾薑且分兩不過五分如曰古之一兩今用一錢可也則古之五分僅存今之五釐而已寧可以方寸匕分三服哉若果仲景所加雖或以為陰中之陽邪而減其分兩亦未可知然不能無疑焉如腹中痛者加附子一枚以少陰腹痛而用附子一枚非仲景不能宛然仲景之筆但以一枚之多若加入十分之中尚可若止加入三方寸匕內則覺太多矣而加法中並無成法亦缺失也其泄利下重者以陰寒在裡則泄利清陽不升而下陷則下重泄利下重則氣滯下焦故用辛溫滑利之薤白以鼓動其陽而疏泄其滯也此亦頗似仲景本文何以知之嘗觀金匱方中治胸痹心痛有栝蔞薤白白酒湯胸痹不得臥心痛徹背者有栝蔞薤白半夏湯胸痹心痞有枳實薤白桂枝湯皆以其脈之陽浮陰弦及寸口脈沉而遲關上小緊數悉為陽氣虛衰之故所以用薤白通行陽氣即白通湯用蔥白之意也至於悸者加桂枝五分小便不利者加茯苓五分夫悸病之在陽經者皆屬汗下之虛其說已見於小柴胡湯方論中矣而三陰悸病乃陰中之陽亦虛邪所致蓋桂枝為衛分解散風邪之藥雖太陽篇中如炙甘草湯治心中悸而煩者中有桂枝又桂枝甘草湯治發汗過多叉手冒心心下悸者亦用桂枝又茯苓桂枝甘草大棗湯治發汗後臍下悸欲作奔豚者用桂枝皆各自有專意非獨以桂枝能治悸也且以上諸湯桂枝輒皆三四兩此方止用五分何以治悸茯苓雖淡滲而小便不利者亦止用五分東垣云古云三兩即今之一兩也李時珍云古今異制古之一兩今用一錢可也據東垣之說則古之所謂五分乃今之一分七釐也豈能滲利小便哉況氣化之功非獨淡滲可致是以知其非仲景原文也少陰熱證少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之少陰下利陰寒在下也少陰之脈從腎上貫肝膈入肺循喉嚨其支者從肺出絡心注胸中以下利六七日之久邪氣循經上逆犯肺則咳入胸則嘔下焦無火氣液不得蒸騰則渴虛陽在上其脈出肺絡心故心煩不得眠也豬苓湯主之者非獨滲利小便分別水穀而已以諸利小便之藥皆氣味輕薄而上行於肺使肺氣下行然後小便滲利此蓋欲引其犯肺咳嘔心煩之陽邪下走故用諸滲泄之藥及甘膠以清肺益陰也詳具五苓散及豬苓湯方論中然於此可見仲景治少陰經之陽邪雖不以寒涼為治而亦不輕用溫熱唯用升降滋養以導引消弭之耳少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之二三日以上言才過二三日也二三日即心中煩不得臥較之前條咽痛心煩為陽邪已甚然陰經邪熱亦能燔灼心神使之煩悶攪亂而不得臥者不似前篇皆少陰之寒邪入里陰邪太甚故能使命門真陽磨滅所以更無熱證此篇皆陽邪入里故無虛寒之證且腎家雖有真陰亦自有真陽作配又增外入之陽邪是一水不能勝二火故使熱邪內鬱而心煩不得臥致手足兩少陰俱受病也以黃連阿膠湯主之者所以瀉心家之煩熱益腎臟之真陰也前輩每以傳足不傳手亹亹立論諄諄置辨皆未之思並未之悟耳如少陽證而每病及三焦陽明脾約而使大腸燥結少陰下利膿血病及大腸六經之喘咳邪皆犯肺心中煩心下痞及驚悸神昏之病皆犯心之包絡非手經病耶豈手經非十二經又在軀殼之外而不病耶黃連阿膠湯方黃連二兩黃芩一兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三物取二升去滓內膠烊盡小冷內雞子黃攪令相得溫服七合日三服黃連苦寒瀉心家之煩熱而又以黃芩佐之芍藥收陰斂氣雞子黃氣味俱厚陰中之陰故能補陰除熱阿膠為濟水之伏流乃天下十二經水中之陰水也烏驢皮黑而屬水能制熱而走陰血合而成膠為滋養陰氣之上品協四味而成劑半以殺風邪之熱半以滋陰水之源而為補救少陰之法也少陰病八九日一身手足盡熱者以熱在膀胱必便血也大凡寒邪入少陰必惡寒逆冷故以反發熱者為陽回陰解而不死此因風邪入少陰至八九日之久一身手足盡熱者蓋以足少陰腎邪傳歸足太陽膀胱也腎與膀胱一表一里乃臟邪傳腑為自陰還陽以太陽主表故一身手足盡熱也然一身盡熱陽邪已甚正所謂邪在陰經則為陰邪而見陰證邪在陽經即為陽邪而見陽證以熱邪在膀胱所謂瘀熱在裡迫血妄行故必便血也此條雖系自陰轉陽其中風之熱邪既歸太陽之裡與太陽熱結膀胱之證治無異不可仍以少陰為治也必便血三字前注傢俱謂必出二陰之竅恐熱邪雖在膀胱而血未必從小便出也詳見熱結膀胱注中少陰病下利便膿血者可刺邪入少陰而下利則下焦壅滯而不流行氣血腐化而為膿血故可刺之以泄其邪通行其脈絡則其病可已不曰刺何經穴者蓋刺少陰之井滎輸經合也其所以不言者以良工必知之熟矣故不必贅也少陰急下少陰病得之二三日口燥咽乾者急下之宜大承氣湯少陰本經感受之寒邪本無口燥咽乾之見證即中風陽邪所感亦無過心煩咽痛不得臥而已雖有咳而渴嘔之證是亦虛陽挾邪循經上逆故不以寒涼為治而以豬苓湯引天氣下降使氣液升降流行乃其治也惟素問熱病論云少陰脈貫腎絡於肺系舌本故口燥舌乾而渴然非少陰本經之自感因一日巨陽受之二日陽明受之三日少陽受之四日太陰受之至五日而始少陰受之乃陽經傳邪故有是證此條得病才二三日即口燥咽乾而成急下之證者乃少陰之變非少陰之常也況汗下皆屬陰經之禁忌乎惟兩感於寒者一日巨陽與少陰俱病則頭痛口乾而煩滿古人又不立治法矣然但口燥咽乾未必即是急下之證亦必有胃實之證實熱之脈其見證雖屬少陰而有邪氣復歸陽明即所謂陽明中土萬物所歸無所復傳為胃家實熱之證據方可急下而用大承氣湯也且大承氣為仲景之所慎用在陽明篇中如脾約一證里無大熱者即以小承氣湯和之而不令大泄下矣其次或以調胃承氣湯和胃麻仁丸潤燥而已豈肯以大承氣而急用之於少陰證乎其故可思也其所以急下之者恐入陰之證陽氣漸亡胃腑敗損必至厥躁呃逆變證蜂起則無及矣故不得不急也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯此亦少陰之變例也自利寒邪在裡也自利清水即前篇所謂清水完穀此則並無完穀而止利清水其色且純青矣清水固屬寒邪而青則又寒色也故屬少陰成氏及方注皆以為肝色誤矣若證止如此其為四逆湯證無疑不謂胃中清水雖自利而去其穀食渣滓熱邪尚留於胃所以心下按之必痛且口中乾燥則知邪氣雖入少陰而陽明實熱尚在非但少陰證也其熱邪熾盛迫脅胃中之津液下奔下焦寒甚故皆清水而色純青也即素問至真要大論中病機十九條之所謂暴注下迫皆屬於熱之義也陽邪暴迫上則胃中之津液下則腎家之真陰皆可立盡故當急下之也辨誤成注以自利色青為肝邪乘腎而以腎蘊實邪為解其理已屬背謬劉河間原病式云仲景法曰少陰病下利清水色純青者熱在裡也大承氣湯下之引此以證小兒熱甚急驚利多色青及下利色黑由火熱過極反兼水化之義不知小兒急驚之利色多青者乃肝木之邪下利色黑者亦有宿穢蓄血寒邪之不同非盡熱極反從水化也況仲景原云自利清水色純青又以心下必痛口乾燥而知其熱邪在裡故雖云少陰病而急用大承氣湯下之守真不知此義但以少陰病自利清水色純青為熱邪在裡削去心下必痛口乾燥者八字漫云以大承氣湯下之試思苟非有心下痛口乾燥之見證熱在何處而以承氣湯下之耶歷觀完素運氣病機無非攪亂經文立方主治盡是苦寒攻下如病機一十九條內經本云諸熱瞀瘛皆屬於火諸痛癢瘡皆屬於心完素則增為諸痛癢瘡瘍皆屬心火不知經所謂心者指後天實火而言火者指先天真陽而論所以實火則有諸痛癢瘡之有形見證虛火則有諸熱瞀瘛無形上升之見證也又增燥病一條曰諸澀枯涸幹勁皴揭皆屬於燥不知出於何典且每引高陽生左為腎右為命門之說詢是金遼亂世鹵莽粗工知熱而不知寒知瀉而不知補後人尊之為四大家之一不知何所取乎少陰病六七日腹脹不大便者急下之宜大承氣湯少陰病而至六七日邪入已深然少陰每多自利而反腹脹不大便者此少陰之邪復還陽明也所謂陽明中土萬物所歸無所復傳之地故當急下與陽明篇腹滿痛者急下之無異也以陰經之邪而能復歸陽明之腑者即靈樞邪氣臟腑病形篇所謂邪入於陰經其臟氣實邪氣入而不能客故還之於腑中陽則溜於經中陰則溜於腑之義也然必驗其舌察其脈有不得不下之勢方以大承氣湯下之耳
